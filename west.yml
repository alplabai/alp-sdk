# SPDX-License-Identifier: Apache-2.0
#
# alp-sdk west manifest.
#
# This is the manifest a Zephyr workspace uses when alp-sdk itself is
# the topdir.  Most application repos will instead add alp-sdk as a
# project in their own west.yml and let *that* manifest drive Zephyr.
#
# Pin policy:
#   - zephyr: the stable release the SDK is verified against.  Currently
#     v4.4.0 (the same revision pr-twister.yml + the nightly AEN HIL
#     workflow exercise).  v0.5 bumped from v3.7.0 LTS to v4.4.0 to
#     pick up mainline LVGL v9, upstream Alif Ensemble board files,
#     and the I2S inclusive-language rename.  Bumps are deliberate,
#     not automatic -- each major upgrade ships as a minor alp-sdk
#     release after re-verifying every wrapped peripheral on the
#     target SoMs.  See docs/zephyr-version-policy.md for the full
#     policy + LTS migration notes.
#   - hal_renesas / hal_nxp: imported via Zephyr's own west.yml (the
#     name-allowlist below lets them through the import filter).
#     Zephyr v4.4 pins specific revisions; we follow what Zephyr ships.
#     hal_renesas covers the RZ/V2N + RZ/V2L + RZ/V2H BSP under
#     `drivers/rz/fsp/src/rzv/bsp/mcu/rzv2n/`; hal_nxp covers
#     i.MX 93 (MIMX9301..9352) and i.MX 95 under
#     `mcux/mcux-sdk-ng/devices/i.MX/i.MX93/`.
#   - hal_alif: NOT in Zephyr's modules tree as of v3.7, but Alif
#     publishes a fully Apache-2.0-licensed Zephyr module of their
#     own at github.com/alifsemi/hal_alif (zephyr/module.yml shape,
#     standard cmake/kconfig hookup).  We import it directly here
#     as a top-level project at the latest tagged release.
#
#     IMPORTANT (current as of the v4.4.0 pin): upstream Zephyr v4.4
#     DOES ship the stock Alif Ensemble board files under
#     boards/alif/ -- ensemble_e8_dk (incl. our E8 part
#     ae822fa0e5597ls0; targets rtss_he / rtss_hp), ensemble_e1c_dk,
#     balletto_b1_dk.  So the DEFAULT AEN path is plain upstream
#     Zephyr + this hal_alif module -- no fork needed.  hal_alif
#     supplies the HAL drivers; the upstream boards/alif/ files give
#     the Alif-EVK board targets.  An E1M-AEN *carrier* still needs
#     its own board overlay (generated by alp-sdk / shipped via
#     alplabai/alp-zephyr-modules) because the upstream files target
#     Alif's own EVKs, not the E1M board.  Alif's complete fork
#     (`sdk-alif` / `zephyr_alif`) is the OPT-IN path (vendor-sdks
#     group) for customers who want Alif's whole Zephyr tree or its
#     newest fork-only bits; alp-sdk deliberately does NOT base on it
#     -- one upstream Zephyr base serves Alif + Renesas + NXP.  See
#     docs/getting-started.md §8 for the decision tree.
#
#     Two more Alif-specific pieces (alif_dave2d-driver,
#     alif_image-processing-lib) are vendor-licensed (Alif
#     Semiconductor Software License Agreement, source-visible);
#     they sit in the `vendor-sdks` group below alongside the
#     `sdk-alif` aggregate manifest for opt-in consumption by
#     AEN customers.
#
# When upgrading the Zephyr pin: change `revision:` below, rerun
# `west update`, verify the modules/hal/{renesas,nxp} revs that
# ship with the new Zephyr tag still satisfy the SoMs we target
# (see docs/os-support-matrix.md), bump pr-twister.yml +
# nightly-aen-hil.yml's `--mr` to match, and add a CHANGELOG entry.

manifest:
  defaults:
    remote: zephyrproject

  remotes:
    - name: zephyrproject
      url-base: https://github.com/zephyrproject-rtos
    - name: majerle
      url-base: https://github.com/MaJerle
    - name: nanopb
      url-base: https://github.com/nanopb
    - name: alifsemi
      url-base: https://github.com/alifsemi
    - name: renesas
      url-base: https://github.com/renesas
    - name: nxp-mcuxpresso
      url-base: https://github.com/nxp-mcuxpresso
    # extras-tier1 community-library remotes (§D.lib batch).
    - name: olikraus           # u8g2
      url-base: https://github.com/olikraus
    - name: obgm               # libcoap
      url-base: https://github.com/obgm
    - name: vshymanskyy        # TinyGSM
      url-base: https://github.com/vshymanskyy
    - name: warmcat            # libwebsockets
      url-base: https://github.com/warmcat
    - name: zserge             # jsmn
      url-base: https://github.com/zserge
    - name: lieff              # minimp3
      url-base: https://github.com/lieff
    - name: xiph               # opus
      url-base: https://github.com/xiph
    - name: catchorg           # Catch2
      url-base: https://github.com/catchorg
    - name: stephane           # libmodbus
      url-base: https://github.com/stephane
    - name: freertos-org       # coreMQTT-SN
      url-base: https://github.com/FreeRTOS
    - name: xio-technologies   # Madgwick AHRS reference
      url-base: https://github.com/xioTechnologies
    - name: bearssl-mirror     # BearSSL community git mirror (upstream is
      url-base: https://github.com/bearsslmirror
                              # tarball-only; mirror tracks main branch).

  # Groups disabled by default.  Entries pinned below for audit
  # in source control, but `west update` on a v0.3 workspace does
  # not fetch them and the Zephyr build does not auto-import them.
  # Flip via `west update --group-filter +<group>` (or by editing
  # this filter line) when the consuming work lands.
  #
  # `extras-v04`     - lwrb + nanopb pins for v0.4 wave-2 consumers.
  #                    See vendors/lwrb/README.md +
  #                    vendors/nanopb/README.md.
  # `extras-tier1`   - upstream pins for the 14 Tier 1 §D.lib batch
  #                    libraries that aren't in Zephyr's modules
  #                    tree (u8g2, libcoap, tinygsm, libwebsockets,
  #                    jsmn, bearssl, minimp3, opus, libhelix,
  #                    catch2, libmodbus, madgwick_ahrs,
  #                    coremqtt_sn).  Disabled by default so v0.5
  #                    workspaces stay light; customers flip via
  #                    `west update --group-filter +extras-tier1`
  #                    when they list any of those libraries in
  #                    `board.yaml` `libraries:`.  Revisions below
  #                    are maintainer-verified-as-of 2026-05-14;
  #                    bumps land alongside the library knob in
  #                    `metadata/library-profiles/<name>/hw-backends.yaml`.
  # `vendor-sdks`    - public vendor SDK repos pinned to the
  #                    verified tags (Alif sdk-alif, Renesas
  #                    rzv-fsp, NXP mcuxsdk-manifests).  Carries
  #                    vendor-specific licensing -- see
  #                    docs/getting-started.md §8 and
  #                    docs/vendor-partnerships.md for the licence
  #                    story before enabling on a customer build.
  group-filter:
    - -extras-v04
    - -extras-tier1
    - -vendor-sdks

  projects:
    # hal_alif lands directly from Alif's GitHub at Apache-2.0
    # because Zephyr's own west.yml doesn't include it (the Alif
    # Ensemble SoC + boards ARE in the upstream Zephyr tree as of
    # v4.4, but the hal_alif module is not a Zephyr-managed project).
    # Default-enabled (no group) so AEN builds work out of the
    # box -- matches how Zephyr's own west.yml ships hal_renesas /
    # hal_nxp for the other vendor families.  Pinned to a verified
    # tagged release; bumps coordinate with the Zephyr-LTS cycle.
    - name: hal_alif
      remote: alifsemi
      revision: v2.2.0
      path: modules/hal/alif

    - name: zephyr
      revision: v4.4.0        # Latest stable; see docs/zephyr-version-policy.md
      west-commands: scripts/west-commands.yml
      import:
        # Pull in only the modules we actually need.  Filtering keeps
        # CI fast; expand as new libraries land in the SDK.
        name-allowlist:
          # Vendor HALs imported via Zephyr's own west.yml.  Alif's
          # hal_alif is NOT here -- Zephyr's west.yml doesn't list it;
          # we import it as a separate top-level project below
          # against the Alif-maintained release at
          # github.com/alifsemi/hal_alif (Apache-2.0).
          # hal_renesas covers RZ/V2N (V2N + V2N-M1 SoMs);
          # hal_nxp covers i.MX 93 (E1M-NX9101).
          - hal_renesas
          - hal_nxp
          - cmsis
          # cmsis_6 provides cmsis_core.h for Cortex-M targets on Zephyr
          # v4.4 (the legacy `cmsis` module now serves Cortex-A/R only).
          # Required by the RZ/V2N + i.MX93 M33/M-class cores.
          - cmsis_6
          - cmsis-dsp
          - lvgl
          - mbedtls
          - mcuboot
          # tflite-micro powers <alp/inference.h>'s TFLM backend.
          # Pulled in unconditionally so apps that flip
          # CONFIG_ALP_SDK_INFERENCE_TFLM=y just work; the module
          # is small enough that the cost-of-presence is negligible.
          - tflite-micro
          # zcbor backs the `.alpmodel` container reader
          # (CONFIG_ALP_SDK_MODEL_READER selects CONFIG_ZCBOR).
          # Without this allowlist entry an alp-sdk-topdir workspace
          # never fetches the module and the Kconfig select aborts
          # every MODEL_READER build.
          - zcbor
          # open-amp + libmetal back the Zephyr ipc_service RPMsg
          # (static-vrings) backend -- the HE<->HP dual-core RPC on
          # AEN (examples/aen/aen-rpc-pingpong, the alif,mhuv2-mbox
          # MBOX transport).  Pinned by Zephyr v4.4; allowlisted so the
          # OpenAMP RPC builds out of the box without a manual
          # -DEXTRA_ZEPHYR_MODULES.  libmetal (modules/hal/libmetal) is
          # open-amp's HAL/OS-abstraction dependency.
          - open-amp
          - libmetal
          # nanopb is also pulled in by Zephyr's tree when ALP_NANOPB
          # is enabled.  Our SDK uses it via the upstream Zephyr
          # module (no extras-tier1 pin needed for v0.5).

    # SDK-internal dependencies pinned ahead of their v0.4 consumers.
    # Behind the `extras-v04` group (disabled above) so v0.3
    # workspaces never see them on `west update`.  The vendor stub
    # headers under `vendors/{lwrb,nanopb}/include/` keep SDK source
    # link-clean until v0.4 swaps the real upstream in.
    - name: lwrb
      remote: majerle
      revision: v3.2.0
      path: modules/lib/lwrb
      groups:
        - extras-v04
    - name: nanopb
      remote: nanopb
      revision: nanopb-0.4.9
      path: modules/lib/nanopb
      groups:
        - extras-v04

    # ---------------------------------------------------------------
    # extras-tier1 -- §D.lib batch.  14 libraries that aren't in
    # Zephyr's modules tree, pinned to maintainer-verified tagged
    # releases (or `main` where upstream has no semver releases --
    # bearssl, minimp3, libhelix).  Disabled by default; consumers
    # flip via `west update --group-filter +extras-tier1` when their
    # board.yaml's `libraries:` lists any of these.  Each library
    # ships its compile-time profile + HW-accelerator binding under
    # metadata/library-profiles/<name>/.
    # ---------------------------------------------------------------
    - name: u8g2
      remote: olikraus
      repo-path: u8g2
      revision: 2.36.5            # Apr 2024; matches metadata/library-profiles/u8g2/.
      path: modules/lib/u8g2
      groups:
        - extras-tier1
    - name: libcoap
      remote: obgm
      repo-path: libcoap
      revision: v4.3.5            # Mar 2024.
      path: modules/lib/libcoap
      groups:
        - extras-tier1
    - name: TinyGSM
      remote: vshymanskyy
      repo-path: TinyGSM
      revision: v0.11.7            # Apr 2024.
      path: modules/lib/tinygsm
      groups:
        - extras-tier1
    - name: libwebsockets
      remote: warmcat
      repo-path: libwebsockets
      revision: v4.3.4            # Mar 2024.
      path: modules/lib/libwebsockets
      groups:
        - extras-tier1
    - name: jsmn
      remote: zserge
      repo-path: jsmn
      revision: v1.1.0            # Header-only; latest tagged release.
      path: modules/lib/jsmn
      groups:
        - extras-tier1
    - name: minimp3
      remote: lieff
      repo-path: minimp3
      revision: main              # No versioned releases; pin to commit
                                  # when consumed.  TBD: pin to a SHA after
                                  # the maintainer audit.
      path: modules/lib/minimp3
      groups:
        - extras-tier1
    - name: opus
      remote: xiph
      repo-path: opus
      revision: v1.5.2            # Apr 2024 stable.
      path: modules/lib/opus
      groups:
        - extras-tier1
    - name: libhelix
      remote: xiph
      repo-path: libhelix         # TBD: confirm canonical upstream + tag.
      revision: main
      path: modules/lib/libhelix
      groups:
        - extras-tier1
    - name: Catch2
      remote: catchorg
      repo-path: Catch2
      revision: v3.7.1            # Oct 2024.
      path: modules/lib/catch2
      groups:
        - extras-tier1
    - name: libmodbus
      remote: stephane
      repo-path: libmodbus
      revision: v3.1.10           # Aug 2023; v3.1.x stable.
      path: modules/lib/libmodbus
      groups:
        - extras-tier1
    - name: coreMQTT-SN
      remote: freertos-org
      repo-path: coreMQTT-SN
      revision: v1.0.1            # Aug 2024.
      path: modules/lib/coremqtt_sn
      groups:
        - extras-tier1
    - name: madgwick_ahrs
      remote: xio-technologies
      repo-path: Fusion           # The maintained successor lib (Madgwick
                                  # reference + Fusion are bundled).
      revision: main              # TBD: pin SHA after maintainer audit.
      path: modules/lib/madgwick_ahrs
      groups:
        - extras-tier1
    - name: BearSSL
      remote: bearssl-mirror
      repo-path: BearSSL          # Community git mirror; upstream is
                                  # tarball-only.  TBD: confirm + pin SHA.
      revision: master
      path: modules/lib/bearssl
      groups:
        - extras-tier1
    # gfx_compat is maintainer-written and ships in-tree under
    # src/lib/gfx_compat/ -- no west pin needed.

    # Optional vendor-source pins behind the `vendor-sdks` group.
    # Pinned to the maintainer-verified tags (per §C.33/34/35
    # vendor-partnership verification 2026-05-14, §C.40 Zephyr-
    # integration cross-check 2026-05-14, §C.42 sdk-alif
    # restoration 2026-05-14).
    #
    # Three flavours sit here:
    #
    #   * sdk-alif aggregate manifest (alifsemi/sdk-alif).
    #     Required for AEN Zephyr builds that want Alif's stock
    #     EVK board files (alif_e7_dk_rtss_he, alif_b1_dk, ...).
    #     Alif maintains these in their zephyr_alif fork; sdk-alif
    #     is the canonical west manifest that imports zephyr_alif
    #     as the Zephyr project alongside their other forks.
    #     Customers using stock Alif boards should either:
    #       (a) enable this group + set EXTRA_ZEPHYR_MODULES to
    #           the cloned sdk-alif path, or
    #       (b) use sdk-alif itself as the workspace topdir (which
    #           replaces our Zephyr v4.4 pin with zephyr_alif's
    #           Alif-patched Zephyr fork).
    #     Customers with their own AEN board overlay don't
    #     need sdk-alif -- the top-level hal_alif direct import
    #     above suffices for them.
    #
    #   * Alif vendor-licensed differentiating drivers
    #     (alif_dave2d-driver, alif_image-processing-lib).  Source-
    #     visible under the Alif Semiconductor Software License
    #     Agreement -- NOT Apache.  Customers using <alp/gpu2d.h>
    #     or the Helium image-processing kernels on AEN silicon
    #     enable this group; default builds skip the download.
    #
    #   * Bare-metal-mirror pins for Renesas + NXP
    #     (renesas/rzv-fsp, nxp-mcuxpresso/mcuxsdk-manifests).
    #     DUPLICATIVE with hal_renesas / hal_nxp which Zephyr
    #     ships in its modules tree -- pinned here for customers
    #     doing bare-metal builds outside Zephyr.  Also serves as
    #     a customer-visible audit trail of the upstream version
    #     we cross-verified hal_renesas / hal_nxp against.
    #
    # Disabled by default via the `vendor-sdks` group; customer
    # builds enable by including the group in their workspace's
    # `--group-filter`.  Each repo carries its own licence text --
    # see docs/getting-started.md §8 + the docs/vendor-partnerships.md
    # per-vendor sections.
    - name: sdk-alif
      remote: alifsemi
      revision: zas-v2.0.0-rc1
      path: modules/vendors/sdk-alif
      groups:
        - vendor-sdks
    - name: alif_dave2d-driver
      remote: alifsemi
      revision: d667a8e47f13e2f39bc724d66def5230827b2808
      path: modules/drivers/dave2d
      groups:
        - vendor-sdks
    - name: alif_image-processing-lib
      remote: alifsemi
      revision: b4444c0504be3a1eed4a0655c9a95fe343706dcb
      path: modules/lib/aipl
      groups:
        - vendor-sdks
    - name: rzv-fsp
      remote: renesas
      revision: v3.1.0
      path: modules/vendors/rzv-fsp
      groups:
        - vendor-sdks
    - name: mcuxsdk-manifests
      remote: nxp-mcuxpresso
      revision: v26.03.00
      path: modules/vendors/mcuxsdk-manifests
      groups:
        - vendor-sdks

  self:
    path: alp-sdk
    # Surface `west alp-build` to workspaces where alp-sdk is the
    # topdir.  Consumers who include alp-sdk as a project in their
    # own west.yml should add the same `west-commands:` line under
    # their `projects.alp-sdk` entry.
    west-commands: scripts/west-commands.yml
