# SPDX-License-Identifier: Apache-2.0
#
# alp-sdk west manifest.
#
# This is the manifest a Zephyr workspace uses when alp-sdk itself is
# the topdir.  Most application repos will instead add alp-sdk as a
# project in their own west.yml and let *that* manifest drive Zephyr.
#
# Pin policy:
#   - zephyr: the LTS release the SDK is verified against.  Currently
#     v3.7.0 (the same revision pr-twister.yml + the nightly AEN HIL
#     workflow exercise).  Bumps are deliberate, not automatic --
#     each LTS-to-LTS upgrade ships as a minor alp-sdk release after
#     re-verifying every wrapped peripheral on the target SoMs.  See
#     docs/zephyr-version-policy.md for the full policy.
#   - hal_renesas / hal_nxp: imported via Zephyr's own west.yml (the
#     name-allowlist below lets them through the import filter).
#     Zephyr v3.7 pins specific revisions; we follow what Zephyr ships.
#     hal_renesas covers the RZ/V2N + RZ/V2L + RZ/V2H BSP under
#     `drivers/rz/fsp/src/rzv/bsp/mcu/rzv2n/`; hal_nxp covers
#     i.MX 93 (MIMX9301..9352) and i.MX 95 under
#     `mcux/mcux-sdk-ng/devices/i.MX/i.MX93/`.
#   - hal_alif: NOT in Zephyr's modules tree as of v3.7.  Alif's
#     Ensemble Zephyr support ships outside Zephyr at
#     github.com/alifsemi/sdk-alif (the aggregate manifest) or
#     github.com/alifsemi/zephyr_alif (the Zephyr fork itself).
#     The `vendor-sdks` group below pins `sdk-alif` -- customers
#     building for AEN add it via `west update --group-filter
#     +vendor-sdks` or set `EXTRA_ZEPHYR_MODULES` to its path.
#     See docs/getting-started.md §8 for the customer-side wiring.
#
# When upgrading the Zephyr pin: change `revision:` below, rerun
# `west update`, verify the modules/hal/{renesas,nxp} revs that
# ship with the new Zephyr tag still satisfy the SoMs we target
# (see docs/os-support-matrix.md), bump pr-twister.yml +
# nightly-aen-hil.yml's `--mr` to match, and add a CHANGELOG entry.

manifest:
  defaults:
    remote: zephyrproject

  remotes:
    - name: zephyrproject
      url-base: https://github.com/zephyrproject-rtos
    - name: majerle
      url-base: https://github.com/MaJerle
    - name: nanopb
      url-base: https://github.com/nanopb
    - name: alifsemi
      url-base: https://github.com/alifsemi
    - name: renesas
      url-base: https://github.com/renesas
    - name: nxp-mcuxpresso
      url-base: https://github.com/nxp-mcuxpresso

  # Groups disabled by default.  Entries pinned below for audit
  # in source control, but `west update` on a v0.3 workspace does
  # not fetch them and the Zephyr build does not auto-import them.
  # Flip via `west update --group-filter +<group>` (or by editing
  # this filter line) when the consuming work lands.
  #
  # `extras-v04`     - lwrb + nanopb pins for v0.4 wave-2 consumers.
  #                    See vendors/lwrb/README.md +
  #                    vendors/nanopb/README.md.
  # `vendor-sdks`    - public vendor SDK repos pinned to the
  #                    verified tags (Alif sdk-alif, Renesas
  #                    rzv-fsp, NXP mcuxsdk-manifests).  Carries
  #                    vendor-specific licensing -- see
  #                    docs/getting-started.md §8 and
  #                    docs/vendor-partnerships.md for the licence
  #                    story before enabling on a customer build.
  group-filter:
    - -extras-v04
    - -vendor-sdks

  projects:
    - name: zephyr
      revision: v3.7.0        # LTS pin; see docs/zephyr-version-policy.md
      west-commands: scripts/west-commands.yml
      import:
        # Pull in only the modules we actually need.  Filtering keeps
        # CI fast; expand as new libraries land in the SDK.
        name-allowlist:
          # Vendor HALs imported via Zephyr's own west.yml.  See the
          # pin-policy note above for why hal_alif is NOT here
          # (Alif isn't in Zephyr v3.7's modules tree; customers
          # add sdk-alif via the vendor-sdks group below or via
          # EXTRA_ZEPHYR_MODULES).  hal_renesas covers RZ/V2N
          # (V2N + V2N-M1 SoMs); hal_nxp covers i.MX 93 (E1M-NX9101).
          - hal_renesas
          - hal_nxp
          - cmsis
          - cmsis-dsp
          - lvgl
          - mbedtls
          - mcuboot
          # tflite-micro powers <alp/inference.h>'s TFLM backend.
          # Pulled in unconditionally so apps that flip
          # CONFIG_ALP_SDK_INFERENCE_TFLM=y just work; the module
          # is small enough that the cost-of-presence is negligible.
          - tflite-micro

    # SDK-internal dependencies pinned ahead of their v0.4 consumers.
    # Behind the `extras-v04` group (disabled above) so v0.3
    # workspaces never see them on `west update`.  The vendor stub
    # headers under `vendors/{lwrb,nanopb}/include/` keep SDK source
    # link-clean until v0.4 swaps the real upstream in.
    - name: lwrb
      remote: majerle
      revision: v3.2.0
      path: modules/lib/lwrb
      groups:
        - extras-v04
    - name: nanopb
      remote: nanopb
      revision: nanopb-0.4.9
      path: modules/lib/nanopb
      groups:
        - extras-v04

    # Public vendor SDK repos.  Pinned to the maintainer-verified
    # tags (per §C.33/34/35 vendor-partnership verification
    # 2026-05-14, §C.40 Zephyr-integration cross-check 2026-05-14).
    #
    # Important: these are NOT all redundant with the Zephyr
    # name-allowlist above.  Split by purpose:
    #
    #   - sdk-alif: REQUIRED for any Alif Ensemble (AEN) build.
    #     hal_alif does NOT exist in Zephyr v3.7's modules tree;
    #     sdk-alif is the canonical Alif-side Zephyr integration.
    #     Customers targeting AEN MUST enable this group OR
    #     supply sdk-alif another way (typically EXTRA_ZEPHYR_MODULES
    #     in their own workspace).
    #   - rzv-fsp: DUPLICATIVE with hal_renesas (which mirrors it
    #     into Zephyr).  Pinned here for customers doing bare-metal
    #     RZ/V builds that don't run under Zephyr, where they pull
    #     the FSP directly from Renesas's upstream rather than via
    #     Zephyr's module tree.
    #   - mcuxsdk-manifests: DUPLICATIVE with hal_nxp (which mirrors
    #     into Zephyr).  Same rationale -- pinned for bare-metal
    #     i.MX MCU builds outside Zephyr, and as a customer-visible
    #     audit trail of the upstream version we cross-verified
    #     against.
    #
    # Disabled by default via the `vendor-sdks` group; customer
    # builds enable per-vendor by including the group in their
    # workspace's `--group-filter`.  Each repo carries its own
    # licence text -- see docs/getting-started.md §8 + the
    # docs/vendor-partnerships.md per-vendor sections.
    - name: sdk-alif
      remote: alifsemi
      revision: v2.3.0-rc1
      path: modules/vendors/sdk-alif
      groups:
        - vendor-sdks
    - name: rzv-fsp
      remote: renesas
      revision: v3.1.0
      path: modules/vendors/rzv-fsp
      groups:
        - vendor-sdks
    - name: mcuxsdk-manifests
      remote: nxp-mcuxpresso
      revision: v26.03.00
      path: modules/vendors/mcuxsdk-manifests
      groups:
        - vendor-sdks

  self:
    path: alp-sdk
    # Surface `west alp-build` to workspaces where alp-sdk is the
    # topdir.  Consumers who include alp-sdk as a project in their
    # own west.yml should add the same `west-commands:` line under
    # their `projects.alp-sdk` entry.
    west-commands: scripts/west-commands.yml
