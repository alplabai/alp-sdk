# kas build manifest — E1M-V2N (RZ/V2N) A55 edge image.
#
#   kas build kas/e1m-v2n.yml          # -> alp-image-edge for e1m-v2n101-a55
#
# This stitches the public Yocto layers + the Renesas RZ/V2N AI-SDK BSP
# + meta-alp-sdk and emits the local.conf/bblayers, so a clean checkout
# builds the carrier image in one command.
#
# STATUS: SCAFFOLD — not yet run end-to-end. Two things must be filled:
#   1. The Renesas AI-SDK BSP is license-gated and is NOT on public git.
#      Extract it from the Renesas release (RTK0EF0189F06300SJ — AI SDK
#      6.30, linux-renesas 6.1-cip43, kernel SHA 6717c06c) and point the
#      `meta-renesas` / `meta-rz-features` repos at your local path or
#      internal mirror (kas supports `path:` repos).
#   2. Pin exact SHAs on the public layers below (branch is given; swap
#      in the commit your BSP release was validated against).

header:
  version: 14

distro: poky
machine: e1m-v2n101-a55
target: alp-image-edge

repos:
  # This layer (the checkout kas is invoked from).
  meta-alp-sdk:
    layers:
      meta-alp-sdk:

  poky:
    url: https://git.yoctoproject.org/poky
    branch: scarthgap
    # commit: TODO-pin
    layers:
      meta:
      meta-poky:

  meta-openembedded:
    url: https://github.com/openembedded/meta-openembedded
    branch: scarthgap
    # commit: TODO-pin
    layers:
      meta-oe:
      meta-python:
      meta-networking:
      meta-multimedia:

  meta-ros:
    url: https://github.com/ros/meta-ros
    branch: scarthgap     # ROS 2 Humble
    # commit: TODO-pin
    layers:
      meta-ros-common:
      meta-ros2:
      meta-ros2-humble:

  # --- Renesas RZ/V2N AI-SDK BSP (LICENSE-GATED — from the Renesas
  #     release, not public git). Point these at your extracted BSP /
  #     internal mirror. meta-rz-features bundles drpai/graphics/codecs/
  #     opencva inside the AI-SDK tarball. ---
  meta-renesas:
    # path: ../bsp/meta-renesas        # <- local path to extracted BSP
    url: TODO-renesas-bsp-mirror
    commit: TODO
    layers:
      meta-rz-bsp:
      meta-rz-features/meta-rz-drpai:
      meta-rz-features/meta-rz-graphics:
      meta-rz-features/meta-rz-codecs:
      meta-rz-features/meta-rz-opencva:

  # Optional, opt-in:
  #   meta-deepx (V2M only), meta-imx (NX only), meta-mender-core (OTA).

local_conf_header:
  alp-edge: |
    # alp-image-edge is the reference rootfs; bootloader is production-
    # flashed (see docs/e1m-x-v2n-sdk-integration.md), so no TF-A/U-Boot
    # build target is required for the customer's normal flow.
    ALP_BOOT_DEVICE ?= "emmc"
    # Uncomment to also build the bootloader from source (production /
    # recovery), with the alp DDR injected via the TF-A bbappend:
    #   IMAGE_INSTALL:append = ""
    #   (build: kas build kas/e1m-v2n.yml:trusted-firmware-a)
