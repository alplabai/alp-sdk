# yaml-language-server: $schema=https://raw.githubusercontent.com/Open-CMSIS-Pack/devtools/tools/projmgr/2.6.0/tools/projmgr/schemas/clayer.schema.json

# ALP SDK - Alif Platform Layer
# This layer provides Alif-specific SPI driver using CMSIS Driver interface

layer:
  description: ALP SDK Hardware Abstraction Layer with Alif CMSIS Driver
  
  # Required components from Alif pack
  components:
    - component: AlifSemiconductor::CMSIS Driver:SPI
  
  # ALP SDK Core + Alif Driver
  groups:
    - group: ALP Core
      files:
        - file: ../../alp/src/core/alp_spi_core.c
    
    - group: ALP Alif Driver
      files:
        - file: ../../alp/src/drivers/alif/alp_spi_alif.c
  
  # Include paths
  add-paths:
    - ../../alp/include
  
  # Preprocessor defines
  define:
    - ALP_SDK_VERSION_MAJOR=0
    - ALP_SDK_VERSION_MINOR=1
    - ALP_SDK_VERSION_PATCH=0
    - ALP_PLATFORM_ALIF=1
