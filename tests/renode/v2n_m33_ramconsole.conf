# Kconfig fragment for the --sim-mode Renode gate (issue #674).
#
# The shipping RZ/V2N M33-SM is HEADLESS (board defconfig CONFIG_CONSOLE=n;
# sci0 is not a CM33 console).  This enables Zephyr's `ram_console` backend
# -- the SAME headless-observability channel the alp-sdk AEN examples ship
# and the bench reads over SWD -- so the firmware's console lands in the
# `ram_console_buf` RAM ring that `west alp-renode --sim-mode` streams to
# the studio UART socket.  No UART, no fabricated console pin.
CONFIG_CONSOLE=y
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
CONFIG_PRINTK=y
CONFIG_BOOT_BANNER=y
