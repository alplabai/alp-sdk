#
# Real-backend coverage for <alp/security.h> AEAD (GHSA-7xh2-9pcg-r824).
#
# tests/zephyr/security/ intentionally builds with NO MbedTLS, so its
# AEAD calls only ever exercise the NOSUPPORT contract -- the zephyr_drv
# backend's actual PSA body never runs there.  This suite is the missing
# real-handle coverage: MbedTLS's PSA Crypto is wired in, so
# alp_aead_open() binds the priority-100 zephyr_drv backend (over the
# priority-0 native_sim SW fallback) and every encrypt/decrypt call runs
# the real PSA multipart AEAD path in src/backends/security/zephyr_drv.c.
#
# CONFIG_MAIN_STACK_SIZE stays at 4096 -- the same figure the advisory
# calls out as a common SDK default that the old 4,112-byte automatic
# scratch buffer overflowed.  Passing here on the ztest main thread is
# the actual regression proof for the fix.

CONFIG_ZTEST=y
CONFIG_ALP_SDK=y
CONFIG_LOG=y
CONFIG_PRINTK=y
CONFIG_THREAD_LOCAL_STORAGE=y
CONFIG_MAIN_STACK_SIZE=4096

# Real MbedTLS PSA Crypto backend for <alp/security.h> (see
# src/backends/security/zephyr_drv.c / ALP_SDK_SECURITY Kconfig help).
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_PSA_CRYPTO_C=y
CONFIG_ALP_SDK_SECURITY=y

# Both AEAD algorithms the backend declares in aead_alg_meta():
# AES-128/256-GCM and ChaCha20-Poly1305.
CONFIG_PSA_WANT_ALG_GCM=y
CONFIG_PSA_WANT_ALG_CHACHA20_POLY1305=y
CONFIG_PSA_WANT_KEY_TYPE_AES=y
CONFIG_PSA_WANT_KEY_TYPE_CHACHA20=y
