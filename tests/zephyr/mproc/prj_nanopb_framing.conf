# Twister overlay: flips on CONFIG_ALP_SDK_MPROC_NANOPB_FRAMING so the
# alp_mbox_send / mbox_rx_cb framing code path in mproc_zephyr.c is
# compile-verified.  Real mbox roundtrip remains parked behind HIL
# (no mbox device exists under native_sim); the same encode/decode
# ZTESTs in src/main.c cover the framing helper directly.

CONFIG_MBOX=y
CONFIG_ALP_SDK_MPROC=y
CONFIG_ALP_SDK_MPROC_NANOPB_FRAMING=y
CONFIG_ALP_SDK_MPROC_FRAME_MAX_BYTES=256
