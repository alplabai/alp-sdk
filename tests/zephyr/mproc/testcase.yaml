tests:
  alp_sdk.mproc.smoke:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    tags:
      - alp-sdk
      - mproc

  # v0.4-prep: flips CONFIG_ALP_SDK_MPROC_NANOPB_FRAMING=y to
  # compile-verify the framing-on-send + unframing-on-receive paths
  # in mproc_zephyr.c.  The IPC envelope encode/decode helpers are
  # still exercised by the same ZTESTs (they don't need a real mbox
  # device); this scenario adds the build assertion that the framing
  # branch in alp_mbox_send compiles cleanly.
  alp_sdk.mproc.nanopb_framing:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    extra_args:
      - "EXTRA_CONF_FILE=prj_nanopb_framing.conf"
    tags:
      - alp-sdk
      - mproc
      - nanopb

  # 2026-05-17: real-backend exercise for shmem + hwsem -- pulls in
  # the native_sim DT overlay declaring alp-shmem0/1 + flips
  # CONFIG_ALP_SDK_MPROC=y so the wrapper takes the DT-alias-lookup
  # path (shmem) + the k_sem fallback (hwsem) instead of the
  # NOSUPPORT shortcircuit.
  alp_sdk.mproc.shmem_hwsem:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    extra_args:
      - "EXTRA_CONF_FILE=prj_shmem_hwsem.conf"
    tags:
      - alp-sdk
      - mproc
      - shmem
