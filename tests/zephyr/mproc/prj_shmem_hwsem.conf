#
# Extra config for the alp_sdk.mproc.shmem_hwsem scenario: turn the
# real MPROC backend on so alp_shmem_* + alp_hwsem_* dispatch
# through the DT-alias-lookup + k_sem paths (rather than the
# NOSUPPORT shortcircuit).
#
# CONFIG_MBOX=y is required because CONFIG_ALP_SDK_MPROC has
# `depends on MBOX` in zephyr/Kconfig -- without it the Kconfig
# solver silently demotes the assignment to 'n' and the wrapper
# keeps shortcircuiting to ALP_ERR_NOSUPPORT.

CONFIG_MBOX=y
CONFIG_ALP_SDK_MPROC=y
