CONFIG_ZTEST=y
CONFIG_ALP_SDK=y

# Pin the SoC choice so alp_backend_select("display", ALP_SOC_REF_STR)
# exercises the same selector path real customer builds hit.
CONFIG_ALP_SOC_ALIF_ENSEMBLE_E7=y

# Zephyr display subsystem -- pulls in the real zephyr_drv backend
# (CONFIG_ALP_SDK_DISPLAY_ZEPHYR_DRV defaults y).  The dummy display
# driver (CONFIG_DUMMY_DISPLAY) auto-enables when the overlay
# provides a zephyr,dummy-dc node.
CONFIG_DISPLAY=y

# Required for thread-local last-error storage.
CONFIG_THREAD_LOCAL_STORAGE=y

CONFIG_LOG=y
