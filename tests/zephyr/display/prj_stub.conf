#
# Stub-fallback scenario: no Zephyr display subsystem, so
# CONFIG_ALP_SDK_DISPLAY_ZEPHYR_DRV can't compile and the wildcard
# priority-0 zephyr_stub is the selected backend.  Proves the
# NOT_IMPLEMENTED degrade stays clean on builds without a display.

CONFIG_DISPLAY=n
