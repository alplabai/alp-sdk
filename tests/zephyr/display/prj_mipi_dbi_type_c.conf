CONFIG_ZTEST=y
CONFIG_ALP_SDK=y

# Keep the backend-selector path identical to the runtime display ztest.
CONFIG_ALP_SOC_ALIF_ENSEMBLE_E7=y

# Zephyr display + the alp-sdk driver-class wrapper.  The overlay's
# sitronix,st7789v node auto-enables CONFIG_ST7789V, which selects
# Zephyr's MIPI DBI host layer; the zephyr,mipi-dbi-spi controller
# auto-enables CONFIG_MIPI_DBI_SPI.
CONFIG_DISPLAY=y

# native_sim has an SDL display node by default.  This fixture is about
# the DBI Type C devicetree path, and it must stay headless in CI.
CONFIG_SDL_DISPLAY=n

# GPIO is used for D/C# and reset in the 4-wire Type C fixture.
CONFIG_GPIO=y

# native_sim's SPI/GPIO devices are emulated controllers.  The scenario
# is build-only, but these symbols must still be present so Zephyr emits
# the controller devices referenced by the DBI node.
CONFIG_EMUL=y
CONFIG_GPIO_EMUL=y
CONFIG_SPI_EMUL=y

# Required for thread-local last-error storage.
CONFIG_THREAD_LOCAL_STORAGE=y

CONFIG_LOG=y
