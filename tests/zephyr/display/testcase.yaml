tests:
  # Real-backend scenario: the upstream dummy display controller
  # (CONFIG_DUMMY_DISPLAY, zephyr,dummy-dc) backs the alp-display0
  # alias, so open / get_caps / blit / clear / close plus the param-
  # validation edges run against the real zephyr_drv backend.
  alp_sdk.display.zephyr_drv:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    extra_args:
      - "DTC_OVERLAY_FILE=overlays/dummy_display.overlay"
    tags:
      - alp-sdk
      - display
      - backend

  # No-device scenario: CONFIG_DISPLAY=y so zephyr_drv is compiled
  # and selected, but no alp-displayN alias exists in DT.  Proves
  # the clean degrade on boards without a display node: open returns
  # NULL with ALP_ERR_NOT_READY, nothing crashes at boot.
  alp_sdk.display.no_device:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    tags:
      - alp-sdk
      - display
      - backend

  # DBI Type C integration scenario: instantiate Zephyr's upstream
  # zephyr,mipi-dbi-spi controller plus an ST7789V child panel and
  # expose the child as both zephyr,display and alp-display0.  This is
  # build-only because native_sim's SPI-emul controller still needs a
  # target emulator for real transfer IO; runtime display semantics are
  # covered by the dummy-dc scenario above.
  alp_sdk.display.mipi_dbi_type_c_build:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    build_only: true
    extra_args:
      - "DTC_OVERLAY_FILE=overlays/mipi_dbi_type_c_st7789.overlay"
      - "EXTRA_CONF_FILE=prj_mipi_dbi_type_c.conf"
    tags:
      - alp-sdk
      - display
      - mipi-dbi
      - backend

  # Stub-fallback scenario: CONFIG_DISPLAY=n removes the zephyr_drv
  # backend entirely; the wildcard priority-0 stub is selected and
  # open degrades with ALP_ERR_NOT_IMPLEMENTED.
  alp_sdk.display.stub_fallback:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    extra_args:
      - "EXTRA_CONF_FILE=prj_stub.conf"
    tags:
      - alp-sdk
      - display
      - backend
