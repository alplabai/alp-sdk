# SPDX-License-Identifier: Apache-2.0

CONFIG_ZTEST=y
CONFIG_ALP_SDK=y

CONFIG_I2C=y
# Compile the controller driver's target-mode hooks.  On native_sim
# the emulated controller then both accepts the registration AND
# forwards same-bus controller transfers addressed to the registered
# target -- which is what lets the loopback tests drive the helper's
# ISR callbacks for real (no external hardware).
CONFIG_I2C_TARGET=y

# Emulated controller so the suite runs under native_sim.
CONFIG_EMUL=y
CONFIG_I2C_EMUL=y

# Required for thread-local last-error storage.
CONFIG_THREAD_LOCAL_STORAGE=y

CONFIG_LOG=y
