#
# Degrade-path scenario: flip target mode OFF so the controller
# driver's api->target_register is NULL and i2c_target_register
# returns -ENOSYS.  The helper must then propagate exactly what
# alp_i2c_target_open reports: ALP_ERR_NOSUPPORT.
CONFIG_I2C_TARGET=n
