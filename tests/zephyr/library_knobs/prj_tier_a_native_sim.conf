#
# Extra native_sim config for the ADR 0018 Tier-A library lane.
# `alp_project.py --emit zephyr-conf` enables CONFIG_LVGL when a
# board.yaml selects `libraries: [lvgl]`; native_sim then needs a
# headless display device so LVGL's Zephyr glue can link in CI.

CONFIG_DISPLAY=y
CONFIG_DUMMY_DISPLAY=y
CONFIG_SDL_DISPLAY=n
CONFIG_LV_Z_AUTO_INIT=n
CONFIG_LV_Z_MEM_POOL_SIZE=16384

# `libraries: [modbus]` emits CONFIG_MODBUS=y.  native_sim has no serial
# `zephyr,modbus-serial` node, so use Zephyr's transport-agnostic RAW_ADU
# backend for the Tier-A host lane.
CONFIG_MODBUS_RAW_ADU=y
CONFIG_MODBUS_NUMOF_RAW_ADU=1
