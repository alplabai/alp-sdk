#
# §D.lib smoke -- the loader emits these CONFIG_* lines when a
# board.yaml lists the matching `libraries:` entry.  Pinning them
# explicitly here keeps the test self-contained (the loader's
# emission is already covered by tests/scripts/test_project_backends.py).

CONFIG_ZTEST=y
CONFIG_ALP_SDK=y
CONFIG_LOG=y
CONFIG_THREAD_LOCAL_STORAGE=y

# Zephyr-native baseline libraries (in Zephyr's own west.yml + our
# name-allowlist).
#
# CONFIG_MBEDTLS=y is intentionally NOT pinned here.  Zephyr v4.4's
# mbedtls module pulls in ssl_misc.h transitively (which references
# mbedtls_error_pair_t and other SSL-only types), so a generic
# CONFIG_MBEDTLS=y trips -Werror on platforms that don't carry the
# full SSL stack.  Real link coverage for the mbedtls C surface
# (SHA-256, AES-GCM, TRNG) lives in tests/zephyr/security_mbedtls/
# / tests/yocto/security_openssl.c — both use a working SSL config.
# The mbedtls knob below (IS_ENABLED(CONFIG_MBEDTLS)) just asserts
# the Kconfig symbol resolves.

CONFIG_CMSIS_DSP=y
CONFIG_CMSIS_DSP_SUPPORT=y       # arm_copy_f32 lives in SupportFunctions/

# CONFIG_FILE_SYSTEM_LITTLEFS=y pulls in Zephyr v4.4's
# subsys/fs/littlefs_fs.c, which trips -Werror on unused-variable +
# unused-function warnings.  We don't actually exercise the FS layer
# from this knob smoke (the goal is to prove the CONFIG_*=y
# Kconfig symbols resolve), so leave LITTLEFS off here and rely on
# tests/yocto/<…>littlefs<…> for the real coverage.

# v0.5 §D.lib per-library SW-fallback knobs.  Each defaults `y` in
# Kconfig.alp-libraries so this list is documentary; the Kconfig
# parser would set them anyway.
CONFIG_ALP_TFLM_REF_KERNELS=y
CONFIG_ALP_MBEDTLS_PURE_C=y
CONFIG_ALP_CMSIS_DSP_SCALAR=y
CONFIG_ALP_LITTLEFS_SYNC_IO=y
CONFIG_ALP_LVGL_SW_BLIT=y
CONFIG_ALP_BEARSSL_PURE_C=y
CONFIG_ALP_MADGWICK_LIBM=y
CONFIG_ALP_U8G2_SW_BLIT=y
CONFIG_ALP_GFX_COMPAT_SW=y
CONFIG_ALP_OPUS_PURE_C=y
CONFIG_ALP_MINIMP3_PURE_C=y
CONFIG_ALP_JSMN_SW=y
CONFIG_ALP_CATCH2_SW=y
CONFIG_ALP_NANOPB_SW=y
CONFIG_ALP_MQTTSN_NO_TLS=y
CONFIG_ALP_COAP_NO_TLS=y
CONFIG_ALP_LWS_NO_TLS=y
CONFIG_ALP_MODBUS_SYNC_IO=y
CONFIG_ALP_PID_INT_MATH=y
