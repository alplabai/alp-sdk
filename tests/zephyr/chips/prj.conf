# Subsystems the chip drivers depend on transitively via
# <alp/peripheral.h> + <alp/uart.h> + <alp/pwm.h>.
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_SPI=y
CONFIG_SERIAL=y       # UART-backed cellular / GPS / motor-driver chips
CONFIG_PWM=y          # motor-driver chips (a4988, drv8825, drv8833)

# Emulated controllers — let the test run under native_sim.
CONFIG_EMUL=y
CONFIG_GPIO_EMUL=y
CONFIG_I2C_EMUL=y
CONFIG_SPI_EMUL=y

CONFIG_LOG=y
