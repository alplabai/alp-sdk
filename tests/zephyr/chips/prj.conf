CONFIG_ZTEST=y
CONFIG_ALP_SDK=y

# Chip drivers under test
CONFIG_ALP_SDK_CHIP_LSM6DSO=y
CONFIG_ALP_SDK_CHIP_SSD1306=y
CONFIG_ALP_SDK_CHIP_BUTTON_LED=y
CONFIG_ALP_SDK_CHIP_BME280=y
CONFIG_ALP_SDK_CHIP_LIS2DW12=y
CONFIG_ALP_SDK_CHIP_SSD1331=y
CONFIG_ALP_SDK_CHIP_OV5640=y
CONFIG_ALP_SDK_CHIP_PDM_MIC=y
CONFIG_ALP_SDK_CHIP_ICM42670=y
CONFIG_ALP_SDK_CHIP_BMI323=y
CONFIG_ALP_SDK_CHIP_BMP581=y

# Subsystems the chip drivers depend on transitively via <alp/peripheral.h>
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_SPI=y

# Emulated controllers — let the test run under native_sim.
CONFIG_EMUL=y
CONFIG_GPIO_EMUL=y
CONFIG_I2C_EMUL=y
CONFIG_SPI_EMUL=y

CONFIG_LOG=y
