CONFIG_ZTEST=y
CONFIG_ALP_SDK=y

# Chip drivers under test — every chip that ships a *_init in main.c
# must be enabled here, otherwise the native_sim link fails with
# "undefined reference to <chip>_init".  Order roughly matches the
# §D batches in src/main.c so it's easy to keep in sync.

# v0.1..v0.4 baseline chips.
CONFIG_ALP_SDK_CHIP_LSM6DSO=y
