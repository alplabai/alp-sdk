CONFIG_ZTEST=y
CONFIG_ALP_SDK=y
CONFIG_ALP_SDK_DSP=y

# alp_last_error reads from a thread-local slot on Zephyr.
CONFIG_THREAD_LOCAL_STORAGE=y

CONFIG_LOG=y

# The DSP fallback kernels pull in math.h transcendentals (sinf, cosf,
# sqrtf, lrintf).  picolibc (the native_sim default) provides them
# without any extra config.

# FPU is the default for native_sim/native/64 -- no Kconfig needed.
