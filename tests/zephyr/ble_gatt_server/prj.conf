#
# CONFIG_BT + CONFIG_BT_PERIPHERAL (-> BT_CONN) turn on CONFIG_ALP_SDK_BLE's
# real body in src/backends/ble/zephyr_drv.c (default y if BT).  This suite
# never calls bt_enable() -- see src/backends/ble/zephyr_drv.c's file header
# and src/main.c's suite comment for why that stays offline-unreachable.

CONFIG_ZTEST=y
CONFIG_ALP_SDK=y
CONFIG_LOG=y
CONFIG_PRINTK=y
CONFIG_THREAD_LOCAL_STORAGE=y
CONFIG_MAIN_STACK_SIZE=4096

# zephyr_drv.c's scan/connect ops (unused by this suite) still compile
# unconditionally under CONFIG_ALP_SDK_BLE, so both roles must link
# (CONFIG_ALP_SDK_BLE's own Kconfig help says as much: "plus
# CONFIG_BT_PERIPHERAL=y and/or CONFIG_BT_CENTRAL=y for the matching role").
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_CENTRAL=y
