CONFIG_ZTEST=y
CONFIG_ALP_SDK=y

# Pin the SoC choice so alp_backend_select("display", ALP_SOC_REF_STR)
# exercises the same selector path real customer builds hit; the local
# test-double backend in src/main.c registers at silicon_ref="*"
# priority 255 so it wins regardless.
CONFIG_ALP_SOC_ALIF_ENSEMBLE_E7=y

# Required for thread-local last-error storage.
CONFIG_THREAD_LOCAL_STORAGE=y

CONFIG_LOG=y

# LVGL v9 -- pulls in the real alp_gui_lvgl_attach() bridge
# (CONFIG_ALP_SDK_HAS_LVGL defaults y when CONFIG_LVGL=y, mirrored
# into the ALP_HAS_LVGL compile define by zephyr/CMakeLists.txt).
# Overridden to n by prj_no_lvgl.conf for the NOSUPPORT scenario.
CONFIG_LVGL=y
CONFIG_LV_COLOR_DEPTH_16=y
# LVGL's own internal allocator pool (lv_malloc) -- the 2048-byte
# default is too small once a label + its span-draw stack exist.
CONFIG_LV_Z_MEM_POOL_SIZE=16384

# Zephyr's LVGL glue (modules/lvgl/lvgl.c) requires a "zephyr,display"
# chosen node to compile, regardless of whether this suite's bridge
# ever uses it -- boards/native_sim_native_64.overlay wires the dummy
# display driver to satisfy that.  alp_gui_lvgl_attach() itself never
# touches this device: it binds to the priority-255 test-double display
# backend registered in src/main.c.  Harmless to also carry in the
# CONFIG_LVGL=n scenario (prj_no_lvgl.conf).
CONFIG_DISPLAY=y
CONFIG_DUMMY_DISPLAY=y

# native_sim's DTS carries a zephyr,sdl-dc node, so CONFIG_DISPLAY=y also
# drags in the SDL display driver by default; its GL teardown asserts
# inside libGLdispatch on headless hosts (no display server) AFTER the
# suite passes (same trap tests/zephyr/display/prj.conf documents).
# Keep SDL out of the build entirely.
CONFIG_SDL_DISPLAY=n

# Zephyr's own LVGL auto-init (SYS_INIT before main()) would otherwise
# allocate a SECOND lv_display_t against the tiny 32x16 dummy_dc above,
# sized by CONFIG_LV_Z_VDB_SIZE's screen-percentage default -- too small
# a fraction of a 32x16 panel to round up to a whole line, which trips
# LVGL's own "buffer is too small" assert. This suite manages lv_init()
# and the one real lv_display_t (over the test-double backend) itself,
# so the auto-created display is both unneeded and the thing that was
# crashing; disable it.
CONFIG_LV_Z_AUTO_INIT=n

CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=16384
