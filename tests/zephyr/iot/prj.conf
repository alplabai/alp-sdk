# SPDX-License-Identifier: Apache-2.0
#
# IoT smoke tests -- exercise the <alp/iot.h> wrapper's public-API
# contract.  Runs under native_sim, which has no Wi-Fi radio nor
# MQTT-capable network stack; the test verifies that the wrapper
# falls back cleanly to the v0.1 NULL-with-NOSUPPORT contract when
# CONFIG_ALP_SDK_IOT_WIFI / CONFIG_ALP_SDK_IOT_MQTT are off.
#
# The "real Wi-Fi + MQTT" path is exercised by HW-in-loop CI on
# AEN-Zephyr (gated on the hil-aen self-hosted runner) -- see
# .github/workflows/nightly-aen-hil.yml.

CONFIG_ZTEST=y
CONFIG_ALP_SDK=y

CONFIG_LOG=y
CONFIG_PRINTK=y
CONFIG_THREAD_LOCAL_STORAGE=y
CONFIG_MAIN_STACK_SIZE=4096
