# SPDX-License-Identifier: Apache-2.0
#
# Audio smoke tests -- exercise the <alp/audio.h> wrapper's
# public-API contract.  Runs under native_sim, which has no DMIC
# nor I2S devices; the wrapper falls back to the v0.1 NULL-with-
# NOSUPPORT contract when CONFIG_ALP_SDK_AUDIO_IN / _OUT are off.

CONFIG_ZTEST=y
CONFIG_ALP_SDK=y

CONFIG_LOG=y
CONFIG_PRINTK=y
CONFIG_THREAD_LOCAL_STORAGE=y
CONFIG_MAIN_STACK_SIZE=4096
