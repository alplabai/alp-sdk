# Twister overlay that flips CONFIG_ALP_SDK_UART_RX_RINGBUF on so the
# interrupt-driven RX ring buffer code path in peripheral_uart.c is
# compile-tested alongside its NOSUPPORT siblings.  Real-IRQ attach
# requires a working UART driver (HIL) so the failure-path tests
# here verify NULL-arg handling only.

CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_ALP_SDK_UART_RX_RINGBUF=y
