tests:
  alp_sdk.peripheral.smoke:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    tags:
      - alp-sdk
      - peripheral

  # v0.2 capability-validation scenario: pin the SoC choice to Alif
  # Ensemble E3 (24-bit max ADC, 12 PWMs, etc.) and verify that the
  # SoC-capability checks in alp_*_open reject configs that exceed
  # the documented hardware caps.
  alp_sdk.peripheral.caps_e3:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    extra_args:
      - "EXTRA_CONF_FILE=prj_caps_e3.conf"
    tags:
      - alp-sdk
      - peripheral
      - caps

  # Interim scenario (LwRB upstream swap deferred, no committed
  # version): flips CONFIG_ALP_SDK_UART_RX_RINGBUF=y so the
  # LwRB-backed RX ring buffer code path in peripheral_uart.c is
  # compile-verified.  The failure-path tests in this suite run
  # against both this overlay (feature on) and the default config
  # (feature off) -- the assertions are scoped to "any refusal is
  # acceptable" rather than a specific status code, so the same
  # ZTESTs cover both builds.  Real-IRQ attach gates on HIL.
  alp_sdk.peripheral.uart_rx_ringbuf:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    extra_args:
      - "EXTRA_CONF_FILE=prj_uart_ringbuf.conf"
    tags:
      - alp-sdk
      - peripheral
      - uart
      - lwrb

  # V2N-supervisor scenario: force CONFIG_ALP_SDK_V2N_SUPERVISOR=y
  # so the GD32-bridge dispatch branches in peripheral_pwm.c /
  # peripheral_adc.c / peripheral_qenc.c / peripheral_counter.c /
  # peripheral_dac.c get compiled and tested under native_sim.  No
  # bus IDs configured (Kconfig defaults to -1), so the supervisor
  # surfaces ALP_ERR_NOT_READY for every open() and the V2N-only
  # tests assert that propagates back through the portable surface.
  alp_sdk.peripheral.v2n_supervisor:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    extra_args:
      - "EXTRA_CONF_FILE=prj_v2n_supervisor.conf"
    tags:
      - alp-sdk
      - peripheral
      - v2n
      - bridge

  # alp_sdk.peripheral.evk_aen — HW-in-loop variant for the E1M EVK
  # populated with an E1M-AEN801 SoM. The real board target,
  # alp_e1m_aen801_m55_he/ae822fa0e5597ls0/rtss_he, ships in-tree
  # under zephyr/boards/alp/ -- this scenario stays parked pending
  # HW-in-loop CI wiring, not a missing board file. The overlay at
  # boards/alp_e1m_aen801_m55_he.overlay is already in place and
  # compiles against the in-tree board file without further changes.
