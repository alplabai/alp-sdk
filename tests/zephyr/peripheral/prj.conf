CONFIG_ZTEST=y
CONFIG_ALP_SDK=y

# Zephyr subsystems we wrap
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_SPI=y
CONFIG_SERIAL=y

# v0.2 peripheral subsystems — needed so the wrapper sources compile
# and the alp_*_open NULL/INVAL/last_error paths can be exercised.
# No corresponding controllers in the overlay; alp_*_open returns
# NULL with a precise last_error code.
CONFIG_ADC=y
CONFIG_PWM=y
CONFIG_COUNTER=y
CONFIG_SENSOR=y
CONFIG_I2S=y
CONFIG_CAN=y
CONFIG_RTC=y
CONFIG_WATCHDOG=y
# Required for thread-local last-error storage.
CONFIG_THREAD_LOCAL_STORAGE=y

# peripheral_i2s.c calls k_malloc to allocate its DMA slab; without
# a heap pool the linker rejects the reference.  4 KiB is enough
# for the test's open-with-NULL paths -- real apps that exercise
# alp_i2s_write set this higher.
CONFIG_HEAP_MEM_POOL_SIZE=4096

# Emulated controllers — let the test run under native_sim.
CONFIG_EMUL=y
CONFIG_GPIO_EMUL=y
CONFIG_I2C_EMUL=y
CONFIG_SPI_EMUL=y
# #626: alp-uart1 (RX byte injection for the timeout_ms contract tests
# in src/uart.c) is backed by zephyr,uart-emul, not a real controller.
CONFIG_UART_EMUL=y

CONFIG_LOG=y

# I2C target (slave) mode: compiles the emulated controller's
# target-register hooks so the alp_i2c_target_* lifecycle tests can
# run the open/close roundtrip (nothing external ever drives the
# emulated bus, so callbacks never fire).
CONFIG_I2C_TARGET=y

# SPI target (slave) mode: compiles the SPI drivers' slave path so
# alp_spi_target_open can claim the emulated bus.  CONFIG_SPI_ASYNC
# stays OFF here on purpose -- the spi_target tests pin down the
# documented degrade: a finite transceive timeout on a sync-only
# build must fail with ALP_ERR_NOSUPPORT instead of blocking.
CONFIG_SPI_SLAVE=y
