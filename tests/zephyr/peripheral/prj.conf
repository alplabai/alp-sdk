CONFIG_ZTEST=y
CONFIG_ALP_SDK=y

# Zephyr subsystems we wrap
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_SPI=y
CONFIG_SERIAL=y

# v0.2 peripheral subsystems — needed so the wrapper sources compile
# and the alp_*_open NULL/INVAL/last_error paths can be exercised.
# No corresponding controllers in the overlay; alp_*_open returns
# NULL with a precise last_error code.
CONFIG_ADC=y
CONFIG_PWM=y
CONFIG_COUNTER=y
CONFIG_SENSOR=y
CONFIG_I2S=y
CONFIG_CAN=y
CONFIG_RTC=y
CONFIG_WATCHDOG=y
# DAC: scenarios don't have a real DAC controller, but the test
# suite references alp_dac_open in src/main.c.  Force the wrapper
# in so the symbol exists at link time; it returns NOT_READY for
# the unresolved alp-dac0 alias (no controller backing).
CONFIG_ALP_SDK_PERIPH_DAC=y
# Required for thread-local last-error storage.
CONFIG_THREAD_LOCAL_STORAGE=y

# peripheral_i2s.c calls k_malloc to allocate its DMA slab; without
# a heap pool the linker rejects the reference.  4 KiB is enough
# for the test's open-with-NULL paths -- real apps that exercise
# alp_i2s_write set this higher.
CONFIG_HEAP_MEM_POOL_SIZE=4096

# Emulated controllers — let the test run under native_sim.
CONFIG_EMUL=y
CONFIG_GPIO_EMUL=y
CONFIG_I2C_EMUL=y
CONFIG_SPI_EMUL=y

CONFIG_LOG=y
