#
# Overlay onto prj.conf for the alp_sdk.peripheral.v2n_supervisor
# scenario.  Force-enables the V2N SoC choice + GD32G553 chip driver
# + the supervisor singleton so the bridge dispatcher branches in
# peripheral_pwm.c / _adc.c / _qenc.c / _counter.c / _dac.c get
# compiled and the open() paths surface ALP_ERR_NOT_READY from the
# supervisor (no bus IDs configured -> no actual GD32 link).
#
# This scenario does NOT exercise the GD32 firmware -- native_sim
# has no SPI/I2C controller wired to a GD32 emul.  The intent is to
# prove that the V2N branch compiles + routes correctly back to the
# portable surface; real-silicon round-trip coverage lives in the
# v2n HIL test plan.

CONFIG_ALP_SOC_RENESAS_RZV2N_N44=y
CONFIG_ALP_SDK_CHIP_GD32G553=y
CONFIG_ALP_SDK_V2N_SUPERVISOR=y
CONFIG_ALP_SDK_PERIPH_DAC=y
