#
# Inference smoke tests -- exercise the <alp/inference.h> wrapper's
# public-API contract under native_sim.  CONFIG_ALP_SDK_INFERENCE_TFLM
# stays off so the wrapper falls back to NOSUPPORT; the real TFLM
# round-trip lands in HW-in-loop CI on AEN.

CONFIG_ZTEST=y
CONFIG_ALP_SDK=y

CONFIG_LOG=y
CONFIG_PRINTK=y
CONFIG_THREAD_LOCAL_STORAGE=y
CONFIG_MAIN_STACK_SIZE=4096
