# SPDX-License-Identifier: Apache-2.0
#
# E1M-V2M101 Cortex-M33 system manager: pin the SoC capability
# profile so the conformance expectations derive from alp_has()
# (strict caps<->backend parity) instead of the permissive
# CONFIG_ALP_SOC_NONE fallback.  Profile per
# metadata/e1m_modules/E1M-V2M101.yaml (silicon_variant
# R9A09G056N44GBG -> metadata/socs/renesas/rzv2n/n44.json).
CONFIG_ALP_SOC_RENESAS_RZV2N_N44=y

# The V2N-family PWM / ADC backends route through the on-module
# GD32G553 supervisor (compiled whenever the SoC config is set), and
# their bridge calls resolve in chips/gd32g553/gd32g553.c -- so the
# chip driver must come along.  Every E1M-X SoM carries the bridge
# (docs/portability-matrix.md pairs these two configs on all four
# SKUs); cf. tests/zephyr/peripheral/prj_v2n_supervisor.conf.
CONFIG_ALP_SDK_CHIP_GD32G553=y
