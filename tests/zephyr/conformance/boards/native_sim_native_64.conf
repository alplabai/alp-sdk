#
# native_sim-only Kconfig: the emulated controllers backing the
# must-open rows (gpio / i2c / spi; adc0 + counter0 come from the
# board DTS via the overlay aliases).  Kept out of prj.conf because
# the DT_HAS_ZEPHYR_*_EMUL_ENABLED dependencies don't exist on the
# real-SoM builds in testcase.yaml platform_allow.
CONFIG_EMUL=y
CONFIG_GPIO_EMUL=y
CONFIG_I2C_EMUL=y
CONFIG_SPI_EMUL=y

# The native_pty UART driver implements the interrupt-driven API, so
# the alp_uart_rx_ringbuf_* surface gets a real positive path here
# (attach + count + pop + detach against uart0).
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_ALP_SDK_UART_RX_RINGBUF=y
