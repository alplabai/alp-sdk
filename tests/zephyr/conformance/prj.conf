CONFIG_ZTEST=y
CONFIG_ALP_SDK=y

# Zephyr subsystems behind the portable classes under conformance
# test.  Each CONFIG pulls the matching alp backend wrapper into the
# build; classes without a controller on the build platform exercise
# the documented failure contract (NULL + alp_last_error) instead of
# the positive open path -- see the test matrix in src/main.c.
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_SPI=y
CONFIG_SERIAL=y
CONFIG_ADC=y
CONFIG_PWM=y
CONFIG_COUNTER=y
CONFIG_SENSOR=y
CONFIG_I2S=y
CONFIG_CAN=y
CONFIG_RTC=y
CONFIG_WATCHDOG=y

# Required for the thread-local alp_last_error() storage.
CONFIG_THREAD_LOCAL_STORAGE=y

# peripheral_i2s.c allocates its DMA slab with k_malloc; the linker
# needs a heap pool even though the conformance build never gets past
# open() on native_sim (no I2S controller).
CONFIG_HEAP_MEM_POOL_SIZE=4096

# Emulated controllers live in boards/native_sim*.conf: their Kconfig
# deps (DT_HAS_ZEPHYR_*_EMUL_ENABLED) only exist on native_sim, and an
# unmet =y assignment is a hard Kconfig error on the real-SoM builds
# this suite also targets (see testcase.yaml platform_allow).

CONFIG_LOG=y
