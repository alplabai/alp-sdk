CONFIG_ZTEST=y
CONFIG_ALP_SDK=y

# Zephyr subsystems behind the portable classes under conformance
# test.  Each CONFIG pulls the matching alp backend wrapper into the
# build; classes without a native_sim controller exercise the
# documented failure contract (NULL + alp_last_error) instead of the
# positive open path -- see the test matrix in src/main.c.
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_SPI=y
CONFIG_SERIAL=y
CONFIG_ADC=y
CONFIG_PWM=y
CONFIG_COUNTER=y
CONFIG_SENSOR=y
CONFIG_I2S=y
CONFIG_CAN=y
CONFIG_RTC=y
CONFIG_WATCHDOG=y

# Required for the thread-local alp_last_error() storage.
CONFIG_THREAD_LOCAL_STORAGE=y

# peripheral_i2s.c allocates its DMA slab with k_malloc; the linker
# needs a heap pool even though the conformance build never gets past
# open() on native_sim (no I2S controller).
CONFIG_HEAP_MEM_POOL_SIZE=4096

# Emulated controllers -- back the must-open classes (gpio / i2c /
# spi / uart) so the positive capabilities + double-close paths run.
CONFIG_EMUL=y
CONFIG_GPIO_EMUL=y
CONFIG_I2C_EMUL=y
CONFIG_SPI_EMUL=y

CONFIG_LOG=y
