#
# Runner defaults for E1M-AEN301 (Alif Ensemble E3) + E1M-EVK.
# Inherits the portable spec set from tests/hil/_common/.

schema_version: 1
board: alp_e1m_aen301_m55_hp        # E3 has 2x M55 (HP + HE); HP is the app core.
serial_port: /dev/ttyACM0
flash_method: westflash
defaults:
  serial:
    baud:       115200
    duration_s: 15
