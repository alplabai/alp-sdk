# SPDX-License-Identifier: Apache-2.0
#
# HiL smoke for examples/gpio-button-led on the E1M-EVK.
#
# The EVK has no dedicated GPIO LED, so the example uses the E1M "GPIO
# secondary" capability: the button is the encoder push switch
# (E1M_GPIO_IO4, active-low) and the LED is the RGB-red PWM3 pad
# claimed as a digital GPIO (E1M_GPIO_PWM3), both through the
# <alp/blocks/button_led.h> helper.
#
# Hardware fixtures expected:
#   - E1M_GPIO_IO4 routed to the encoder push switch and the PWM3 pad
#     (E1M_GPIO_PWM3) wired to the RGB-red LED, both via the e1m-evk
#     preset's e1m_routes:.  The board DTS must mux the PWM3 pad to
#     GPIO (pinctrl) for the LED half to drive.
#
# What this proves end-to-end:
#   - alp_button_led_init() returns ALP_OK on real silicon (both pads
#     resolve through the positional alp,pin-array).
#   - alp_button_led_set() drives the red LED (4 toggles visible).
#   - alp_button_led_is_pressed() returns ALP_OK and a 0/1 value.
#   - The example exits cleanly without a panic.

schema_version: 1
name: gpio-button-led
description: |
  Verifies GPIO button read + GPIO LED drive end-to-end on the E1M-EVK,
  with the LED on the PWM3 pad claimed as a GPIO (E1M GPIO-secondary).

example: examples/gpio-button-led

# board: inherited from the per-SoM _runner.yaml

serial:
  duration_s: 10
  expect_contains:
    - "[gpio] init button=E1M_GPIO_IO4, led=E1M_GPIO_PWM3"
    - "[gpio] led=1 status=0"     # at least one ALP_OK set
    - "[gpio] is_pressed -> status=0"
    - "[gpio] done"
  expect_absent:
    - "init failed"
    - "PANIC"
    - "ASSERT"
    - "FAULT"
