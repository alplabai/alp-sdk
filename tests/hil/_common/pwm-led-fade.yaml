# SPDX-License-Identifier: Apache-2.0
#
# Portable HiL smoke for examples/peripheral-io/pwm-led-fade.  Works on every E1M-
# conformant SoM -- the example targets E1M_PWM0 which the spec
# guarantees every SoM routes.
#
# What this proves end-to-end:
#   - alp_pwm_open(E1M_PWM0, 1 MHz period) returns a real handle.
#   - alp_pwm_set_duty() succeeds for every step in a 0..100..0 sweep.
#   - The example exits cleanly after the sweep.

schema_version: 1
name: pwm-led-fade
description: |
  PWM open / set_duty sweep across E1M_PWM0.

example: examples/peripheral-io/pwm-led-fade

serial:
  duration_s: 15
  expect_contains:
    - "[pwm] open E1M_PWM0"
    - "[pwm] done"
  expect_absent:
    - "open failed"
    - "set_duty"            # the example only prints set_duty on FAILURE
    - "PANIC"
    - "ASSERT"
    - "FAULT"
