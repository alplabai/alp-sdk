# Alif Ensemble E8 GMAC MAC-INIT bench test (alp_e1m_aen801_m55_he, RAM-run).

# --- Tier-1.5 driver Kconfigs are gated under ALP_SDK ---
CONFIG_ALP_SDK=y

# --- RAM console: the app UART is not on USB on this bench, so the human reads
#     the 'ram_console_buf' symbol over SWD (mem8) + ASCII-decodes. ---
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y

# --- Ethernet networking stack + the upstream DWMAC core. The alp-sdk
#     ETH_DWMAC_ALIF glue is `default y` once the alif,ethernet node is okay
#     (it selects ETH_DWMAC + PINCTRL).  Do NOT assign CONFIG_ETH_DWMAC here:
#     it is a select-only symbol (no prompt), so assigning it is a hard Kconfig
#     error ("assigned in a configuration file ... but ... has no prompt"). ---
CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y

# The upstream DWMAC core errors out under CONFIG_NET_BUF_VARIABLE_DATA_SIZE and
# ETH_DWMAC depends on NET_BUF_FIXED_DATA_SIZE; pin it (and the fragment size
# the descriptor rings are sized against).
CONFIG_NET_BUF_FIXED_DATA_SIZE=y
CONFIG_NET_BUF_DATA_SIZE=256

# We validate MAC INIT (register programming), not traffic.  net_pkt.c hard-
# #errors unless at least one L3 protocol is compiled in, so enable IPv4 (the
# lightest), but skip DHCP/address config churn -- the iface comes up without an
# address, which is all MAC-init needs.
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_DHCPV4=n
CONFIG_NET_CONFIG_SETTINGS=n
CONFIG_NET_TC_THREAD_PREEMPTIVE=y

# Pools: a handful of TX/RX buffers is enough for the iface to come up.
CONFIG_NET_PKT_RX_COUNT=8
CONFIG_NET_PKT_TX_COUNT=8
CONFIG_NET_BUF_RX_COUNT=16
CONFIG_NET_BUF_TX_COUNT=16

# Keep descriptor rings small + deterministic for the readback math.
CONFIG_DWMAC_NB_TX_DESCS=4
CONFIG_DWMAC_NB_RX_DESCS=4

# Logs to the RAM console (ethernet + phy banner help triage if a step fails).
CONFIG_LOG=y
CONFIG_LOG_MODE_MINIMAL=y
CONFIG_ETHERNET_LOG_LEVEL_INF=y
CONFIG_NET_LOG=y

# Generous main stack: the net stack + iface bring-up runs from system threads,
# but the readback test loop prints from main.
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=8192
