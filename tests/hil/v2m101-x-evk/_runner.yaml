#
# Runner defaults for E1M-V2M101 (V2N101 silicon + on-module DEEPX
# DX-M1 NPU) + E1M-X-EVK.  Inherits the portable spec set from
# tests/hil/_common/; DEEPX-specific bring-up specs (v2n-m1-deepx-
# inference, DEEPX 0.75 V rail) live alongside in this dir.

schema_version: 1
board: alp_e1m_v2m101_m33_sm
serial_port: /dev/ttyACM0
flash_method: westflash
defaults:
  serial:
    baud:       115200
    duration_s: 20
