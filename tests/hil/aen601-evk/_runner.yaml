#
# Runner defaults for E1M-AEN601 (Alif Ensemble E6, 1x A32 + 2x M55
# + 3x Ethos-U) + E1M-EVK.  Inherits the portable spec set from
# tests/hil/_common/.

schema_version: 1
board: alp_e1m_aen601_m55_hp
serial_port: /dev/ttyACM0
flash_method: westflash
defaults:
  serial:
    baud:       115200
    duration_s: 15
