#
# Runner defaults for E1M-V2N102 (same silicon as V2N101, larger
# memory) + E1M-X-EVK.  Inherits the portable spec set from
# tests/hil/_common/.

schema_version: 1
board: alp_e1m_v2n102_m33_sm
serial_port: /dev/ttyACM0
flash_method: westflash
defaults:
  serial:
    baud:       115200
    duration_s: 20
