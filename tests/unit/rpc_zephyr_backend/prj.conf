#
# CONFIG_OPENAMP / CONFIG_IPC_SERVICE_BACKEND_RPMSG are NOT set here --
# see src/test_rpc_zephyr_backend.c's header comment for why they are
# faked at the preprocessor level instead (this workspace's manifest
# has no `open-amp` module, and the RPMSG ipc_service backend needs a
# real MBOX instance neither of which any test below touches).
# CONFIG_IPC_SERVICE stays real: it pulls in subsys/ipc/ipc_service.c
# (the core TU, backend-independent), which is where every
# ipc_service_* symbol zephyr_drv.c references actually lives.
CONFIG_ZTEST=y
CONFIG_IPC_SERVICE=y
