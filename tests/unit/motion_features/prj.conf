CONFIG_ZTEST=y

# <alp/dsp.h> chain: the feature extractor now routes its FFT through
# the portable DSP surface (CMSIS-DSP on Cortex-M, portable-C fallback
# here).  Enable the alp_sdk module + DSP class so dsp_dispatch.c +
# the sw_fallback backend link into this ztest.
CONFIG_ALP_SDK=y
CONFIG_ALP_SDK_DSP=y
CONFIG_THREAD_LOCAL_STORAGE=y
