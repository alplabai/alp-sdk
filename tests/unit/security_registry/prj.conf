CONFIG_ZTEST=y
CONFIG_ALP_SDK=y
CONFIG_ALP_SOC_ALIF_ENSEMBLE_E7=y
CONFIG_ALP_SDK_SECURITY_SW_FALLBACK=y

# CONFIG_MBEDTLS intentionally OFF here -- Zephyr v4.4's mbedtls
# 3.6 has a broken ssl_misc.h on every native_sim build (see
# reference_zephyr_ci_gotchas memory note §8 / upstream
# tf-psa-crypto work).  The security sw_fallback compiles
# without mbedtls (it's an OS-agnostic stub returning NOSUPPORT),
# so the registry test still exercises the dispatcher contract
# end-to-end.  Real-silicon builds re-enable mbedtls via TF-M.
