CONFIG_ZTEST=y
CONFIG_ALP_SDK=y
CONFIG_ALP_SOC_ALIF_ENSEMBLE_E7=y

# Pulls in Zephyr's power-management subsystem so
# pm_policy_state_lock_get / pm_policy_state_lock_put + enum pm_state
# resolve at link time and the real ALP power backend
# (src/backends/power/zephyr_pm_policy.c) compiles in.
CONFIG_PM=y
CONFIG_ALP_SDK_POWER_PM_POLICY=y
