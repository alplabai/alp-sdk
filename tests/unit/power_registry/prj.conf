CONFIG_ZTEST=y
CONFIG_ALP_SDK=y
CONFIG_ALP_SOC_ALIF_ENSEMBLE_E7=y

# Pulls in Zephyr's power-management subsystem so
# pm_policy_state_lock_get / pm_policy_state_lock_put + enum pm_state
# resolve at link time and the real ALP power backend
# (src/backends/power/zephyr_pm_policy.c) compiles in.
CONFIG_PM=y
CONFIG_ALP_SDK_POWER_PM_POLICY=y

# Compile the Renesas vendor-extension body so the dispatcher /
# vendor-check path is exercised end-to-end.  The body references
# gd32g553_power_mode_set (from the chip driver) + the V2N
# supervisor singleton's acquire / release helpers; pulling in
# the chip driver + supervisor lets the body link cleanly even
# though the active SoC is alif (the body's vendor-check gate
# returns NOT_PRESENT_ON_THIS_SOC well before reaching the
# supervisor on this build).
CONFIG_ALP_SDK_CHIP_GD32G553=y
CONFIG_ALP_SDK_V2N_SUPERVISOR=y
CONFIG_ALP_SDK_POWER_EXT_RENESAS=y

# Subsystems the GD32G553 chip driver depends on via
# <alp/peripheral.h>.
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_SPI=y
