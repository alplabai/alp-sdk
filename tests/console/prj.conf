CONFIG_ZTEST=y
CONFIG_ALP_SDK=y
CONFIG_ALP_SDK_CONSOLE=y
CONFIG_ALP_SDK_CONSOLE_UNSAFE=y
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=n
CONFIG_SHELL_BACKEND_DUMMY=y
CONFIG_LOG=n
CONFIG_GPIO=y
CONFIG_ALP_SDK_I2C_SW_FALLBACK=y
CONFIG_ADC=y
CONFIG_ALP_SDK_ADC_SW_FALLBACK=y
CONFIG_SHELL_BACKEND_DUMMY_BUF_SIZE=2048

# `alp companion` (#673 Phase 2 command-group split) -- Alif CC3501E path.
# Pulls in chips/cc3501e/cc3501e.c (link-tests every command-group TU
# without a real bus; commands warn "companion not registered" and exit
# early, same as an app that hasn't called alp_console_companion_set()
# yet).  CONFIG_SPI/CONFIG_EMUL/CONFIG_SPI_EMUL mirror the known-working
# tests/zephyr/chips/prj.conf recipe for CONFIG_ALP_SDK_CHIP_CC3501E on
# native_sim.
CONFIG_ALP_SDK_CONSOLE_CMD_COMPANION=y
CONFIG_ALP_SDK_CHIP_CC3501E=y
CONFIG_SPI=y
CONFIG_EMUL=y
CONFIG_SPI_EMUL=y
