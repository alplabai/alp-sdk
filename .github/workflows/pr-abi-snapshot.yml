# SPDX-License-Identifier: Apache-2.0
#
# ABI snapshot gate.  Activates post-1.0 when ABI stability is the
# release-gate contract; pre-1.0 the equivalent drift check runs
# inside `pr-generated-files.yml` (informational, not blocking).
#
# What this workflow does:
#
#   1. Regenerate the ABI snapshot from the working tree's
#      include/alp/*.h headers.
#   2. Diff against docs/abi/v<N>-snapshot.json, where <N> is the
#      version `metadata/sdk_version.yaml` currently declares (same
#      derivation `pr-generated-files.yml` and `test-all.sh` use, see
#      docs/abi/README.md).  If that snapshot isn't committed yet (a
#      release cut in flight bumped the version before its snapshot
#      landed), the diff step skips with a notice rather than failing
#      the job -- this workflow stays informational pre-1.0.
#   3. Classify each diff entry by [ABI-STABLE] vs
#      [ABI-EXPERIMENTAL] marker presence in the header comment:
#      - ADDED [ABI-STABLE]              -> minor bump required, PASS
#      - ADDED [ABI-EXPERIMENTAL]        -> any release, PASS
#      - CHANGED / REMOVED [ABI-STABLE]  -> major bump required, FAIL unless the PR also bumps sdk_version.yaml's major
#      - CHANGED / REMOVED [ABI-EXPERIMENTAL] -> any release, PASS with a warning
#
# This workflow is currently parked behind a no-op shim until v1.0
# tags.  The shim runs the snapshot diff and prints results without
# enforcing exit codes; flipping the `gate` job's
# `continue-on-error: true` to `false` after the v1.0 tag activates
# the gate.

name: pr-abi-snapshot

on:
  pull_request:
    branches:
      - main
      - 'release/**'
    paths:
      - 'include/alp/**'
      - 'metadata/sdk_version.yaml'
      - 'scripts/abi_snapshot.py'
      - 'docs/abi/**'
      - '.github/workflows/pr-abi-snapshot.yml'

permissions:
  contents: read
  pull-requests: write  # to post the diff as a comment

jobs:
  snapshot-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Locate the current snapshot
        id: snap
        run: |
          # Derived from metadata/sdk_version.yaml (docs/abi/README.md),
          # same as pr-generated-files.yml and test-all.sh -- not `ls |
          # sort -V | tail -1`, which only ever agreed with this by
          # coincidence of version-sort ordering and isn't protected by
          # the write guard the way this derivation is.
          VERSION=$(python3 scripts/abi_snapshot.py --print-current-version)
          LATEST="docs/abi/${VERSION}-snapshot.json"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Current snapshot: $LATEST"

      - name: Run snapshot diff
        id: diff
        run: |
          SNAPSHOT="${{ steps.snap.outputs.latest }}"
          # A release cut bumps metadata/sdk_version.yaml before its
          # docs/abi/v<N>-snapshot.json is generated + committed (that
          # commit lands in the same PR, sometimes a follow-up). Without
          # the guard below, a missing baseline doesn't redden this job
          # -- it can't: `abi_snapshot.py --diff` raises, but this step
          # pipes its output through `tee` with no pipefail, so the
          # step's exit code is `tee`'s (0) regardless of what python
          # did, and the job stays green with a raw traceback sitting in
          # an otherwise-clean log. The guard is a clarity fix, not a
          # red->green one: it swaps that traceback for a clean
          # `::notice::` skip.
          if [ ! -f "${SNAPSHOT}" ]; then
            echo "::notice::No committed snapshot at ${SNAPSHOT} yet (release cut in progress) -- skipping the ABI diff for this run."
            echo "ABI diff skipped: ${SNAPSHOT} is not committed yet." > abi_diff.txt
            echo "has_breaking=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python3 scripts/abi_snapshot.py --diff "${SNAPSHOT}" | tee abi_diff.txt
          # PIPESTATUS[0], not the pipeline's own exit code (that's
          # `tee`'s) -- otherwise a real abi_snapshot.py failure (exit
          # >=2: a corrupt snapshot, a parse error) leaves abi_diff.txt
          # empty, `grep` below finds nothing, and has_breaking=false
          # reports "no ABI change" for a check that never actually ran.
          diff_rc=${PIPESTATUS[0]}
          if [ "${diff_rc}" -ge 2 ]; then
            echo "::error::abi_snapshot.py --diff failed (exit ${diff_rc}); see the log above."
            exit "${diff_rc}"
          fi
          if grep -q "REMOVED\|CHANGED" abi_diff.txt; then
            echo "has_breaking=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_breaking=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post diff to the PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('abi_diff.txt', 'utf8').trim();
            if (!diff || diff.includes('ABI unchanged')) return;
            const body = '### ABI snapshot diff\n\n```\n' + diff + '\n```\n\n' +
              'See [`docs/release-policy.md`](../blob/main/docs/release-policy.md#what-counts-as-breaking-for-the-sdk) ' +
              'for what counts as breaking.  `[ABI-STABLE]` removals require a major version bump.';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Gate (post-1.0 only -- currently informational)
        # Flip this to remove `continue-on-error` after the v1.0
        # tag.  Until then the workflow runs to publish the diff
        # comment but does not fail the PR.
        continue-on-error: true
        run: |
          if [ "${{ steps.diff.outputs.has_breaking }}" = "true" ]; then
            echo "::warning::ABI-breaking change detected.  Post-1.0 this fails the PR unless the major version is also bumped."
            # Post-1.0: also assert metadata/sdk_version.yaml major
            # bumped vs main.  Logic lives in this block once the
            # gate flips active.
          fi
