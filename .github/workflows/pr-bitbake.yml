# SPDX-License-Identifier: Apache-2.0
#
# Bitbake CI — DISPATCH BRIDGE (GitHub-hosted).
#
# The actual Yocto build runs on a self-hosted runner in the PRIVATE
# `alplabai/alp-sdk-internal` repo (which also hosts the license-gated
# RZ BSP the build needs).  A self-hosted runner NEVER attaches to this
# public repo — fork PRs would otherwise run untrusted code on it.  This
# job is GitHub-hosted: it sets a `pending` commit status, then fires a
# `repository_dispatch` to alp-sdk-internal with the target ref/sha.
# alp-sdk-internal runs `bitbake alp-image-edge` for every A-cluster
# MACHINE on its own runner and posts the per-MACHINE result back here as
# a commit status (`bitbake · <MACHINE>`), so the red-X still lands on
# the dev→main PR and can be a required check.
#
# Security model (see docs/ci/runner-architecture.md):
#   * Fork PRs receive NO secrets, so the App credentials are absent and
#     the guard below skips the dispatch entirely — a fork can never
#     trigger the private build.
#   * The dispatch token is minted at runtime from a GitHub App
#     (actions/create-github-app-token), scoped to alp-sdk-internal with
#     Contents:write ONLY and valid ~1h.  The only long-lived secret is
#     the App's private key (org-owned + revocable); worst case if leaked,
#     someone can kick off a build — no code execution, no host access.

name: pr-bitbake

on:
  pull_request:
    branches: [main, dev]
    paths:
      - 'metadata/**'
      - 'scripts/**'
      - 'examples/**/board.yaml'
      # The example SOURCE that meta-alp-sdk recipes actually compile.  Listed
      # explicitly rather than as a blanket `examples/**`: a bake is hours long
      # and runs on the bench host, so a Zephyr-only example edit must not
      # trigger one.  Kept honest by tests/scripts/test_bitbake_paths_cover_recipe_sources.py,
      # which fails if a recipe's `S = ...examples/...` is not matched here --
      # otherwise adding a recipe silently drops it from CI.
      #
      # Why this exists: #818 fixed alp-lvgl-dashboard's do_compile, and its
      # merge triggered NO bake, because CMakeLists.txt -- the very file the
      # recipe compiles -- matched none of these paths.  Only board.yaml did.
      - 'examples/aen/edgeai-vision-aen/**'
      - 'examples/display/lvgl-dashboard-x-evk/**'
      - 'examples/v2n/v2n-m1-ros-perception/**'
      - 'src/**'
      - 'meta-alp-sdk/**'
      - '.github/workflows/pr-bitbake.yml'
  push:
    branches: [main, dev]
    paths:
      - 'metadata/**'
      - 'scripts/**'
      - 'examples/**/board.yaml'
      # Keep in lockstep with the pull_request list above.
      - 'examples/aen/edgeai-vision-aen/**'
      - 'examples/display/lvgl-dashboard-x-evk/**'
      - 'examples/v2n/v2n-m1-ros-perception/**'
      - 'src/**'
      - 'meta-alp-sdk/**'
      - '.github/workflows/pr-bitbake.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dispatch:
    name: bitbake · dispatch to alp-sdk-internal
    runs-on: ubuntu-latest
    permissions:
      statuses: write          # pending status on THIS repo (same-repo, no PAT)
    steps:
      - name: Resolve target sha/ref
        id: t
        run: |
          echo "sha=${{ github.event.pull_request.head.sha || github.sha }}" >> "$GITHUB_OUTPUT"
          echo "ref=${{ github.event.pull_request.head.ref || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Guard — internal events only (forks never dispatch)
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && \
             [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "Fork PR detected — skipping private dispatch (secrets do not reach forks anyway)."
            echo "go=false" >> "$GITHUB_OUTPUT"
          else
            echo "go=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set pending status on alp-sdk
        if: steps.guard.outputs.go == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ steps.t.outputs.sha }} \
            -f state=pending \
            -f context="bitbake (alp-sdk-internal)" \
            -f description="Dispatched to the private Yocto runner…"

      - name: Mint a short-lived App token (scoped to alp-sdk-internal)
        if: steps.guard.outputs.go == 'true'
        id: apptoken
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ALP_CI_APP_ID }}
          private-key: ${{ secrets.ALP_CI_APP_PRIVATE_KEY }}
          owner: alplabai
          repositories: alp-sdk-internal

      - name: Dispatch build to alp-sdk-internal
        if: steps.guard.outputs.go == 'true'
        env:
          GH_TOKEN: ${{ steps.apptoken.outputs.token }}
        run: |
          gh api repos/alplabai/alp-sdk-internal/dispatches \
            -f event_type=bitbake \
            -F "client_payload[sha]=${{ steps.t.outputs.sha }}" \
            -F "client_payload[ref]=${{ steps.t.outputs.ref }}" \
            -F "client_payload[pr]=${{ github.event.pull_request.number || 0 }}"
