# SPDX-License-Identifier: Apache-2.0
#
# Bitbake CI — DISPATCH BRIDGE (GitHub-hosted).
#
# The actual Yocto build runs on a self-hosted runner in the PRIVATE
# `alplabai/alp-sdk-internal` repo (which also hosts the license-gated
# RZ BSP the build needs).  A self-hosted runner NEVER attaches to this
# public repo — fork PRs would otherwise run untrusted code on it.  This
# job is GitHub-hosted: it sets a `pending` commit status, then fires a
# `repository_dispatch` to alp-sdk-internal with the target ref/sha.
# alp-sdk-internal runs `bitbake alp-image-edge` for every A-cluster
# MACHINE on its own runner and posts the per-MACHINE result back here as
# a commit status (`bitbake · <MACHINE>`), so the red-X still lands on
# the dev→main PR and can be a required check.
#
# Security model (see docs/ci/runner-architecture.md):
#   * Fork PRs receive NO secrets, so ALP_INTERNAL_DISPATCH_TOKEN is
#     absent and the guard below skips the dispatch entirely — a fork can
#     never trigger the private build.
#   * ALP_INTERNAL_DISPATCH_TOKEN is a fine-grained PAT scoped to
#     alp-sdk-internal with Contents:write ONLY (enough for
#     repository_dispatch).  Worst case if leaked: someone can kick off a
#     build — no code execution on any runner, no host access.

name: pr-bitbake

on:
  pull_request:
    branches: [main]
    paths:
      - 'metadata/**'
      - 'scripts/**'
      - 'examples/**/board.yaml'
      - 'src/**'
      - 'meta-alp-sdk/**'
      - '.github/workflows/pr-bitbake.yml'
  push:
    branches: [main]
    paths:
      - 'metadata/**'
      - 'scripts/**'
      - 'examples/**/board.yaml'
      - 'src/**'
      - 'meta-alp-sdk/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dispatch:
    name: bitbake · dispatch to alp-sdk-internal
    runs-on: ubuntu-latest
    permissions:
      statuses: write          # pending status on THIS repo (same-repo, no PAT)
    steps:
      - name: Resolve target sha/ref
        id: t
        run: |
          echo "sha=${{ github.event.pull_request.head.sha || github.sha }}" >> "$GITHUB_OUTPUT"
          echo "ref=${{ github.event.pull_request.head.ref || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Guard — internal events only (forks never dispatch)
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && \
             [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "Fork PR detected — skipping private dispatch (secrets do not reach forks anyway)."
            echo "go=false" >> "$GITHUB_OUTPUT"
          else
            echo "go=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set pending status on alp-sdk
        if: steps.guard.outputs.go == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ steps.t.outputs.sha }} \
            -f state=pending \
            -f context="bitbake (alp-sdk-internal)" \
            -f description="Dispatched to the private Yocto runner…"

      - name: Dispatch build to alp-sdk-internal
        if: steps.guard.outputs.go == 'true'
        env:
          GH_TOKEN: ${{ secrets.ALP_INTERNAL_DISPATCH_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::ALP_INTERNAL_DISPATCH_TOKEN not set — see docs/ci/runner-architecture.md"
            exit 1
          fi
          gh api repos/alplabai/alp-sdk-internal/dispatches \
            -f event_type=bitbake \
            -F "client_payload[sha]=${{ steps.t.outputs.sha }}" \
            -F "client_payload[ref]=${{ steps.t.outputs.ref }}" \
            -F "client_payload[pr]=${{ github.event.pull_request.number || 0 }}"
