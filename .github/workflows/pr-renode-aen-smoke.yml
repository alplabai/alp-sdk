# SPDX-License-Identifier: Apache-2.0
#
# Renode single-core (Alif Ensemble E8 / E1M-AEN801) smoke test.
#
# Builds examples/peripheral-io/hello-world for the M55-HP Zephyr
# slice, boots the resulting ELF headless in Renode via
# `tan renode` (the standalone github.com/alplabai/tan-cli executor
# -- ADR-0020 Phase 4 retired the SDK-side `west alp-build`/`west
# alp-renode` commands this workflow used to drive), and asserts the
# app's "[hello] done" marker reaches the UART5 console.
#
# !! ADVISORY until the M55 boot is validated on a Renode-equipped
#    runner; flip to required once green.  The build/run/assert steps
#    carry `continue-on-error: true` (mirrors pr-renode-dual-os.yml) so
#    this workflow cannot block PRs while:
#      - the metadata/renode/alif_ensemble_e8.repl / .resc are still
#        unverified on a real Renode (authored HW-free), and
#      - it's unconfirmed that Renode v1.16.1 recognises "cortex-m55"
#        (the .repl notes the cortex-m33 fallback).
#    Promote to a required branch-protection context once a runner
#    proves the console reaches "[hello] done".
#
# What IS already validated elsewhere, not this advisory job: `tan
# renode`'s own deterministic logic (manifest parsing, ELF-path
# resolution, family->descriptor mapping, command-line construction,
# and the missing-renode-binary error path) is covered by tan-cli's
# own test suite now that the SDK-side `west alp-renode` Python
# wrapper (formerly tested by tests/scripts/test_alp_renode.py) was
# retired in ADR-0020 Phase 4.

name: pr-renode-aen-smoke

on:
  pull_request:
    branches: [main, dev]
    paths:
      - 'metadata/renode/**'
      - 'scripts/west_commands/alp_renode.py'
      - 'examples/peripheral-io/hello-world/**'
      - '.github/workflows/pr-renode-aen-smoke.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  renode-aen-smoke:
    name: renode · AEN801 M55-HP hello-world
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      ZEPHYR_TOOLCHAIN_VARIANT: zephyr

    steps:
      - name: Checkout alp-sdk
        uses: actions/checkout@v6
        with:
          path: alp-sdk
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # Repo is checked out under alp-sdk/ (path:), but setup-python (a
          # uses: step) resolves python-version-file from GITHUB_WORKSPACE.
          python-version-file: alp-sdk/.python-version

      - name: Install host build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              ninja-build gperf ccache dfu-util device-tree-compiler \
              python3-dev python3-pip python3-setuptools python3-wheel \
              libffi-dev libssl-dev xz-utils file make gcc \
              ca-certificates curl gnupg

      - name: Install west + Python deps
        run: pip3 install west jsonschema pyyaml

      # Zephyr workspace lives next to alp-sdk.  bootstrap.sh is
      # idempotent (skips work already done) -- mirrors pr-alp-build.yml
      # and pr-twister.yml.
      - name: Bootstrap Zephyr workspace
        working-directory: ${{ github.workspace }}/alp-sdk
        run: bash scripts/bootstrap.sh

      # The M55-HP slice is a real arm-zephyr-eabi cross build (unlike
      # the native_sim twister gate), so the Zephyr SDK is required.
      - name: Install Zephyr SDK (arm-zephyr-eabi)
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          SDK_VER=0.16.8
          curl -fsSL -o /tmp/zephyr-sdk.tar.xz \
            "https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${SDK_VER}/zephyr-sdk-${SDK_VER}_linux-x86_64_minimal.tar.xz"
          mkdir -p "$HOME/zephyr-sdk"
          tar -xJf /tmp/zephyr-sdk.tar.xz -C "$HOME/zephyr-sdk" --strip-components=1
          "$HOME/zephyr-sdk/setup.sh" -t arm-zephyr-eabi -c
          echo "ZEPHYR_SDK_INSTALL_DIR=$HOME/zephyr-sdk" >> "$GITHUB_ENV"

      # Renode's published GitHub release carries the pinned .deb.
      # Same v1.16.1 pin as pr-renode-dual-os.yml so both Renode gates
      # exercise identical emulator behaviour.
      - name: Install Renode
        run: |
          set -euo pipefail
          # v1.16.1 portable-dotnet build: self-contained .NET, no Mono/GTK#
          # system deps.  The .deb needs gtk-sharp2 / *-cil-dev packages that
          # Ubuntu 24.04 (== ubuntu-latest) dropped, breaking apt install (#339).
          curl -fsSL https://github.com/renode/renode/releases/download/v1.16.1/renode-1.16.1.linux-portable-dotnet.tar.gz \
              -o /tmp/renode.tar.gz
          mkdir -p "$HOME/renode"
          tar -xzf /tmp/renode.tar.gz -C "$HOME/renode" --strip-components=1
          echo "$HOME/renode" >> "$GITHUB_PATH"
          # $GITHUB_PATH only applies to later steps, so smoke-check by full path.
          "$HOME/renode/renode" --version

      # Standalone Rust build/run executor for alp-sdk board.yaml plans
      # (ADR-0020 Phase 4 -- the SDK-side `west alp-build`/`west alp-renode`
      # executor was retired; `tan` is now the sole consumer of
      # `alp_orchestrate --emit build-plan`).  No version pin: tan-cli is
      # still a draft, main is the only meaningful ref.
      - name: Install tan (github.com/alplabai/tan-cli)
        run: cargo install --git https://github.com/alplabai/tan-cli --bin tan

      # ---- Advisory verification (continue-on-error) ----------------

      - name: tan build hello-world (M55-HP slice)
        id: alp_build
        continue-on-error: true
        working-directory: ${{ github.workspace }}/alp-sdk
        env:
          # Workspace topdir is the alp-sdk checkout's PARENT (west init -l,
          # #769/#850) -- zephyr lands directly at <topdir>/zephyr, no
          # zephyrproject/ subdir.
          ZEPHYR_BASE: ${{ github.workspace }}/zephyr
        run: |
          set -euo pipefail
          tan build --native --sdk-root "${{ github.workspace }}/alp-sdk" \
              --board-yaml examples/peripheral-io/hello-world/board.yaml

      - name: tan renode (boot M55-HP in Renode)
        id: alp_renode
        continue-on-error: true
        working-directory: ${{ github.workspace }}/alp-sdk
        run: |
          set -euo pipefail
          mkdir -p /tmp/renode-logs
          tan renode examples/peripheral-io/hello-world \
              --log /tmp/renode-logs/out.log \
              --expect "[hello] done" \
              --timeout 120

      - name: Assert "[hello] done" reached the console
        id: assert
        continue-on-error: true
        run: |
          set -euo pipefail
          log=/tmp/renode-logs/out.log
          if [ ! -s "${log}" ]; then
            echo "::error::Renode log missing or empty at ${log}"
            exit 1
          fi
          if ! grep -q "\[hello\] done" "${log}"; then
            echo "::error::Renode console did not contain '[hello] done' within timeout"
            echo "--- tail of ${log} ---"
            tail -100 "${log}"
            exit 1
          fi
          echo "Observed '[hello] done'; AEN801 M55-HP Renode smoke OK."

      - name: Upload Renode log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: renode-aen-smoke-log
          path: /tmp/renode-logs/
          retention-days: 14
          if-no-files-found: ignore
