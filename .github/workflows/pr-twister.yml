# SPDX-License-Identifier: Apache-2.0
#
# Pull-request twister gate for the Alp SDK.
#
# Runs the full ztest + example suite under native_sim/native/64
# on every PR.  The work is split into N parallel shards via
# twister's `--subset i/N` (deterministic partition of the same
# suite list -- the shards' union is identical to a single run, so
# coverage is unchanged).  A tiny aggregator job named exactly
# `twister · native_sim/native/64` gates on all shards, so that name
# stays the single required branch-protection context (no protection
# change needed when the shard count changes).

name: pr-twister

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
  workflow_dispatch:

# Cancel in-flight runs on the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  twister-shard:
    # NB: this job's checks (`twister-shard 1/4` ...) are NOT the
    # required context -- the aggregator `twister` job below is.  The
    # shard count can change here without touching branch protection.
    name: twister-shard ${{ matrix.shard }}/4
    runs-on: ubuntu-latest

    strategy:
      # Run every shard even if one fails, so a single failing suite
      # doesn't mask failures in the other shards.
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    # We deliberately do NOT use the zephyrprojectrtos/ci docker
    # image here.  The image bundles Zephyr SDK 1.0.1 (~17 GB on disk
    # with every cross-toolchain) which intermittently blows out the
    # ubuntu-latest runner's ~14 GB free space at docker-pull time
    # with "no space left on device".  Since native_sim builds use
    # the host's gcc directly (ZEPHYR_TOOLCHAIN_VARIANT=host), the
    # SDK isn't needed -- we just need Python, west, dtc, ninja, and
    # the Zephyr Python deps.  Installing those is ~2 minutes vs a
    # 5+ minute image pull, and stays well within disk budget.

    env:
      ZEPHYR_TOOLCHAIN_VARIANT: host
      # ccache is content-addressed; persisting it across runs turns
      # the per-shard cold builds warm.  Each shard caches its own
      # objects (the `--subset i/4` partition is deterministic, so a
      # shard rebuilds the same suites run-to-run -> high hit rate).
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Checkout alp-sdk
        uses: actions/checkout@v6
        with:
          path: alp-sdk
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # Repo is checked out under alp-sdk/ (path:), but setup-python (a
          # uses: step) resolves python-version-file from GITHUB_WORKSPACE.
          python-version-file: alp-sdk/.python-version

      - name: Install host build tools (dtc, ninja, ccache, gperf, libffi)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              ninja-build gperf ccache dfu-util device-tree-compiler \
              python3-dev python3-pip python3-setuptools python3-wheel \
              libffi-dev libssl-dev xz-utils file make gcc gcc-multilib \
              g++-multilib libsdl2-dev libmagic1

      - name: Install west
        run: pip3 install west

      # Zephyr workspace lives next to alp-sdk.  We use west init
      # from a temporary topdir so alp-sdk itself isn't relocated.
      - name: west init zephyr workspace
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p zephyrproject
          cd zephyrproject
          # Pin to the Zephyr release the v0.1 dependency matrix
          # documents (VERSIONS.md).  Bump intentionally; do not
          # track main.
          west init -m https://github.com/zephyrproject-rtos/zephyr --mr v4.4.0 .
          west update --narrow -o=--depth=1
          west zephyr-export

      - name: Cache Zephyr modules
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/zephyrproject/modules
            ${{ github.workspace }}/zephyrproject/zephyr
          key: zephyr-v4.4.0-host-${{ runner.os }}

      # Persist ccache objects across runs, per shard.  The save key is
      # per-SHA so each run writes a fresh entry; restore-keys falls
      # back to the latest cache for this shard so warm builds reuse it.
      - name: Cache ccache objects
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ runner.os }}-twister-shard${{ matrix.shard }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-twister-shard${{ matrix.shard }}-

      - name: pip install Zephyr requirements
        working-directory: ${{ github.workspace }}/zephyrproject
        run: |
          pip3 install -r zephyr/scripts/requirements.txt

      # alp-sdk's CMake-time loader (scripts/alp_project.py) needs
      # jsonschema in addition to PyYAML (already pulled in by
      # Zephyr's requirements-base.txt).  Install it after the
      # Zephyr deps so version pins don't override.
      - name: pip install Alp SDK Python deps
        run: |
          pip3 install jsonschema

      - name: twister · run shard ${{ matrix.shard }}/4 on native_sim/native/64
        working-directory: ${{ github.workspace }}/zephyrproject
        env:
          ZEPHYR_BASE: ${{ github.workspace }}/zephyrproject/zephyr
          EXTRA_ZEPHYR_MODULES: ${{ github.workspace }}/alp-sdk
        run: |
          # Use $GITHUB_WORKSPACE (container-mapped at run time) instead
          # of the ${{ github.workspace }} expansion which the runner
          # may render as a host path on container jobs.
          #
          # --subset i/4 deterministically partitions the SAME suite
          # list across the 4 shards; their union == a single full run,
          # so no test is dropped (coverage unchanged, ~4x faster wall).
          python3 zephyr/scripts/twister \
            --testsuite-root "$GITHUB_WORKSPACE/alp-sdk/tests/unit" \
            --testsuite-root "$GITHUB_WORKSPACE/alp-sdk/tests/zephyr" \
            --testsuite-root "$GITHUB_WORKSPACE/alp-sdk/examples" \
            -p native_sim/native/64 \
            --subset ${{ matrix.shard }}/4 \
            --inline-logs \
            --no-detailed-test-id

      # The SB_CONFIG_* class gate (#807 / #814) asserts every symbol
      # emit_sysbuild_conf() produces names a real `config` in the
      # PINNED Zephyr's share/sysbuild/**/Kconfig* -- so it needs a
      # Zephyr workspace as its oracle.  It shipped with no job that
      # had one: the only two jobs running tests/scripts/ (python-smoke
      # in cross-platform-zephyr.yml, pr-metadata-validate.yml) are
      # pure-Python checkouts, so the gate pytest.skip'd on every PR
      # and reported green while enforcing nothing.
      #
      # This job already west-init'd the pinned v4.4.0 tree above, so
      # the oracle is free here -- run it on shard 1 only (the matrix
      # would otherwise run it 4x identically).  ALP_REQUIRE_ZEPHYR_ORACLE=1
      # turns the gate's skip into a hard failure: this job PROMISES
      # the workspace, so an unresolvable one is a bug in the job, not
      # an environment fact to skip past.
      - name: check · SB_CONFIG_* symbols exist in pinned Zephyr (#807 class gate)
        if: matrix.shard == 1
        working-directory: ${{ github.workspace }}/alp-sdk
        env:
          ZEPHYR_BASE: ${{ github.workspace }}/zephyrproject/zephyr
          ALP_REQUIRE_ZEPHYR_ORACLE: '1'
        run: |
          python3 -m pytest tests/scripts/test_hil_blocks_coverage.py -q \
            -k test_emitted_sb_config_symbols_exist_in_pinned_zephyr

      # Persist the twister REPORTS (json/xml/log) regardless of
      # pass/fail.  Do NOT upload the whole twister-out/ tree: the
      # per-test build directories grew past 2 GB with the v0.6
      # example/test count and actions/upload-artifact@v7 dies with
      # a Node "JavaScript heap out of memory" mid-upload (first hit
      # on PR #88 -- the run was 721/721 green and the job still
      # FAILED in this step).  Failing-test build logs are already
      # in the job output via --inline-logs.
      #
      # Per-shard artefact name so the 4 parallel uploads don't clash.
      - name: Upload twister reports artefact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: twister-out-${{ matrix.shard }}
          path: |
            zephyrproject/twister-out/*.json
            zephyrproject/twister-out/*.xml
            zephyrproject/twister-out/*.log
          retention-days: 14
          if-no-files-found: ignore

  # Aggregator: the single required branch-protection context.  Its
  # name MUST stay `twister · native_sim/native/64` (the repointed
  # required check) regardless of how many shards run.  It fails iff
  # any shard failed -- `if: always()` so it reports even when a shard
  # is red (a plain `needs` without it would be skipped, not failed).
  twister:
    name: twister · native_sim/native/64
    needs: twister-shard
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Gate on all twister shards
        run: |
          result='${{ needs.twister-shard.result }}'
          echo "twister-shard aggregate result: $result"
          if [ "$result" != "success" ]; then
            echo "::error::one or more twister shards did not pass ($result)"
            exit 1
          fi
          echo "all twister shards passed"
