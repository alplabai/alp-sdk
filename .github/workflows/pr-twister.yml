# SPDX-License-Identifier: Apache-2.0
#
# Pull-request twister gate for the Alp SDK.
#
# Runs the full ztest + example suite under native_sim/native/64
# on every PR.  The Zephyr workspace is set up via the
# zephyrprojectrtos/ci Docker image, which ships Zephyr + west +
# toolchains pre-installed — saves ~5 minutes per run vs a clean
# `west init`.

name: pr-twister

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs on the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  twister:
    name: twister · native_sim/native/64
    runs-on: ubuntu-latest

    # We deliberately do NOT use the zephyrprojectrtos/ci docker
    # image here.  The image bundles Zephyr SDK 1.0.1 (~17 GB on disk
    # with every cross-toolchain) which intermittently blows out the
    # ubuntu-latest runner's ~14 GB free space at docker-pull time
    # with "no space left on device".  Since native_sim builds use
    # the host's gcc directly (ZEPHYR_TOOLCHAIN_VARIANT=host), the
    # SDK isn't needed — we just need Python, west, dtc, ninja, and
    # the Zephyr Python deps.  Installing those is ~2 minutes vs a
    # 5+ minute image pull, and stays well within disk budget.

    env:
      ZEPHYR_TOOLCHAIN_VARIANT: host

    steps:
      - name: Checkout alp-sdk
        uses: actions/checkout@v6
        with:
          path: alp-sdk
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install host build tools (dtc, ninja, ccache, gperf, libffi)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              ninja-build gperf ccache dfu-util device-tree-compiler \
              python3-dev python3-pip python3-setuptools python3-wheel \
              libffi-dev libssl-dev xz-utils file make gcc gcc-multilib \
              g++-multilib libsdl2-dev libmagic1

      - name: Install west
        run: pip3 install west

      # Zephyr workspace lives next to alp-sdk.  We use west init
      # from a temporary topdir so alp-sdk itself isn't relocated.
      - name: west init zephyr workspace
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p zephyrproject
          cd zephyrproject
          # Pin to the Zephyr release the v0.1 dependency matrix
          # documents (VERSIONS.md).  Bump intentionally; do not
          # track main.
          west init -m https://github.com/zephyrproject-rtos/zephyr --mr v4.4.0 .
          west update --narrow -o=--depth=1
          west zephyr-export

      - name: Cache Zephyr modules
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/zephyrproject/modules
            ${{ github.workspace }}/zephyrproject/zephyr
          key: zephyr-v4.4.0-host-${{ runner.os }}

      - name: pip install Zephyr requirements
        working-directory: ${{ github.workspace }}/zephyrproject
        run: |
          pip3 install -r zephyr/scripts/requirements.txt

      # alp-sdk's CMake-time loader (scripts/alp_project.py) needs
      # jsonschema in addition to PyYAML (already pulled in by
      # Zephyr's requirements-base.txt).  Install it after the
      # Zephyr deps so version pins don't override.
      - name: pip install Alp SDK Python deps
        run: |
          pip3 install jsonschema

      - name: debug · verify checkout paths are reachable inside container
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "PWD=$(pwd)"
          ls "$GITHUB_WORKSPACE/alp-sdk" | head -20 || true
          echo "--- testcase.yaml files ---"
          find "$GITHUB_WORKSPACE/alp-sdk/tests" "$GITHUB_WORKSPACE/alp-sdk/examples" \
              -name "testcase.yaml" -o -name "sample.yaml" || true

      # ---------------------------------------------------------------
      # v0.6 heterogeneous-orchestrator note (per
      # docs/superpowers/specs/2026-05-15-heterogeneous-os-orchestration-design.md
      # §5.6 + §7 Phase 5):
      #
      # In v0.6 the orchestrator (`scripts/alp_orchestrate.py`) fans
      # board.yaml out into per-core slices.  For Zephyr-only slices
      # the orchestrator routes through twister via the new emit
      # mode `alp_project.py --emit zephyr-conf --core <id>`.  Twister
      # itself stays the fast lane for pure-Zephyr coverage (no
      # bitbake spin-up, no Renode boot) and remains the
      # native_sim/native/64 gate for every PR.
      #
      # The orchestrator-side integration (calling twister with a
      # per-core conf fragment) lands in Phase 2 -- this workflow's
      # invocation below is intentionally unchanged for v0.6 so
      # twister coverage stays stable while Phase 2 is in flight.
      # ---------------------------------------------------------------
      - name: twister · run tests + examples on native_sim/native/64
        working-directory: ${{ github.workspace }}/zephyrproject
        env:
          ZEPHYR_BASE: ${{ github.workspace }}/zephyrproject/zephyr
          EXTRA_ZEPHYR_MODULES: ${{ github.workspace }}/alp-sdk
        run: |
          # Use $GITHUB_WORKSPACE (container-mapped at run time) instead
          # of the ${{ github.workspace }} expansion which the runner
          # may render as a host path on container jobs.
          python3 zephyr/scripts/twister \
            --testsuite-root "$GITHUB_WORKSPACE/alp-sdk/tests/zephyr" \
            --testsuite-root "$GITHUB_WORKSPACE/alp-sdk/examples" \
            -p native_sim/native/64 \
            --inline-logs \
            --no-detailed-test-id

      # Persist the twister REPORTS (json/xml/log) regardless of
      # pass/fail.  Do NOT upload the whole twister-out/ tree: the
      # per-test build directories grew past 2 GB with the v0.6
      # example/test count and actions/upload-artifact@v7 dies with
      # a Node "JavaScript heap out of memory" mid-upload (first hit
      # on PR #88 -- the run was 721/721 green and the job still
      # FAILED in this step).  Failing-test build logs are already
      # in the job output via --inline-logs.
      - name: Upload twister reports artefact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: twister-out
          path: |
            zephyrproject/twister-out/*.json
            zephyrproject/twister-out/*.xml
            zephyrproject/twister-out/*.log
          retention-days: 14
          if-no-files-found: ignore
