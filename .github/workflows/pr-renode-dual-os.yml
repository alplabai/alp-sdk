# SPDX-License-Identifier: Apache-2.0
#
# Renode heterogeneous-boot smoke test.  Boots the V2N A55-Yocto +
# M33-SM-Zephyr pair in Renode and asserts the RPMsg name-service
# handshake completes within 60s.  Per the v0.6 heterogeneous-OS
# design (§7 Phase 5 + §11 acceptance) this is the canary that
# proves the orchestrator's two slices actually talk to each other.
#
# v0.6 note: Renode dual-OS test is a stretch goal.  ADR-0020 Phase 4
# retired the SDK-side `west alp-renode`; the boot step below now
# drives `tan renode` (github.com/alplabai/tan-cli), the standalone
# executor.  The actual command is wrapped in `continue-on-error: true`
# so this workflow can't block PRs while the dual-OS handshake path is
# still maturing.  Promotes to a required check in v0.6.1 once the
# Phase 3 IPC contract lands and the handshake message is stable.
#
# === Trigger chain choice ===
#
# Option A: `workflow_run` chained to pr-bitbake.yml succeeding.
# Option B: re-run bitbake-from-cache inline in this workflow.
#
# We pick (A) -- `workflow_run`.  Reasoning: bitbake runs on the
# private alp-sdk-internal runner via the dispatch bridge in
# pr-bitbake.yml (no self-hosted runner attaches to public
# alp-sdk), so re-running it from cache on a cheap ubuntu-latest
# VM here isn't possible.  The image artefact is produced on the
# private runner, so this workflow must fetch it across the repo
# boundary -- a cross-repo handshake that isn't wired yet (see
# the advisory download step below).
#
# Caveat: `workflow_run` fires only for the *target branch* of
# the PR -- it doesn't auto-run on the PR head ref.  That's fine
# for the v0.6.1 promotion: the orchestrator only needs to verify
# main's dual-OS contract hasn't regressed.  For PR-level coverage
# pre-promotion, devs trigger `workflow_dispatch` manually.

name: pr-renode-dual-os

on:
  workflow_run:
    workflows: [pr-bitbake]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  renode:
    name: renode · V2N101 dual-OS handshake
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Only run if the upstream bitbake workflow actually succeeded.
    # `workflow_dispatch` triggers always run.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout alp-sdk
        uses: actions/checkout@v6
        with:
          path: alp-sdk
          fetch-depth: 1

      # Renode's published apt repo carries stable releases.  Pin
      # the version inline so a runner-image bump doesn't silently
      # change Renode behaviour mid-month.  v1.15 is the current
      # LTS-style line as of 2026-05.
      - name: Install Renode
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              ca-certificates curl gnupg
          # v1.16.1 portable-dotnet build: self-contained .NET, no Mono/GTK#
          # system deps.  The .deb needs gtk-sharp2 / *-cil-dev packages that
          # Ubuntu 24.04 (== ubuntu-latest) dropped, breaking apt install (#339).
          curl -fsSL https://github.com/renode/renode/releases/download/v1.16.1/renode-1.16.1.linux-portable-dotnet.tar.gz \
              -o /tmp/renode.tar.gz
          mkdir -p "$HOME/renode"
          tar -xzf /tmp/renode.tar.gz -C "$HOME/renode" --strip-components=1
          echo "$HOME/renode" >> "$GITHUB_PATH"
          # $GITHUB_PATH only applies to later steps, so smoke-check by full path.
          "$HOME/renode/renode" --version

      # Download the V2N A55 bitbake image from the upstream
      # pr-bitbake.yml run (when triggered via workflow_run) or
      # the latest successful run on main (when manually dispatched).
      - name: Download V2N A55 bitbake image
        uses: actions/download-artifact@v8
        with:
          name: bitbake-e1m-v2n101-a55-image
          path: ${{ github.workspace }}/artefacts/bitbake
          # `run-id`+`github-token` chain across workflows.  When
          # triggered by workflow_run, GITHUB_TOKEN can reach the
          # upstream run's artefacts.
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        # Renode integration is a stretch goal -- the bitbake image
        # artefact is built on the private alp-sdk-internal runner
        # (pr-bitbake.yml dispatches there), so it does NOT land in
        # this public pr-bitbake run's artefacts.  Keep advisory so
        # the workflow stays useful via workflow_dispatch even though
        # the cross-repo artefact handshake isn't wired yet.  Promotes
        # to required once the private runner publishes the image back
        # under a stable artefact name reachable from the public repo.
        continue-on-error: true

      # Download the M33-SM Zephyr ELF from pr-alp-build.yml.  Same
      # cross-workflow artefact-fetch contract.  Note: the M33-SM
      # ELF artefact name is not yet stabilised; once Phase 2 lands
      # an explicit `actions/upload-artifact` for the per-slice ELF
      # in pr-alp-build.yml, update the name pattern below.
      - name: Download M33-SM Zephyr ELF
        uses: actions/download-artifact@v8
        with:
          name: system-manifest-E1M-V2N101-heterogeneous-default
          path: ${{ github.workspace }}/artefacts/zephyr
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        # Advisory until the per-slice ELF upload-artifact lands in
        # pr-alp-build.yml under a stable name.  Promotes alongside
        # the artefact-name stabilisation above.
        continue-on-error: true

      # Standalone Rust build/run executor for alp-sdk board.yaml plans
      # (ADR-0020 Phase 4 -- the SDK-side `west alp-build`/`west alp-renode`
      # executor was retired; `tan` is now the sole consumer of
      # `alp_orchestrate --emit build-plan`).  No version pin: tan-cli is
      # still a draft, main is the only meaningful ref.
      - name: Install tan (github.com/alplabai/tan-cli)
        run: cargo install --git https://github.com/alplabai/tan-cli --bin tan

      # The primary verification step.  Renode itself isn't part of the
      # standard CI runner image.  Keep advisory until the self-hosted
      # runner ships Renode + `tan renode` boots the dual-OS image to a
      # stable handshake.  Promotes to required when the HW integration
      # path lands in v0.6.1.
      - name: tan renode (V2N dual-OS boot)
        id: renode_boot
        working-directory: ${{ github.workspace }}/alp-sdk
        run: |
          set -euo pipefail
          mkdir -p /tmp/renode-logs
          # The orchestrator picks up artefacts from a single
          # bundle dir; copy both downloads into it.
          mkdir -p /tmp/image-bundle
          cp -r "${GITHUB_WORKSPACE}/artefacts/bitbake/." /tmp/image-bundle/ || true
          cp -r "${GITHUB_WORKSPACE}/artefacts/zephyr/."  /tmp/image-bundle/ || true
          # Cap wall time at 60s per design §11 acceptance ("RPMsg
          # handshake completes within 60s in CI").  Renode's own
          # script-level termination is layered on top.
          timeout 90 tan renode \
              --board E1M-V2N101 \
              --image-bundle /tmp/image-bundle \
              --log /tmp/renode-logs/v2n-dual-os.log
        continue-on-error: true

      - name: Assert "RPMsg handshake complete" in Renode log
        if: steps.renode_boot.outcome == 'success'
        run: |
          set -euo pipefail
          log=/tmp/renode-logs/v2n-dual-os.log
          if [ ! -s "${log}" ]; then
            echo "::error::Renode log missing or empty at ${log}"
            exit 1
          fi
          if ! grep -q "RPMsg handshake complete" "${log}"; then
            echo "::error::Renode log does not contain 'RPMsg handshake complete' within timeout"
            echo "--- tail of ${log} ---"
            tail -100 "${log}"
            exit 1
          fi
          echo "RPMsg handshake observed; dual-OS smoke OK."

      - name: Upload Renode logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: renode-dual-os-logs
          path: /tmp/renode-logs/
          retention-days: 14
          if-no-files-found: ignore
