# SPDX-License-Identifier: Apache-2.0
#
# Verifies the plain-CMake (non-Zephyr) build paths.  Compiles the
# baremetal and yocto backends as host libraries with the host
# toolchain so the stub backend at src/common/stub_backend.c stays
# link-complete every PR.
#
# This catches:
#   - New public functions added to <alp/...>.h without a matching
#     stub in src/common/stub_backend.c (linker error on
#     undefined-reference).
#   - Header self-containment issues (missing forward declarations,
#     stale typedefs).
#   - Compile errors that only surface outside Zephyr's environment
#     (e.g. assumptions about ZEPHYR_BASE-defined macros).

name: pr-plain-cmake

on:
  pull_request:
    branches: [main, dev]
    paths:
      - 'include/**'
      - 'src/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - '.github/workflows/pr-plain-cmake.yml'
  push:
    branches: [main, dev]
    paths:
      - 'include/**'
      - 'src/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baremetal:
    name: plain-cmake · baremetal stub backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Configure
        run: cmake -B build/baremetal -S . -DALP_OS=baremetal
      - name: Build
        run: cmake --build build/baremetal --parallel

  baremetal-aen:
    # ALP_OS=baremetal + ALP_SOM=aen activates the vendors/alif/
    # wrapper directory.  Without ALP_HAS_ALIF_HAL=ON the four
    # wrapper sources (i2c.c, spi.c, gpio.c, uart.c) compile to
    # empty translation units; stub_backend.c keeps providing the
    # NOSUPPORT defaults.  Verifies the dispatch + CMake wiring
    # without depending on the proprietary CMSIS pack -- the real
    # HAL link arrives in v0.2.x via cpackget AlifSemiconductor::Ensemble.
    name: plain-cmake · baremetal AEN (vendor scaffolding)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Configure
        run: cmake -B build/baremetal-aen -S . -DALP_OS=baremetal -DALP_SOM=aen
      - name: Build
        run: cmake --build build/baremetal-aen --parallel

  baremetal-v2n:
    # ALP_OS=baremetal + ALP_SOM=v2n activates the
    # vendors/renesas-rzv2n/ wrapper directory.  Same pattern as
    # baremetal-aen above -- without ALP_HAS_RENESAS_FSP=ON the
    # wrapper sources compile to empty TUs and stub_backend.c
    # provides the NOSUPPORT defaults.  Real FSP link arrives in
    # v0.4 alongside the V2N HIL bring-up.
    name: plain-cmake · baremetal V2N (vendor scaffolding)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Configure
        run: cmake -B build/baremetal-v2n -S . -DALP_OS=baremetal -DALP_SOM=v2n
      - name: Build
        run: cmake --build build/baremetal-v2n --parallel

  consumer-add-subdirectory:
    # Issue #598: the README documents add_subdirectory() as a first-class
    # consumption mode, but nothing built alp-sdk as a NESTED project until
    # this job -- every job above builds alp-sdk as the top-level project,
    # which can't catch a CMAKE_SOURCE_DIR-vs-CMAKE_CURRENT_SOURCE_DIR path
    # bug (they're identical at the top level).  This job configures/builds
    # tests/cmake-consumer/add-subdirectory-smoke, a separate top-level
    # CMake project that add_subdirectory()s alp-sdk the documented way.
    name: plain-cmake · add_subdirectory() consumer (#598)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        som: ["none", "aen"]
    steps:
      - uses: actions/checkout@v6
      - name: Configure
        run: >
          cmake -B build/consumer-${{ matrix.som }}
          -S tests/cmake-consumer/add-subdirectory-smoke
          -DALP_OS=baremetal -DALP_SOM=${{ matrix.som }}
      - name: Build
        run: cmake --build build/consumer-${{ matrix.som }} --parallel

  yocto:
    name: plain-cmake · yocto backend + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # libmosquitto-dev unlocks the iot_yocto.c MQTT wrapper;
      # libasound2-dev unlocks the audio_yocto.c ALSA wrapper;
      # libssl-dev unlocks the security_yocto.c OpenSSL wrapper.
      # Without these the CMakeLists falls back to the NOSUPPORT
      # stubs and we'd lose coverage in CI.
      - name: Install Yocto-side runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              libmosquitto-dev libasound2-dev libssl-dev pkg-config
      - name: Configure
        run: cmake -B build/yocto -S . -DALP_OS=yocto -DALP_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build/yocto --parallel
      # ctest exercises the inference dispatcher's NULL/INVAL paths,
      # the I2C/SPI/UART/GPIO wrappers' failure-path coverage, and
      # the MQTT wrapper's URI-parse + NULL-arg paths.  Real-adapter
      # HIL coverage is parked behind docs/ci/HW-IN-LOOP.md.
      - name: Test
        run: ctest --test-dir build/yocto --output-on-failure

  link-complete:
    # Issue #593: every public <alp/*.h> function must be a real symbol
    # in BOTH the baremetal and yocto plain-CMake libalp_sdk.a archives
    # (a dispatcher, a real backend, or an explicit stub_backend.c
    # NOSUPPORT stub) -- never silently absent, or a portable app that
    # links clean on Zephyr fails at final link switching to baremetal
    # or Yocto.  Cross-checks `nm`'s defined-symbol list for each
    # archive against metadata/catalog.json's portable_api inventory
    # (the same list the doc-drift / ABI-snapshot gates already treat
    # as the source of truth for the portable surface).
    name: plain-cmake · link-completeness (#593)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check
        run: python3 scripts/check_plain_cmake_link_complete.py

  find-package-consumer:
    # Issue #607: an INSTALLED alp-sdk (ALP_SDK_BUILD_SHARED=ON) must be
    # a real CMake package -- `find_package(alp-sdk 0.9 REQUIRED)`
    # resolves, `alp::sdk` links, and the reported version matches the
    # authoritative include/alp/version.h (not a stale hardcoded 0.1.0).
    # Installs to a throwaway prefix, then configures/builds
    # tests/cmake-consumer/find-package-smoke as a SEPARATE top-level
    # CMake project against that prefix (the same external-consumer
    # shape as consumer-add-subdirectory, but for the find_package()
    # path instead of add_subdirectory()).
    name: plain-cmake · find_package() consumer (#607)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Yocto-side runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              libmosquitto-dev libasound2-dev libssl-dev pkg-config
      - name: Configure + build + install alp-sdk
        run: |
          cmake -B build/install-review -S . -DALP_OS=yocto \
              -DALP_SDK_BUILD_SHARED=ON \
              -DCMAKE_INSTALL_PREFIX="$RUNNER_TEMP/alp-prefix"
          cmake --build build/install-review --parallel
          cmake --install build/install-review
      - name: Configure + build the find_package() consumer
        run: |
          cmake -B build/consumer-findpkg \
              -S tests/cmake-consumer/find-package-smoke \
              -DCMAKE_PREFIX_PATH="$RUNNER_TEMP/alp-prefix"
          cmake --build build/consumer-findpkg --parallel
      - name: Run + verify the reported version
        run: |
          out="$(LD_LIBRARY_PATH="$RUNNER_TEMP/alp-prefix/lib" \
              ./build/consumer-findpkg/find_package_smoke)"
          echo "$out"
          echo "$out" | grep -qx "alp-sdk version: 0.9.0"
