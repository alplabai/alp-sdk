# SPDX-License-Identifier: Apache-2.0
#
# Verifies the plain-CMake (non-Zephyr) build paths.  Compiles the
# baremetal and yocto backends as host libraries with the host
# toolchain so the stub backend at src/common/stub_backend.c stays
# link-complete every PR.
#
# This catches:
#   - New public functions added to <alp/...>.h without a matching
#     stub in src/common/stub_backend.c (linker error on
#     undefined-reference).
#   - Header self-containment issues (missing forward declarations,
#     stale typedefs).
#   - Compile errors that only surface outside Zephyr's environment
#     (e.g. assumptions about ZEPHYR_BASE-defined macros).

name: pr-plain-cmake

on:
  pull_request:
    branches: [main]
    paths:
      - 'include/**'
      - 'src/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - '.github/workflows/pr-plain-cmake.yml'
  push:
    branches: [main]
    paths:
      - 'include/**'
      - 'src/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baremetal:
    name: plain-cmake · baremetal stub backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build/baremetal -S . -DALP_OS=baremetal
      - name: Build
        run: cmake --build build/baremetal --parallel

  baremetal-aen:
    # ALP_OS=baremetal + ALP_SOM=aen activates the vendors/alif/
    # wrapper directory.  Without ALP_HAS_ALIF_HAL=ON the four
    # wrapper sources (i2c.c, spi.c, gpio.c, uart.c) compile to
    # empty translation units; stub_backend.c keeps providing the
    # NOSUPPORT defaults.  Verifies the dispatch + CMake wiring
    # without depending on the proprietary CMSIS pack -- the real
    # HAL link arrives in v0.2.x via cpackget AlifSemiconductor::Ensemble.
    name: plain-cmake · baremetal AEN (vendor scaffolding)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build/baremetal-aen -S . -DALP_OS=baremetal -DALP_SOM=aen
      - name: Build
        run: cmake --build build/baremetal-aen --parallel

  baremetal-v2n:
    # ALP_OS=baremetal + ALP_SOM=v2n activates the
    # vendors/renesas-rzv2n/ wrapper directory.  Same pattern as
    # baremetal-aen above -- without ALP_HAS_RENESAS_FSP=ON the
    # wrapper sources compile to empty TUs and stub_backend.c
    # provides the NOSUPPORT defaults.  Real FSP link arrives in
    # v0.4 alongside the V2N HIL bring-up.
    name: plain-cmake · baremetal V2N (vendor scaffolding)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build/baremetal-v2n -S . -DALP_OS=baremetal -DALP_SOM=v2n
      - name: Build
        run: cmake --build build/baremetal-v2n --parallel

  yocto:
    name: plain-cmake · yocto backend + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # libmosquitto-dev unlocks the iot_yocto.c MQTT wrapper;
      # libasound2-dev unlocks the audio_yocto.c ALSA wrapper;
      # libssl-dev unlocks the security_yocto.c OpenSSL wrapper.
      # Without these the CMakeLists falls back to the NOSUPPORT
      # stubs and we'd lose coverage in CI.
      - name: Install Yocto-side runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              libmosquitto-dev libasound2-dev libssl-dev pkg-config
      - name: Configure
        run: cmake -B build/yocto -S . -DALP_OS=yocto -DALP_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build/yocto --parallel
      # ctest exercises the inference dispatcher's NULL/INVAL paths,
      # the I2C/SPI/UART/GPIO wrappers' failure-path coverage, and
      # the MQTT wrapper's URI-parse + NULL-arg paths.  Real-adapter
      # HIL coverage is parked behind docs/ci/HW-IN-LOOP.md.
      - name: Test
        run: ctest --test-dir build/yocto --output-on-failure
