# SPDX-License-Identifier: Apache-2.0
#
# Static analysis on every PR.  v0.1 scope:
#   1. clang-format-diff — checks only the lines changed by the PR
#      against `.clang-format`.  Avoids forcing a repo-wide
#      reformat; CI tightens incrementally.
#   2. cppcheck — full tree under src/ + chips/, treats warnings as
#      informational (not fatal) until v0.2.
#
# Build-context-aware tools (clang-tidy + ABI snapshot) need a
# proper compile_commands.json — they land in v0.2 once we have a
# host CMake build wired with -DCMAKE_EXPORT_COMPILE_COMMANDS=ON.

name: pr-static-analysis

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-format-diff:
    name: clang-format · diff-only
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # need history so HEAD~ resolves

      - name: Install clang-format 22 (pinned)
        # Pinned to clang-format-22 via the pip wheel (clang-format==22.1.5),
        # which ships BOTH the `clang-format` binary and `clang-format-diff.py`.
        # We pin via pip, NOT apt: apt's `clang-format` floats with the runner
        # image (22.04 -> v14, 24.04 -> v18) and reflows differently, which used
        # to break this gate even when no source changed style.  The committed
        # tree is formatted against v22; .clang-format also locks
        # Cpp11BracedListStyle so designated-initialiser output stays
        # reproducible across patch releases.
        run: |
          python3 -m pip install --user 'clang-format==22.1.5'
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/clang-format" --version

      - name: Determine diff base
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=HEAD~1" >> "$GITHUB_OUTPUT"
          fi

      - name: Run clang-format-diff on changed lines
        run: |
          # clang-format-diff.py from the pinned pip wheel; it shells out to the
          # wheel's bundled v22 clang-format, so the diff check uses v22 too.
          DIFF_TOOL="$HOME/.local/bin/clang-format-diff.py"
          if [ ! -f "$DIFF_TOOL" ]; then
              echo "::error::clang-format-diff.py not found after the pip install"
              exit 1
          fi
          # vendors/** and zephyr/** are excluded: those subtrees keep
          # their UPSTREAM project's style (GigaDevice firmware library,
          # Zephyr/Renesas-FSP drivers) so they stay diffable against
          # their sources -- our .clang-format does not govern them.
          git diff -U0 ${{ steps.base.outputs.ref }} -- '*.c' '*.h' \
              ':!vendors/**' ':!zephyr/**' \
              | python3 "$DIFF_TOOL" -p1 \
              | tee clang-format-diff.txt
          if [ -s clang-format-diff.txt ]; then
              echo "::error::clang-format would change the diff above.  Run clang-format-22 on your changes before pushing."
              exit 1
          fi
          echo "clang-format clean on the diff."

  cppcheck:
    name: cppcheck · src + chips
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        # cppcheck without a build context misses some symbols
        # (it doesn't know which Zephyr / vendor headers are
        # available).  We pass --suppress=missingIncludeSystem to
        # skip those rather than report them.  Real type-checking
        # arrives with the v0.2 clang-tidy job.
        run: |
          cppcheck \
              --enable=warning,style,performance,portability \
              --inline-suppr \
              --suppress=missingInclude \
              --suppress=missingIncludeSystem \
              --suppress=unusedFunction \
              --suppress=unmatchedSuppression \
              --error-exitcode=0 \
              --quiet \
              --xml \
              --output-file=cppcheck.xml \
              -I include \
              src/ chips/ || true
          if [ -s cppcheck.xml ]; then
              n_errors=$(grep -c '<error ' cppcheck.xml || true)
              echo "::notice::cppcheck reported $n_errors finding(s) (informational; v0.2 will gate)"
          fi

      - name: Upload cppcheck.xml
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cppcheck
          path: cppcheck.xml
          retention-days: 14
          if-no-files-found: ignore
