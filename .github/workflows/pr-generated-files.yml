# SPDX-License-Identifier: Apache-2.0
#
# Verifies generated files stay in sync with their inputs.  Catches:
#
#   - Metadata edits that didn't trigger a soc_caps.h regeneration.
#     scripts/gen_soc_caps.py reads metadata/socs/**.json and emits
#     include/alp/soc_caps.h; if the committed header doesn't match
#     what the script would produce, the PR is asking reviewers to
#     accept stale capability tables.
#
#   - Public-header additions/removals that didn't bump the ABI
#     snapshot at docs/abi/v<N>-snapshot.json.  The snapshot's
#     fingerprint diff is the cheapest way to spot accidental
#     ABI changes.

name: pr-generated-files

on:
  pull_request:
    branches: [main]
    paths:
      - 'metadata/**'
      - 'include/alp/**'
      - 'scripts/gen_soc_caps.py'
      - 'scripts/abi_snapshot.py'
      - '.github/workflows/pr-generated-files.yml'
  push:
    branches: [main]
    paths:
      - 'metadata/**'
      - 'include/alp/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check · generated files in sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # The ABI freeze gate below needs tags + the v0.1 commit
          # reachable so `git show v0.1:docs/abi/v0.1-snapshot.json`
          # works.  Default fetch-depth=1 strips tags.
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Regenerate soc_caps.h from metadata
        run: python3 scripts/gen_soc_caps.py

      - name: Regenerate ABI snapshot (current = v0.7)
        # The committed v0.7 snapshot is the CURRENT working snapshot
        # (v0.1 + v0.3 + v0.5 + v0.6 are FROZEN historical records --
        # the in-tree convention per docs/abi-markers.md).  Regenerate
        # v0.7 from the current headers and compare.
        #
        # The snapshot's `generated` field is a date stamp; re-running
        # on the same headers always changes that one line, so the
        # diff below masks it with --ignore-matching-lines.
        run: |
          python3 scripts/abi_snapshot.py \
              --version v0.7 \
              --output docs/abi/v0.7-snapshot.json

      - name: Fail if generated files differ from committed copies
        run: |
          # Allow the snapshot's "generated" date to differ; everything
          # else must match.
          if ! git diff --exit-code \
                  --ignore-matching-lines='"generated":' \
                  -- include/alp/soc_caps.h docs/abi/v0.7-snapshot.json; then
            echo "::error::Generated files are stale.  Run:"
            echo "::error::  python3 scripts/gen_soc_caps.py"
            echo "::error::  python3 scripts/abi_snapshot.py --version v0.7 --output docs/abi/v0.7-snapshot.json"
            echo "::error::and commit the result."
            exit 1
          fi

      # ABI freeze gate -- compares the PR's current ABI against the
      # snapshot stored on the tagged v0.1 release.  Once v0.1 ships
      # the snapshot is *frozen* -- additions land in
      # docs/abi/v0.<N>-snapshot.json, removals require a major bump
      # (per the deprecation policy in VERSIONS.md).  Until the v0.1
      # tag exists the step is a no-op (we're still pre-v0.1 today).
      #
      # scripts/abi_snapshot.py --diff exits 1 only on REMOVED or
      # CHANGED symbols.  ADDED symbols pass (we accept additive
      # extensions silently within a major version).
      - name: ABI freeze gate vs tagged v0.1
        run: |
          # Need the full repo + tags for `git show v0.1:...` to work.
          # actions/checkout@v6 already fetched tags so this is cheap.
          if ! git rev-parse --verify --quiet refs/tags/v0.1 >/dev/null; then
            echo "::notice::No v0.1 tag yet -- ABI freeze gate is a no-op until v0.1 ships."
            exit 0
          fi
          mkdir -p .abi-baseline
          git show v0.1:docs/abi/v0.1-snapshot.json \
              > .abi-baseline/v0.1-snapshot.json
          if ! python3 scripts/abi_snapshot.py \
                  --version v0.1 \
                  --diff .abi-baseline/v0.1-snapshot.json; then
            echo "::error::Public ABI changed vs the frozen v0.1 baseline."
            echo "::error::Removals + signature changes require a major bump after v1.0."
            echo "::error::Pre-1.0 lands the breaking change with a CHANGELOG entry + "
            echo "::error::a new snapshot at docs/abi/v0.<N>-snapshot.json."
            exit 1
          fi
