# SPDX-License-Identifier: Apache-2.0
#
# Nightly hardware-in-loop on a real E1M-AEN dev kit.
#
# **Status: skeleton.**  Runs only when a self-hosted runner with
# the `hil-aen` label is online (none yet).  When the runner comes
# up, this workflow flashes the v0.1 ztest firmware to the EVK,
# runs `tests/zephyr/peripheral` against real silicon, and uploads
# the captured serial output.
#
# Runner setup is documented in docs/ci/HW-IN-LOOP.md.

name: nightly-aen-hil

on:
  schedule:
    # 02:30 UTC every weekday — quiet hours for the lab.
    - cron: '30 2 * * 1-5'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  hil:
    name: HIL · E1M-AEN801 dev kit
    # The runner must self-identify with these labels.  Until a
    # physical runner registers with `hil-aen` GitHub queues the
    # job indefinitely; manual `workflow_dispatch` triggers a no-op
    # while the workflow waits.
    runs-on: [self-hosted, linux, hil-aen]
    timeout-minutes: 30

    env:
      ZEPHYR_TOOLCHAIN_VARIANT: zephyr

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: alp-sdk

      - name: Verify runner reports a board attached
        run: |
          # The runner ships a tiny shell helper that exits non-zero
          # if no Alif dev kit is enumerated on USB.  Fail fast
          # rather than waste a flash cycle.
          /opt/alp-hil/check-aen-attached.sh

      - name: Set up Zephyr workspace (cached)
        run: |
          if [ ! -d $HOME/zephyrproject ]; then
            mkdir -p $HOME/zephyrproject
            cd $HOME/zephyrproject
            west init -m https://github.com/zephyrproject-rtos/zephyr --mr v4.4.0 .
            west update --narrow -o=--depth=1
            west zephyr-export
          fi

      - name: Build peripheral test for E1M-AEN801
        env:
          ZEPHYR_BASE: ${{ env.HOME }}/zephyrproject/zephyr
          EXTRA_ZEPHYR_MODULES: ${{ github.workspace }}/alp-sdk
        run: |
          # alp_e1m_aen801_m55_he/ae822fa0e5597ls0/rtss_he ships
          # in-tree at zephyr/boards/alp/e1m_aen801_m55_he/ -- no
          # external module needed, so there is no absent-dependency
          # case to park on.  A build failure now fails this job.
          cd $HOME/zephyrproject
          west build -p always -b alp_e1m_aen801_m55_he/ae822fa0e5597ls0/rtss_he \
              ${{ github.workspace }}/alp-sdk/tests/zephyr/peripheral

      - name: Flash + capture serial
        run: |
          if [ ! -f $HOME/zephyrproject/build/zephyr/zephyr.elf ]; then
            echo "no firmware to flash; HIL skipped"
            exit 0
          fi
          west flash -d $HOME/zephyrproject/build
          /opt/alp-hil/capture-serial.sh --port /dev/ttyACM0 --duration 30 \
              --output ${{ github.workspace }}/hil-output.log

      - name: Assert ztests pass
        run: |
          if [ -f hil-output.log ]; then
            grep -q "PROJECT EXECUTION SUCCESSFUL" hil-output.log
          fi

      # ---- HiL smoke specs -------------------------------------------------
      # Drives every *.yaml under tests/hil/_common/ + the aen801-evk
      # board dir through the standard runner (build + flash + serial
      # capture + assertion).  Each spec covers one peripheral OR (since
      # v0.6) one declarative board.yaml block:
      #
      #   boot_mcuboot.yaml         -> board.yaml `boot:`
      #   memory_stacks.yaml        -> board.yaml `cores.<id>.memory:`
      #   power_sleep_wake.yaml     -> board.yaml `cores.<id>.power:`
      #   diagnostics_modules.yaml  -> board.yaml `diagnostics.modules:`
      #
      # The runner exits 0 if every spec asserts cleanly, 1 if any fail,
      # 2 on invocation error.
      - name: HiL smoke -- _common + AEN801 board specs
        if: success()
        env:
          ZEPHYR_BASE: ${{ env.HOME }}/zephyrproject/zephyr
          EXTRA_ZEPHYR_MODULES: ${{ github.workspace }}/alp-sdk
        run: |
          cd ${{ github.workspace }}/alp-sdk
          python3 tests/hil/run_smoke.py --validate tests/hil/aen801-evk/
          python3 tests/hil/run_smoke.py tests/hil/aen801-evk/

      - name: Upload HIL artefacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hil-aen-${{ github.run_number }}
          path: |
            hil-output.log
            /tmp/hil-output.log
            ${{ env.HOME }}/zephyrproject/build/twister-out/
          retention-days: 30
          if-no-files-found: ignore
