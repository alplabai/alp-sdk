# SPDX-License-Identifier: Apache-2.0
#
# Builds the public-API Doxygen reference on every PR.
#
# Gate is hard: WARN_AS_ERROR=FAIL_ON_WARNINGS dumps the full
# warning log + the summarise step exits 1 on a non-empty log,
# so a regression fails PR CI immediately.  This matches the
# v1.0 acceptance bar (per VERSIONS.md "Quality bar"): "Doxygen
# build passes with zero warnings."  No Doxyfile is committed
# yet — the workflow generates one inline.  INPUT covers
# include/alp/ + README.md + VERSIONS.md + CONTRIBUTING.md +
# the doc tree + the per-area README.md files (vendors/,
# firmware/, keys/, meta-alp-sdk/, examples/,
# metadata/library-profiles/, zephyr/sysbuild/aen/, chips/);
# CHANGELOG.md + docs/superpowers/* are excluded.

name: pr-doxygen

on:
  pull_request:
    branches: [main]
    paths:
      - 'include/**'
      - 'docs/doxygen/**'
      - '.github/workflows/pr-doxygen.yml'
  push:
    branches: [main]
    paths:
      - 'include/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  doxygen:
    name: doxygen · public headers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      # Fast pre-flight: catch a missing @brief before we spin up
      # the full Doxygen build.  Currently at 100% coverage on main;
      # the gate is hard so a regression fails CI immediately.
      - name: Public-API @brief coverage audit (fail-on-gaps)
        run: |
          python3 scripts/check_doxygen_coverage.py --fail-on-gaps

      - name: Generate Doxyfile (v0.1 inline; v0.2+ uses docs/doxygen/Doxyfile)
        run: |
          if [ -f docs/doxygen/Doxyfile ]; then
            cp docs/doxygen/Doxyfile Doxyfile
          else
            doxygen -g Doxyfile.default
            # Pre-compute the version so the heredoc can stay
            # single-quoted (no shell expansion of $(...) and friends).
            ALP_PROJECT_NUMBER="$(git describe --tags --always 2>/dev/null || echo 0.1.0-pre)"
            cat > Doxyfile <<EOF
          PROJECT_NAME           = "Alp SDK"
          PROJECT_NUMBER         = "${ALP_PROJECT_NUMBER}"
          OUTPUT_DIRECTORY       = doxygen-out
          INPUT                  = include/alp
          RECURSIVE              = YES
          EXTRACT_ALL            = YES
          EXTRACT_STATIC         = NO
          GENERATE_HTML          = YES
          GENERATE_LATEX         = NO
          QUIET                  = NO
          WARN_AS_ERROR          = FAIL_ON_WARNINGS
          WARN_LOGFILE           = doxygen-warnings.log
          OPTIMIZE_OUTPUT_FOR_C  = YES
          DOT_GRAPH_MAX_NODES    = 200
          JAVADOC_AUTOBRIEF      = YES
          USE_MDFILE_AS_MAINPAGE = README.md
          INPUT                 += README.md VERSIONS.md CONTRIBUTING.md docs \
                                   chips/README.md \
                                   vendors/alif/README.md \
                                   vendors/deepx-dxm1/README.md \
                                   vendors/gd32_firmware_library/README.md \
                                   firmware/cc3501e/README.md \
                                   keys/README.md \
                                   meta-alp-sdk/README.md \
                                   examples/README.md \
                                   metadata/library-profiles/README.md \
                                   zephyr/sysbuild/aen/README.md
          # CHANGELOG.md is volatile release notes (not customer-
          # facing reference) and contains literals Doxygen
          # mis-parses (<batch>, @v3, etc.); keep it out of INPUT.
          # docs/superpowers/* are internal design specs / WIP
          # plans, not part of the public reference.
          EXCLUDE_PATTERNS       = */superpowers/*
          EOF
          fi

      - name: Build HTML
        run: doxygen Doxyfile

      - name: Summarise warnings
        if: always()
        run: |
          if [ -s doxygen-warnings.log ]; then
            echo "::group::Doxygen warnings"
            cat doxygen-warnings.log
            echo "::endgroup::"
            echo "::error::Doxygen reported $(wc -l < doxygen-warnings.log) warning(s).  Gate is hard -- fix the warnings."
            exit 1
          else
            echo "Doxygen produced zero warnings."
          fi

      - name: Upload HTML artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-html
          path: doxygen-out/html/
          retention-days: 14
          if-no-files-found: ignore
