# SPDX-License-Identifier: Apache-2.0
#
# Compile the VS Code extension on every change to vscode/ or the
# board-config schema.  Guarantees:
#   1. vscode/schemas/board-config-v1.schema.json stays byte-identical
#      to metadata/schemas/board-config-v1.schema.json (the extension
#      ships a copy so the .vsix is self-contained; we never let the
#      two drift).
#   2. `npx tsc -p .` produces a clean compile -- no type errors,
#      no unused symbols.
#   3. `vsce package --no-yarn` produces a publishable .vsix
#      artefact (uploaded for manual install / smoke).

name: pr-vscode-extension

on:
  pull_request:
    branches: [main]
    paths:
      - 'vscode/**'
      - 'metadata/schemas/board-config-v1.schema.json'
      - '.github/workflows/pr-vscode-extension.yml'
  push:
    branches: [main]
    paths:
      - 'vscode/**'
      - 'metadata/schemas/board-config-v1.schema.json'
      - '.github/workflows/pr-vscode-extension.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: vscode-extension · build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Schema sync check
        run: |
          diff -q metadata/schemas/board-config-v1.schema.json \
                  vscode/schemas/board-config-v1.schema.json
          echo "schemas in sync"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vscode/package-lock.json

      - name: npm ci (vscode/)
        working-directory: vscode
        run: npm ci --no-audit --no-fund

      - name: tsc compile
        working-directory: vscode
        run: npx tsc -p .

      - name: vsce package
        working-directory: vscode
        run: npx vsce package --no-yarn --out alp-sdk.vsix

      - name: Upload .vsix artefact
        uses: actions/upload-artifact@v4
        with:
          name: alp-sdk-vscode
          path: vscode/alp-sdk.vsix
          retention-days: 14
          if-no-files-found: error
