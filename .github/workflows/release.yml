# SPDX-License-Identifier: Apache-2.0
#
# Release workflow.  Fires when a maintainer pushes a `v*` tag.
#
# Steps (now split across two jobs for SLSA L3):
#
#   1. `build` job:
#      a. Verify the tag matches `metadata/sdk_version.yaml`.
#      b. Verify CHANGELOG.md has a matching `## [v<N>] - YYYY-MM-DD`
#         section (release notes will be sliced from this).
#      c. Verify the ABI snapshot at docs/abi/v<N>-snapshot.json
#         exists.
#      d. Build a source tarball (no binaries -- the SDK is a source
#         release).
#      e. Generate SHA-256 + SHA-512 checksums.
#      f. Create the GitHub Release with the CHANGELOG slice as the
#         body and the tarball + checksums as artefacts.
#      g. Emit the tarball's base64-encoded SHA-256 digest for the
#         provenance generator (consumed via `outputs.hashes`).
#
#   2. `provenance` job (calls the slsa-framework reusable workflow):
#      a. Runs inside an isolated, ephemeral GitHub-hosted runner
#         that the SLSA generator controls.  Cannot be tampered
#         with by the `build` job above -- this is the L3 promise.
#      b. Generates an in-toto SLSA v1.0 build-provenance predicate
#         signed via Sigstore against the workflow's OIDC token.
#      c. With `upload-assets: true`, the resulting bundle is
#         attached to the GitHub Release the `build` job created in
#         step 1.f.
#
# The previous L2 implementation (`actions/attest-build-provenance@v1`
# running inline in the build job) is dropped because L3 disallows
# in-workflow provenance generation -- a compromised build job could
# tamper with the attestation.  The reusable-workflow split is the
# standard SLSA pattern for L3.
#
# Tag form: `v<MAJOR>.<MINOR>.<PATCH>` (SemVer).  Pre-release tags
# (`vX.Y.Z-rc1`) are supported and produce a "pre-release" Release
# on GitHub.
#
# Verification (downstream customer):
#
#   slsa-verifier verify-artifact alp-sdk-v<N>.tar.gz \
#       --provenance-path alp-sdk-v<N>.tar.gz.intoto.jsonl \
#       --source-uri github.com/alplabai/alp-sdk --source-tag v<N>
#
# (github.com/slsa-framework/slsa-verifier -- single static binary.)
# This checks the Sigstore signature against the Rekor transparency
# log, the builder identity (the pinned generic generator), the
# source repo + tag, and the artefact digest match -- all bound to
# the SLSA L3 provenance bundle.  NOTE: `gh attestation verify` does
# NOT work here -- that API only serves attest-build-provenance (L2)
# attestations; the generic generator ships its proof as the
# .intoto.jsonl release asset instead (verified for real on the
# v0.6.0 release: rekor entry 1740409638).
#
# See docs/release-policy.md + https://slsa.dev/spec/v1.0/levels#level-3.

name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

# Top-level permissions are minimal.  Each job opts in to what it needs.
permissions: read-all

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create the GitHub Release
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Checkout (full history for CHANGELOG slice)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install pyyaml jsonschema

      - name: Parse tag + verify against metadata
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Strip leading 'v', strip pre-release suffix if any.
          VERSION="${TAG#v}"
          CORE_VERSION="${VERSION%%-*}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "core_version=$CORE_VERSION" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$([ "$VERSION" = "$CORE_VERSION" ] && echo false || echo true)" >> "$GITHUB_OUTPUT"

          # Verify metadata/sdk_version.yaml matches.
          DECLARED=$(python3 -c "import yaml; print(yaml.safe_load(open('metadata/sdk_version.yaml'))['version'])")
          if [ "$DECLARED" != "$CORE_VERSION" ]; then
            echo "::error::Tag core version $CORE_VERSION doesn't match metadata/sdk_version.yaml ($DECLARED)"
            exit 1
          fi

      - name: Verify ABI snapshot exists
        run: |
          MINOR=$(echo "${{ steps.tag.outputs.core_version }}" | cut -d. -f1-2)
          SNAPSHOT="docs/abi/v${MINOR}-snapshot.json"
          if [ ! -f "$SNAPSHOT" ]; then
            echo "::error::Missing $SNAPSHOT -- regenerate via scripts/abi_snapshot.py before tagging"
            exit 1
          fi
          # Confirm working-tree headers match the committed snapshot.
          python3 scripts/abi_snapshot.py --diff "$SNAPSHOT"

      - name: Slice CHANGELOG section for the release notes
        id: changelog
        run: |
          VERSION="${{ steps.tag.outputs.core_version }}"
          # The CHANGELOG section header is `## [v<VERSION>]` (date
          # follows after a dash).  Slice from that line up to (but
          # not including) the next `## ` line.
          python3 - <<PY > release_notes.md
          import re, sys
          version = "${{ steps.tag.outputs.core_version }}"
          text = open("CHANGELOG.md").read()
          # Match either '## [v0.4.0] - ...' or '## [Unreleased] - v0.4.0 candidate'
          # We want the first form once the slice has been cut.
          pattern = rf"^## \[v{re.escape(version)}\][^\n]*\n(.*?)(?=^## |\Z)"
          m = re.search(pattern, text, re.MULTILINE | re.DOTALL)
          if not m:
              print(f"# v{version}\n\nRelease notes pending CHANGELOG slice.", file=sys.stdout)
              sys.exit(0)
          print(m.group(1).strip())
          PY

      - name: Build source tarball
        id: archive
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          ARCHIVE="alp-sdk-${TAG}.tar.gz"
          git archive --format=tar.gz --prefix="alp-sdk-${TAG}/" -o "$ARCHIVE" HEAD
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          sha512sum "$ARCHIVE" > "$ARCHIVE.sha512"

      - name: Emit base64-encoded digests for the provenance job
        id: hash
        # The slsa-framework reusable workflow consumes a
        # newline-separated list of `sha256:HASH FILENAME` records
        # base64-encoded as a single line.  One artefact per row
        # produces one provenance subject; the tarball is the only
        # canonical release artefact (checksums + provenance bundle
        # are derived, not subjects in their own right).
        run: |
          ARCHIVE="${{ steps.archive.outputs.archive }}"
          HASH=$(sha256sum "$ARCHIVE" | base64 -w0)
          echo "hashes=$HASH" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body_path: release_notes.md
          prerelease: ${{ steps.tag.outputs.is_prerelease == 'true' }}
          files: |
            alp-sdk-${{ steps.tag.outputs.tag }}.tar.gz
            alp-sdk-${{ steps.tag.outputs.tag }}.tar.gz.sha256
            alp-sdk-${{ steps.tag.outputs.tag }}.tar.gz.sha512

  # SLSA L3 provenance generator.  Runs as a separate reusable
  # workflow inside an isolated runner so a compromised `build` job
  # above cannot tamper with the attestation -- the source of L3.
  # Bundle is uploaded to the GitHub Release the build job created
  # via `upload-assets: true`.
  provenance:
    needs: [build]
    permissions:
      actions: read       # needed to read the workflow trigger event
      id-token: write     # OIDC token for Sigstore signing
      contents: write     # write the attestation to the Release
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      upload-assets: true
      provenance-name: "alp-sdk-${{ needs.build.outputs.tag }}.tar.gz.intoto.jsonl"
