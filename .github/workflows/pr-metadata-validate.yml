# SPDX-License-Identifier: Apache-2.0
#
# Validates every metadata/socs/**/*.json against
# metadata/schemas/soc-spec-v1.schema.json on every PR.
#
# Catches schema drift the moment someone edits an SoC file —
# missing required fields, typo'd refs, invalid `ref` patterns,
# undeclared additionalProperties, etc.

name: pr-metadata-validate

on:
  pull_request:
    branches: [main]
    paths:
      - 'metadata/**'
      - 'examples/**/board.yaml'
      - 'include/alp/boards/**'
      - '.github/workflows/pr-metadata-validate.yml'
      - 'scripts/validate_metadata.py'
      - 'scripts/validate_board_yaml.py'
      - 'scripts/alp_project.py'
      - 'tests/scripts/**'
      - 'firmware/gd32-bridge/tests/gen_protocol_vectors.py'
      - 'firmware/gd32-bridge/tests/protocol_vectors.txt'
  push:
    branches: [main]
    paths:
      - 'metadata/**'
      - 'examples/**/board.yaml'
      - 'include/alp/boards/**'
      - 'scripts/validate_board_yaml.py'
      - 'scripts/alp_project.py'
      - 'tests/scripts/**'
      - 'firmware/gd32-bridge/tests/gen_protocol_vectors.py'
      - 'firmware/gd32-bridge/tests/protocol_vectors.txt'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate · soc-spec-v1
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install jsonschema pyyaml

      - name: Validate every SoC file against the v1 schema
        run: python3 scripts/validate_metadata.py

      # Catches pad-uniqueness regressions when two peripherals
      # accidentally claim the same silicon pad on a SoM pinout.
      - name: Check pin conflicts in every SoM peripheral map
        run: python3 scripts/check_pin_conflicts.py

      # Smoke-test the board.yaml loader on the canonical example so
      # any schema / loader regression is caught at PR time rather
      # than v0.4-load-test time.  Exercises every emit format.
      - name: Smoke-test board.yaml loader (zephyr-conf)
        run: |
          python3 scripts/alp_project.py \
              --input metadata/templates/board.yaml.example \
              --emit zephyr-conf > /tmp/alp.conf
          test -s /tmp/alp.conf
          echo "--- generated zephyr-conf ---"
          cat /tmp/alp.conf

      - name: Smoke-test board.yaml loader (cmake-args)
        run: |
          python3 scripts/alp_project.py \
              --input metadata/templates/board.yaml.example \
              --emit cmake-args > /tmp/alp-cmake.txt
          test -s /tmp/alp-cmake.txt
          echo "--- generated cmake-args ---"
          cat /tmp/alp-cmake.txt

      - name: Smoke-test board.yaml loader (yocto-conf)
        run: |
          python3 scripts/alp_project.py \
              --input metadata/templates/board.yaml.example \
              --emit yocto-conf > /tmp/alp-yocto.conf
          test -s /tmp/alp-yocto.conf
          echo "--- generated yocto-conf ---"
          cat /tmp/alp-yocto.conf

      # The dts-overlay path reads include/alp/boards/<carrier>.h.
      # Smoke-test against the only released carrier (E1M-EVK).
      # Validates the alias block contains the expected bus alphabet
      # and that the alp,pin-array block is well-formed.
      - name: Smoke-test board.yaml loader (dts-overlay)
        run: |
          python3 scripts/alp_project.py \
              --input metadata/templates/board.yaml.example \
              --emit dts-overlay > /tmp/alp.overlay
          test -s /tmp/alp.overlay
          echo "--- generated dts-overlay ---"
          cat /tmp/alp.overlay
          # Sanity: every v0.3-scoped class produces at least one
          # alias (E1M-EVK wires all five) and the pin-array block
          # is present.
          grep -q 'alp-i2c0' /tmp/alp.overlay
          grep -q 'alp-spi1' /tmp/alp.overlay
          grep -q 'alp-uart0' /tmp/alp.overlay
          grep -q 'alp-pwm0' /tmp/alp.overlay
          grep -q 'alp,pin-array' /tmp/alp.overlay

      # The hw-info-h path bakes board.yaml identifiers into a C
      # header apps include alongside <alp/hw_info.h> to call
      # alp_hw_info_assert_matches_build() without hardcoded strings.
      # Sanity: the canonical template populates every macro.
      - name: Smoke-test board.yaml loader (hw-info-h)
        run: |
          python3 scripts/alp_project.py \
              --input metadata/templates/board.yaml.example \
              --emit hw-info-h > /tmp/alp_hw_info_build.h
          test -s /tmp/alp_hw_info_build.h
          echo "--- generated hw-info-h ---"
          cat /tmp/alp_hw_info_build.h
          grep -q '#define ALP_HW_BUILD_SOM_SKU' /tmp/alp_hw_info_build.h
          grep -q '#define ALP_HW_BUILD_SOM_HW_REV' /tmp/alp_hw_info_build.h
          grep -q '#define ALP_HW_BUILD_CARRIER_NAME' /tmp/alp_hw_info_build.h
          grep -q '#define ALP_HW_BUILD_OS' /tmp/alp_hw_info_build.h

      # The west-libraries path emits a paste-ready west.yml fragment
      # listing the Zephyr modules the board.yaml `libraries:` array
      # requires.  Sanity: the canonical template (which lists lvgl,
      # mbedtls, cmsis_dsp, etl) lands the first three in the
      # allowlist and the etl note in the trailing comment block.
      - name: Smoke-test board.yaml loader (west-libraries)
        run: |
          python3 scripts/alp_project.py \
              --input metadata/templates/board.yaml.example \
              --emit west-libraries > /tmp/alp-west-libs.yml
          test -s /tmp/alp-west-libs.yml
          echo "--- generated west-libraries ---"
          cat /tmp/alp-west-libs.yml
          # `--` terminates grep option parsing so the leading `-`
          # in '- lvgl' isn't treated as a flag (exit code 2 = grep error).
          grep -q -- 'name-allowlist:' /tmp/alp-west-libs.yml
          grep -q -- '- lvgl' /tmp/alp-west-libs.yml
          grep -q -- '- mbedtls' /tmp/alp-west-libs.yml
          grep -q -- '- cmsis-dsp' /tmp/alp-west-libs.yml

      # Customer-side linter -- exercises the same schema +
      # preset checks an app author would run before pushing.
      # Covers both the canonical template and every example
      # board.yaml in tree, so a broken example fails CI here
      # rather than at twister time.
      - name: Validate canonical template board.yaml
        run: |
          python3 scripts/validate_board_yaml.py \
              --input metadata/templates/board.yaml.example

      - name: Validate every examples/*/board.yaml
        run: |
          set -e
          for f in $(find examples -name board.yaml); do
              echo "--- $f ---"
              python3 scripts/validate_board_yaml.py --input "$f"
          done

      # v2 schema validity sweep -- walks every board.yaml under
      # examples/ + tests/ and runs scripts/validate_board_yaml.py.
      # Per the v0.6 heterogeneous-OS design (§7 Phase 5), this step
      # is `continue-on-error: true` until Phase 4 migrates every
      # in-repo board.yaml to schema_version: 2.  TODO: flip to a
      # hard gate (drop `continue-on-error`) once Phase 4 lands and
      # `validate_board_yaml.py` rejects any remaining v1 file.
      - name: v2 schema sweep across examples/ + tests/
        continue-on-error: true
        run: |
          set -u
          status=0
          while IFS= read -r f; do
              echo "--- v2-check: $f ---"
              if ! python3 scripts/validate_board_yaml.py --input "$f"; then
                  echo "::warning::v2 schema check failed for $f -- expected until Phase 4 migration."
                  status=1
              fi
          done < <(find examples tests -name board.yaml 2>/dev/null)
          if [ "$status" -ne 0 ]; then
              echo "::warning::At least one board.yaml not yet on schema_version: 2."
          fi
          exit 0

      # Cross-validate: every `id:` in every metadata/socs/.../*.json
      # cores[] block must have a matching key in every consuming
      # SoM preset's `topology:` block.  Catches the case where a
      # silicon update adds a new core (e.g. m33_sm) but the SoM
      # preset's topology stops declaring an OS for it.  Per design
      # §4.2 the topology key set is required to mirror the SoC's
      # cores[].id set exactly.
      - name: Cross-check SoC cores[].id vs SoM topology keys
        run: |
          python3 -c '
          import json, sys, pathlib, yaml
          root = pathlib.Path(".")
          # Index every SoC cores[].id set keyed by relative path.
          soc_cores = {}
          for jf in (root / "metadata/socs").rglob("*.json"):
              with jf.open() as fh:
                  data = json.load(fh)
              ids = [c.get("id") for c in data.get("cores", []) if c.get("id")]
              soc_cores[jf.as_posix()] = set(ids)
          # Walk every SoM preset, resolve its referenced SoC, and
          # compare its topology keys against that SoC s id set.
          failures = []
          for sf in (root / "metadata/e1m_modules").glob("*.yaml"):
              with sf.open() as fh:
                  preset = yaml.safe_load(fh) or {}
              topology = preset.get("topology") or {}
              if not topology:
                  continue
              soc_ref = preset.get("soc_ref") or preset.get("soc") or ""
              matched = [p for p in soc_cores if soc_ref and p.endswith(soc_ref)]
              if not matched:
                  print(f"NOTE: {sf} -> soc_ref={soc_ref!r} not yet resolvable; skipping.")
                  continue
              soc_path = matched[0]
              expected = soc_cores[soc_path]
              actual = set(topology.keys())
              if expected != actual:
                  failures.append((sf.as_posix(), soc_path, expected, actual))
          for sf, sp, exp, act in failures:
              print(f"::error::topology mismatch in {sf}: SoC {sp} declares cores={sorted(exp)}, topology has {sorted(act)}")
          sys.exit(1 if failures else 0)
          '

      # Unit-test the loader contract -- schema pass/fail, missing-
      # preset error, override merge, all four emit modes produce
      # non-empty output, dts-overlay structural shape.  Catches
      # regressions the smoke tests above can't reach.
      - name: Unit tests for the loader
        run: |
          python3 -m unittest tests.scripts.test_alp_project -v

      # The gd32-bridge protocol vectors must stay in lockstep with
      # the generator.  The script's --check mode exits non-zero if
      # the on-disk file has drifted from the generator output (e.g.
      # someone edited the .txt by hand instead of re-running the
      # generator, or bumped the firmware version triple in the
      # script without committing the new CRC bytes).  Cheap to run;
      # catches a class of host-firmware desync that would otherwise
      # only surface in a HiL run.
      - name: gd32-bridge protocol vectors are not drifted
        run: |
          python3 firmware/gd32-bridge/tests/gen_protocol_vectors.py --check

      # Cross-family portability lint -- catches an example that
      # silently reaches for a chip that isn't populated on its own
      # target SoM (the example would build but fail at runtime), and
      # classifies every example into ring1 / ring2 / ring3 so the
      # portability claim in examples/README.md stays honest as the
      # example set grows.
      - name: Example portability classification + hard-error lint
        run: |
          python3 scripts/check_example_portability.py

      # Public-API test-coverage audit -- per the VERSIONS.md
      # "Quality bar" entry, every public function should have at
      # least one ztest mention.  Runs informational today (no
      # --fail-on-gaps) so backfilling can happen incrementally; the
      # gate flips on for the v1.0 release branch.
      - name: Public-API test-coverage audit (informational)
        run: |
          python3 scripts/check_test_coverage.py
