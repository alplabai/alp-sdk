# SPDX-License-Identifier: Apache-2.0
#
# ADR-0020 cross-repo parity trigger (alp-sdk side). The ADR's "one thing that
# must hold" + "Cross-repo oracle trigger" require that every alp-sdk PLANNER
# change automatically runs `tan`'s build-validation, so a plan that emits fine
# but builds wrong surfaces on the alp-sdk change itself -- not later. Phase 4
# deleted `fan_out` (the only in-repo oracle), so this trigger is what keeps the
# contract honest. Pairs with alplabai/tan-cli's `parity.yml`
# (repository_dispatch type `alp-sdk-planner-change`). Tracked in #855.
#
# AUTH — reuses the EXISTING org-owned "ALP_CI" GitHub App (the same one
# pr-bitbake.yml uses to dispatch into alp-sdk-internal). NO new secrets:
# ALP_CI_APP_ID + ALP_CI_APP_PRIVATE_KEY are already set on this repo. The ONLY
# admin action, one-time:
#   Install the ALP_CI App on `alplabai/tan-cli` with "Contents: Read and write"
#   (org Settings -> GitHub Apps -> ALP_CI -> Install/Configure -> add tan-cli).
# Until the App is installed on tan-cli the token step fails softly and this job
# SKIPS with a warning (never hard-fails a push). The built-in GITHUB_TOKEN
# cannot do this -- it is scoped to alp-sdk only and cannot dispatch elsewhere.
name: tan-parity-dispatch

on:
  push:
    branches: [dev, main]
    paths:
      - "scripts/alp_orchestrate/**"
      - "metadata/schemas/build-plan-v1.schema.json"
      - "metadata/**"
      - "examples/**/board.yaml"

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Mint a tan-cli-scoped installation token from the ALP_CI App
        id: app-token
        continue-on-error: true # App not yet installed on tan-cli -> empty token -> graceful skip
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ALP_CI_APP_ID }}
          private-key: ${{ secrets.ALP_CI_APP_PRIVATE_KEY }}
          owner: alplabai
          repositories: tan-cli

      - name: Trigger tan build-validation
        env:
          TOKEN: ${{ steps.app-token.outputs.token }}
          SDK_SHA: ${{ github.sha }}
          SDK_BRANCH: ${{ github.ref_name }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::warning::ALP_CI App token not minted — install the ALP_CI App on alplabai/tan-cli (Contents: write) to enable the ADR-0020 parity dispatch (#855). Skipping."
            exit 0
          fi
          # SDK_SHA / SDK_BRANCH are trusted GitHub context (not user payload);
          # jq builds the JSON body so no value is shell-interpolated into it.
          body="$(jq -nc --arg ref "$SDK_SHA" --arg br "$SDK_BRANCH" \
            '{event_type:"alp-sdk-planner-change",client_payload:{sdk_ref:$ref,branch:$br}}')"
          curl -sSf -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/alplabai/tan-cli/dispatches \
            -d "$body"
          echo "::notice::dispatched alp-sdk-planner-change to tan-cli for $SDK_SHA ($SDK_BRANCH)"
