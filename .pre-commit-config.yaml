# Optional local-first formatting gate — mirrors the CI clang-format check so you
# catch style issues before pushing, rather than after a GitHub Actions round-trip.
#
# Enable once per clone (opt-in; not required — CI still enforces on PRs to main):
#   pip install pre-commit && pre-commit install
#
# Pinned to clang-format 14.0.6 to match the CI gate exactly (Cpp11BracedListStyle
# in .clang-format keeps output identical across v14<->v18).  Vendored upstream
# trees keep their own style and are excluded, same as the CI gate.
repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v14.0.6
    hooks:
      - id: clang-format
        types_or: [c, c++]
        exclude: '^(zephyr|vendors)/'
