#
# Alif Ensemble LPTIMER (low-power timer), bound as a Zephyr counter-class
# device (a free-running 32-bit DOWN-counter with one underflow alarm channel)
# by the alp-sdk Tier-1.5 driver zephyr/drivers/counter/counter_alif_lptimer.c
# (compatible "alif,lptimer").  On the E8 SoM this models the always-on
# lptimer@42001000 block: four independent channels, each clocked from the
# VBAT-domain low-frequency source.
#
# This is a DISTINCT always-on IP from the LPRTC ("snps,dw-apb-rtc",
# lprtc@42000000) and the UTIMER ("alif,utimer-counter").  Clean-room: the
# alifsemi/zephyr_alif fork ships NO "alif,lptimer" binding and NO Zephyr
# LPTIMER driver; register model transcribed from the Alif DFP
# (drivers/include/lptimer.h + sys_ctrl_lptimer.h).  ADR 0017 Tier-1.5,
# BENCH-UNVERIFIED.

description: Alif Ensemble LPTIMER counter channel

compatible: "alif,lptimer"

include: base.yaml

properties:
  reg:
    required: true
    description: LPTIMER block base address and size.

  interrupts:
    required: true
    description: The selected channel's underflow interrupt.

  channel:
    type: int
    required: true
    enum: [0, 1, 2, 3]
    description: |
      LPTIMER channel index (0..3).  Selects the per-channel config block
      (base + channel * 0x14) and the matching VBAT TIMER_CLKSEL field.
      Channels 0 and 2 do NOT support the cascade clock source.

  clock-source:
    type: int
    required: true
    enum: [0, 1, 2, 3]
    description: |
      VBAT TIMER_CLKSEL clock source for this channel
      (Alif DFP sys_ctrl_lptimer.h enum LPTIMER_CLK_SRC):
        0 = 32 kHz, 1 = 128 kHz, 2 = external, 3 = cascade.
      Must match clock-frequency.

  clock-frequency:
    type: int
    required: true
    description: |
      Counter tick rate in Hz, i.e. the selected clock-source frequency
      (32768 for 32 kHz, 131072 for 128 kHz, ...).  Used only to scale
      counter_us_to_ticks(); it does not program any register.
