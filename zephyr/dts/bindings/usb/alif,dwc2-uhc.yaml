#
# Alif Ensemble DWC2 USB controller in host (UHC) mode.
#
# "alif,dwc2-uhc" shares the same Synopsys DWC2 silicon as the device-mode
# "snps,dwc2" binding; the distinct compatible keeps the host (UHC-class) and
# device (UDC-class) drivers collision-free so both can coexist in a DT that
# exposes both controllers.
#
# NOTE: no "uhc.yaml" base exists in Zephyr 4.4.  The usb-controller.yaml
# base (used by all NXP and virtual UHC bindings) provides maximum-speed
# (full enum incl. super-speed), vbus-gpios, and bus: usb.
# The Alif DWC2 is a HS-capable OTG core; set maximum-speed = "high-speed"
# in the board DT node (or leave it to the driver default).

description: Alif Ensemble DWC2 USB controller in host (UHC) mode

compatible: "alif,dwc2-uhc"

include: [usb-controller.yaml]

properties:
  reg:
    required: true

  interrupts:
    required: true
