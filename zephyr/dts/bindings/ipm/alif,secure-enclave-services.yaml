#
# Secure-Enclave (SE) services channel, carried over a pair of Arm MHUv2
# mailboxes.  The Apache-2.0 hal_alif SE client
# (se_services/zephyr/src/se_service.c) DEVICE_DT_GET_OR_NULLs the two phandle
# properties below at SYS_INIT and drives them through Zephyr's IPM API (the
# alp-sdk in-tree "arm,mhuv2" driver).  Property shape matches Alif's
# zephyr_alif fork binding (the same hal_alif consumer); upstream Zephyr v4.4
# ships no such binding, so the alp-sdk carries this clean re-author.
# ADR 0017 Tier-2 (INTERIM, task #21).

description: Secure Enclave services through Arm MHUv2 on Alif Ensemble SoCs

compatible: "alif,secure-enclave-services"

include: [base.yaml]

properties:
  mhuv2-send-node:
    type: phandle
    required: true
    description: Arm MHUv2 SENDER (tx) node -- the RTSS -> SE outbound mailbox.

  mhuv2-recv-node:
    type: phandle
    required: true
    description: Arm MHUv2 RECEIVER (rx) node -- the SE -> RTSS inbound mailbox.
