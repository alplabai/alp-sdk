#
# ADR 0017 Tier-1.5 (in-tree thin driver over an Apache-2.0 hal_alif HW
# library) -- HW-BLOCKED, BUILD-ONLY this batch.  Vendored VERBATIM (below the
# provenance header) from the Apache-2.0 zephyr_alif fork
# (dts/bindings/ospi/snps,designware-ospi.yaml, HEAD da4a9034) -- the
# properties (aes-reg, bus-speed, cs-pin, ddr-drive-edge, rx-ds-delay,
# xip-wait-cycles, xip-base-address, baud2-delay) map 1:1 onto the hal_alif
# `struct ospi_init` config fields (modules/hal/alif drivers/ospi/include/
# ospi_hal.h), which is why this binding is vendored rather than re-derived.
# Bound in-tree by zephyr/drivers/flash/flash_ospi_alif.c.
#
# The E1M-AEN801 (Ensemble E8) has no octal-NOR/HyperBus part populated this
# hardware batch, so this only proves the ospi0 node BINDS + the hal_alif
# init/XiP-enable entry points compile and link (see
# examples/aen/aen-ospi-regcheck).  See docs/adr/0017-alp-sdk-over-the-vendor-sdk.md.
#
# Vendored VERBATIM from here down (no functional edits).

description: Synopsys Designware OSPI controller

compatible: "snps,designware-ospi"

include: [base.yaml, pinctrl-device.yaml]

properties:
  reg:
    required: true

  interrupts:
    required: true

  pinctrl-0:
    required: true

  pinctrl-names:
    required: true

  aes-reg:
    type: array
    description: register space
    required: true

  bus-speed:
    type: int
    required: true
    description: speed

  clock-frequency:
    type: int
    description: |
      Input clock frequency

  cs-pin:
    type: int
    description: slave connected pin
    required: true

  ddr-drive-edge:
    type: int
    description: control the driving edge of TXD in DDR mode
    default: 1

  rx-ds-delay:
    type: int
    description: receive datastrobe delay
    default: 16

  tx-fifo-threshold:
    type: int
    description: transmit fifo threshold
    default: 128

  xip-wait-cycles:
    type: int
    description: waitcycles on XiP transaction
    default: 16

  xip-rxds-vl-en:
    type: boolean
    description: Enable/Disable RXDS Variable Latency on XiP transaction

  xip-base-address:
    type: array
    description: XiP memory address range

  baud2-delay:
    type: int
    description: Enable/disable BAUD2 delay. This needs to be enabled when BAUDR divisor is 2.
                 Enumerated values
                 0 - disable BAUD2 delay
                 1 - enable BAUD2 delay
                 2 - auto sets BAUD2 delay when BAUDR divisor is 2
    default: 2
    enum:
      - 0
      - 1
      - 2
