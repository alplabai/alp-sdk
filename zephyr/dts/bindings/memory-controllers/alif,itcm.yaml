#
# Alif Ensemble RTSS-core ITCM (Instruction Tightly Coupled Memory).
#
# Re-authored in alp-sdk (config, not Alif driver code) to add the
# `global_base` property that hal_alif's soc_memory_map.h local_to_global()
# consumes -- DT_PROP(DT_NODELABEL(itcm), global_base).  Upstream Zephyr's
# arm,itcm binding has no such property, so an itcm node compatible with
# "arm,itcm" cannot carry global_base and the Ethos-U address-remap glue
# (ethosu_callback.c) fails to compile.  The Apache-2.0 zephyr_alif fork
# carries an equivalent alif,itcm binding (dts/bindings/arm/alif,itcm.yaml);
# this mirror lets the same itcm node bind on the upstream-Zephyr + hal_alif
# base.  The app overlay re-`compatible`s the board's arm,itcm node onto this
# binding and sets global_base (ITCM global view = 0x58000000 on the E8 RTSS-HE,
# from the fork ensemble_rtss_he.dtsi).
#
# ADR 0017 Tier-1.5 (in-tree thin glue over the upstream/hal base).

description: Alif Ensemble RTSS-core ITCM (Instruction Tightly Coupled Memory)

compatible: "alif,itcm"

include: [base.yaml, "zephyr,memory-region.yaml"]

properties:
  reg:
    required: true
  global_base:
    required: true
    type: int
    description: |
      Global (system-bus) base address of the ITCM as seen by other bus
      masters (e.g. the Ethos-U NPU's AXI master), used by
      soc_memory_map.h local_to_global() to translate a CPU-local ITCM
      pointer into the address the NPU must be programmed with.
