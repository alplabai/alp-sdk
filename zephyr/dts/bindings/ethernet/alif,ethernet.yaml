#
# ADR 0017 Tier-1.5 (in-tree glue over the UPSTREAM eth_dwmac core) --
# BENCH-VERIFIED PASS on E8 (2026-06-17). Kept in-tree (not retired onto the
# fork: the fork forked the DWMAC core; upstream ships no Ensemble path). See
# docs/adr/0017.
#
# Synopsys DesignWare MAC (DWC-ETHERNET QoS, v4.x/5.x) as integrated on the
# Alif Ensemble family -- the RMII MAC at 0x4810_0000. Drives the upstream
# Zephyr DWMAC core (drivers/ethernet/eth_dwmac.c) via the Alif platform glue
# carried in this SDK (zephyr/drivers/ethernet/eth_dwmac_alif_ensemble.c,
# DT_DRV_COMPAT alif_ethernet), since upstream Zephyr v4.4 ships the core but
# not the Alif glue nor this binding.
#
# A node lists BOTH compatibles:
#
#     compatible = "alif,ethernet", "snps,designware-ethernet";
#
# `alif,ethernet` (first, more specific) is what the platform glue binds to
# (DT_DRV_COMPAT alif_ethernet) and what enables CONFIG_ETH_DWMAC_ALIF.
# `snps,designware-ethernet` (second, the generic fallback) is what enables the
# upstream core's CONFIG_ETH_DWMAC via DT_HAS_SNPS_DESIGNWARE_ETHERNET_ENABLED.
# Both must be present.
#
# This binding ADDS, over the bare upstream `snps,designware-ethernet`:
#   - clocks    (the Alif clock manager gate -- upstream omits it entirely;
#                the glue's clock_control_on() needs it. Reference the
#                ALIF_ETHERNET_CLK macro from
#                <zephyr/dt-bindings/clock/alif_ensemble_clocks.h>, e.g.
#                clocks = <&clockctrl ALIF_ETHERNET_CLK>.)
#   - pinctrl-0 / pinctrl-names  (the RMII pad routing)
#
# Station MAC (standard ethernet-controller.yaml semantics):
#   - `zephyr,random-mac-address` (the SoC-dtsi default): the glue generates a
#     per-boot random locally-administered address (prefix 02:01:56, this
#     repo's LAA convention) via the upstream gen_random_mac() helper, so no
#     two units ship the same MAC. Any local-mac-address is ignored while the
#     flag is set (upstream binding rule).
#   - `local-mac-address`: fixed per-unit address; a provisioning overlay
#     deletes the random flag (/delete-property/ zephyr,random-mac-address;)
#     and supplies the real address. There is no fuse/OUI fallback in this
#     glue; a node carrying NEITHER property fails the glue's BUILD_ASSERT.
#
# PHY: the controller node may carry a child `mdio` bus with a managed PHY
# (e.g. ti,dp83825 at addr 0), OR -- for first bring-up -- a `fixed-link` child
# PHY node (compatible "ethernet-phy-fixed-link", no MDIO). Either way the node
# references it via the standard `phy-handle` property (inherited from
# ethernet-controller.yaml); the glue forwards it to the core as p->phy_dev.
# When `phy-handle` is absent the core skips link management and the MAC stays
# at the static MAC_CONF speed/duplex the glue programs (100 Mbps / full).
#
# Register offsets used by the glue (MAC_CONF, DMA_SYSBUS_MODE, MAC_MDIO_*) are
# transcribed verbatim from eth_dwmac_priv.h; the node geometry (reg, IRQ,
# clock id) is from the alifsemi/zephyr_alif fork DTS. Validated on E8 silicon
# (2026-06-17): the E1M-AEN801 (M55-HE) pulled a real DHCP lease end-to-end with
# the descriptor rings + net_buf pool placed in global SRAM0 (zephyr,sram =
# &sram0) and CONFIG_DCACHE=n.

description: |
  Alif Ensemble Synopsys DesignWare Ethernet MAC (RMII).

compatible: "alif,ethernet"

include: [ethernet-controller.yaml, pinctrl-device.yaml]

properties:
  reg:
    required: true

  interrupts:
    required: true

  clocks:
    required: true
    description: |
      Single phandle-array entry to the Alif clock controller with the
      Ethernet clock id in its `clkid` cell, i.e.
      clocks = <&clockctrl ALIF_ETHERNET_CLK>. The platform glue enables this
      gate via clock_control_on() before applying pinctrl.

  pinctrl-0:
    required: true

  pinctrl-names:
    required: true

  local-mac-address:
    description: |
      The 6-byte station MAC address for per-unit provisioning. Only honoured
      when `zephyr,random-mac-address` is NOT set on the node (standard
      ethernet-controller semantics); the SoC dtsi sets the random flag by
      default, so an overlay pinning a real address must also
      /delete-property/ zephyr,random-mac-address. The glue enforces at build
      time that at least one of the two properties is present (no fuse/OUI
      fallback).

  # phy-handle is inherited from ethernet-controller.yaml (type: phandle). The
  # node points it at either a managed PHY on a child `mdio` bus or a fixed-link
  # PHY (compatible "ethernet-phy-fixed-link"); the glue forwards it to the core
  # as p->phy_dev. Optional -- when omitted the core leaves the MAC at the
  # glue's static speed/duplex.

  phy-connection-type:
    type: string
    default: "rmii"
    description: |
      MAC<->PHY interface. The Ensemble MAC is wired RMII on this SoM; kept for
      DT documentation parity with the generic ethernet-controller binding.
