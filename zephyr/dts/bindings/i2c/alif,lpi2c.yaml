# vendor-ext, BENCH-UNVERIFIED.
#
# Binding for the Alif Ensemble LPI2C (Low-Power I2C) controller. Ported from
# the Apache-2.0 alifsemi/zephyr_alif fork's dts/bindings/i2c/alif,lpi2c.yaml;
# upstream Zephyr v4.4 + hal_alif v2.2.0 do NOT ship it. Property names match
# the fork binding exactly. The driver is zephyr/drivers/i2c/i2c_alif_lpi2c.c.
#
# On the E1M-X / Ensemble E8 SoM this controller is LPI2C0 @0x43009000 on pins
# P7_4 (LPI2C0_SCL_A) / P7_5 (LPI2C0_SDA_A) -- the on-module "BRD_I2C"
# housekeeping bus (OPTIGA 0x30, RV-3028 RTC 0x52, TMP112 0x48, EEPROM 0x50).
#
# The fork register model has NO `clocks` property (the fork's lpi2c0 node
# carries none); the FIFO-mode driver does not program a bus clock. The fork
# node addresses/IRQ were transcribed from the fork DTS
# (dts/arm/alif/ensemble/common/e1.dtsi: reg = <0x43009000 0x100>,
# interrupts = <47 ...>). Not yet validated on silicon.

description: Alif LP-I2C node

compatible: "alif,lpi2c"

include: [base.yaml, i2c-controller.yaml, pinctrl-device.yaml]

properties:
  interrupts:
    required: true
