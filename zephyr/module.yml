# Zephyr module manifest — makes alp-sdk importable as a Zephyr module
# when added to a project's west.yml or via EXTRA_ZEPHYR_MODULES.
#
# See: https://docs.zephyrproject.org/latest/develop/modules.html
name: alp-sdk
build:
  cmake: zephyr
  kconfig: zephyr/Kconfig
  settings:
    # Expose zephyr/dts/bindings/ to Zephyr's devicetree binding
    # scanner so boards / overlays can use
    # compatible = "alp,pin-array".  `dts_root: zephyr` tells
    # Zephyr to look at `<module-root>/zephyr/dts/bindings/`
    # instead of the default `<module-root>/dts/bindings/` --
    # we keep all Zephyr-only artefacts under `zephyr/` so the
    # top-level repo stays tidy (see CHANGELOG §A.10 2026-05-14).
    dts_root: zephyr
    # board_root: zephyr exposes zephyr/boards/<vendor>/<board>/ to
    # Zephyr's board scanner (e.g. alp/e1m_v2m101_m33_sm, the RZ/V2N
    # M33 system-manager board that drives the on-module GD32 bridge).
    board_root: zephyr

# NOTE on `west alp-build`:
#   The command lives in `scripts/west-commands.yml` and is surfaced
#   via the *manifest's* west-commands -- the manifest's
#   `self.west-commands` (when alp-sdk is the workspace topdir) or the
#   consuming project's `projects.alp-sdk.west-commands` (when alp-sdk
#   is consumed as a Zephyr module).  This is a deliberate choice for
#   topdir/consumer symmetry, not a schema limitation: the workspace
#   now pins Zephyr v4.4.0 (see west.yml / README), so the earlier
#   v3.7-era note about module.yml's top-level `west-commands:` key no
#   longer applies.  See west.yml + scripts/west-commands.yml for the
#   wiring.
