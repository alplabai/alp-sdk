# SPDX-License-Identifier: Apache-2.0
# Zephyr module manifest — makes alp-sdk importable as a Zephyr module
# when added to a project's west.yml or via EXTRA_ZEPHYR_MODULES.
#
# See: https://docs.zephyrproject.org/latest/develop/modules.html
name: alp-sdk
build:
  cmake: zephyr
  kconfig: zephyr/Kconfig
  settings:
    # Expose dts/bindings/ to Zephyr's devicetree binding scanner so
    # boards / overlays can use compatible = "alp,pin-array".
    dts_root: .

# NOTE on `west alp-build`:
#   Zephyr v3.7's module.yml schema does NOT accept `west-commands:`
#   at the top level (that key was added to module.yml in a later
#   Zephyr release).  The command lives in `scripts/west-commands.yml`
#   and is surfaced via the manifest's `self.west-commands` (when
#   alp-sdk is the workspace topdir) or via the consuming project's
#   `projects.alp-sdk.west-commands` field in their own west.yml.
#   See west.yml + scripts/west-commands.yml for the wiring.
