# Shared AEN801 (E8, M55-HE) bench conf: RAM-console observability + DCACHE off.
#
# Add this to a bench app with, e.g.:
#     west build ... -- -DEXTRA_CONF_FILE=scripts/bench/aen/aen-bench-shared.conf
#
# The app UART is not on USB on this bench; the human reads 'ram_console_buf'
# over SWD, so the console must be the RAM buffer, NOT a UART.  CONFIG_DCACHE=n
# because the E8 D-cache maintenance loop hangs on this silicon.
CONFIG_ALP_SDK=y
CONFIG_CONSOLE=y
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
CONFIG_UART_CONSOLE=n
CONFIG_STDOUT_CONSOLE=y
CONFIG_DCACHE=n
