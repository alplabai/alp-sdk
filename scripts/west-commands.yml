# SPDX-License-Identifier: Apache-2.0
#
# Registers alp-sdk's west-extension commands with any Zephyr
# workspace that imports this repo as a module.  See
# zephyr/module.yml's `west-commands:` field for how it's surfaced.
#
# ADR-0020 Phase 4 (preview, this branch): the SDK-side executor and its
# build/flash/image/size/renode/clean commands were retired.  Only the
# read-only planner/emit + lock/migrate/quality commands remain.

west-commands:
  - file: scripts/west_commands/alp_lock.py
    commands:
      - name: alp-lock
        class: AlpLock
        help: Write or verify the project's alp.lock dependency lock
  - file: scripts/west_commands/alp_migrate.py
    commands:
      - name: alp-migrate
        class: AlpMigrate
        help: Version and migrate a project's board.yaml
  - file: scripts/west_commands/alp_quality.py
    commands:
      - name: alp-quality
        class: AlpQuality
        help: Run the quality-task registry for a profile (JSON/JUnit/SARIF)
  # Read-only inspector for the orchestrator's --emit seam (no build).
  - file: scripts/west_commands/alp_emit.py
    commands:
      - name: alp-emit
        class: AlpEmit
        help: Print a generated config artefact from board.yaml (no build)
