# Display stack for the E1M-X carrier RK055HDMIPI4MA0 panel on Display 1
# (himax HX8394-F over the V2N DSI, GPT PWM backlight, GD32-bridge GPIO expander
# for the panel-reset sideband).
#
CONFIG_DRM_PANEL_HIMAX_HX8394=y
CONFIG_BACKLIGHT_CLASS_DEVICE=y
CONFIG_BACKLIGHT_PWM=y
CONFIG_GPIO_GD32_BRIDGE=y
CONFIG_CRC_ITU_T=y

# No TOUCHSCREEN_GOODIX here: the GT911's bus (E1M I2C3) terminates at the
# GD32 IO-MCU -- no Linux master until the bridge I2C-proxy follow-up.
