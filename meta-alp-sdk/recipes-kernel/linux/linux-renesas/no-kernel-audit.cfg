# The BSP defconfig enables the kernel audit subsystem, but the image's
# systemd is built -AUDIT -- there is no userspace consumer.  The only
# observable effect is console spam on every boot/shutdown/login
# (audit: type=1334 BPF prog LOAD/UNLOAD, type=1006/1300/1327 records
# echoed to the serial console).  Disable it; AUDITSYSCALL falls away
# with it.  If a product ever needs auditing, re-enable together with
# a PACKAGECONFIG'd auditd, not alone.
# CONFIG_AUDIT is not set
