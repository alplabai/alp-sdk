# Trim EVK-reference-defconfig bloat that no E1M product uses.  Every
# option below was confirmed ENABLED from the 2026-06-12 V2M101 boot
# log (driver banners), and none has a consumer on any E1M SKU:
#
#   CONFIG_BTRFS_FS    "Btrfs loaded" -- rootfs is ext4 (Mender A/B);
#                      btrfs selects raid6_pq + xor_blocks, whose
#                      boot-time self-benchmarks cost ~0.6 s on every
#                      boot ("raid6: neonx8 gen() ..." x8 +
#                      "xor: measuring software checksum speed").
#   CONFIG_MEGARAID_SAS "megasas: 07.719.03.00-rc1" -- server RAID HBA
#                      on a SoM whose only PCIe device is the DX-M1.
#   CONFIG_E1000/E1000E Intel PCIe NICs; networking is the two
#                      on-module GbE MACs.
#   CONFIG_JFFS2_FS    raw-NOR fs; the xSPI NOR holds bl2+fip only.
#   CONFIG_NET_9P/9P_FS virtio 9p shares; no hypervisor use case.
#
# NFS client, CAN, and MD/device-mapper are deliberately NOT touched:
# NFS is used in dev workflows, CAN is a carrier feature (TCAN1044),
# and dm stays available for a future dm-verity rootfs.
# CONFIG_BTRFS_FS is not set
# CONFIG_MEGARAID_SAS is not set
# CONFIG_E1000 is not set
# CONFIG_E1000E is not set
# CONFIG_JFFS2_FS is not set
# CONFIG_NET_9P is not set
# CONFIG_9P_FS is not set
