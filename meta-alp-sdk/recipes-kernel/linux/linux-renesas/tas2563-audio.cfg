# ALP e1m-x carrier: TAS2563 smart-amp codec (2x U27/U28 on the carrier,
# on E1M_X_I2C0 @ 0x4D/0x4E, I2S0 via the TMUX1574 path-mux).
#
# The mainline ASoC `tas2562` driver covers the TAS2563; it is NOT enabled
# in the linux-renesas 6.1.141-cip43 (AI SDK platform 7.1 / BSP v6.30, kernel SHA 6717c06c)
# defconfig, so turn it on here.
#
# STATUS: this fragment pre-stages the codec driver. DT patch 0010 only
# DISABLES the EVK's DA7212 audio graph (&da7212/&rcar_sound/&sound_card)
# so it stops failing to probe; it does NOT add any ti,tas2563 node. The
# ti,tas2563 codec nodes + audio-graph-card land in a follow-up patch
# (0014, not yet merged). Until then this driver loads with no DT
# consumer (harmless no-op).
CONFIG_SND_SOC_TAS2562=y
