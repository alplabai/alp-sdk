# ALP production SSH hardening (installed only in alp-image-prod).
# Root is reachable over SSH by key ONLY -- the per-unit authorized key is
# installed at provisioning time (scripts/provision_som.py). There is no
# password to leak: console root login is locked (no debug-tweaks), and these
# directives forbid any password / empty-password / keyboard-interactive path.
PermitRootLogin prohibit-password
PasswordAuthentication no
PermitEmptyPasswords no
KbdInteractiveAuthentication no
