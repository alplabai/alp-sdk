# ALP watchdog policy -- runtime + reboot supervision via the CA55
# cluster's hardware watchdog (RZ/V2N wdt1, /dev/watchdog0).
#
# Before this drop-in the only watchdog activity in the whole power
# cycle was systemd-shutdown opportunistically arming the unconfigured
# 1-minute default to cover the final reboot(2) -- zero supervision
# during boot and runtime, so any kernel hang bricked the unit until a
# human pulled power.  With RuntimeWatchdogSec set, PID 1 arms the dog
# as soon as it starts and pets it at half the interval; a hard kernel
# hang now resets the board within 30 s, which is also what makes
# Mender A/B rollback meaningful on a wedged update.
#
# Mechanism notes:
#   - The rzv2h_wdt HARDWARE period is fixed at ~175 ms (16384 cycles
#     of 24 MHz/256; the driver has no .set_timeout).  The 30 s/60 s
#     figures below are kernel-emulated: the watchdog core re-pets the
#     HW dog from a kworker until the software timeout expires.
#   - CAVEAT (bench): halting the A55 cluster under a debugger stops
#     that kworker too, so the board resets within ~0.2 s of the halt
#     -- not 30 s.  If that bites a debug workflow, set
#     RuntimeWatchdogSec=0 in /etc/systemd/system.conf.d/ on the unit
#     (or move this package to the production image only).
#   - On r9a09g056 the WDT1-underflow -> reset routing
#     (CPG_ERRORRST_SEL2) is programmed by TF-A BL2, not by the kernel
#     (the DT lacks renesas,syscon-cpg-error-rst).  The supervision
#     guarantee therefore holds only with the ALP/BSP FIP, and the
#     hang-injection validation must run on the exact deployed FIP.

[Manager]
RuntimeWatchdogSec=30s
RebootWatchdogSec=60s
