# ALP production boot lockdown -- opt-in via ALP_PROD_BOOT = "1"
# (release-bundle builds only; dev/bench builds keep the open 2 s
# autoboot prompt and the verbose cmdline).
#
#   CONFIG_ALP_PROD_BOOT     production kernel cmdline (quiet, no
#                            earlycon, console= pinned) -- see patch
#                            0002 and board/renesas/rzv2n-dev/Kconfig.
#   CONFIG_BOOTDELAY=0       no interactive window: the keyed-autoboot
#                            poll runs a single pass, so no multi-char
#                            stop sequence can ever be entered.  THIS
#                            is what locks the console.
#   CONFIG_AUTOBOOT_KEYED    with an EMPTY stop string: strlen()==0
#                            never matches (autoboot.c len>0 guard),
#                            so an un-overridden build has no stop
#                            sequence at all.  The internal release
#                            pipeline overrides CONFIG_AUTOBOOT_STOP_STR
#                            per product (alp-sdk-internal,
#                            som-productization docs) to provide the
#                            service/RMA escape hatch -- keep product
#                            strings SHORT (the BOOTDELAY=0 window only
#                            reads what already sits in the 16-byte
#                            SCIF RX FIFO).  Never use \x escapes here:
#                            Kconfig passes them verbatim and C greedy
#                            hex parsing mangles them silently.
#
# KNOWN HOLE (deferred with the env-storage decision, see the
# bbappend): env-in-MMC loads before autoboot, and a saved env can
# override bootdelay/bootstopkey -- a root shell on the device can
# reopen the console via fw_setenv.  The production env story
# (ENV_IS_NOWHERE or CONFIG_ENV_WRITEABLE_LIST excluding
# bootdelay/bootstopkey*) must close this before shipped units rely on
# the lockdown.
CONFIG_ALP_PROD_BOOT=y
CONFIG_BOOTDELAY=0
CONFIG_AUTOBOOT=y
CONFIG_AUTOBOOT_KEYED=y
CONFIG_AUTOBOOT_FLUSH_STDIN=y
CONFIG_AUTOBOOT_PROMPT="Booting in %d s\n"
CONFIG_AUTOBOOT_STOP_STR=""
