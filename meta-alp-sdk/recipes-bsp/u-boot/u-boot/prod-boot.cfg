# ALP production boot lockdown -- opt-in via ALP_PROD_BOOT = "1"
# (release-bundle builds only; dev/bench builds keep the open 2 s
# autoboot prompt and the verbose cmdline).
#
#   CONFIG_ALP_PROD_BOOT     production kernel cmdline (quiet, no
#                            earlycon, console= pinned) -- see patch
#                            0002 and board/renesas/rzv2n-dev/Kconfig.
#   CONFIG_BOOTDELAY=0       no free interactive window on the console.
#   CONFIG_AUTOBOOT_KEYED    a service/RMA escape hatch still exists,
#                            but only with the product stop string.
#
# The real stop string is NOT in this public layer: the internal
# release pipeline overrides CONFIG_AUTOBOOT_STOP_STR per product
# (alp-sdk-internal, som-productization docs). The placeholder below
# makes an un-overridden prod build effectively locked.
CONFIG_ALP_PROD_BOOT=y
CONFIG_BOOTDELAY=0
CONFIG_AUTOBOOT=y
CONFIG_AUTOBOOT_KEYED=y
CONFIG_AUTOBOOT_FLUSH_STDIN=y
CONFIG_AUTOBOOT_PROMPT="Booting in %d s\n"
CONFIG_AUTOBOOT_STOP_STR="\x00ALP-UNSET-STOP-STR\x00"
