# Reproducible / traceable U-Boot version banner.
#
# The vendor rzv2n-dev_defconfig sets CONFIG_LOCALVERSION_AUTO=y, which
# appends `git describe --dirty` to the version -- and our U-Boot tree is
# ALWAYS dirty at build time (the DEEPX + production-boot patches are
# git-applied into the source tree), so the boot banner was
# "U-Boot 2024.07-gbcf29d98-dirty": a "-dirty" flag plus the upstream
# short SHA. Disable the auto git version and pin an explicit ALP
# localversion. The release pipeline can override CONFIG_LOCALVERSION
# with the signed-bundle version for full traceability.
# CONFIG_LOCALVERSION_AUTO is not set
CONFIG_LOCALVERSION="-alp"
