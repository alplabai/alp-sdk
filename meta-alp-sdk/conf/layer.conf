# SPDX-License-Identifier: Apache-2.0
# meta-alp-sdk: Yocto layer for the ALP SDK runtime + chips +
# examples + ROS nodes on the V2N / V2N-M1 / i.MX 93 SoM family.

BBPATH .= ":${LAYERDIR}"

BBFILES += "${LAYERDIR}/recipes-*/*/*.bb       \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "alp-sdk"
BBFILE_PATTERN_alp-sdk = "^${LAYERDIR}/"
BBFILE_PRIORITY_alp-sdk = "8"

LAYERSERIES_COMPAT_alp-sdk = "kirkstone scarthgap"

LAYERDEPENDS_alp-sdk = "core openembedded-layer meta-ros2-humble"

# Optional vendor layers.  Builds that only target one family can
# drop the others from bblayers.conf.
#
# Renesas RZ/V2N (covers e1m-v2n101-a55 + e1m-v2n102-a55 +
# e1m-v2m101-a55 + e1m-v2m102-a55):
#   `meta-renesas` is the canonical RZ base BSP.  The four
#   `meta-rz-features/*` sublayers come bundled together inside
#   the RZ/V2N AI SDK 7.10 BSP tarball (see README.md).
#
# DEEPX DX-M1 (covers e1m-v2m101-a55 + e1m-v2m102-a55):
#   `meta-deepx` carries the DX-M1 kernel module + userspace
#   runtime recipes.  Source at github.com/DEEPX-AI/meta-deepx-m1.
#
# NXP i.MX 93 (covers e1m-nx9101-a55):
#   `meta-imx` is the canonical i.MX BSP.
#
# Mender OTA (covers every machine when OTA is opted in):
#   `meta-mender-core` provides the .mender artefact generator
#   + A/B rootfs partitioning + the on-target Mender client.
#   Builds that don't ship OTA can drop it from bblayers.conf;
#   the meta-alp-sdk recipes parse cleanly without it.  See
#   conf/distro/include/mender.inc + README.md for the wiring.
LAYERRECOMMENDS_alp-sdk = " \
    meta-renesas              \
    meta-rz-graphics          \
    meta-rz-drpai             \
    meta-rz-opencva           \
    meta-rz-codecs            \
    meta-econsys              \
    meta-deepx                \
    meta-imx                  \
    meta-mender-core          \
"

LAYERVERSION_alp-sdk = "2"
