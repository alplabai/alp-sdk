# SPDX-License-Identifier: Apache-2.0
# meta-alp-sdk: Yocto layer for the Alp SDK runtime + chips +
# examples + ROS nodes on the V2N / V2N-M1 / i.MX 93 SoM family.

BBPATH .= ":${LAYERDIR}"

# Two-level recipes (recipes-<category>/<pkg>/<recipe>.bb) plus flat
# recipes directly under a category dir (e.g. recipes-images/*.bb for
# image recipes) -- the latter pattern is what makes alp-image-edge.bb
# discoverable.
BBFILES += "${LAYERDIR}/recipes-*/*.bb         \
            ${LAYERDIR}/recipes-*/*/*.bb       \
            ${LAYERDIR}/recipes-*/*.bbappend   \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

# Bbappends for recipes that live in an OPTIONAL vendor layer go under
# dynamic-layers/<collection>/ and are pulled in via BBFILES_DYNAMIC, so they
# are parsed ONLY when that collection is in bblayers.  A plain .bbappend with
# no matching recipe is a hard parse error, so this keeps builds that drop the
# vendor layer clean.  kernel-module-mali (the Mali-G31 GPU DDK) lives in the
# RZ AI SDK's meta-rz-graphics; our GPU clock-ownership fix only applies there.
BBFILES_DYNAMIC += " \
    meta-rz-graphics:${LAYERDIR}/dynamic-layers/meta-rz-graphics/recipes-*/*/*.bbappend \
"

BBFILE_COLLECTIONS += "alp-sdk"
BBFILE_PATTERN_alp-sdk = "^${LAYERDIR}/"
BBFILE_PRIORITY_alp-sdk = "8"

LAYERSERIES_COMPAT_alp-sdk = "kirkstone scarthgap"

# Hard layer deps only.  meta-ros2-humble moved to LAYERRECOMMENDS so
# non-ROS images (e.g. core-image-minimal) build without the ROS layer.
LAYERDEPENDS_alp-sdk = "core openembedded-layer"

# Optional vendor layers.  Builds that only target one family can
# drop the others from bblayers.conf.
#
# Renesas RZ/V2N (covers e1m-v2n101-a55 + e1m-v2n102-a55 +
# e1m-v2m101-a55 + e1m-v2m102-a55):
#   `meta-renesas` is the canonical RZ base BSP.  The four
#   `meta-rz-features/*` sublayers come bundled together inside
#   the RZ/V2N AI SDK BSP v6.30 Source Code package (see README.md).
#
# DEEPX DX-M1 (covers e1m-v2m101-a55 + e1m-v2m102-a55):
#   `meta-deepx` carries the DX-M1 kernel module + userspace
#   runtime recipes.  Source at github.com/DEEPX-AI/meta-deepx-m1.
#
# NXP i.MX 93 (covers e1m-nx9101-a55):
#   `meta-imx` is the canonical i.MX BSP.
#
# Mender OTA (covers every machine when OTA is opted in):
#   `meta-mender-core` provides the .mender artefact generator
#   + A/B rootfs partitioning + the on-target Mender client.
#   Builds that don't ship OTA can drop it from bblayers.conf;
#   the meta-alp-sdk recipes parse cleanly without it.  See
#   conf/distro/include/mender.inc + README.md for the wiring.
#
# ROS 2 (covers images that ship the alp-sdk ROS nodes):
#   `meta-ros2-humble` provides rclcpp + the ROS message packages
#   pulled into alp-image-edge.  Soft dep, so non-ROS images build
#   without it -- those builds must also mask the ROS recipes
#   (BBMASK += "/meta-alp-sdk/recipes-ros/"), and likewise
#   "/meta-alp-sdk/recipes-deepx/" on non-DEEPX builds, since those
#   recipes inherit vendor classes from their layers.
LAYERRECOMMENDS_alp-sdk = " \
    meta-ros2-humble          \
    meta-renesas              \
    meta-rz-graphics          \
    meta-rz-drpai             \
    meta-rz-opencva           \
    meta-rz-codecs            \
    meta-econsys              \
    meta-deepx                \
    meta-imx                  \
    meta-mender-core          \
"

LAYERVERSION_alp-sdk = "2"
