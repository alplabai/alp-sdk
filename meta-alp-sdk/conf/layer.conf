# SPDX-License-Identifier: Apache-2.0
# meta-alp-sdk: Yocto layer for the ALP SDK runtime + ROS nodes on
# the V2N + V2N-M1 SoM family.

BBPATH .= ":${LAYERDIR}"

BBFILES += "${LAYERDIR}/recipes-*/*/*.bb       \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "alp-sdk"
BBFILE_PATTERN_alp-sdk = "^${LAYERDIR}/"
BBFILE_PRIORITY_alp-sdk = "8"

LAYERSERIES_COMPAT_alp-sdk = "kirkstone scarthgap"

LAYERDEPENDS_alp-sdk = "core openembedded-layer meta-ros2-humble"

# Optional: depend on Renesas + DEEPX layers when targeting V2N.
LAYERRECOMMENDS_alp-sdk = "meta-renesas meta-deepx"

LAYERVERSION_alp-sdk = "1"
