# SPDX-License-Identifier: Apache-2.0
#
# Alp SDK distro -- rebrands the Renesas "rz-vlp" VLP distro so shipped images
# carry an Alp identity instead of the upstream "Poky (Yocto Project Reference
# Distro)" reference-distro banner (which also tags itself as not-for-production
# in /etc/issue + /etc/os-release + the serial login banner).
#
# It owns IDENTITY + VERSIONING only: it `require`s rz-vlp.conf and inherits its
# entire feature set (Wayland/OpenGL, the Renesas graphics + codec stack, Mender
# OTA, machine tuning), changing NO DISTRO_FEATURES (those are build-wide and
# shared by both alp-image-edge and alp-image-prod; production-specific
# hardening lives in the prod IMAGE recipe, not here). The version/provenance
# model below is the single place the Alp product version and the attributed
# upstream Renesas BSP version are declared.
#
# Select it from the build (local.conf / the alp build template):
#   DISTRO = "alp"
#
# Copyright (C) 2026 Alp Lab AB

require conf/distro/rz-vlp.conf

# ROS 2 Humble build config for the alp-ros feature set: masks the
# cmake_qt5 (meta-qt5) GUI/sim recipes we don't ship and drops the
# proprietary Connext RMW backend. See the include header.
require conf/distro/include/ros2-humble-build.inc

DISTRO = "alp"
DISTRO_NAME = "Alp SDK"
# Headline version = the Alp SDK product release, NOT the Renesas BSP version.
# Tracks the alp-sdk release tag; bump on release (see the cutting-a-release
# flow). The upstream Renesas BSP version is carried separately as attributed
# provenance below (ALP_BSP_*), so "Alp SDK 0.7.0" never collides with the
# vendor's "BSP 6.30".
DISTRO_VERSION = "0.7.0"

# Provenance, surfaced in /etc/os-release (vendor-prefixed per the os-release
# spec). Three distinct facts, never collapsed: the Alp product version, the
# upstream BSP (attributed to its vendor), and the Yocto lineage. When the BSP
# bumps -- or a new SoM uses a different SoC vendor's BSP (Alif AEN, NXP i.MX) --
# only these lines change; the Alp version line stays coherent.
ALP_SDK_VERSION   = "${DISTRO_VERSION}"
ALP_BSP_VENDOR    = "Renesas"
ALP_BSP_NAME      = "RZ/V2N AI SDK BSP"
ALP_BSP_VERSION   = "6.30"
ALP_YOCTO_RELEASE = "scarthgap"
OS_RELEASE_FIELDS:append = " ALP_SDK_VERSION ALP_BSP_VENDOR ALP_BSP_NAME ALP_BSP_VERSION ALP_YOCTO_RELEASE"
# No codename: this distro is shared by the dev (alp-image-edge) and production
# (alp-image-prod) images, and os-release is built once from the distro-wide
# value -- it cannot differ per image. A codename like "edge" would brand the
# PRODUCTION rootfs "Alp SDK 0.7.0 (edge)", reintroducing the dev/prod confusion
# this rebrand exists to remove. The image NAME conveys posture; the banner
# stays "Alp SDK 0.7.0".
DISTRO_CODENAME = ""
# poky's os-release appends " (${DISTRO_CODENAME})" to VERSION whenever the
# variable merely EXISTS in the datastore (an empty codename gives the ugly
# "Alp SDK 0.7.0 ()"). Pin os-release's VERSION to the bare DISTRO_VERSION (scoped
# to this recipe, so only os-release is affected) -> clean "Alp SDK 0.7.0".
VERSION:pn-os-release = "${DISTRO_VERSION}"
SDK_VENDOR = "-alpsdk"
SDKPATH = "/opt/${DISTRO}/${SDK_VERSION}"
MAINTAINER = "Alp Lab AB <contact@alplab.ai>"

# Default hostname (overridable per build/image). base-files writes ${hostname}
# to /etc/hostname; without this it defaults to ${MACHINE}.
hostname ?= "alp-e1m"
