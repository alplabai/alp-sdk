#@TYPE: Machine
#@NAME: E1M-V2N102 A55 cluster (V2N variant)
#@DESCRIPTION: Alp Lab E1M-V2N102 SoM -- second V2N base variant
#              (Renesas RZ/V2N quad-A55 + M33 + DRP-AI3).  Differs
#              from V2N101 in carrier wiring / DDR config per the
#              hand-written HW config (TBD pending the user's
#              authoritative writeup).  This MACHINE targets the
#              A55 Linux cluster; the M33 system core builds via
#              Zephyr (see topology.m33_sm.board in the SoM preset).

# BSP v6.30 derives carriers from the full EVK machine (the old
# rzv2n.inc include was dropped); override only what differs below.
require conf/machine/rzv2n-evk.conf

MACHINEOVERRIDES =. "e1m-v2n102-a55:e1m-v2n102:e1m-v2n101-a55:e1m-v2n101:"
MACHINE_FEATURES += "alp-sdk e1m v2n"

PREFERRED_PROVIDER_virtual/kernel = "linux-renesas"

IMAGE_INSTALL:append = " alp-sdk ros-humble-rclcpp ros-humble-sensor-msgs"

# Inference runtime selection is silicon-determined (same as
# V2N101 -- the alp-sdk recipe's DEPENDS:append:e1m-v2n102 installs
# the DRP-AI3 userspace).  No build-time backend pin.

ALP_BOOT_DEVICE ?= "emmc"

# Carrier DTB: TBD pending the V2N102 carrier writeup.  Default
# falls back to the V2N101 DTB so the build stays reproducible
# without a V2N102-specific overlay; override when the carrier
# DTB lands.
# Carrier device tree. TODO: V2N102 is a different memory tier -- it
# reuses the V2N101 board dtb for now; create e1m-v2n102-x-evk.dts with
# the correct memory@ size once the V2N102 DDR map is confirmed.
# NOTE: the U-Boot bootcmd must load this filename (set fdtfile).
KERNEL_DEVICETREE = "renesas/e1m-v2n101-x-evk.dtb"

# OTA via Mender (opt-in).
#
#     require conf/distro/include/mender.inc
