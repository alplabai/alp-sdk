#@TYPE: Machine
#@NAME: E1M-V2N101 (V2N base)
#@DESCRIPTION: ALP Lab E1M-V2N101 SoM (Renesas RZ/V2N quad-A55 +
#              M33 + DRP-AI3) on the E1M-X-EVK carrier.

require conf/machine/include/rzv2n.inc

MACHINEOVERRIDES =. "e1m-v2n101:"

# Bootloader + kernel + dtb come straight from meta-renesas; we
# just add the alp-sdk overlays + the ROS 2 base packages.
PREFERRED_PROVIDER_virtual/kernel = "linux-renesas"

IMAGE_INSTALL:append = " alp-sdk ros-humble-rclcpp ros-humble-sensor-msgs"

# DEEPX runtime is NOT installed on V2N101 -- the SoM has no DEEPX
# silicon.  V2M101 (separate machine conf) adds dx-rt.

# Carrier overlay: E1M-X-EVK exposes USB-CDC console + dual
# Ethernet + 2x mPCIe slots.
KERNEL_DEVICETREE:append = " renesas/e1m-x-evk.dts"
