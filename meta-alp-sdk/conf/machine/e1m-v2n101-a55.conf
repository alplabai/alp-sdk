#@TYPE: Machine
#@NAME: E1M-V2N101 A55 cluster (V2N base)
#@DESCRIPTION: Alp Lab E1M-V2N101 SoM (Renesas RZ/V2N quad-A55 +
#              M33 + DRP-AI3) on the E1M-X-EVK carrier.  This
#              MACHINE targets the A55 Linux cluster; the M33
#              system core builds via Zephyr (see the SoM preset's
#              topology.m33_sm.board).

# BSP v6.30 derives carriers from the full EVK machine (the old
# rzv2n.inc include was dropped); override only what differs below.
require conf/machine/rzv2n-evk.conf

MACHINEOVERRIDES =. "e1m-v2n101-a55:e1m-v2n101:"
MACHINE_FEATURES += "alp-sdk e1m v2n"

# Bootloader + kernel + dtb come straight from meta-renesas; we
# just add the alp-sdk overlays + the ROS 2 base packages.
PREFERRED_PROVIDER_virtual/kernel = "linux-renesas"

IMAGE_INSTALL:append = " alp-sdk ros-humble-rclcpp ros-humble-sensor-msgs"

# DEEPX runtime is NOT installed on V2N101 -- the SoM has no DEEPX
# silicon.  V2M101 / V2M102 (sibling machine confs) add dx-rt.

# Inference runtime selection is silicon-determined -- the alp-sdk
# recipe's DEPENDS:append:e1m-v2n101 = " drpai-driver" installs the
# DRP-AI3 userspace.  Apps pick at runtime via alp_inference_open();
# customer cannot pin a backend at build time.

# Boot media on the V2N101 SoM is eMMC by default; SD-card boot via
# the EVK's microSD slot is supported but not the default.
ALP_BOOT_DEVICE ?= "emmc"

# Carrier device tree: dedicated board dtb composed from the SoC dtsi +
# SoM dtsi + E1M-X-EVK carrier dtsi (meta-alp-sdk/recipes-kernel/linux).
# Override (not append) so only the ALP board dtb is built, not the EVK's.
# NOTE: the U-Boot bootcmd must load this filename (set fdtfile) instead
# of the stock renesas/r9a09g056n48-rzv2n-evk.dtb.
KERNEL_DEVICETREE = "renesas/e1m-v2n101-x-evk.dtb"

# OTA via Mender (opt-in).  Uncomment to inherit Mender image
# generation + A/B rootfs partitioning.  Requires meta-mender-core
# in bblayers.conf; reference flow in docs/ota.md.  Production
# fleets MUST also override MENDER_SERVER_URL + MENDER_TENANT_TOKEN
# in local.conf.
#
#     require conf/distro/include/mender.inc
