#@TYPE: Machine
#@NAME: E1M-AEN701 A32 cluster (Alif Ensemble E7)
#@DESCRIPTION: Alp Lab E1M-AEN701 SoM (Alif Ensemble E7: dual
#              Cortex-A32 + Cortex-M55 HP/HE + 2x Ethos-U55) on the
#              E1M EVK.  This MACHINE targets the A32 application
#              cluster (Linux); the two M55 system cores build via
#              Zephyr (see the SoM preset's topology.m55_hp /
#              topology.m55_he boards).
#
#              Derives from the real Alif BSP (github.com/alifsemi/
#              meta-alif-ensemble) by `require`-ing its E7 machine and
#              overriding the Alp-Lab-carrier specifics.  NOTE: E7 is
#              deprioritised both ways -- Alp Lab leads with AEN801/E8,
#              and upstream Alif demotes E7 on the scarthgap branch
#              (only `devkit-e7.conf.orig` remains; the active machines
#              are devkit-e6 / devkit-e8 / appkit-e6 / appkit-e8).  The
#              full devkit-e7.conf lives on the older `devkit-ex-b0`
#              branch.  Kept here as the reference E7 carrier path; if
#              E7 is never produced this MACHINE can be dropped.
#
#              SKELETON: carrier dtb, TF-A platform/memory map, and boot
#              media are Alp-Lab-specific and marked "# TBD" pending the
#              AEN HW config.

# Inherit the upstream Alif E7 DevKit machine, then override below.  Add
# meta-alif-ensemble to bblayers.conf first and pick the branch that
# still carries a parseable E7 machine (devkit-ex-b0: conf/machine/
# devkit-e7.conf -- scarthgap keeps only devkit-e7.conf.orig).  Until the
# layer is vendored this require has no target and the MACHINE will not
# parse -- intentional.
#require conf/machine/devkit-e7.conf        # meta-alif-ensemble @devkit-ex-b0

# ---- Alp-Lab E1M-AEN701 carrier overrides ----

MACHINEOVERRIDES =. "e1m-aen701-a32:e1m-aen701:e1m-e7:e1m:"
MACHINE_FEATURES += "alp-sdk e1m aen701 ethos-u55"

# Carrier device tree: a dedicated board dtb composed from the Alif E7
# SoC dtsi + the E1M SoM dtsi + the E1M-EVK carrier dtsi.  Overrides the
# Alif reference dtb (devkit-e7.dtb).
# TBD(alif-hw-config): the carrier .dts is Alp-Lab-authored, pending the
# AEN HW config.
#KERNEL_DEVICETREE = "alif/ensemble/e1m/e1m-aen701.dtb"

# Trusted Firmware-A platform + memory map.  The Alif E7 base uses
# TF-A_PLATFORM "devkit_e7"; the E1M carrier reuses TF-A but its memory
# layout is HW-config-determined.
# TBD(alif-hw-config): confirm TF-A_PLATFORM + the carrier memory map.

# Serial console + boot media inherit the Alif E7 defaults (115200;ttyS0;
# OSPI via the base's OSPI_BOOT switches).  TBD(alif-hw-config): confirm
# the E1M carrier routing before relying on the inherited values.

# Install the alp-sdk runtime alongside the ROS 2 base packages,
# mirroring the other A-cluster machines.  AEN701 carries no DEEPX /
# DRP-AI silicon, so no vendor NPU runtime is installed here -- the
# Ethos-U path lives inside the alp-sdk library.
IMAGE_INSTALL:append = " alp-sdk rclcpp sensor-msgs"

# Inference runtime selection is silicon-determined.  The SoM preset
# (metadata/e1m_modules/E1M-AEN701.yaml) declares preferred_backend
# ethos_u / variant u55; E7 carries two Ethos-U55s (NPU-HP + NPU-HE)
# and no U85.  The alp-sdk library compiles the <alp/inference.h>
# dispatcher; apps pick per-handle at runtime via alp_inference_open().
# No build-time backend pin.

# OTA via Mender (opt-in).  Uncomment to inherit Mender image
# generation + A/B rootfs partitioning.  Requires meta-mender-core
# in bblayers.conf; reference flow in docs/ota.md.
#
#     require conf/distro/include/mender.inc
