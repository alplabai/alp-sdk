#@TYPE: Machine
#@NAME: E1M-AEN701 A32 cluster (Alif Ensemble E7)
#@DESCRIPTION: Alp Lab E1M-AEN701 SoM (Alif Ensemble E7: dual
#              Cortex-A32 + Cortex-M55 HP/HE + 2x Ethos-U55) on the
#              E1M EVK.  This MACHINE targets the A32 application
#              cluster (Linux); the two M55 system cores build via
#              Zephyr (see the SoM preset's topology.m55_hp /
#              topology.m55_he boards).
#
#              SKELETON grounded on the real Alif BSP (github.com/
#              alifsemi/meta-alif-ensemble, branch devkit-ex-b0) -- the
#              BSP that ships the Ensemble machine confs, TF-A, and
#              Linux-kernel recipes.  The public BSP includes an E7
#              machine (conf/machine/devkit-e7.conf), so this E1M-AEN701
#              carrier follows it directly; only the Alp-Lab-carrier
#              specifics (board dtb, TF-A platform + memory map, boot
#              media) stay "# TBD" pending the AEN HW config.  NOTE:
#              meta-alif-ensemble declares LAYERSERIES_COMPAT "warrior
#              zeus" (Yocto 2019) vs alp-sdk's scarthgap -- folding it in
#              needs a compat bump / forward-port (see docs/bring-up-aen.md).
#              N.B. AEN701/E7 is deprioritised vs AEN801/E8 (see the
#              project note); kept as the BSP-complete reference path.

# Wire in the Alif BSP machine include once meta-alif-ensemble is added
# to bblayers.conf (and to LAYERDEPENDS in conf/layer.conf).  The Alif
# Ensemble machine confs are standalone -- they only `require` the
# CPU-tune include below (devkit-e7.conf requires
# conf/machine/include/tune-cortex-a32.inc), so an E1M-AEN701 carrier
# either requires that tune include + redeclares the devkit-e7 settings,
# or requires a refactored-shared Ensemble-E7 base if Alif provides one.
# With nothing required this MACHINE has no kernel/bootloader provider
# and will NOT parse to a buildable config -- intentional until the BSP
# layer is vendored.
#require conf/machine/include/tune-cortex-a32.inc   # from meta-alif-ensemble

MACHINEOVERRIDES =. "e1m-aen701-a32:e1m-aen701:e1m-e7:e1m:"
MACHINE_FEATURES += "alp-sdk e1m aen701 ethos-u55"

# CPU tune.  The A32 application cluster is 2x Cortex-A32 (Armv8-A,
# AArch32) -- see metadata/socs/alif/ensemble/e7.json cores[].type
# "cortex-a32".  This is the value the Alif BSP's devkit-e7.conf uses
# (cortexa32hf-neon, from meta-alif-ensemble's tune-cortex-a32.inc).
# Left as ?= so the BSP tune include (the require above) can own it.
DEFAULTTUNE ?= "cortexa32hf-neon"

# Kernel provider + image type, from the Alif BSP (meta-alif-ensemble
# devkit-e7.conf + recipes-kernel/linux/linux-alif.inc).  Commented until
# the layer is vendored so this skeleton doesn't pin a recipe absent from
# every parsed layer.  The Alif E7 devkit uses
# devkit_e7_unicore_defconfig (SMP=0) / devkit_e7_defconfig and the
# devkit-e7.dtb; the E1M carrier dtb replaces the reference dtb.
#PREFERRED_PROVIDER_virtual/kernel_forcevariable = "linux-alif"
#KERNEL_IMAGETYPE = "xipImage"
#KBUILD_DEFCONFIG = "devkit_e7_unicore_defconfig"   # reference; carrier may fork

# Carrier device tree: a dedicated board dtb composed from the SoC dtsi +
# SoM dtsi + E1M-EVK carrier dtsi.  Override (not append) so only the ALP
# board dtb is built, not the BSP reference-board dtb (devkit-e7.dtb).
# TBD(alif-hw-config): the carrier .dts is Alp-Lab-authored, pending the
# AEN HW config.
#KERNEL_DEVICETREE = "e1m-aen701-evk.dtb"

# Trusted Firmware-A: provided by meta-alif-ensemble
# (recipes-bsp/trusted-firmware-a, port github.com/alifsemi/
# trusted-firmware-a_alif).  devkit-e7 uses TF-A_PLATFORM "devkit_e7"
# with a full BL32/BL33 + DTB memory-map block.
# TBD(alif-hw-config): set TF-A_PLATFORM + the carrier memory map.
#TF-A_PLATFORM = "<e1m_aen701>"

# Serial console: the Alif BSP devkit-e7 uses "115200;ttyS0" for the A32
# debug UART; carry that as the expected default.
# TBD(alif-hw-config): confirm the E7 carrier routes the same UART to the
# EVK debug connector before relying on ttyS0.
#SERIAL_CONSOLES ?= "115200;ttyS0"

# Boot media.  TBD(alif-hw-config): the AEN module boots from on-die
# MRAM + an external xSPI (E7 uses OctalSPI) flash; whether the EVK
# images boot from xSPI, SD, or eMMC is set by the HW config + the Alif
# BSP's OSPI_BOOT / WIC defaults (cf. devkit-e7.conf's OSPI_BOOT switches).
#ALP_BOOT_DEVICE ?= "xspi"

# Install the alp-sdk runtime alongside the ROS 2 base packages,
# mirroring the other A-cluster machines.  AEN701 carries no DEEPX /
# DRP-AI silicon, so no vendor NPU runtime is installed here -- the
# Ethos-U path lives inside the alp-sdk library.
IMAGE_INSTALL:append = " alp-sdk rclcpp sensor-msgs"

# Inference runtime selection is silicon-determined.  The SoM preset
# (metadata/e1m_modules/E1M-AEN701.yaml) declares preferred_backend
# ethos_u / variant u55; E7 carries two Ethos-U55s (NPU-HP + NPU-HE)
# and no U85.  The alp-sdk library compiles the <alp/inference.h>
# dispatcher; apps pick per-handle at runtime via alp_inference_open().
# No build-time backend pin.
# TBD(alif-bsp): if the Alif Ensemble Ethos-U firmware + Vela driver
# library ship as separate BSP recipes, wire their PREFERRED_PROVIDERs
# here (cf. e1m-nx9101-a55.conf's ethosu-firmware / ethosu-driver-library).

# OTA via Mender (opt-in).  Uncomment to inherit Mender image
# generation + A/B rootfs partitioning.  Requires meta-mender-core
# in bblayers.conf; reference flow in docs/ota.md.
#
#     require conf/distro/include/mender.inc
