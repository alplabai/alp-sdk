#@TYPE: Machine
#@NAME: E1M-V2M102 A55 cluster (V2N + DEEPX DX-M1, variant)
#@DESCRIPTION: ALP Lab E1M-V2M102 SoM -- second V2M variant (V2N
#              base + on-module DEEPX DX-M1 NPU over PCIe).
#              Differs from V2M101 per the hand-written HW config
#              (TBD pending the user's authoritative writeup).
#              A55 Linux cluster MACHINE; M33 system core builds
#              via Zephyr.

require conf/machine/include/rzv2n.inc

MACHINEOVERRIDES =. "e1m-v2m102-a55:e1m-v2m102:e1m-v2m101-a55:e1m-v2m101:e1m-v2n101-a55:e1m-v2n101:"
MACHINE_FEATURES += "alp-sdk e1m v2n deepx-dxm1"

PREFERRED_PROVIDER_virtual/kernel = "linux-renesas"

IMAGE_INSTALL:append = " \
    alp-sdk                       \
    dx-rt                         \
    kernel-module-dx-rt-npu       \
    ros-humble-rclcpp             \
    ros-humble-sensor-msgs        \
    ros-humble-vision-msgs        \
"

# Inference runtime selection is silicon-determined (same as
# V2M101 -- DRP-AI3 + DEEPX DX-M1 both compile in; app picks
# per-handle at runtime).  No build-time backend pin.

ALP_BOOT_DEVICE ?= "emmc"

# Carrier DTB: TBD pending the V2M102 writeup.  Default falls
# back to the V2M101 DTB until the V2M102-specific overlay lands.
KERNEL_DEVICETREE:append = " renesas/e1m-x-evk-v2m.dts"

# OTA via Mender (opt-in).
#
#     require conf/distro/include/mender.inc
