#@TYPE: Machine
#@NAME: E1M-V2M102 A55 cluster (V2N + DEEPX DX-M1, variant)
#@DESCRIPTION: Alp Lab E1M-V2M102 SoM -- second V2M variant (V2N
#              base + on-module DEEPX DX-M1 NPU over PCIe).
#              Differs from V2M101 in DRAM density only (the V2N
#              family shares one PCB). A55 Linux cluster MACHINE;
#              M33 system core builds via Zephyr.

# BSP v6.30 derives carriers from the full EVK machine (the old
# rzv2n.inc include was dropped); override only what differs below.
require conf/machine/rzv2n-evk.conf

MACHINEOVERRIDES =. "e1m-v2m102-a55:e1m-v2m102:e1m-v2m101-a55:e1m-v2m101:e1m-v2n101-a55:e1m-v2n101:"
MACHINE_FEATURES += "alp-sdk e1m v2n deepx-dxm1"

# STATUS: expected buildable (not yet baked or booted as this MACHINE).
# V2M102 reuses the V2M101 carrier dtb BY DESIGN: the V2N's DDR
# connections are identical on V2N and V2M boards (maintainer,
# 2026-06-12), and U-Boot overwrites the kernel dtb's /memory node
# anyway (ARCH_FIXUP_FDT_MEMORY) with the size from its OWN control DT
# inside the FIP -- so no per-tier kernel dts exists or is needed.
# TODO(firmware-pack): before V2M102 ships, its per-SKU FIP must carry
# the 64 Gbit DRAM size (U-Boot control dts memory@ node + TF-A DDR
# parameters); the shared FIP is currently built for the 8 GiB tier.
# The DEEPX dx-rt runtime remains license-gated
# (recipes-deepx/dx-rt/dx-rt_2.4.bb), opt-in via ALP_ENABLE_DEEPX_DXM1.

PREFERRED_PROVIDER_virtual/kernel = "linux-renesas"

# Runtime payload (alp-sdk + opt-in ROS) is image-owned, not set here; this
# machine adds only the silicon-gated DEEPX runtime below.

# DEEPX DX-M1 userspace runtime + PCIe kernel driver. GATED behind an
# explicit opt-in because dx-rt is license-gated + blacklisted (it has no
# redistributable source/LICENSE in this public layer). Set
# ALP_ENABLE_DEEPX_DXM1 = "1" in local.conf only after you have provided a
# licensed dx_rt source + sha256 + LICENSE and cleared SKIP_RECIPE[dx-rt].
ALP_ENABLE_DEEPX_DXM1 ?= "0"
IMAGE_INSTALL:append = "${@' dx-rt kernel-module-dx-rt-npu' if d.getVar('ALP_ENABLE_DEEPX_DXM1') == '1' else ''}"

# Inference runtime selection is silicon-determined (same as
# V2M101 -- DRP-AI3 + DEEPX DXM1 both compile in; app picks
# per-handle at runtime).  No build-time backend pin.

ALP_BOOT_DEVICE ?= "emmc"

# Carrier DTB: shared with V2M101 by design -- one family PCB, identical
# DDR connections, and DRAM size comes from the firmware handoff, so a
# memory-tier variant needs no dts of its own.
# NOTE: the U-Boot bootcmd must load this filename (set fdtfile).
KERNEL_DEVICETREE = "renesas/e1m-v2m101-x-evk.dtb"

# OTA via Mender (opt-in).
#
#     require conf/distro/include/mender.inc
