#@TYPE: Machine
#@NAME: E1M-AEN801 A32 cluster (Alif Ensemble E8)
#@DESCRIPTION: Alp Lab E1M-AEN801 SoM (Alif Ensemble E8: dual
#              Cortex-A32 + Cortex-M55 HP/HE + Ethos-U85 + 2x
#              Ethos-U55, plus ISP + JPEG encoder) on the E1M EVK.
#              This MACHINE targets the A32 application cluster
#              (Linux); the two M55 system cores build via Zephyr
#              (see the SoM preset's topology.m55_hp / topology.m55_he
#              boards).
#
#              Derives from the REAL Alif BSP: github.com/alifsemi/
#              meta-alif-ensemble, branch **scarthgap** (matches
#              alp-sdk's Yocto series; LAYERSERIES_COMPAT = scarthgap),
#              which ships a full E8 machine -- conf/machine/devkit-e8.conf
#              (+ appkit-e8.conf).  This carrier MACHINE `require`s that
#              base and overrides only the Alp-Lab-carrier specifics.
#              The Alif E8 reference values it inherits: cortexa32 tune,
#              PREFERRED_PROVIDER_virtual/kernel = linux-alif, xipImage,
#              devkit_e8_defconfig + devkit-e8.dtb, TF-A, ttyS0, SMP=1.
#
#              SKELETON: still pending the Alif HW config -- the carrier
#              dtb, TF-A platform/memory map, and boot media are
#              Alp-Lab-specific and marked "# TBD" per the no-invented-
#              values rule.  (E8 silicon is also preliminary per
#              E1M-AEN801.yaml status.preliminary = true.)

# Inherit the upstream Alif E8 DevKit machine, then override below.
# Add meta-alif-ensemble (branch scarthgap) to bblayers.conf + to
# LAYERDEPENDS in conf/layer.conf first; until it is vendored this
# require has no target and the MACHINE will not parse -- intentional.
#require conf/machine/devkit-e8.conf       # meta-alif-ensemble @scarthgap

# ---- Alp-Lab E1M-AEN801 carrier overrides ----

MACHINEOVERRIDES =. "e1m-aen801-a32:e1m-aen801:e1m-e8:e1m:"
MACHINE_FEATURES += "alp-sdk e1m aen801 ethos-u85 ethos-u55"

# Carrier device tree: a dedicated board dtb composed from the Alif E8
# SoC dtsi + the E1M SoM dtsi + the E1M-EVK carrier dtsi.  Overrides the
# Alif reference dtb (devkit-e8.dtb / alif/ensemble/devkit/...).
# TBD(alif-hw-config): the carrier .dts is Alp-Lab-authored, pending the
# AEN HW config.
#KERNEL_DEVICETREE = "alif/ensemble/e1m/e1m-aen801.dtb"

# Trusted Firmware-A platform + memory map.  The Alif E8 base uses
# TF-A_PLATFORM "devkit_e7" with a BL32/BL33 + DTB memory map; the E1M
# carrier reuses TF-A but its DDR/MRAM layout is HW-config-determined.
# TBD(alif-hw-config): confirm TF-A_PLATFORM + the carrier memory map.

# Serial console + boot media inherit the Alif E8 defaults (ttyS0; OSPI/
# HYPERRAM via the base's OSPI_BOOT switches).  TBD(alif-hw-config):
# confirm the E1M carrier routes the same debug UART + boot flash before
# relying on the inherited values.

# Install the alp-sdk runtime alongside the ROS 2 base packages,
# mirroring the other A-cluster machines.  AEN801 carries no DEEPX /
# DRP-AI silicon, so no vendor NPU runtime is installed here -- the
# Ethos-U path lives inside the alp-sdk library.
IMAGE_INSTALL:append = " alp-sdk rclcpp sensor-msgs"

# Inference runtime selection is silicon-determined.  The SoM preset
# (metadata/e1m_modules/E1M-AEN801.yaml) declares preferred_backend
# ethos_u / variant u85; E8 carries one Ethos-U85 (NPU-HG, Generative
# AI / Transformers) alongside two Ethos-U55s.  The alp-sdk library
# compiles the <alp/inference.h> dispatcher; apps pick per-handle at
# runtime via alp_inference_open().  No build-time backend pin.
#
# NOTE: E8 also ships an ISP + JPEG encoder (e8.json peripherals);
# userspace recipes for those come from the Alif BSP.

# OTA via Mender (opt-in).  Uncomment to inherit Mender image
# generation + A/B rootfs partitioning.  Requires meta-mender-core
# in bblayers.conf; reference flow in docs/ota.md.
#
#     require conf/distro/include/mender.inc
