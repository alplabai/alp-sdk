#@TYPE: Machine
#@NAME: E1M-AEN801 A32 cluster (Alif Ensemble E8)
#@DESCRIPTION: Alp Lab E1M-AEN801 SoM (Alif Ensemble E8: dual
#              Cortex-A32 + Cortex-M55 HP/HE + Ethos-U85 + 2x
#              Ethos-U55, plus ISP + JPEG encoder) on the E1M EVK.
#              This MACHINE targets the A32 application cluster
#              (Linux); the two M55 system cores build via Zephyr
#              (see the SoM preset's topology.m55_hp / topology.m55_he
#              boards).
#
#              SKELETON grounded on the real Alif BSP (github.com/
#              alifsemi/meta-alif-ensemble, branch devkit-ex-b0:
#              "machine configuration files, TFA, and Linux kernel
#              recipes for the Ensemble devices").  Two hard caveats:
#                1. The public Alif BSP ships E5/E7 machines only
#                   (devkit-e5, devkit-e7, appkit-e7) -- there is NO E8
#                   machine yet.  This conf follows the devkit-e7
#                   pattern; the E8-specific kernel defconfig / dtb /
#                   TF-A platform are TBD until Alif publishes E8
#                   support (or Alp Lab ports it).
#                2. meta-alif-ensemble declares LAYERSERIES_COMPAT
#                   "warrior zeus" (Yocto 2019) while alp-sdk builds on
#                   scarthgap -- folding it in needs a compat bump /
#                   forward-port.  See docs/bring-up-aen.md.
#              The E8 silicon is also preliminary
#              (E1M-AEN801.yaml status.preliminary = true), and the
#              Alp Lab carrier dtb + boot media are HW-config-determined.
#              Per the project rule, real-but-unknown values stay "# TBD".

# Wire in the Alif BSP machine include once meta-alif-ensemble is added
# to bblayers.conf (and to LAYERDEPENDS in conf/layer.conf).  The Alif
# Ensemble machine confs are standalone -- they only `require` the
# CPU-tune include below and (optionally) the OSPI boot includes; there
# is no single "SoC base" include to require.  With nothing required this
# MACHINE has no kernel/bootloader provider and will NOT parse to a
# buildable config -- intentional until the BSP layer is vendored and an
# E8 machine pattern exists upstream.
#require conf/machine/include/tune-cortex-a32.inc   # from meta-alif-ensemble

MACHINEOVERRIDES =. "e1m-aen801-a32:e1m-aen801:e1m-e8:e1m:"
MACHINE_FEATURES += "alp-sdk e1m aen801 ethos-u85 ethos-u55"

# CPU tune.  The A32 application cluster is 2x Cortex-A32 (Armv8-A,
# AArch32) -- see metadata/socs/alif/ensemble/e8.json cores[].type
# "cortex-a32".  This is the value the Alif BSP's devkit-e7.conf uses
# (cortexa32hf-neon, from meta-alif-ensemble's tune-cortex-a32.inc); the
# A32 cluster is identical to the E7's, so it carries over to E8.  Left
# as ?= so the BSP tune include (the require above) can own it.
DEFAULTTUNE ?= "cortexa32hf-neon"

# Kernel provider + image type, per the Alif BSP (meta-alif-ensemble
# devkit-e7.conf + recipes-kernel/linux/linux-alif.inc).  Commented until
# the layer is vendored so this skeleton doesn't pin a recipe absent from
# every parsed layer.  KBUILD_DEFCONFIG / KERNEL_DEVICETREE follow the
# Alif kernel tree's E8 names -- TBD until Alif publishes E8 (devkit-e7
# uses devkit_e7[_unicore]_defconfig + devkit-e7.dtb).
#PREFERRED_PROVIDER_virtual/kernel_forcevariable = "linux-alif"
#KERNEL_IMAGETYPE = "xipImage"
# TBD(alif-bsp): E8 kernel defconfig (cf. devkit_e7_unicore_defconfig).
#KBUILD_DEFCONFIG = "<e8-defconfig>"

# Carrier device tree: a dedicated board dtb composed from the SoC dtsi +
# SoM dtsi + E1M-EVK carrier dtsi.  Override (not append) so only the ALP
# board dtb is built, not the BSP reference-board dtb.
# TBD(alif-hw-config): the dtb filename follows the Alif kernel's
# arch/arm/boot/dts layout (devkit-e7 builds devkit-e7.dtb); the carrier
# .dts is Alp-Lab-authored and pending the AEN HW config.
#KERNEL_DEVICETREE = "e1m-aen801-evk.dtb"

# Trusted Firmware-A: provided by meta-alif-ensemble
# (recipes-bsp/trusted-firmware-a, port github.com/alifsemi/
# trusted-firmware-a_alif).  TF-A_PLATFORM + the BL32/BL33 load
# addresses are board-specific (devkit-e7 uses TF-A_PLATFORM "devkit_e7"
# with a full memory-map block).
# TBD(alif-hw-config): set TF-A_PLATFORM + the E8 carrier memory map.
#TF-A_PLATFORM = "<e1m_aen801>"

# Serial console.  The Alif BSP devkit-e7 uses "115200;ttyS0" for the
# A32 debug UART; carry that as the expected default.
# TBD(alif-hw-config): confirm the E8 carrier routes the same UART
# instance to the EVK debug connector before relying on ttyS0.
#SERIAL_CONSOLES ?= "115200;ttyS0"

# Boot media.  TBD(alif-hw-config): the AEN module boots from on-die
# MRAM + an external xSPI (E8 uses HexSPI) flash; whether the EVK images
# boot from xSPI, SD, or eMMC is set by the HW config + the Alif BSP's
# OSPI_BOOT / WIC defaults (cf. devkit-e7.conf's OSPI_BOOT switches).
#ALP_BOOT_DEVICE ?= "xspi"

# Install the alp-sdk runtime alongside the ROS 2 base packages,
# mirroring the other A-cluster machines.  AEN801 carries no DEEPX /
# DRP-AI silicon, so no vendor NPU runtime is installed here -- the
# Ethos-U path lives inside the alp-sdk library.
IMAGE_INSTALL:append = " alp-sdk rclcpp sensor-msgs"

# Inference runtime selection is silicon-determined.  The SoM preset
# (metadata/e1m_modules/E1M-AEN801.yaml) declares preferred_backend
# ethos_u / variant u85; E8 carries one Ethos-U85 (NPU-HG, Generative
# AI / Transformers) alongside two Ethos-U55s.  The alp-sdk library
# compiles the <alp/inference.h> dispatcher; apps pick per-handle at
# runtime via alp_inference_open().  No build-time backend pin.
# TBD(alif-bsp): if the Alif Ethos-U firmware + Vela driver ship as
# separate BSP recipes, wire their PREFERRED_PROVIDERs here.
#
# NOTE: E8 also ships an ISP + JPEG encoder (e8.json peripherals);
# any userspace recipes for those are TBD pending the Alif BSP.

# OTA via Mender (opt-in).  Uncomment to inherit Mender image
# generation + A/B rootfs partitioning.  Requires meta-mender-core
# in bblayers.conf; reference flow in docs/ota.md.
#
#     require conf/distro/include/mender.inc
