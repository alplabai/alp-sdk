#@TYPE: Machine
#@NAME: E1M-AEN801 A32 cluster (Alif Ensemble E8)
#@DESCRIPTION: Alp Lab E1M-AEN801 SoM (Alif Ensemble E8: dual
#              Cortex-A32 + Cortex-M55 HP/HE + Ethos-U85 + 2x
#              Ethos-U55, plus ISP + JPEG encoder) on the E1M EVK.
#              This MACHINE targets the A32 application cluster
#              (Linux); the two M55 system cores build via Zephyr
#              (see the SoM preset's topology.m55_hp / topology.m55_he
#              boards).
#
#              SKELETON -- this file is an honest scaffold, and the E8
#              silicon is preliminary (E1M-AEN801.yaml status.preliminary
#              = true).  The Alif Ensemble Yocto BSP is NOT vendored in
#              this layer, so the SoC base (require), kernel/dtb names,
#              U-Boot config, boot media + serial console are marked
#              "# TBD:" below.  A maintainer completes them when the Alif
#              BSP lands and the AEN HW config is hand-written (see the
#              project memory note: "never invent hardware values --
#              mark unknowns TBD").

# TBD(alif-bsp): this MACHINE must `require` the real Alif Ensemble
# Yocto machine include, but the Alif BSP layer is NOT vendored here so
# its exact include name cannot be asserted without fabricating it.
# Point this at the upstream Alif Ensemble E8 machine conf (or the
# shared Ensemble base include) once the Alif BSP release pinned in
# bblayers.conf is known, and add that layer to LAYERRECOMMENDS in
# conf/layer.conf.  With the require commented out this MACHINE is
# missing its SoC base (kernel/bootloader providers, image-fstype
# defaults) and will NOT parse to a buildable config -- that is
# intentional until the real include is wired in.  Do NOT uncomment
# with a guessed path.
#require conf/machine/include/<alif-ensemble-e8-base>.inc

MACHINEOVERRIDES =. "e1m-aen801-a32:e1m-aen801:e1m-e8:e1m:"
MACHINE_FEATURES += "alp-sdk e1m aen801 ethos-u85 ethos-u55"

# CPU tune.  The A32 application cluster is 2x Cortex-A32 (Armv8-A,
# AArch32 only) -- see metadata/socs/alif/ensemble/e8.json cores[].type
# "cortex-a32".  This DEFAULTTUNE is the OE-core armv8a tune (it is NOT
# an Alif-vendor value); the A32 cluster is identical to the E7's.
# TBD(alif-bsp): the Alif Ensemble base include (the require above)
# normally sets the tune; if it does not, source the OE-core tune
# explicitly via:
#     require conf/machine/include/arm/armv8a/tune-cortexa32.inc
DEFAULTTUNE ?= "cortexa32"

# Bootloader + kernel + device tree providers.
# TBD(alif-bsp): set the kernel + U-Boot virtual/* providers to the
# recipes shipped by the Alif Ensemble BSP layer once it is vendored
# (e.g. PREFERRED_PROVIDER_virtual/kernel = "linux-alif" and the
# matching virtual/bootloader).  Left unset here so this skeleton does
# not pin a provider that does not yet exist in any parsed layer.
#PREFERRED_PROVIDER_virtual/kernel = "linux-alif"
#PREFERRED_PROVIDER_virtual/bootloader = "u-boot-alif"

# Carrier device tree: dedicated board dtb composed from the SoC dtsi +
# SoM dtsi + E1M-EVK carrier dtsi.  Override (not append) so only the
# ALP board dtb is built, not the BSP's reference-board dtb.
# TBD(alif-hw-config): the dtb vendor sub-directory + filename follow
# the Alif kernel's arch/.../boot/dts layout, which is unknown until the
# BSP lands.  The U-Boot bootcmd must load this filename (set fdtfile).
#KERNEL_DEVICETREE = "alif/e1m-aen801-evk.dtb"

# Serial console.  TBD(alif-hw-config): the A32 cluster's debug UART
# instance + baud are pin/HW-config-determined (the SoM routes one of
# the E8 UARTs to the EVK debug connector).  Mark TBD until the AEN HW
# config is hand-written; format is "<baud>;<tty>" (e.g. "115200;ttyS0").
#SERIAL_CONSOLES = "115200;ttyTBD"

# Boot media.  TBD(alif-hw-config): the AEN module boots from on-die
# MRAM + an external xSPI (E8 uses HexSPI) flash; whether the EVK images
# boot from xSPI, SD, or eMMC is set by the HW config + the Alif BSP's
# WIC/fstype defaults.  Mark TBD until those land.
#ALP_BOOT_DEVICE ?= "xspi"

# Install the alp-sdk runtime alongside the ROS 2 base packages,
# mirroring the other A-cluster machines.  AEN801 carries no DEEPX /
# DRP-AI silicon, so no vendor NPU runtime is installed here -- the
# Ethos-U path lives inside the alp-sdk library.
IMAGE_INSTALL:append = " alp-sdk rclcpp sensor-msgs"

# Inference runtime selection is silicon-determined.  The SoM preset
# (metadata/e1m_modules/E1M-AEN801.yaml) declares preferred_backend
# ethos_u / variant u85; E8 carries one Ethos-U85 (NPU-HG, Generative
# AI / Transformers) alongside two Ethos-U55s.  The alp-sdk library
# compiles the <alp/inference.h> dispatcher; apps pick per-handle at
# runtime via alp_inference_open().  No build-time backend pin.
# TBD(alif-bsp): if the Alif Ensemble Ethos-U firmware + Vela driver
# library ship as separate BSP recipes, wire their PREFERRED_PROVIDERs
# here (cf. e1m-nx9101-a55.conf's ethosu-firmware / ethosu-driver-library).
#
# NOTE: E8 also ships an ISP + JPEG encoder (e8.json peripherals);
# any userspace recipes for those are TBD pending the Alif BSP.

# OTA via Mender (opt-in).  Uncomment to inherit Mender image
# generation + A/B rootfs partitioning.  Requires meta-mender-core
# in bblayers.conf; reference flow in docs/ota.md.
#
#     require conf/distro/include/mender.inc
