#@TYPE: Machine
#@NAME: E1M-AEN801 A32 cluster (Alif Ensemble E8)
#@DESCRIPTION: Alp Lab E1M-AEN801 SoM (Alif Ensemble E8: dual
#              Cortex-A32 + Cortex-M55 HP/HE + Ethos-U85 + 2x
#              Ethos-U55, plus ISP + JPEG encoder) on the E1M EVK.
#              This MACHINE targets the A32 application cluster
#              (Linux); the two M55 system cores build via Zephyr
#              (see the SoM preset's topology.m55_hp / topology.m55_he
#              boards).
#
#              Derives from the REAL Alif BSP: github.com/alifsemi/
#              meta-alif-ensemble, branch **scarthgap** (matches
#              alp-sdk's Yocto series; LAYERSERIES_COMPAT = scarthgap
#              in conf/layer.conf), whose devkit-e8 MACHINE is the
#              upstream-complete E8 base -- conf/machine/devkit-e8.conf
#              (+ appkit-e8.conf).  That base pairs with the
#              upstream-Zephyr `ensemble_e8_dk` board on the M55 side,
#              so the full E8 platform (A32 Linux + M55 Zephyr) is
#              upstream-native; this carrier MACHINE only `require`s
#              the devkit-e8 base and overrides the Alp-Lab-carrier
#              specifics below.  Per ADR-0017 we ride OVER the vendor
#              BSP (Tier-1 upstream-native base + a thin in-tree
#              override) -- we do NOT fork meta-alif-ensemble.
#
#              SKELETON: the carrier dtb, TF-A platform/memory map,
#              and boot media are Alp-Lab-SoM-specific and supplied by
#              the maintainer's AEN HW config; every such value is
#              marked "# TBD(alif-hw-config)" per the no-invented-
#              values rule.  (E8 silicon order code is also flagged
#              status.preliminary / status.partial_hw_config = true in
#              metadata/e1m_modules/E1M-AEN801.yaml.)

# ---- Inherit the upstream Alif E8 DevKit base machine ----
#
# meta-alif-ensemble (branch scarthgap) must be on bblayers.conf and
# registered in conf/layer.conf's LAYERRECOMMENDS_alp-sdk first (it
# is -- see that file's "Alif Ensemble E8" note); the README "Alif
# Ensemble E8 -- via meta-alif-ensemble" section has the clone +
# add-layer steps.  This `require` pulls the Alif E8 reference values
# (cortexa32 tune, PREFERRED_PROVIDER_virtual/kernel = linux-alif,
# xipImage, the devkit_e8 defconfig + devkit-e8.dtb, TF-A, the serial
# console, SMP) -- alp-sdk does NOT re-author any of them.
# (base machine from meta-alif-ensemble @scarthgap)
require conf/machine/devkit-e8.conf

# ---- Alp-Lab E1M-AEN801 carrier overrides ----

MACHINEOVERRIDES =. "e1m-aen801-a32:e1m-aen801:e1m-e8:e1m:"
MACHINE_FEATURES += "alp-sdk e1m aen801 ethos-u85 ethos-u55"

# Carrier device tree: a dedicated board dtb composed from the Alif E8
# SoC dtsi + the E1M SoM dtsi + the E1M-EVK carrier dtsi.  Overrides
# (not appends) the Alif reference dtb (devkit-e8.dtb) so only the ALP
# board dtb is built -- mirrors the V2N / NX9101 carriers.
# Grounded against the real devkit-e8.conf (meta-alif-ensemble@scarthgap):
# the base sets KERNEL_DEVICETREE = "alif/ensemble/devkit/devkit-e8.dtb" and
# `inherit dct-kernel` -- the DTS is built via Alif's DCT macro flow under
# arch/arm (aarch32), NOT the arch/arm64 dtsi composition the V2N carrier uses.
# The carrier dtb is authored as a BASELINE (derived from devkit-e8) + wired by
# meta-alp-sdk's linux-alif_%.bbappend (installs the dts + e1m_dct_defines.h into
# arch/arm/ensemble/e1m/ and extends COMPATIBLE_MACHINE).  Mirrors the Alif devkit
# DCT model -- see docs/superpowers/specs/2026-06-25-aen-a32-yocto-bringup-design.md
# (§12b).  Refine the peripheral selection to the real E1M-EVK HW mapping later.
KERNEL_DEVICETREE = "alif/ensemble/e1m/e1m-aen801-evk.dtb"

# Trusted Firmware-A: the devkit-e8 base sets TF-A_PLATFORM = "devkit_e7"
# (the shared e7/e8 TF-A platform) and an XIP memory map (KERNEL_DTB_ADDR,
# XIP_KERNEL_LOAD_ADDR, the HyperRAM/SRAM/TRUSTED_SRAM bases) -- all
# SoC-level for the E8, so the E1M carrier INHERITS them unchanged.  We do
# not re-author the platform string or transcribe the address constants here;
# they live in the public devkit-e8.conf, and any resolved E1M-specific delta
# goes to alp-sdk-internal per the public/internal split.

# Serial console inherits the devkit-e8 default (ttyS0 @115200, UART2; SMP=1).
# Boot flash is the on-module Macronix MX25UM25645 OctaFlash (xSPI NOR, 32 MiB)
# on OSPI0 CS0 (E1M-AEN801.yaml on_module.ospi_memories.ospi0), so we select the
# Macronix flash path -- the devkit defaults to ISSI.  linux-alif's do_mx_rev16
# byte-reverses the xipImage when MX_FLASH_EN=1, which Macronix OctaFlash
# requires.  The on-module HyperRAM is a Winbond W958D8NBYA5I on OSPI0 CS1;
# confirm the ISSI_HYPERRAM_EN / AP_HYPERRAM_EN toggles cover the OctalRAM
# generically, else a HyperRAM-part delta is TBD(alif-hw-config).
MX_FLASH_EN   = "1"
ISSI_FLASH_EN = "0"
# Boot from OSPI0 CS0 (the Macronix OctaFlash). (BitBake .conf has no inline
# comments, so this note stays on its own line.)
ALP_BOOT_DEVICE ?= "ospi-nor"

# Install the alp-sdk runtime.  AEN801 carries no DEEPX / DRP-AI silicon, so
# no vendor NPU runtime is installed here -- the Ethos-U path lives inside the
# alp-sdk library.  Unlike the larger A55 SoMs, the E8 A32 runs a tiny XIP
# Linux (~42 MiB working RAM, OSPI), so ROS 2 (rclcpp/sensor-msgs/perception)
# is NOT installed on AEN -- it would not fit the footprint and needs meta-ros
# (design 8.2).  Apps that want ROS target an A55 SoM instead.
IMAGE_INSTALL:append = " alp-sdk aen-a32-carrier-bringup"

# Inference runtime selection is silicon-determined.  The SoM preset
# (metadata/e1m_modules/E1M-AEN801.yaml inference:) declares
# preferred_backend ethos_u / variant u85; E8 carries one Ethos-U85
# (NPU-HG, Generative AI / Transformers) alongside two Ethos-U55s
# (NPU-HP + NPU-HE).  The alp-sdk library compiles the
# <alp/inference.h> dispatcher; apps pick per-handle at runtime via
# alp_inference_open().  No build-time backend pin.
#
# NOTE: E8 also ships an ISP + JPEG encoder (e8.json peripherals);
# userspace recipes for those come from the Alif BSP.

# OTA via Mender (opt-in).  Uncomment to inherit Mender image
# generation + A/B rootfs partitioning.  Requires meta-mender-core
# in bblayers.conf; reference flow in docs/ota.md.
#
#     require conf/distro/include/mender.inc
