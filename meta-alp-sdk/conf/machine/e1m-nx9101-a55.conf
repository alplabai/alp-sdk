#@TYPE: Machine
#@NAME: E1M-NX9101 A55 cluster (NXP i.MX 93)
#@DESCRIPTION: Alp Lab E1M-NX9101 SoM (NXP i.MX 93: Cortex-A55 dual
#              + Cortex-M33 RT-domain + Ethos-U65 micro-NPU) on the
#              E1M EVK.  This MACHINE targets the A55 Linux cluster;
#              the M33 system core builds via Zephyr.
#
#              Layers on top of `meta-imx`'s i.MX 93 base; see
#              https://github.com/nxp-imx/meta-imx for the upstream.

# TODO(meta-imx): this MACHINE must `require` the real meta-imx i.MX 93
# machine include, but meta-imx is NOT vendored in this layer so the
# exact include name cannot be asserted here without fabricating it.
# The earlier `conf/machine/include/imx93-base.inc` does not exist in
# meta-imx. Point this at the correct upstream include (commonly the
# i.MX 93 EVK machine conf, e.g. `require conf/machine/imx93-11x11-lpddr4x-evk.conf`,
# or the shared `conf/machine/include/imx9-class.inc` / `imx-base.inc`
# family) once the meta-imx release pinned in bblayers.conf is known.
# With the require commented out this MACHINE is missing its SoC base
# (no SOC_FAMILY, tune, kernel/bootloader providers) and therefore will
# NOT parse to a buildable config -- that is intentional until the real
# include is wired in. Do NOT uncomment with a guessed path.
#require conf/machine/include/imx93-base.inc

MACHINEOVERRIDES =. "e1m-nx9101-a55:e1m-nx9101:e1m-n93:e1m:"
MACHINE_FEATURES += "alp-sdk e1m nx9101 ethos-u65"

# i.MX 93 has a Cortex-M33 real-time domain alongside the A55s.
# alp-sdk builds the same <alp/...> surface for both -- Linux
# user-space on the A55s + RTOS-side (Zephyr) on the M33.  The
# M33 firmware is loaded by the A55s at boot via remoteproc
# (alp-remoteproc.service handles the lifecycle).
ALP_BOOT_RTCORE_DEFAULT ?= "1"

# Ethos-U65 micro-NPU.  Same Vela toolchain as AEN's U55, just a
# different command-stream variant.  The alp-inference Ethos-U
# backend targets both -- see task #14.
PREFERRED_PROVIDER_virtual/ethosu-firmware ?= "ethosu-fw-imx93"
PREFERRED_PROVIDER_ethosu-driver-library ?= "ethosu-driver-library"

# Inference runtime is silicon-determined -- alp-sdk's
# DEPENDS:append:e1m-nx9101 installs ethosu-driver-library, which
# the build's compiled-in Ethos-U dispatcher uses.  No build-time
# backend pin; apps pick at runtime via alp_inference_open().

# E1M-NX9101 carrier wiring (vs NXP's generic imx93evk).
KERNEL_DEVICETREE = "freescale/imx93-e1m-evk.dtb"

# Runtime payload is image-owned: alp-sdk ships in every alp-image-*; ROS is
# the opt-in alp-ros feature group. This machine has no DRP-AI/DEEPX runtime
# to add -- alp-sdk's Ethos-U backend is compiled into the library.

# Boot media: SD card by default, eMMC populated on production
# images.  The carrier's microSD slot is multiplexed via 74LVC157
# with the M.2 E-key SDIO -- see <alp/boards/alp_e1m_evk.h>.
ALP_BOOT_DEVICE ?= "sdcard"

# OTA via Mender (opt-in).  Uncomment to inherit Mender image
# generation + A/B rootfs partitioning.  Requires meta-mender-core
# in bblayers.conf; reference flow in docs/ota.md.
#
#     require conf/distro/include/mender.inc
