#@TYPE: Machine
#@NAME: E1M-V2M101 A55 cluster (V2N + DEEPX DX-M1)
#@DESCRIPTION: Alp Lab E1M-V2M101 SoM -- V2N base + on-module
#              DEEPX DX-M1 NPU over PCIe.  This MACHINE targets
#              the A55 Linux cluster; the M33 system core builds
#              via Zephyr (see topology.m33_sm.board in the SoM
#              preset).

# BSP v6.30 derives carriers from the full EVK machine (the old
# rzv2n.inc include was dropped); override only what differs below.
require conf/machine/rzv2n-evk.conf

MACHINEOVERRIDES =. "e1m-v2m101-a55:e1m-v2m101:e1m-v2n101-a55:e1m-v2n101:"
MACHINE_FEATURES += "alp-sdk e1m v2n deepx-dxm1"

# NOT-YET-BUILDABLE: the V2M carrier device tree
# (renesas/e1m-v2m101-x-evk.dts, see KERNEL_DEVICETREE below) is not yet
# shipped by the linux-renesas bbappend, and the DEEPX dx-rt runtime is
# license-gated + blacklisted (recipes-deepx/dx-rt/dx-rt_2.4.bb). This
# MACHINE will not produce a working image until both land. Treat as a
# work-in-progress target.

PREFERRED_PROVIDER_virtual/kernel = "linux-renesas"

# Install the alp-sdk runtime alongside the ROS 2 base packages.
IMAGE_INSTALL:append = " \
    alp-sdk                       \
    ros-humble-rclcpp             \
    ros-humble-sensor-msgs        \
    ros-humble-vision-msgs        \
"

# DEEPX DX-M1 userspace runtime + PCIe kernel driver. GATED behind an
# explicit opt-in because dx-rt is license-gated + blacklisted (it has no
# redistributable source/LICENSE in this public layer). Set
# ALP_ENABLE_DEEPX_DXM1 = "1" in local.conf only after you have provided a
# licensed dx_rt source + sha256 + LICENSE and cleared PNBLACKLIST[dx-rt].
ALP_ENABLE_DEEPX_DXM1 ?= "0"
IMAGE_INSTALL:append = "${@' dx-rt kernel-module-dx-rt-npu' if d.getVar('ALP_ENABLE_DEEPX_DXM1') == '1' else ''}"

# Inference runtime selection is silicon-determined -- V2M101's
# `capabilities:` block declares BOTH DRP-AI3 AND DEEPX DXM1, so the
# build compiles in dispatchers for both.  The app picks per-handle at
# runtime via alp_inference_open(.backend = ...) -- DEEPX DXM1 for the
# heavy vision models, DRP-AI3 as a fallback for ops the NPU doesn't
# accelerate.  No build-time backend pin.

ALP_BOOT_DEVICE ?= "emmc"

# V2M board dtb (V2N + DEEPX DXM1). Composed from SoC + SoM + carrier +
# DEEPX dtsi. Override so only the ALP board dtb builds.
# NOTE: the U-Boot bootcmd must load this filename (set fdtfile).
KERNEL_DEVICETREE = "renesas/e1m-v2m101-x-evk.dtb"

# OTA via Mender (opt-in).  Uncomment to inherit Mender image
# generation + A/B rootfs partitioning.  Requires meta-mender-core
# in bblayers.conf; reference flow in docs/ota.md.
#
#     require conf/distro/include/mender.inc
