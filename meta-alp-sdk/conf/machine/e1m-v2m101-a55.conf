#@TYPE: Machine
#@NAME: E1M-V2M101 A55 cluster (V2N + DEEPX DX-M1)
#@DESCRIPTION: ALP Lab E1M-V2M101 SoM -- V2N base + on-module
#              DEEPX DX-M1 NPU over PCIe.  This MACHINE targets
#              the A55 Linux cluster; the M33 system core builds
#              via Zephyr (see topology.m33_sm.board in the SoM
#              preset).

require conf/machine/include/rzv2n.inc

MACHINEOVERRIDES =. "e1m-v2m101-a55:e1m-v2m101:e1m-v2n101-a55:e1m-v2n101:"
MACHINE_FEATURES += "alp-sdk e1m v2n deepx-dxm1"

PREFERRED_PROVIDER_virtual/kernel = "linux-renesas"

# Install the alp-sdk runtime + DEEPX driver + DEEPX runtime
# alongside the ROS 2 base packages.  dx-rt brings dx_rt + the
# Linux kernel driver as a built-in module.
IMAGE_INSTALL:append = " \
    alp-sdk                       \
    dx-rt                         \
    kernel-module-dx-rt-npu       \
    ros-humble-rclcpp             \
    ros-humble-sensor-msgs        \
    ros-humble-vision-msgs        \
"

# DEEPX inference backend selected as alp-inference default;
# DRP-AI remains available as a fallback for models the M1
# doesn't support.
ALP_INFERENCE_DEFAULT_BACKEND ?= "deepx"

# Pull in the DEEPX user-space runtime + kernel PCIe driver from
# the upstream `meta-deepx-m1` Yocto layer.  Both must be installed;
# userspace has no path to the silicon without the kernel module.
# See vendors/deepx-dxm1/README.md for the licensing posture.

ALP_BOOT_DEVICE ?= "emmc"

KERNEL_DEVICETREE:append = " renesas/e1m-x-evk-v2m.dts"

# OTA via Mender (opt-in).  Uncomment to inherit Mender image
# generation + A/B rootfs partitioning.  Requires meta-mender-core
# in bblayers.conf; reference flow in docs/ota.md.
#
#     require conf/distro/include/mender.inc
