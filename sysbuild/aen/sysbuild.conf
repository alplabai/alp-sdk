#
# Sysbuild configuration for E1M-AEN secure-boot images.
#
# Loaded when a Zephyr application is built with sysbuild against
# this directory, e.g.:
#
#   west build -b alp_e1m_evk_aen path/to/app \
#       --sysbuild --sysbuild-config alp-sdk/sysbuild/aen/sysbuild.conf
#
# Produces:
#   build/zephyr/zephyr.signed.bin     -- signed application image
#   build/mcuboot/zephyr/zephyr.bin    -- MCUboot bootloader
#
# Verification policy:
#   - MCUboot verifies the application image's ECDSA-P256 signature
#     against the public key compiled into the bootloader.
#   - Failed verification triggers swap-back to the previous slot
#     (swap-using-scratch mode).
#   - Signing keys live at <repo>/keys/ -- the dev key
#     (mcuboot_dev_ecdsa_p256.pem) ships test-only and MUST be
#     replaced with the production key (held in OPTIGA Trust M's
#     secure NVM) before any production deployment.  See
#     docs/secure-boot.md for the lifecycle.
#
# Status: v0.4-prep scaffolding.  The authoritative
# alp_e1m_evk_aen board file lives at alplabai/alp-zephyr-modules
# (TBD).  Live CI compile-verification hooks into pr-twister.yml
# once that board file lands -- the sysbuild config here is the
# target.  Until then this file documents the intended config so
# downstream consumers don't have to reverse-engineer it.

# Pull MCUboot into the build graph.
SB_CONFIG_BOOTLOADER_MCUBOOT=y

# Signature: ECDSA-P256 (smaller signatures than RSA-2048, mature
# nanoecc / mbedtls implementations on Cortex-M55).
SB_CONFIG_MCUBOOT_SIGNATURE_TYPE_ECDSA_P256=y

# Use the dev key by default; consumers override this at build time
# to point at their production key.  Path is repo-relative; sysbuild
# resolves it against the SB_CONFIG source.
SB_CONFIG_BOOT_SIGNATURE_KEY_FILE="keys/mcuboot_dev_ecdsa_p256.pem"

# Swap-using-scratch -- requires a small scratch partition in the
# flash layout (declared in the board's DT under partitions {}).
# Trades flash space for a robust crash-recoverable swap.  Other
# upgrade modes (overwrite-only, swap-using-move) are available
# upstream but scratch is the v0.4 reference path.
SB_CONFIG_MCUBOOT_MODE_SWAP_USING_SCRATCH=y
