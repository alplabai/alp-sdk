# SPDX-License-Identifier: Apache-2.0
#
# Machine configuration for the E1M-X V2N module on the E1M-X EVK.
# Renesas RZ/V2N (Cortex-A55 quad + DRP-AI3 accelerator).
#
# This machine config layers on top of `meta-renesas-rz`'s
# `renesas-rzv2n` base; see
# https://github.com/renesas-rz/meta-renesas-rz for the upstream.
#
# Usage (in conf/local.conf or bblayers.conf):
#
#     MACHINE = "e1m-x-v2n"

#@TYPE: Machine
#@NAME: ALP E1M-X V2N module
#@DESCRIPTION: Machine configuration for the E1M-X V2N SoM (Renesas RZ/V2N)
#@SOC: r9a09g056

require conf/machine/include/rzv2n-common.inc

# E1M-X carrier wiring (vs Renesas' generic RZ/V2N EVK).
MACHINEOVERRIDES =. "e1m-x-v2n:"
MACHINE_FEATURES += "alp-sdk e1m-x v2n"

# Boot media on the E1M-X V2N is eMMC by default; SD-card boot via
# the EVK's microSD slot is supported but not the default.
ALP_BOOT_DEVICE ?= "emmc"

# DRP-AI3 firmware blob, required for any inference workload.
# Pulled in by the alp-sdk-runtime + alp-chips recipes when
# CONFIG_ALP_INFERENCE_BACKEND_DRPAI is enabled in the image.
PREFERRED_PROVIDER_virtual/drpai-firmware ?= "drpai-fw"

# E1M-X carrier conveniences:
#  - Two RJ45 jacks wired to V2N's two GMAC controllers.
#  - One PCIe x4 lane group (Key M slot on the carrier).
#  - MIPI-CSI + MIPI-DSI for camera + display.
KERNEL_DEVICETREE = "renesas/r9a09g056n48-e1m-x-evk.dtb"
