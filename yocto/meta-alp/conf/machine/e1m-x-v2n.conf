# SPDX-License-Identifier: Apache-2.0
#
# Machine configuration for the E1M-X V2N module on the E1M-X EVK.
# Renesas RZ/V2N (Cortex-A55 quad + DRP-AI3 accelerator).
#
# This machine config inherits from Renesas's canonical `rzv2n-evk`
# MACHINE (defined in meta-renesas, distributed via the RZ/V2N AI
# SDK 7.10 BSP -- see yocto/meta-alp/README.md for the setup recipe).
# The E1M-X carrier shares the Renesas EVK's SoC config; only the
# carrier-specific peripherals + boot media differ.
#
# Usage (in conf/local.conf):
#
#     MACHINE = "e1m-x-v2n"

#@TYPE: Machine
#@NAME: ALP E1M-X V2N module
#@DESCRIPTION: Machine configuration for the E1M-X V2N SoM (Renesas RZ/V2N)
#@SOC: r9a09g056

require conf/machine/rzv2n-evk.conf

# E1M-X carrier wiring (vs Renesas' generic RZ/V2N EVK).
MACHINEOVERRIDES =. "e1m-x-v2n:"
MACHINE_FEATURES += "alp-sdk e1m-x v2n"

# Boot media on the E1M-X V2N is eMMC by default; SD-card boot via
# the EVK's microSD slot is supported but not the default.
ALP_BOOT_DEVICE ?= "emmc"

# DRP-AI3 firmware blob is provided by meta-rz-drpai; the alp-sdk
# build only needs the runtime when an inference backend is wired.
PREFERRED_PROVIDER_virtual/drpai-firmware ?= "drpai-fw"

# Carrier-specific DTB.  The exact device-tree filename is TBD --
# the authoritative pin assignment + per-carrier overlay live in
# the user-supplied HW config writeup (per the project memory note
# "pending exact hardware configurations").  Default falls back to
# Renesas's stock V2N-EVK DTB so the build is reproducible without
# a carrier DTB; override when the E1M-X carrier DTB lands:
#     KERNEL_DEVICETREE = "renesas/r9a09g056n4?-e1m-x-evk.dtb"
# The "n4?" stem maps to the exact V2N silicon variant the SoM
# ships with (V2N has multiple orderable SKUs differing in
# package + temperature grade); user HW config supplies that too.
KERNEL_DEVICETREE ?= "renesas/r9a09g056n44-rzv2n-evk.dtb"

# OTA via Mender (opt-in).  Uncomment the line below to inherit
# Mender image generation + A/B rootfs partitioning.  Requires
# meta-mender-core in bblayers.conf; reference flow in
# docs/ota.md.  Production fleets MUST also override
# MENDER_SERVER_URL + MENDER_TENANT_TOKEN in local.conf.
#
#     require conf/distro/include/mender.inc
