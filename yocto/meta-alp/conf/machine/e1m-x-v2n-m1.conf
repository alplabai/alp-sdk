# SPDX-License-Identifier: Apache-2.0
#
# Machine configuration for the E1M-X V2N-M1 module on the E1M-X
# EVK.  Renesas RZ/V2N (Cortex-A55 quad + DRP-AI3) PLUS an external
# DEEPX DX-M1 NPU sitting behind the SoM's PCIe x4 lane group.
#
# Inherits everything from e1m-x-v2n.conf and adds the DEEPX
# runtime to the default image features.

#@TYPE: Machine
#@NAME: ALP E1M-X V2N-M1 module
#@DESCRIPTION: V2N base + DEEPX DX-M1 external NPU
#@SOC: r9a09g056

require conf/machine/e1m-x-v2n.conf

MACHINEOVERRIDES =. "e1m-x-v2n-m1:"
MACHINE_FEATURES += "deepx-dxm1"

# Pull in the DEEPX user-space runtime + kernel PCIe driver from the
# upstream `meta-deepx-m1` Yocto layer.  Add the layer to bblayers.conf
# (`git clone -b scarthgap https://github.com/DEEPX-AI/meta-deepx-m1.git`,
# then `bitbake-layers add-layer ../meta-deepx-m1`).  Upstream recipe
# names per the layer's README:
#   - `dx-driver` -- M1 PCIe kernel module
#   - `dx-rt`     -- userspace DXRT inference runtime
# Both must be installed; userspace has no path to the silicon
# without the kernel module.  See vendors/deepx-dxm1/README.md for
# the licensing posture (DEEPX repos are source-visible but not
# openly licensed -- authorised for DEEPX NPU customers only).
IMAGE_INSTALL:append = " dx-driver dx-rt"

# DEEPX inference backend selected as the alp-inference default
# for this machine; DRP-AI remains available as a fallback for
# models the M1 doesn't support.
ALP_INFERENCE_DEFAULT_BACKEND ?= "deepx"

# The V2N-M1 carrier shares the E1M-X form factor and uses the
# same base DTB; the DEEPX module is enumerated via PCIe at
# runtime, no DTB delta required.
