# Layer configuration for meta-alp.
# v0.3 — machine configs + recipe fleshout in place; build glue
# lands in v0.4.

BBPATH .= ":${LAYERDIR}"

BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "alp"
BBFILE_PATTERN_alp  = "^${LAYERDIR}/"
BBFILE_PRIORITY_alp = "10"

LAYERVERSION_alp    = "3"
LAYERSERIES_COMPAT_alp = "kirkstone scarthgap"

# Upstream BSP layers required for the per-SoM machine configs.
# Builds that only target one family can drop the other dep.
LAYERDEPENDS_alp = " \
    core \
    openembedded-layer \
"

LAYERRECOMMENDS_alp = " \
    meta-renesas-rz \
    meta-imx \
"
