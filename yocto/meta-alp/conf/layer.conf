# Layer configuration for meta-alp.
# v0.3 -- machine configs + recipe fleshout in place; build glue
# lands in v0.4.  README.md documents the surrounding layer setup
# for the Renesas V2N AI SDK 7.10 BSP + NXP i.MX 93 (v0.4) flows.

BBPATH .= ":${LAYERDIR}"

BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "alp"
BBFILE_PATTERN_alp  = "^${LAYERDIR}/"
BBFILE_PRIORITY_alp = "10"

LAYERVERSION_alp    = "3"
LAYERSERIES_COMPAT_alp = "kirkstone scarthgap"

# Hard layer deps.  Both ship with poky / meta-openembedded so
# every Yocto build pulls them in regardless of SoM family.
LAYERDEPENDS_alp = " \
    core \
    openembedded-layer \
"

# Soft recommends -- the SoM-specific BSP layers.  Builds that
# only target one family can drop the others from bblayers.conf.
#
# Renesas RZ/V2N (covers e1m-x-v2n + e1m-x-v2n-m1):
#   `meta-renesas` is the canonical RZ base BSP.  The four
#   `meta-rz-features/*` sublayers come bundled together inside
#   the RZ/V2N AI SDK 7.10 BSP tarball
#   (RTK0EF0045Z94001AZJ-v1.0.3.zip on My Renesas) -- see
#   yocto/meta-alp/README.md for the extract-and-add-layer recipe.
#
# DEEPX DX-M1 (covers e1m-x-v2n-m1 only):
#   `meta-deepx-m1` carries the DX-M1 kernel module + userspace
#   runtime recipes.  Source at github.com/DEEPX-AI/meta-deepx-m1.
#
# NXP i.MX 93 (covers e1m-n93):
#   `meta-imx` is the canonical i.MX BSP; v0.4 bring-up wires
#   the full layer list.
#
# Mender OTA (covers every machine when OTA is opted in):
#   `meta-mender-core` provides the .mender artefact generator
#   + A/B rootfs partitioning + the on-target Mender client.
#   Builds that don't ship OTA can drop it from bblayers.conf;
#   the meta-alp recipes parse cleanly without it.  See
#   conf/distro/include/mender.inc + yocto/meta-alp/README.md
#   for the wiring.
LAYERRECOMMENDS_alp = " \
    meta-renesas \
    meta-rz-graphics \
    meta-rz-drpai \
    meta-rz-opencva \
    meta-rz-codecs \
    meta-econsys \
    meta-deepx-m1 \
    meta-imx \
    meta-mender-core \
"
