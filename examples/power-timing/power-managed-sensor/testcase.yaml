# SPDX-License-Identifier: Apache-2.0

sample:
  name: power-managed-sensor
  description: |
    Reference for the v0.6 `cores.<id>.power:` declarative block on
    the AEN301 M55-HE core: sleep_mode plus the rtc / gpio_int /
    uart wakeup_sources set.  Framing demo -- it narrates the duty
    cycle via printf and does not drive a sensor or enter a real
    sleep state.

tests:
  alp_sdk.example.power_managed_sensor:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    tags:
      - alp-sdk
      - example
      - power
      - sensor
    harness: console
    harness_config:
      type: one_line
      regex:
        - "\\[pm\\] done"
