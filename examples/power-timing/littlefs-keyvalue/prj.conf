#
# Most CONFIG_* this app needs comes from board.yaml's `libraries:
# [littlefs]` via the loader-generated alp.conf (see CMakeLists.txt).
# The two knobs below are the flash-backend plumbing littlefs mounts
# on top of -- they are storage-medium selection, not library
# selection, so they stay app-local rather than in the loader's
# per-library Kconfig table.
#
# CONFIG_FLASH + CONFIG_FLASH_MAP: pull in the flash subsystem and
# the fixed-partition map so PARTITION_ID(storage_partition) resolves.
# On native_sim this backs onto the `zephyr,sim-flash` node in
# native_sim.dts (a RAM-backed flash simulator) -- no real flash chip
# involved.  On real silicon the same two options back onto the SoM's
# actual MRAM/xSPI/NOR flash partition map instead.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# fs_dirent / fs_statvfs structures are large; the default main
# stack is too small once littlefs's own working set is added.
CONFIG_MAIN_STACK_SIZE=4096
