# SPDX-License-Identifier: Apache-2.0

sample:
  name: counter-alarm
  description: |
    Per-peripheral example for <alp/counter.h>.  Schedules a
    one-shot alarm 100 ms in the future.  Builds for both E1M EVK
    and E1M-X EVK: no board-specific pins are used (board-agnostic).

tests:
  alp_sdk.example.counter_alarm.e1m_evk:
    extra_configs:
      - 'CONFIG_COMPILER_OPT="-DALP_BOARD_E1M_EVK"'
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    tags:
      - alp-sdk
      - example
      - counter
      - aen
    harness: console
    harness_config:
        type: one_line
        regex:
          - "\\[counter\\] done"

  alp_sdk.example.counter_alarm.e1m_x_evk:
    extra_configs:
      - 'CONFIG_COMPILER_OPT="-DALP_BOARD_E1M_X_EVK"'
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    tags:
      - alp-sdk
      - example
      - counter
      - v2n
    harness: console
    harness_config:
        type: one_line
        regex:
          - "\\[counter\\] done"
