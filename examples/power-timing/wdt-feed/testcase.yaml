# SPDX-License-Identifier: Apache-2.0

sample:
  name: wdt-feed
  description: |
    Per-peripheral example for <alp/wdt.h>.  Installs a 5 second
    watchdog timeout and demonstrates the feed loop.

tests:
  alp_sdk.example.wdt_feed:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    tags:
      - alp-sdk
      - example
      - wdt
    harness: console
    harness_config:
        type: one_line
        regex:
          - "\\[wdt\\] done"
