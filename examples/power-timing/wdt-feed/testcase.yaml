# SPDX-License-Identifier: Apache-2.0

sample:
  name: wdt-feed
  description: |
    Per-peripheral example for <alp/wdt.h>.  Installs a 5 second
    watchdog timeout and demonstrates the feed loop.  Builds for
    both E1M EVK and E1M-X EVK: no board-specific pins are used
    (board-agnostic).

tests:
  alp_sdk.example.wdt_feed.e1m_evk:
    extra_configs:
      - 'CONFIG_COMPILER_OPT="-DALP_BOARD_E1M_EVK"'
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    tags:
      - alp-sdk
      - example
      - wdt
      - aen
    harness: console
    harness_config:
        type: one_line
        regex:
          - "\\[wdt\\] done"

  alp_sdk.example.wdt_feed.e1m_x_evk:
    extra_configs:
      - 'CONFIG_COMPILER_OPT="-DALP_BOARD_E1M_X_EVK"'
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    tags:
      - alp-sdk
      - example
      - wdt
      - v2n
    harness: console
    harness_config:
        type: one_line
        regex:
          - "\\[wdt\\] done"
