# SPDX-License-Identifier: Apache-2.0

sample:
  name: uart-hello-world
  description: |
    Per-peripheral example for <alp/peripheral.h> UART.  Producer-
    only "printf via UART" walkthrough: open, send greeting + a
    counter every second, close.  Companion to examples/uart-echo
    (bidirectional) and examples/uart-rx-ringbuf (IRQ-driven RX).

tests:
  alp_sdk.example.uart_hello_world:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    tags:
      - alp-sdk
      - example
      - uart
    harness: console
    harness_config:
        type: one_line
        regex:
          - "\\[uart-hello\\] done"
