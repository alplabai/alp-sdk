#
# Empty-by-design Kconfig.  The effective build config is the
# overlay alp.conf emitted from board.yaml by scripts/alp_project.py
# at configure time (see CMakeLists.txt).
#
# v0.5 [UNTESTED] migration note: Zephyr v4.4's mbedtls 3.6 ships
# with PSA crypto wiring that references `mbedtls_error_pair_t`
# from a private header.  Full integration requires the upstream
# tf-psa-crypto module to be configured -- a v0.6 piece of work.
# Disabling it here lets the native_sim build at least exercise
# the SDK framing path (open(), poll, signature-verify call sites,
# slot-write call site).  Production builds on real silicon (the
# .aen scenario) follow a different config stack (TF-M-on-HE core
# + the mender-mcu-client west module) and are unaffected.
#
# Same workaround as examples/production-deployment/prj.conf --
# the two demos share the v0.6 lift.

# Disable mbedtls on native_sim: Zephyr v4.4's PSA-crypto wiring
# is a v0.6 work item.
CONFIG_MBEDTLS=n

# Keep the upstream mbedtls Kconfig builtin OFF as well; the
# library defaults flip it on as soon as CONFIG_MBEDTLS is true,
# and we want the off path uniform.
CONFIG_MBEDTLS_BUILTIN=n

# MQTT_LIB_TLS is unused by this demo (HTTPS poll instead) but
# the upstream Kconfig pulls it implicitly when CONFIG_MBEDTLS
# flips -- explicit OFF keeps the dependency graph quiet.
CONFIG_MQTT_LIB_TLS=n
