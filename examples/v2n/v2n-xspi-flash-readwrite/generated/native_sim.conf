#
# native_sim-only overlay for v2n-xspi-flash-readwrite.
#
# board.yaml/prj.conf turn on CONFIG_FLASH for the V2N's real xSPI
# NOR.  native_sim has no xSPI controller, so back the flash API with
# Zephyr's in-RAM flash simulator: that gives flash_read/erase/write a
# device to bind so the build (build_only) links cleanly.  The example
# resolves the `xspi-flash` DT alias defensively (NULL device fallback,
# see src/main.c), so at runtime under native_sim it simply prints the
# "alias not present" diagnostic and exits -- the simulator is here
# only to satisfy the CONFIG_FLASH driver dependency at build time.
#
# Wired via testcase.yaml `extra_args: EXTRA_CONF_FILE=...` so it only
# applies to the native_sim variant; real V2N keeps the xSPI driver.
# Lives under generated/ to escape Zephyr's ${APPLICATION_BINARY_DIR}/
# *.conf GLOB (same reason the generated alp.conf does).
CONFIG_FLASH_SIMULATOR=y
CONFIG_FLASH_MAP=y
