sample:
  name: v2n-xspi-flash-readwrite
  description: |
    Read + write + erase against the V2N's on-module xSPI NOR
    flash via Zephyr's flash API.  Validates low-level V2N flash
    bring-up, not coverage for the portable SDK storage facade.

tests:
  alp_sdk.examples.v2n.xspi_flash_readwrite.native_sim:
    platform_allow:
      - native_sim/native/64
    # native_sim has no xSPI controller -- this overlay backs the
    # flash API with the in-RAM flash simulator so the build links
    # (real V2N keeps the xSPI flash driver from prj.conf).
    extra_args: EXTRA_CONF_FILE=generated/native_sim.conf
    tags:
      - alp-sdk
      - example
      - v2n
      - storage
      - flash
    build_only: true
