sample:
  name: v2n-xspi-flash-readwrite
  description: |
    Read + write + erase against the V2N's on-module xSPI NOR
    flash via `<alp/storage.h>`.  Validates the storage surface
    against the V2N's flash backend.

tests:
  alp_sdk.examples.v2n.xspi_flash_readwrite.native_sim:
    platform_allow:
      - native_sim/native/64
    tags:
      - alp-sdk
      - example
      - v2n
      - storage
      - flash
    build_only: true
