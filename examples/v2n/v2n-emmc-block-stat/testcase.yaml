# SPDX-License-Identifier: Apache-2.0

sample:
  name: v2n-emmc-block-stat
  description: |
    Read block-device statistics (sector count, erase block size,
    error counters) from the V2N's on-module eMMC 5.1 via
    Zephyr's disk-access API.  This is low-level V2N storage
    bring-up, not coverage for the portable SDK storage facade.

tests:
  alp_sdk.examples.v2n.emmc_block_stat.native_sim:
    platform_allow:
      - native_sim/native/64
    # native_sim has no SDHC controller -- this overlay swaps the
    # real MMC/SDMMC stack for the in-RAM disk driver so the build
    # links (real V2N keeps the eMMC stack from prj.conf).
    extra_args: EXTRA_CONF_FILE=generated/native_sim.conf
    tags:
      - alp-sdk
      - example
      - v2n
      - storage
      - emmc
    build_only: true
