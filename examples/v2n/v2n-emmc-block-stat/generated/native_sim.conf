#
# native_sim-only overlay for v2n-emmc-block-stat.
#
# board.yaml/prj.conf turn on the real eMMC stack
# (CONFIG_DISK_DRIVER_MMC + CONFIG_SDMMC_STACK), which binds a real
# SDHC controller.  native_sim has no SDHC controller, so disable the
# MMC driver and back the disk-access subsystem with the in-RAM disk
# driver instead -- that gives disk_access_init/ioctl/read a backend
# to link against so the build (build_only) succeeds.
#
# At runtime under native_sim disk_access_init("SD") simply fails
# (no RAM disk named "SD" is configured here) and the example prints
# its "no eMMC?" diagnostic and exits; the point of this overlay is
# only to satisfy the disk-driver dependency at build time.  Real V2N
# keeps the MMC/SDMMC stack from prj.conf.
#
# Wired via testcase.yaml `extra_args: EXTRA_CONF_FILE=...` so it only
# applies to the native_sim variant.  Lives under generated/ to escape
# Zephyr's ${APPLICATION_BINARY_DIR}/*.conf GLOB (same reason the
# generated alp.conf does).
CONFIG_DISK_DRIVER_MMC=n
CONFIG_SDMMC_STACK=n
CONFIG_DISK_DRIVER_RAM=y
