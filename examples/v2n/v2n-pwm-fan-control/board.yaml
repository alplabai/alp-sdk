# Fan-control case study on a V2N module.  The application code is
# fully portable -- E1M_PWM0 resolves on any E1M-conformant
# SoM.  Switch `som.sku` to `E1M-AEN701`, `E1M-V2M101`, etc. to
# run the same fan curve on a different module without code
# changes.

som:
  sku: E1M-V2N101

preset: e1m-x-evk
cores:
  a55_cluster:
    os: "off"
  m33_sm:
    app: ./src
    peripherals:
      - pwm

diagnostics:
  log_level: info
