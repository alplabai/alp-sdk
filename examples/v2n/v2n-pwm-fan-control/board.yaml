# Fan-control case study on a V2N module.  The application code is
# E1M-X pinout namespace (`ALP_E1M_X_PWM0`).  Switch within the
# E1M-X family once the target board routes the same fan-control
# output; use <alp/board.h> aliases for cross-EVK portability.

schemaVersion: 2
som:
  sku: E1M-V2N101

preset: e1m-x-evk
cores:
  a55_cluster:
    os: "off"
  m33_sm:
    app: ./src
    peripherals:
      - pwm

diagnostics:
  log_level: info
