# board.yaml -- per-app project configuration for v2n-gd32-bridge-ping.

schema_version: 2

som:
  sku: E1M-V2N101

carrier:
  name: E1M-X-EVK

cores:
  a55_cluster:
    os: "off"
  m33_sm:
    os: zephyr
    app: ./src
    # Both SPI + I2C are exercised so the example can demonstrate the
    # hybrid bridge routing.
    peripherals:
      - spi
      - i2c

chips:
  - gd32g553

diagnostics:
  log_level: info
