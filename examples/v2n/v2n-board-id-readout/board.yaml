# board.yaml -- per-app project configuration for v2n-board-id-readout.
schemaVersion: 1
som:
  sku: E1M-V2N101

preset: e1m-x-evk
cores:
  a55_cluster:
    os: "off"
  m33_sm:
    app: ./src
    peripherals:
      - i2c

chips:
  - eeprom_24c128

features:
  hw_info:
    eeprom:
      bus: e1m_i2c0           # studio resolves to the right bus_id
      addr_7bit: 0x50
      offset: 0

diagnostics:
  log_level: info
