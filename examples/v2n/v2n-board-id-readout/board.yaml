# board.yaml -- per-app project configuration for v2n-board-id-readout.

schema_version: 2

som:
  sku: E1M-V2N101

carrier:
  name: E1M-X-EVK

# M33-SM-only Zephyr build (matches the v1 `os: zephyr` behaviour for
# this example).  The A55 cluster is opted off so the build runs
# fast under twister; customers wanting the dual-OS flavour add an
# `a55_cluster:` block.
cores:
  a55_cluster:
    os: "off"
  m33_sm:
    app: ./src
    peripherals:
      - i2c

chips:
  - eeprom_24c128

features:
  hw_info:
    eeprom:
      bus: e1m_i2c0           # studio resolves to the right bus_id
      addr_7bit: 0x50
      offset: 0

diagnostics:
  log_level: info
