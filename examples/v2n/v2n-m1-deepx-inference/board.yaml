# board.yaml -- per-app project configuration for the
# v2n-m1-deepx-inference example.
#
# Targets V2N-M1 (the Renesas RZ/V2N + DEEPX DX-M1 NPU SoM).
# Real silicon required to run the inference path; native_sim
# exercises the framing only (every call returns NOSUPPORT or
# NOT_READY but the structure is verified).

schema_version: 2

som:
  sku: E1M-V2M101  # V2N-M1 variant with DEEPX DX-M1 NPU

carrier:
  name: E1M-EVK

# Zephyr-side bring-up of the DEEPX rail + NPU dispatch sits on the
# M33-SM (mirrors v1 `os: zephyr` shape).  The A55 cluster's real
# DEEPX inference path is the v2n-m1-ros-perception example; we opt
# the A-cluster off here so this slice runs fast under twister.
cores:
  a55_cluster:
    os: "off"
  m33_sm:
    os: zephyr
    app: ./src
    # Inference dispatcher set comes from V2M101's `capabilities:`
    # block (drp_ai: true + deepx_dx: true).  DEEPX dispatches via the
    # Linux PCIe driver -- under Zephyr the dispatcher emits a
    # NOSUPPORT-stub.  Real DEEPX inference happens on the customer's
    # Yocto image via dx_rt; alp_inference_open(.backend=DEEPX_DX, ...)
    # picks it per-handle.

chips:
  - deepx_dxm1    # host driver: PCIe mux + M1_RESET sequencer
  - da9292        # PMIC for the DEEPX 0.75 V rail
  - pi3dbs12212   # PCIe mux

# v2n_power_mgmt (§C.28) auto-brings-up the 0.75 V DEEPX rail
# on P65 IRQ via the V2N supervisor's SYS_INIT hook -- no
# board.yaml-level wiring needed.

diagnostics:
  log_level: info
