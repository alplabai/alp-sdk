sample:
  name: v2n-secure-element-sign
  description: |
    Probe the OPTIGA Trust M secure element on the V2N SoM and
    confirm product-info/raw-APDU calls are cleanly blocked with
    ALP_ERR_NOSUPPORT until the host-library transport is integrated.

tests:
  alp_sdk.examples.v2n.secure_element_sign.native_sim:
    platform_allow:
      - native_sim/native/64
    tags:
      - alp-sdk
      - example
      - v2n
      - security
      - optiga
    build_only: true
