# board.yaml -- ROS 2 perception node on V2N + V2N-M1 (DEEPX DX-M1).
#
# Customer workflow: copy this dir + the colcon workspace under
# src/, run `colcon build --base-paths .` inside a Yocto SDK
# environment that includes ros-perception + dx_rt.  Resulting
# binaries land in `install/alp_perception/lib/`.
#
# This is the SDK's flagship ROS 2 demo: V2N (Renesas RZ/V2N
# quad-Cortex-A55 + M33) acts as the ROS 2 compute node,
# delegating object detection to the on-module DEEPX DX-M1 NPU
# over PCIe.  The same C++ source builds against V2N (no DEEPX --
# falls through to DRP-AI) and V2N-M1 (DEEPX) by swapping
# `som.sku`.

schema_version: 1

som:
  sku: E1M-V2M101            # V2N-M1: V2N + DEEPX DX-M1.

carrier:
  name: E1M-X-EVK

os: yocto

# ROS 2 perception node uses the DEEPX NPU on V2N-M1; V2N (no
# DEEPX) falls through to DRP-AI3 automatically.
inference:
  backend: deepx_dx          # V2N-M1 primary; V2N degrades to drpai.

# ROS 2 is brought in via the Yocto image's meta-ros layer, not
# via libraries: -- the recipe pulls ros-rclcpp + ros-vision-msgs +
# ros-sensor-msgs at image-build time.  The host SDK's libraries:
# field still drives the alp_* compile-time profile.
libraries:
  - tflite_micro             # CPU fallback for V2N (no DEEPX) builds.
  - opus                     # Audio compression if the node carries
                              # an audio capture topic.

peripherals:
  - uart                     # GNSS (NEO-M9N).
  - i2c                      # IMU (LSM6DSO) + battery (INA236).

chips:
  - deepx_dxm1               # V2N-M1 only -- host driver / reset sequencer.
  - lsm6dso                  # IMU.
  - ublox_neo_m9n            # GNSS.
  - ina236                   # Battery monitor (used by the diagnostics topic).
  - da9292                   # PMIC for the DEEPX 0.75 V rail.
  - pi3dbs12212              # PCIe mux between DEEPX + host.
  - optiga_trust_m           # ROS 2 SROS2 (security) key store.

diagnostics:
  log_level: info
