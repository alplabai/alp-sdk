# board.yaml -- rpmsg-imx93
#
# Heterogeneous compute demo for E1M-NX9101 (NXP i.MX 93).  Same
# pattern as rpmsg-v2n but for the i.MX 9-family heterogeneous SoC:
#
#   * `a55_cluster` -- Yocto consumer under `linux/`.
#   * `m33`         -- Zephyr producer under `m33/` -- the same
#                       source pattern as rpmsg-v2n's m33_sm slice,
#                       but the iMX93's M33 carries no system-manager
#                       role so the core ID is just `m33`.
#
# The iMX93 SoM preset's memory_map values are TBD pending the
# user's authoritative HW writeup; until those land, `west alp-build`
# will fail at carve-out resolution with a clear message.  This
# example's structural files are correct in shape today.
libraries:
  - name: mbedtls
    cores: [a55_cluster]
  - name: nlohmann-json
    cores: [a55_cluster]
  - name: cmsis-dsp
    cores: [m33]

som:
  sku: E1M-NX9101
  hw_rev: r1

preset: e1m-evk

# E1M pads this app uses (subset of the EVK preset's `e1m_routes:`).
pins:
  - { e1m: E1M_PWM0, macro: EVK_PWM_LED_GREEN, doc: "RGB LED green; schematic-wired via PWM0 (non-contiguous with R/B)" }
  - { e1m: E1M_I2C0, macro: EVK_I2C_BUS_SENSORS, doc: "Shared sensor + IO-expander + INA236 bus" }
cores:
  a55_cluster:
    app: ./linux
    image: alp-image-edge
  m33:
    app: ./m33
    peripherals: [adc, pwm, i2c, gpio]

# Cross-core RPMsg carve-out.  Once the SoM preset carries hard
# memory_map values, the orchestrator allocates from the region whose
# `accessible_from:` covers both endpoints.  Spec §6.8: i.MX 93's
# M33 has no cache, so the default non-cacheable region wins.
ipc:
  - kind: rpmsg
    endpoints: [a55_cluster, m33]
    carve_out_kb: 512
    name: alp_default_rpmsg

diagnostics:
  log_level: info
