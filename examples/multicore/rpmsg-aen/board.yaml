# board.yaml -- rpmsg-aen  (AEN801 default)
#
# Heterogeneous compute demo for E1M-AEN801 (Alif Ensemble E8).  The
# E8 die carries a 2-core Cortex-A32 cluster plus 2 Cortex-M55 cores
# (HP + HE).  This example wires:
#
#   * `a32_cluster` -- Yocto Linux consumer under `linux/`.
#   * `m55_hp`      -- Zephyr producer under `m55_hp/` reading the
#                       board's on-board BMP581 + BMI323 sensors
#                       and publishing them over RPMsg.
#   * `m55_he`      -- left at the SoM topology default (stock-shim
#                       Zephyr image); the always-on M55-HE core
#                       stays alive for future low-power offload
#                       work but doesn't participate in this demo's
#                       RPMsg channel.
#
# See docs/heterogeneous-builds.md for the full walk-through; the
# `examples/multicore/rpmsg-v2n/` example is the canonical V2N counterpart of
# this AEN setup.
#
# AEN801 uses the E8 silicon variant (AE822FA0E5597LS0) whose sram0
# base is grounded (0x02000000); the `alp_default_rpmsg` carve-out
# resolves from that region.  The mailbox controller is `alif_mhuv2`
# (ARM MHUv2, bench-unverified on silicon but not TBD).

som:
  sku: E1M-AEN801
  hw_rev: r2

preset: e1m-evk             # BMP581 + BMI323 (on-board IMU) are
                            # populated by the EVK preset defaults.

# E1M pads this app uses (subset of the EVK preset's `e1m_routes:`).
pins:
  - { e1m: E1M_I2C0, macro: EVK_I2C_BUS_SENSORS, doc: "Shared sensor + IO-expander + INA236 bus" }
cores:
  a32_cluster:
    app: ./linux
    image: alp-image-edge
    libraries: [mbedtls, nlohmann_json]
  m55_hp:
    app: ./m55_hp
    peripherals: [i2c]
    libraries: [cmsis_dsp]

# Cross-core RPMsg carve-out.  The orchestrator allocates from
# E1M-AEN801's sram0 region (0x02000000, 4096 KiB, accessible from
# all three cores; cacheable: true on AEN by default because the M55
# cache is on).
ipc:
  - kind: rpmsg
    endpoints: [a32_cluster, m55_hp]
    carve_out_kb: 256
    name: alp_default_rpmsg
    cacheable: true

diagnostics:
  log_level: info
