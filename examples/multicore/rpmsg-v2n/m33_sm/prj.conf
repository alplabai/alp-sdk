#
# The rest of this app's Kconfig comes from build/generated/alp.conf --
# emitted from ../board.yaml by scripts/alp_project.py and layered over
# this file via OVERLAY_CONFIG (see CMakeLists.txt).
#
# alp-sdk #683 "Path B, Phase 1": src/main.c is now a real raw-OpenAMP
# rpmsg slave (see its file header for why it bypasses <alp/rpc.h> in this
# phase), so this file carries the Kconfig that firmware needs on real
# RZ/V2N hardware -- matching upstream's openamp_linux_zephyr sample
# prj.conf line for line.
CONFIG_MBOX=y
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_OPENAMP=y
# Ship our OWN resource table (src/resource_table.c) instead of Zephyr's
# generated one -- the A55 side's Renesas Multi-OS Package tooling expects
# the vendor-shaped table, not a generic one (see main.c's file header).
CONFIG_OPENAMP_RSC_TABLE=n
