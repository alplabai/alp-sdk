# SPDX-License-Identifier: Apache-2.0
#
# Lives under m33_sm/ (not the project root) because rpmsg-v2n is a
# multi-slice project: the parent directory carries the orchestrator's
# board.yaml + linux/ Yocto consumer + this m33_sm/ Zephyr app.  Only
# the m33_sm/ tree is a self-contained Zephyr app twister can build,
# so the testcase has to sit next to its CMakeLists.txt — otherwise
# twister picks up the parent directory and tries to configure the
# multi-slice marker as a Zephyr app (no prj.conf, no Zephyr CMake).

sample:
  name: rpmsg-v2n-m33_sm
  description: |
    Heterogeneous-compute flagship: Yocto Linux on the V2N's
    Cortex-A55 cluster + Zephyr on the same SoC's Cortex-M33-SM,
    communicating over a raw OpenAMP/RPMsg link (alp-sdk #683 "Path
    B, Phase 1" -- see src/main.c's file header for why this phase
    bypasses <alp/rpc.h>).  The A55/Yocto consumer is tested
    separately by the bitbake CI lane.

    native_sim dropped (alp-sdk #683): this firmware is no longer a
    portable placeholder -- it requires real RZ/V2N devicetree
    (rsctbl/vring/mhu nodes, see the board overlay) and the Renesas
    MHU mailbox + FSP + OpenAMP/libmetal modules, none of which
    native_sim provides.  build_only against the real board is this
    phase's proof; bench attach/echo verification is a later phase.
    Requires hal_renesas + open-amp + libmetal as west modules (see
    west.yml) -- a CI runner without those groups fetched cannot
    build this test.

tests:
  alp_sdk.examples.rpmsg_v2n.m33_sm:
    platform_allow:
      - alp_e1m_v2n101_m33_sm/r9a09g056n48gbg/cm33
    tags:
      - alp-sdk
      - example
      - multiprocessor
      - yocto
      - heterogeneous
      - rpmsg
      - v2n
    build_only: true
