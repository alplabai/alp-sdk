# board.yaml -- rpmsg-v2n
#
# Heterogeneous compute flagship for E1M-V2N101 (Renesas RZ/V2N):
# Yocto Linux on the Cortex-A55 cluster talks to Zephyr RTOS on the
# same SoC's Cortex-M33 system-manager over RPMsg.  One SoM, two
# OSes, one board.yaml that drives both halves.
#
# Per-core slices (kept in lockstep via the orchestrator):
#
#   * `a55_cluster` -- Yocto consumer under `linux/` (alp-image-edge).
#   * `m33_sm`      -- Zephyr producer under `m33_sm/`.
#
# Both halves include <alp/system_ipc.h> (generated by
# scripts/alp_orchestrate/) and use <alp/rpc.h> as the framed
# RPMsg surface.  No address, endpoint id, or mailbox channel is
# hand-written in app code -- the build emits a single header that
# both slices `#include`.
#
# See docs/heterogeneous-builds.md for the full walk-through.
schemaVersion: 2
libraries:
  - name: mbedtls
    cores: [a55_cluster]
  - name: nlohmann-json
    cores: [a55_cluster]
  - name: cmsis-dsp
    cores: [m33_sm]

som:
  sku: E1M-V2N101            # V2N -- A55 cluster + M33-SM + DRP-AI3.
  hw_rev: r1

preset: e1m-x-evk
cores:
  a55_cluster:
    app: ./linux
    image: alp-image-edge    # stock alp-sdk reference rootfs.
    peripherals: [ethernet, usb, emmc]
    iot:
      wifi: true
      mqtt: true
      tls:  true
  m33_sm:
    app: ./m33_sm
    peripherals: [adc, pwm, i2c, gpio]

# Cross-core RPMsg carve-out.  The orchestrator allocates from
# E1M-V2N101's `memory_map:` -- ocram_low for the default
# non-cacheable region.  Endpoint IDs + mailbox channel are derived
# from the channel name and emitted into <alp/system_ipc.h>.
ipc:
  - kind: rpmsg
    endpoints: [a55_cluster, m33_sm]
    carve_out_kb: 512
    name: alp_default_rpmsg

diagnostics:
  log_level: info
