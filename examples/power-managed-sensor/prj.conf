#
# Empty by design.  Every CONFIG_* this app needs is derived from
# board.yaml by scripts/alp_project.py and layered in as
# OVERLAY_CONFIG via CMakeLists.txt -- the board.yaml is the
# single source of truth.  In particular the v0.6 `cores.<id>.power:`
# block emits CONFIG_PM + CONFIG_PM_DEVICE + the matching
# CONFIG_PM_DEVICE_WAKE_<SUBSYS> lines per wake source.
