# yaml-language-server: $schema=https://raw.githubusercontent.com/Open-CMSIS-Pack/devtools/tools/projmgr/2.12.0/tools/projmgr/schemas/cproject.schema.json

project:
  define:
    - BOARD_ALIF_DEVKIT_VARIANT: 4  # E1M Custom Board (6) / Alif DevKit Gen2 (4)

  layers:
    - layer: ../../device/alif-ensemble/alif-ensemble-e7-device.clayer.yml
      
  groups:
    - group: App
      files:
        - file: main.c
    - group: ALP SDK
      files:
        - file: ../../alp/src/core/alp_gpio_core.c
        - file: ../../alp/src/drivers/alif/alp_gpio_alif.c

  add-path:
    - ../../alp/include

  output:
    base-name: $Project$
    type:
      - elf
      - bin

  components:
    - component: ARM::CMSIS:CORE
    - component: AlifSemiconductor::Services:Secure Enclave:core&Source
    - component: AlifSemiconductor::Services:Secure Enclave:Initialization Helper&Source
    - component: AlifSemiconductor::BSP:Board Config
    - component: AlifSemiconductor::BSP:DevKit Config&DevKit-e7

  packs:
    - pack: AlifSemiconductor::Ensemble
