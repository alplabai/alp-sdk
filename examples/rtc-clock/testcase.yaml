# SPDX-License-Identifier: Apache-2.0

sample:
  name: rtc-clock
  description: |
    Per-peripheral example for <alp/rtc.h>.  Demonstrates set/get
    round-trip with the human-readable alp_rtc_time_t struct.

tests:
  alp_sdk.example.rtc_clock:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    tags:
      - alp-sdk
      - example
      - rtc
    harness: console
    harness_config:
        type: one_line
        regex:
          - "\\[rtc\\] done"
