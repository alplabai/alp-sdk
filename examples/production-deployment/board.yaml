# board.yaml -- per-app project configuration for the
# production-deployment flagship.
#
# Designed against AEN-Zephyr (the dual-Cortex-M55 silicon with
# OPTIGA Trust M + secure-boot fabric).  Real customer shipping
# variants will fork this for V2N or i.MX 93 boards; the SDK's
# surfaces stay identical across SoMs.
som:
  sku: E1M-AEN701

preset: e1m-evk
cores:
  a32_cluster:
    os: "off"
  m55_hp:
    app: ./src
    # IoT features (WiFi + MQTT + TLS) ride the per-core `iot:` block;
    # the alp_project.py emitter translates wifi/mqtt/tls into
    # CONFIG_ALP_SDK_IOT_WIFI / _MQTT / _SECURITY.
    iot:
      wifi: true
      mqtt: true
      tls: true
    # libraries: mbedtls dropped here for v0.5 native_sim parity
    #            (Zephyr 4.4 + mbedtls 3.6 PSA wiring is a v0.6 work item).
    #            Real-silicon builds re-enable mbedtls via the SoM-side
    #            TF-M-on-HE-core stack.

chips:
  - optiga_trust_m
  - eeprom_24c128

diagnostics:
  log_level: info

# Secure-boot signing happens at release-build time -- the
# zephyr/sysbuild/aen/ profile carries the ECDSA-P256 key
# configuration that turns this app into a signed image.  See
# docs/secure-boot.md for the key-management contract.  MCUboot
# slot inspection at runtime via <alp/storage.h> goes through
# the internal-flash backend (no explicit board.yaml `chips:`
# or libraries entry required -- the storage surface is always
# available on Zephyr targets that have an internal flash
# controller in DT).
