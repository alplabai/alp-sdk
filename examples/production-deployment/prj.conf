#
# Empty by design.  The build's effective Kconfig is
# build/generated/alp.conf -- emitted from this app's board.yaml
# by scripts/alp_project.py and layered over this file via
# OVERLAY_CONFIG (see CMakeLists.txt).
#
# v0.5 [UNTESTED] migration note: Zephyr v4.4's mbedtls 3.6 ships
# with PSA crypto wiring that references `mbedtls_error_pair_t`
# from a private header.  Full integration requires the upstream
# tf-psa-crypto module to be configured -- a v0.6 piece of work.
# Disabled here so the native_sim build at least exercises the
# SDK framing path.  Production builds on real silicon (the
# .aen scenario) follow a different config stack (TF-M-on-HE
# core) and are unaffected.
# Disable mbedtls on native_sim: Zephyr v4.4's PSA-crypto wiring is
# a v0.6 work item.  The .aen scenario links the real mbedtls via
# TF-M on the HE core.
CONFIG_MBEDTLS=n
CONFIG_MBEDTLS_BUILTIN=n
CONFIG_MQTT_LIB_TLS=n
