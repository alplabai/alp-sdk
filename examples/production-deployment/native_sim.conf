#
# Native-sim Kconfig overlay for production-deployment.
#
# Loaded LAST via twister's `extra_args: EXTRA_CONF_FILE=...`
# (see ../testcase.yaml), so the settings here win over the
# alp.conf-emitted CONFIG_MBEDTLS=y that `libraries: [mbedtls]`
# pulls into every production-deployment build.
#
# Why: Zephyr v4.4 ships mbedtls 3.6 + the new tf-psa-crypto
# split.  The upstream library-internal header
# `mbedtls/library/ssl_misc.h` references `mbedtls_error_pair_t`
# before including the type's declaring header; every TU that
# compiles against the SSL portion of mbedtls fails with
# `unknown type name 'mbedtls_error_pair_t'`.  Full integration
# is a v0.6 (TF-M-on-HE + tf-psa-crypto wiring) work item.
#
# On native_sim we only want the framing-path coverage (open(),
# attest(), OTA-poll call site); turning mbedtls off keeps the
# build green without losing that coverage.  Real-silicon (.aen)
# builds follow a different config stack (TF-M-on-HE core) and
# aren't affected.
CONFIG_MBEDTLS=n
CONFIG_MBEDTLS_BUILTIN=n
CONFIG_MQTT_LIB_TLS=n

# CONFIG_FILE_SYSTEM_LITTLEFS requires a backing flash device or a
# block device declared in DT (CONFIG_FS_LITTLEFS_BLK_DEV).  native_sim
# carries neither, so upstream `subsys/fs/littlefs_fs.c` trips its
# BUILD_ASSERT (no flash/block-device backend visible) and the build
# aborts with "static assertion failed" before main.c even compiles.
# Real-silicon (.aen) builds keep LFS on -- the AEN MRAM is wired
# into DT as the chosen `zephyr,flash-controller` for the storage
# partitions, so the assertion passes.
CONFIG_FILE_SYSTEM_LITTLEFS=n
CONFIG_FILE_SYSTEM=n
