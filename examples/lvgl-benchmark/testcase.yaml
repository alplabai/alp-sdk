sample:
  name: lvgl-benchmark
  description: |
    Wraps the upstream lv_demo_benchmark() FPS harness on ST7789.
    Customers run it to compare per-SoM rendering throughput
    (capabilities:'s gpu2d / dave2d / dma2d wiring) without
    writing benchmark code themselves.
common:
  tags: lvgl benchmark demo example performance
tests:
  alp_sdk.examples.lvgl_benchmark.native_sim:
    platform_allow: native_sim/native/64
    build_only: true
  alp_sdk.examples.lvgl_benchmark.aen:
    platform_allow:
      - ensemble_e8_dk/ae402fa0e5597le0/rtss_hp
    build_only: true
