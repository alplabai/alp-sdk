#
# native_sim-only overlay.  native_sim has no real ST7789 panel, so
# bind Zephyr's dummy display driver: it lets the music-player UI
# link and run the build-only twister check without an SDL/X11
# dependency.  On real silicon this file is NOT applied; the board
# devicetree binds the actual ST7789 display node instead.
CONFIG_DUMMY_DISPLAY=y

# native_sim's DTS also carries a zephyr,sdl-dc node, so CONFIG_DISPLAY=y
# (prj.conf) drags in the SDL display driver by default alongside the
# dummy one above -- see lvgl-widgets-demo/native_sim.conf for why
# that segfaults headless. This app never opens that device, so keep
# SDL out of the build entirely.
CONFIG_SDL_DISPLAY=n
