# board.yaml -- LVGL music-player demo (UI only).
#
# Wraps the upstream `lv_demo_music()` which is the most polished
# of LVGL's bundled demos -- album-art carousel, time slider,
# track list, equaliser visualiser.  This is a DISPLAY-ONLY demo:
# lv_demo_music() animates the player scene but does not decode or
# play any audio, and main.c makes no alp_i2s_* / codec calls.  A
# real audio output path (a WM8960 / TLV320 codec over I²S plus an
# MP3 decoder) is intentionally out of scope here.
schemaVersion: 2
libraries:
  - name: lvgl
    cores: [m55_hp]

som:
  sku: E1M-AEN801

preset: e1m-evk

# E1M pads this app uses (subset of the EVK preset's `e1m_routes:`).
pins:
  - { e1m: E1M_SPI1, macro: EVK_SPI_BUS_ARDUINO, doc: "Arduino UNO header SPI; terminates on the on-module CC3501E, not the main SoC" }
cores:
  a32_cluster:
    os: "off"
  m55_hp:
    app: ./src
    peripherals:
      - spi
      - gpio                 # ST7789 panel: SPI data + control GPIOs.

chips:
  - st7789                   # Display.

diagnostics:
  log_level: info
