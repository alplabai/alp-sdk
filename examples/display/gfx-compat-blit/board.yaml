# board.yaml -- per-app project configuration for the
# gfx-compat-blit example.
#
# gfx_compat is an in-tree, maintainer-written RGB565 fill/blit shim
# (src/lib/gfx_compat/, wired in by `libraries: [gfx_compat]` below --
# see zephyr/Kconfig.alp-libraries's CONFIG_ALP_GFX_COMPAT_SW). It has
# no target hardware dependency, so this example needs no peripherals
# or chips: just RAM buffers.
schemaVersion: 1
som:
  sku: E1M-AEN801

preset: e1m-evk
cores:
  m55_hp:
    app: ./src
    libraries:
      - gfx_compat
    peripherals: []

diagnostics:
  log_level: info
