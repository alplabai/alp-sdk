# SPDX-License-Identifier: Apache-2.0

sample:
  name: gfx-compat-blit
  description: |
    Fills + blits a RGB565 buffer with gfx_compat (the in-tree SW-blit
    shim) and prints a checksum. [UNTESTED] -- native_sim only, no
    bench run.

tests:
  alp_sdk.example.gfx_compat_blit:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    tags:
      - alp-sdk
      - example
      - gfx-compat-blit
    harness: console
    harness_config:
        type: one_line
        regex:
          - "\\[gfx-compat-blit\\] done"
