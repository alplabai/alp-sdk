sample:
  name: drone-hud
  description: |
    Marketing demo: LSM6DSO IMU + uBlox NEO-M9N GNSS + INA236
    battery monitor + ST7789 TFT driven through portable <alp/*>
    surfaces.  Madgwick attitude fusion + LVGL HUD.  native_sim
    runs the UI + the threading model against simulated chip
    NOSUPPORT contracts.
common:
  tags: lvgl demo example marketing showcase drone uav
tests:
  alp_sdk.examples.drone_hud.native_sim:
    platform_allow: native_sim/native/64
    build_only: true
  alp_sdk.examples.drone_hud.aen:
    platform_allow:
      - ensemble_e8_dk/ae402fa0e5597le0/rtss_hp
    build_only: true
