#
# native_sim-only overlay.  native_sim has no real ST7789 panel, so
# bind Zephyr's dummy display driver: it lets the benchmark harness
# link and run the build-only twister check without an SDL/X11
# dependency.  On real silicon this file is NOT applied; the board
# devicetree binds the actual ST7789 display node instead.
CONFIG_DUMMY_DISPLAY=y
