CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=131072

CONFIG_LV_USE_DEMO_BENCHMARK=y

CONFIG_LV_Z_VDB_SIZE=50
CONFIG_LV_COLOR_DEPTH_16=y
# 60 fps target -- benchmark wants the headroom.
CONFIG_LV_DEF_REFR_PERIOD=16

# LVGL's own internal allocator pool -- see lvgl-widgets-demo/prj.conf
# for why the 2048-byte Kconfig default is unsafe (undersizing it
# doesn't fail cleanly, it crashes on the resulting NULL). The
# benchmark scene set is lighter than lv_demo_widgets() but still
# needs headroom beyond the default.
CONFIG_LV_Z_MEM_POOL_SIZE=65536

CONFIG_LOG=y
CONFIG_LOG_PRINTK=y

# Display subsystem.  The actual panel driver is devicetree-specific:
# real silicon binds the ST7789 through Zephyr's display/MIPI DBI
# nodes, while native_sim has no panel and pulls CONFIG_DUMMY_DISPLAY=y
# from the per-example native_sim.conf overlay (wired in testcase.yaml).
CONFIG_DISPLAY=y

# This app binds LVGL to the panel itself via <alp/gui.h>'s
# alp_gui_lvgl_attach() (src/main.c) -- see lvgl-widgets-demo/prj.conf
# for the full rationale on turning Zephyr's own lvgl auto-init off.
CONFIG_LV_Z_AUTO_INIT=n
