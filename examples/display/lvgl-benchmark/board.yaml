# board.yaml -- LVGL benchmark demo.
#
# Wraps the upstream `lv_demo_benchmark()` which measures rendering
# throughput across LVGL's standard scenes.  Use this to compare:
#   - GPU2D / DAVE2D HW acceleration (E4 / E6 / E8) vs pure-C blit (E3 / E5)
#   - DMA2D framebuffer push vs sync SPI push
#   - Native_sim baseline (CPU-only) vs SoM hardware path
libraries:
  - name: lvgl
    cores: [m55_hp]

som:
  sku: E1M-AEN801           # E8 has GPU2D + DAVE2D + DMA2D populated.

preset: e1m-evk

# E1M pads this app uses (subset of the EVK preset's `e1m_routes:`).
pins:
  - { e1m: E1M_SPI1, macro: EVK_SPI_BUS_ARDUINO, doc: "Arduino UNO header SPI; terminates on the on-module CC3501E, not the main SoC" }
cores:
  a32_cluster:
    os: "off"
  m55_hp:
    app: ./src
    peripherals:
      - spi
      - gpio

chips:
  - st7789

diagnostics:
  log_level: info
