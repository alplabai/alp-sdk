# board.yaml -- LVGL widgets demo on E1M-AEN.
#
# Wraps the upstream `lv_demo_widgets` from LVGL's demos/ tree --
# the headline showcase of every standard widget (buttons, sliders,
# tabs, charts, meters, ...).  Customer workflow: copy this dir,
# point `som.sku` at your AEN MPN, attach a 240x320 ST7789 TFT to
# the E1M-EVK SPI0 + GPIO IO0 (D/C) + GPIO IO1 (reset) pads, and
# `west build`.
som:
  sku: E1M-AEN801           # E8 has the Cortex-A32 + SRAM headroom that
                             # LVGL widgets needs comfortably.

preset: e1m-evk

# E1M pads this app uses (subset of the EVK preset's `e1m_routes:`).
pins:
  - { e1m: E1M_SPI1, macro: EVK_SPI_BUS_ARDUINO, doc: "Arduino UNO header SPI; terminates on the on-module CC3501E, not the main SoC" }
cores:
  a32_cluster:
    os: "off"
  m55_hp:
    app: ./src
    # LVGL pulls in via the standard Tier 1 library knob.  The
    # §D.lib.loader cross-references AEN's `capabilities:` block and
    # emits CONFIG_ALP_LVGL_DMA2D=y on E*-series.
    libraries:
      - lvgl
    # SPI for the display + GPIO for the D/C# + reset pins.  The
    # board devicetree binds these to Zephyr's MIPI DBI Type C
    # controller and the ST7789 display driver; the app stays on LVGL.
    peripherals:
      - spi
      - gpio

chips:
  - st7789

diagnostics:
  log_level: info
