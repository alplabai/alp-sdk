sample:
  name: lvgl-widgets-demo
  description: |
    Wraps the upstream lv_demo_widgets() showcase on a 240x320
    ST7789 panel via Zephyr's display subsystem + the lvgl library
    knob.  native_sim builds the UI against the dummy display; AEN
    target build verifies the cross-compile.
common:
  tags: lvgl demo example
tests:
  alp_sdk.examples.lvgl_widgets_demo.native_sim:
    platform_allow: native_sim/native/64
    build_only: true            # LVGL needs an SDL2 host runtime;
                                # twister build-only is enough for v0.5.
    # native_sim has no real panel -- bind the dummy display via the
    # per-example overlay so the dummy-panel knob never reaches the
    # real-silicon build.
    extra_args: EXTRA_CONF_FILE=native_sim.conf
  alp_sdk.examples.lvgl_widgets_demo.aen:
    platform_allow:
      - ensemble_e8_dk/ae402fa0e5597le0/rtss_hp
    build_only: true            # No EVK runner online -- v0.6 HiL fills.
