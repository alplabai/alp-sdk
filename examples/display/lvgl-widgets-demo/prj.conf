#
# Per-app overlay.  The loader-generated alp.conf carries the
# baseline (CONFIG_ALP_SDK=y, CONFIG_LVGL=y, the ST7789 driver
# gate, GPU2D/DMA2D backend choice).  Everything below is demo-
# specific: pull in the lv_demo_widgets() upstream entrypoint and
# set the display geometry LVGL expects.

CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=131072

# LVGL upstream demo entrypoint -- lives under demos/widgets/
# in the LVGL tree.  Zephyr's lvgl module sources it in when
# this Kconfig is set.
CONFIG_LV_USE_DEMO_WIDGETS=y

# LVGL display geometry must match the wired ST7789 panel.  240x320
# is the typical TFT geometry; the 240x240 round variant works too,
# customers swap the macro to suit.
CONFIG_LV_Z_VDB_SIZE=50
CONFIG_LV_COLOR_DEPTH_16=y

# Render thread + frame-rate cap.
# 30 fps target.
CONFIG_LV_DEF_REFR_PERIOD=33

# Console + log for the smoke message.
CONFIG_LOG=y
CONFIG_LOG_PRINTK=y

# Display subsystem.  The actual panel driver is board-specific:
# real silicon binds the ST7789 from the generated alp.conf, while
# native_sim has no panel and pulls CONFIG_DUMMY_DISPLAY=y from the
# per-example native_sim.conf overlay (wired in testcase.yaml).
CONFIG_DISPLAY=y
