#
# Per-app overlay.  The loader-generated alp.conf carries the
# baseline (CONFIG_ALP_SDK=y, CONFIG_LVGL=y, GPU2D/DMA2D backend
# choice).  Everything below is demo-specific: pull in the
# lv_demo_widgets() upstream entrypoint and set the display geometry
# LVGL expects.

CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=131072

# LVGL upstream demo entrypoint -- lives under demos/widgets/
# in the LVGL tree.  Zephyr's lvgl module sources it in when
# this Kconfig is set.
CONFIG_LV_USE_DEMO_WIDGETS=y

# LVGL display geometry must match the wired ST7789 panel.  240x320
# is the typical TFT geometry; the 240x240 round variant works too,
# customers swap the macro to suit.
CONFIG_LV_Z_VDB_SIZE=50
CONFIG_LV_COLOR_DEPTH_16=y

# LVGL's own internal allocator pool (lv_malloc) -- separate from
# CONFIG_HEAP_MEM_POOL_SIZE above, which only backs the flush-buffer
# malloc() in src/gui_lvgl.c.  The 2048-byte Kconfig default is far
# too small once lv_demo_widgets() creates its tab view, styles, and
# per-widget draw state; undersizing this doesn't fail cleanly --
# lv_malloc callers that skip the OOM check crash on the resulting
# NULL. Sized generously for the full widgets showcase (charts,
# meters, tables, ...).
CONFIG_LV_Z_MEM_POOL_SIZE=262144

# Render thread + frame-rate cap.
# 30 fps target.
CONFIG_LV_DEF_REFR_PERIOD=33

# Console + log for the smoke message.
CONFIG_LOG=y
CONFIG_LOG_PRINTK=y

# Display subsystem.  The actual panel driver is devicetree-specific:
# real silicon binds the ST7789 through Zephyr's display/MIPI DBI
# nodes, while native_sim has no panel and pulls CONFIG_DUMMY_DISPLAY=y
# from the per-example native_sim.conf overlay (wired in testcase.yaml).
CONFIG_DISPLAY=y

# This app binds LVGL to the panel itself via <alp/gui.h>'s
# alp_gui_lvgl_attach() (src/main.c), not Zephyr's own lvgl module
# auto-init. CONFIG_LV_Z_AUTO_INIT defaults y and would otherwise have
# modules/lvgl/lvgl.c's SYS_INIT hook create a SECOND lv_display_t
# against the `zephyr,display` chosen node -- two independent LVGL
# displays racing to flush the same (or, here, a different aliased)
# panel. Turning it off also means Zephyr's lvgl_init() never runs, so
# it never calls lv_init() or registers the LVGL tick source either --
# src/main.c does both itself.
CONFIG_LV_Z_AUTO_INIT=n
