#
# native_sim-only overlay.  native_sim has no real ST7789 panel, so
# bind Zephyr's dummy display driver: it lets the LVGL demo link and
# run the build-only twister check without an SDL/X11 dependency.
# On real silicon this file is NOT applied; the board devicetree
# binds the actual ST7789 display node instead.
CONFIG_DUMMY_DISPLAY=y

# native_sim's DTS also carries a zephyr,sdl-dc node, so CONFIG_DISPLAY=y
# (prj.conf) drags in the SDL display driver by default alongside the
# dummy one above.  Its init reaches for a real GL/X11 context that
# doesn't exist on a headless CI runner and segfaults before main()
# even starts (same trap tests/zephyr/gui_lvgl/prj.conf documents).
# This app never opens that device -- alp-display0 (the alias
# alp_display_open resolves) points at dummy_dc only -- so keep SDL
# out of the build entirely.
CONFIG_SDL_DISPLAY=n
