# IoT connected-camera example — v0.1 skeleton config.

CONFIG_ALP_SDK=y

# Chip drivers used by the local UI / status path
CONFIG_ALP_SDK_CHIP_SSD1306=y
CONFIG_ALP_SDK_CHIP_BUTTON_LED=y

# Subsystems consumed by the SDK
CONFIG_GPIO=y
CONFIG_I2C=y

# v0.1 host build runs against emulated controllers.
CONFIG_EMUL=y
CONFIG_GPIO_EMUL=y
CONFIG_I2C_EMUL=y

CONFIG_LOG=y
CONFIG_PRINTK=y
CONFIG_MAIN_STACK_SIZE=4096

# v0.3 will turn these on once the IoT backend is real:
#   CONFIG_NETWORKING=y
#   CONFIG_NET_TCP=y
#   CONFIG_MQTT_LIB=y
#   CONFIG_MBEDTLS=y
#   CONFIG_MBEDTLS_TLS_LIBRARY=y
# v0.1 keeps them off to keep the host build small.
