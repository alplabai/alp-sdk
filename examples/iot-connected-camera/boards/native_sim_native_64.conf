#
# native_sim has no real GPIO / I2C controllers; pull in the emul
# drivers so the local-UI chip drivers (SSD1306 + button_led)
# enumerate at boot.  Auto-loaded by Zephyr when building for
# native_sim/native/64.

CONFIG_EMUL=y
CONFIG_GPIO_EMUL=y
CONFIG_I2C_EMUL=y
