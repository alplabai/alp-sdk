# SPDX-License-Identifier: Apache-2.0
#
# AEN-Zephyr overlay -- enables the real Wi-Fi station + MQTT path
# for E1M-AEN family SoMs.  Layered on top of the base prj.conf via
# `west build -- -DEXTRA_CONF_FILE=overlay-aen.conf` (or twister's
# extra_args block in testcase.yaml when the EVK board file lands).
#
# native_sim builds keep the base prj.conf only -- there is no
# Wi-Fi radio under the simulator and the wrapper falls back to the
# documented NULL-with-NOSUPPORT contract.

# Networking core
CONFIG_NETWORKING=y
CONFIG_NET_TCP=y
CONFIG_NET_IPV4=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_SOCKETS=y

# Wi-Fi station (E1M-AEN ships TI CC3501E or Murata LBEE5HY2FY).
# WPA-supplicant is the upstream Zephyr Wi-Fi management default.
CONFIG_WIFI=y
CONFIG_WIFI_NM_WPA_SUPPLICANT=y

# MQTT (over plain TCP in v0.2; TLS lands with <alp/security.h> v0.3).
CONFIG_MQTT_LIB=y

# Wrapper toggles -- both default y under their CONFIG_ deps but
# spelling them out makes the intent visible to a reader who comes
# in cold.
CONFIG_ALP_SDK_IOT_WIFI=y
CONFIG_ALP_SDK_IOT_MQTT=y

# Larger main stack to absorb the Wi-Fi supplicant + mqtt loop
# threads' frames.
CONFIG_MAIN_STACK_SIZE=8192
