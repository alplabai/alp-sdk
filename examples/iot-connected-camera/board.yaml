# board.yaml -- per-app project configuration for the
# iot-connected-camera reference application.
#
# Customer workflow: copy this directory, change `som.sku` to
# your V2N MPN, edit `preset:` if you fork the X-EVK, and
# `west build`.  CMakeLists.txt invokes scripts/alp_project.py
# at configure time and layers the generated alp.conf over
# prj.conf via OVERLAY_CONFIG.

som:
  sku: E1M-V2N101          # Renesas RZ/V2N -- DRP-AI3 on-die NPU
                            # plus Murata Wi-Fi 6 / BLE radio.

preset: e1m-x-evk           # X-EVK preset's `populated:` is TBD
                            # pending the user-supplied schematic;
                            # the local UI + button this example uses
                            # are listed in `chips:` below.

chips:
  - ssd1306                 # Mono OLED for the local status pane.
  - button_led              # GPIO button + LED helper.

# Camera + IoT demo on the V2N's M33-SM.  Keep the A55 cluster off
# until the Linux-side capture pipeline lands (post-v0.6 OTA-flagship
# work).
cores:
  a55_cluster:
    os: "off"
  m33_sm:
    app: ./src
    # IoT block stays OFF in the base config so the native_sim CI
    # build picks up the v0.1 NULL-with-NOSUPPORT contract.  Opt in to
    # the real Wi-Fi/MQTT path by enabling these under cores.m33_sm.iot
    # here AND building with --extra-conf-file overlay-aen.conf (which
    # pulls in the Zephyr networking stack).  v0.3 finalizes the
    # on-target path.
    #
    # iot:
    #   wifi: true
    #   mqtt: true
    #   tls:  true

diagnostics:
  log_level: info
