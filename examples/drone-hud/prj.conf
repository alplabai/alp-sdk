CONFIG_MAIN_STACK_SIZE=16384
CONFIG_HEAP_MEM_POOL_SIZE=131072

# LVGL UI knobs -- match the 240x320 ST7789 panel geometry.
CONFIG_LV_Z_VDB_SIZE=50
CONFIG_LV_COLOR_DEPTH_16=y
CONFIG_LV_DISP_DEF_REFR_PERIOD=33  # 30 fps target.

CONFIG_LOG=y
CONFIG_LOG_PRINTK=y

# Higher-priority sensor-read thread to keep IMU sampling on time
# even when LVGL is mid-blit.  Madgwick AHRS asks for ~100 Hz IMU
# samples for stable attitude estimation.
CONFIG_NUM_PREEMPT_PRIORITIES=8
