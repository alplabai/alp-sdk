#
# App-level tuning knobs only.  Everything declarative (silicon,
# board population, peripheral subsystems, inference backend,
# library set) is derived from board.yaml by scripts/alp_project.py
# and layered in via OVERLAY_CONFIG -- see CMakeLists.txt.

# Larger stack: the main loop walks the camera frame buffer, runs
# inference, and stamps the bounding-box overlay each pass; the
# default 1 kB main stack tips over once the post-process kernel
# lands in v0.6.
CONFIG_MAIN_STACK_SIZE=8192

# Heap covers:
#   - the camera frame ring buffer (3 x 640 x 480 x 2 B = 1.8 MB on
#     full VGA; v0.5 skeleton runs 240x240 = 115 kB per frame).
#   - the TFLM tensor arena (sized at runtime in alp_inference_open).
# Sized for the v0.5 skeleton's small footprint; bump when the
# real Vela-/DXNN-compiled YOLOv8-tiny model goes in.
CONFIG_HEAP_MEM_POOL_SIZE=524288
