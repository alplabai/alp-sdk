# SPDX-License-Identifier: Apache-2.0

sample:
  name: mproc-dual-os-yocto-zephyr
  description: |
    Heterogeneous-compute flagship: Yocto Linux on the V2N's
    Cortex-A55 cluster + Zephyr on the same SoC's Cortex-M33,
    communicating via <alp/mproc.h> shmem + mailbox.  This
    testcase covers ONLY the Zephyr/M33 half (build_only under
    native_sim).  The A55/Yocto consumer is tested separately
    by meta-alp-sdk's bitbake CI.

tests:
  alp_sdk.examples.mproc_dual_os.native_sim:
    platform_allow:
      - native_sim/native/64
    tags:
      - alp-sdk
      - example
      - multiprocessor
      - yocto
      - heterogeneous
    build_only: true
    harness: console
    harness_config:
      type: one_line
      regex:
        - "\\[dual-os\\] done"
