# yaml-language-server: $schema=https://raw.githubusercontent.com/Open-CMSIS-Pack/devtools/tools/projmgr/2.6.0/tools/projmgr/schemas/cproject.schema.json

# Example project using ALP SDK with Alif hardware
# This demonstrates how to integrate ALP SDK into CMSIS-based Alif projects

project:
  description: ALP SDK Example for Alif Ensemble
  
  groups:
    - group: Application
      files:
        - file: main.c
  
  # Import ALP SDK Alif layer
  layers:
    - layer: ../../layers/alif/alp-alif.clayer.yml
  
  # Required packs
  packs:
    - pack: AlifSemiconductor::Ensemble@2.0.4
    - pack: ARM::CMSIS@6.0.0
  
  # Output configuration
  output:
    base-name: alp_alif_example
    type:
      - elf
      - bin
