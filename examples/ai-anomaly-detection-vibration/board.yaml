# board.yaml -- AI vibration-anomaly detection demo.
#
# Predictive-maintenance edge-AI pitch on the always-on Ethos-U:
# read a 256-sample window from the EVK's LSM6DSO accelerometer,
# feed it through a 1D-CNN anomaly model via TFLM, publish the
# per-window score.  Same app source builds against the V2N's
# DEEPX DX-M1 path when the SoM SKU is flipped.
#
# Why the headline matters for customers: factory-floor vibration
# monitoring without a cloud round-trip.  The model + LSM6DSO
# sample loop both run on the on-die NPU + M55 -- battery-powered
# nodes can run for months on a single charge because the heavy
# compute lives behind the Ethos-U's clock-gated path.

som:
  sku: E1M-AEN701           # E7's two Ethos-U55s give an always-on
                             # inference path; AEN401/AEN601/AEN801
                             # add U85 for transformer-style anomaly
                             # models on the same source.

preset: e1m-evk             # EVK preset populates the LSM6DSO at
                            # I2C0 0x6A by default.

# E1M pads this app uses (subset of the EVK preset's `e1m_routes:`).
pins:
  - { e1m: E1M_I2C0, macro: EVK_I2C_BUS_SENSORS, doc: "Shared sensor + IO-expander + INA236 bus" }

# Single-OS app: M55-HP owns the sample loop + NPU dispatch.  Skip the
# A32 cluster (this is a battery-powered always-on demo) and keep
# M55-HE on the SoM topology default so the peer NPU stays accessible.
cores:
  a32_cluster:
    os: "off"
  m55_hp:
    app: ./src
    # Inference dispatcher set is resolved from the SoM preset's
    # `capabilities:` block (AEN -> Ethos-U, V2N -> DRP-AI3,
    # V2M101 -> DRP-AI3 + DEEPX, NX9101 -> Ethos-U65).  App source
    # touches none of those names.  This block only tunes the
    # per-model arena.
    inference:
      default_arena_kib: 128
    libraries:
      - tflite_micro
    peripherals:
      - i2c                  # LSM6DSO link.

chips:
  - lsm6dso                  # 6-axis IMU; we only use the accel here.

diagnostics:
  log_level: info
