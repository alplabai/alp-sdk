# SPDX-License-Identifier: Apache-2.0

sample:
  name: ai-anomaly-detection-vibration
  description: |
    Predictive-maintenance edge-AI demo: LSM6DSO accelerometer ->
    256-sample sliding window -> 1D-CNN anomaly model via TFLM ->
    per-window score.  Same source targets E1M-AEN (Ethos-U) and
    V2N (DEEPX DX-M1); native_sim exercises the framing path
    against the CPU reference kernels.
common:
  tags: ai inference industrial predictive-maintenance marketing showcase
tests:
  alp_sdk.examples.anomaly_detection.native_sim:
    platform_allow:
      - native_sim/native/64
    tags:
      - alp-sdk
      - example
      - ai
      - industrial
    build_only: true
    harness: console
    harness_config:
      type: one_line
      regex:
        - "\\[anomaly\\] done"
  alp_sdk.examples.anomaly_detection.aen:
    platform_allow:
      - ensemble_e8_dk/ae402fa0e5597le0/rtss_hp
    tags:
      - alp-sdk
      - example
      - ai
      - industrial
    build_only: true
