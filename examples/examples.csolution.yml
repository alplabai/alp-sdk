# yaml-language-server: $schema=https://raw.githubusercontent.com/Open-CMSIS-Pack/devtools/tools/projmgr/2.12.0/tools/projmgr/schemas/csolution.schema.json

solution:
  created-for: CMSIS-Toolbox@2.12.0
  cdefault:
  compiler: AC6

  packs:
    - pack: ARM::CMSIS@6.0.0
    - pack: AlifSemiconductor::Ensemble@2.0.4

  target-types:
    - type: Alif-E7-DevKit
      device: Alif Semiconductor::AE722F80F55D5LS:M55_HE
      board: Alif Semiconductor::DevKit-E7
      define:
        - CORE_M55_HE
        - BOARD_ALIF_DEVKIT_VARIANT: 6 # E1M Custom Board (6) / Alif DevKit Gen2 (4)
      target-set:
        - set:
          images:
            - project-context: alp_spi_demo.Debug
            - project-context: hello_world_alp.Debug
            - project-context: blinky_alp.Debug

  build-types:
    - type: Debug
      optimize: none
      debug: on

    - type: Release
      optimize: balanced
      debug: off

  projects:
    - project: ./blinky_alp/blinky_alp.cproject.yml
      for-context:
        - .Debug+Alif-E7-DevKit
        - .Release+Alif-E7-DevKit
    - project: ./hello_world_alp/hello_world_alp.cproject.yml
      for-context:
        - .Debug+Alif-E7-DevKit
        - .Release+Alif-E7-DevKit
    - project: ./alp_spi_demo/alp_spi_demo.cproject.yml
      for-context:
        - .Debug+Alif-E7-DevKit
        - .Release+Alif-E7-DevKit
