# board.yaml -- per-app project configuration for the
# mproc-mailbox example (M55-HP side).
#
# Targets AEN-Zephyr; the peer-side (M55-HE) firmware lands
# alongside the v0.4 dual-image build flow.

schema_version: 1

som:
  sku: E1M-AEN701

carrier:
  name: E1M-EVK

os: zephyr

# CONFIG_ALP_SDK_MPROC=y is supplied via testcase.yaml's
# `extra_args` -- the schema's `peripherals:` enum is for Zephyr
# driver-class subsystems (adc/can/i2c/spi/...), not for SDK
# feature toggles, so mproc rides extra_args instead.

diagnostics:
  log_level: info
