#
# native_sim has no real I2C controller; pull in the emul I2C
# driver so the management bus enumerates at boot and the address
# scan can probe every 7-bit address (each NACKs because no target
# is registered -- so the scan reports 0 devices, which is still a
# PASS of the scan machinery).  Auto-loaded by Zephyr when building
# for native_sim/native/64.

CONFIG_EMUL=y
CONFIG_I2C_EMUL=y
