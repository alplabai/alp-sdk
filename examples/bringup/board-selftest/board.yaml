# board.yaml -- per-app project configuration for the
# board-selftest example.
#
# A board bring-up / self-test app: reads the SoM + SoC identity,
# reads the RUN operating-point profile (core rail + clock), and
# scans the on-module I2C management bus, then prints a pass/fail
# report.  Portable <alp/*> APIs only -- no chip driver, so the
# SAME source runs on every E1M family; the checks degrade
# gracefully (ALP_ERR_NOSUPPORT) on a backend that lacks a probe.
#
# Customer workflow: copy this directory, change `som.sku` to
# your MPN, edit the `preset:` (or use an inline board) if you're on a non-EVK board,
# and `west build`.  CMakeLists.txt invokes
# scripts/alp_project.py at configure time + layers the
# generated alp.conf over prj.conf via EXTRA_CONF_FILE.
som:
  sku: E1M-AEN801

preset: e1m-evk
supported_boards:
  - e1m-evk
  - e1m-x-evk

# E1M pads this app uses (subset of the EVK preset's `e1m_routes:`).
# The self-test scans this bus for ACKing devices; it is also the
# bus the SoM EEPROM identity manifest lives on.
pins:
  - { e1m: E1M_I2C0, macro: EVK_I2C_BUS_SENSORS, doc: "Shared sensor + IO-expander + INA236 bus" }
cores:
  m55_hp:
    app: ./src
    # Zephyr peripheral subsystem exercised by this example.  The
    # loader translates the entry to CONFIG_I2C=y in alp.conf.
    peripherals:
      - i2c

diagnostics:
  log_level: info
