#
# doctest is C++; the app source is main.cpp.  These are the C++
# toolchain knobs the framework needs -- not board.yaml feature
# selection, so they live here rather than being loader-derived
# (see hello-world/prj.conf for the "what goes here" rule). Modelled
# on examples/aen/aen-npu-inference-alif/prj.conf, the SDK's existing
# native_sim-adjacent CONFIG_CPP precedent.
CONFIG_CPP=y
CONFIG_STD_CPP17=y

# doctest's runner formats failure messages with std::string /
# std::ostringstream and its CHECK/REQUIRE macros use try/catch
# internally (no DOCTEST_CONFIG_NO_EXCEPTIONS in the profile header)
# -- Zephyr's minimal C++ library doesn't carry either, so pull in
# the host's full libstdc++ via EXTERNAL_LIBCPP (native_sim's default
# once REQUIRES_FULL_LIBCPP is set) and turn exceptions back on.
CONFIG_REQUIRES_FULL_LIBCPP=y
CONFIG_CPP_EXCEPTIONS=y
