# SPDX-License-Identifier: Apache-2.0

sample:
  name: spi-master
  description: |
    Per-peripheral example for SPI master.  Send a known byte
    pattern via write / transceive / read against E1M_SPI0.
    Contrasts with examples/spi-loopback (which exercises both
    ends on the same chip).

tests:
  alp_sdk.example.spi_master:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    tags:
      - alp-sdk
      - example
      - spi
    harness: console
    harness_config:
        type: one_line
        regex:
          - "\\[spi-master\\] done"
