# SPDX-License-Identifier: Apache-2.0
CONFIG_MAIN_STACK_SIZE=16384
# Heap sized for camera frame + tensor arena.
CONFIG_HEAP_MEM_POOL_SIZE=524288

CONFIG_LV_Z_VDB_SIZE=50
CONFIG_LV_COLOR_DEPTH_16=y
CONFIG_LV_DEF_REFR_PERIOD=33

CONFIG_LOG=y
CONFIG_LOG_PRINTK=y

# Inference subsystem.
CONFIG_ALP_SDK_INFERENCE_BACKEND_TFLM=y

# Display subsystem.  The actual panel driver is board-specific:
# real silicon binds the panel from the generated alp.conf, while
# native_sim has no panel and pulls CONFIG_DUMMY_DISPLAY=y from the
# per-board boards/native_sim_native_64.conf overlay.
CONFIG_DISPLAY=y
