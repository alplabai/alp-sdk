# board.yaml -- AI camera viewer demo.
#
# OV5640 camera -> <alp/camera.h> frames -> TFLM person-detect
# (Ethos-U dispatch on AEN) -> LVGL UI rendering the captured
# preview + bounding boxes + per-frame inference latency.
#
# The headline marketing demo: shows the full edge-AI stack end
# to end on a single SoM, with the right NPU resolved by the
# §D.lib.loader from the SKU's `capabilities:` block.
schemaVersion: 1
som:
  sku: E1M-AEN801           # E8 -- Ethos-U85 primary plus two Ethos-U55s;
                             # the SoM `npu_population:` block drives
                             # CONFIG_ALP_SDK_INFERENCE_BACKEND_ETHOS_U_AEN=y +
                             # CONFIG_ALP_SDK_INFERENCE_ETHOS_U_VARIANT_U85=y
                             # automatically.

preset: e1m-evk

# E1M pads this app uses (subset of the EVK preset's `e1m_routes:`).
pins:
  - { e1m: E1M_I2C0, macro: EVK_I2C_BUS_SENSORS, doc: "Shared sensor + IO-expander + INA236 bus" }
  - { e1m: E1M_SPI1, macro: EVK_SPI_BUS_ARDUINO, doc: "Arduino UNO header SPI; terminates on the on-module CC3501E, not the main SoC" }
cores:
  a32_cluster:
    os: "off"
  m55_hp:
    app: ./src
    libraries:
      - lvgl
      - tflite_micro
    # Inference backend set is driven by the SoM preset's
    # `capabilities:` block, not by board.yaml.  Per-SKU mappings:
    #   AEN401  -> _BACKEND_ETHOS_U_AEN + _ETHOS_U_VARIANT_{U55,U85}
    #   AEN601  -> _BACKEND_ETHOS_U_AEN + _ETHOS_U_VARIANT_{U55,U85}
    #   AEN801  -> same as AEN401
    #   NX9101  -> _BACKEND_ETHOS_U_N93 + _ETHOS_U_VARIANT_U65
    # (All BACKEND_/VARIANT_ knobs above are ALP_SDK_INFERENCE_-prefixed.)
    # Customers swap the `som.sku` line to compare E4/E6/E8 dispatch
    # without touching the app source.  arena_kib is the only knob.
    inference:
      default_arena_kib: 256
    peripherals:
      - i2c                  # Camera SCCB.
      - spi                  # Display.
      - gpio                 # Camera ancillaries + display D/C#.

chips:
  - ov5640                   # 5 MP camera.
  - st7789                   # 240x320 TFT.

diagnostics:
  log_level: info
