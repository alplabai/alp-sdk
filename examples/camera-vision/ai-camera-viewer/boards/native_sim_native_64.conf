#
# native_sim has no real panel, so bind Zephyr's dummy display driver:
# it lets the viewer link without an SDL/X11 dependency.  Auto-loaded
# by Zephyr when building for native_sim/native/64; on real silicon
# this file is NOT applied (the generated alp.conf binds the actual
# panel driver instead), so the dummy-panel knob never reaches the
# real-silicon build.
CONFIG_DUMMY_DISPLAY=y
