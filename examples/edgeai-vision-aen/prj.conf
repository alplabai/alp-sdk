# SPDX-License-Identifier: Apache-2.0
# EdgeAI vision-AEN example — v0.1 skeleton config.

CONFIG_ALP_SDK=y

# Chip drivers in the EdgeAI pipeline
CONFIG_ALP_SDK_CHIP_LSM6DSO=y
CONFIG_ALP_SDK_CHIP_SSD1306=y
CONFIG_ALP_SDK_CHIP_BUTTON_LED=y

# Subsystems consumed by the SDK and the chip drivers
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_SPI=y

# v0.1 host build runs against emulated controllers so the
# example compiles under native_sim without real silicon.
CONFIG_EMUL=y
CONFIG_GPIO_EMUL=y
CONFIG_I2C_EMUL=y
CONFIG_SPI_EMUL=y

CONFIG_LOG=y
CONFIG_PRINTK=y
CONFIG_MAIN_STACK_SIZE=4096
