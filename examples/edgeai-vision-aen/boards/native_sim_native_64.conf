#
# native_sim has no real GPIO / I2C / SPI controllers; pull in the
# emul drivers so the chip drivers (LSM6DSO / SSD1306 / button_led)
# enumerate at boot.  Auto-loaded by Zephyr when building for
# native_sim/native/64.

CONFIG_EMUL=y
CONFIG_GPIO_EMUL=y
CONFIG_I2C_EMUL=y
CONFIG_SPI_EMUL=y
