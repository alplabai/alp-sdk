# SPDX-License-Identifier: Apache-2.0
#
# Lives under m33_sm/ (not the project root) because rpmsg-v2n is a
# multi-slice project: the parent directory carries the orchestrator's
# board.yaml + linux/ Yocto consumer + this m33_sm/ Zephyr app.  Only
# the m33_sm/ tree is a self-contained Zephyr app twister can build,
# so the testcase has to sit next to its CMakeLists.txt — otherwise
# twister picks up the parent directory and tries to configure the
# multi-slice marker as a Zephyr app (no prj.conf, no Zephyr CMake).

sample:
  name: rpmsg-v2n-m33_sm
  description: |
    Heterogeneous-compute flagship: Yocto Linux on the V2N's
    Cortex-A55 cluster + Zephyr on the same SoC's Cortex-M33-SM,
    communicating via <alp/rpc.h> over RPMsg.  This testcase
    covers ONLY the Zephyr/M33-SM half (build_only under
    native_sim) -- twister stays the Zephyr-only fast lane per
    spec §4.4.  The A55/Yocto consumer is tested separately by
    the bitbake CI lane.

tests:
  alp_sdk.examples.rpmsg_v2n.native_sim:
    platform_allow:
      - native_sim/native/64
    tags:
      - alp-sdk
      - example
      - multiprocessor
      - yocto
      - heterogeneous
      - rpmsg
    build_only: true
    # CONFIG_ALP_SDK_RPC=y -- enables <alp/rpc.h> which the producer
    # uses to publish samples; matches the comment in m33_sm/prj.conf.
    extra_args: CONFIG_ALP_SDK_RPC=y
    harness: console
    harness_config:
      type: one_line
      regex:
        - "\\[rpmsg-v2n\\] done"
