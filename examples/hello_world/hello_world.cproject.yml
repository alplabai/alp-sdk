# yaml-language-server: $schema=https://raw.githubusercontent.com/Open-CMSIS-Pack/devtools/tools/projmgr/2.6.0/tools/projmgr/schemas/cproject.schema.json

project:
  groups:
    - group: ALP SDK Core
      files:
        - file: ../../alp/src/core/alp_usart_core.c
        
    - group: ALP SDK Alif Driver
      files:
        - file: ../../alp/src/drivers/alif/alp_usart_alif.c
        
    - group: Board Support
      files:
        - file: ../../alp/board/board_alif_e7_devkit.c
        
    - group: Application
      files:
        - file: hello_world.c

  components:
    - component: ARM::CMSIS:CORE
    - component: AlifSemiconductor::Device:SOC Peripherals:PINCONF
    - component: AlifSemiconductor::CMSIS Driver:USART
    
  misc:
    - for-compiler: AC6
      C:
        - -I../../alp/include
        - -I../../alp/board
      C-CPP:
        - -DBUILD_ALIF=1
