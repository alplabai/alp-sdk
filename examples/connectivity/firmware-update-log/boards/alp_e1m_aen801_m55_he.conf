#
# E1M-AEN801 / Alif Ensemble E8: load the HE client to ITCM and persist the
# update log in a dedicated MRAM NVS partition.
#
# This is persistence, not app-immutability. The active assurance still comes
# from alp_update_log_assurance(); it becomes HW_ENFORCED only when a real
# secure owner/firewall-backed backend is present.
#
# Keep the AEN bench image fail-closed for the customer policy: if the secure
# owner is not present, the example reports that and exits instead of using the
# software MRAM/NVS tier as a substitute.
CONFIG_ALP_SOC_ALIF_ENSEMBLE_E8=y
CONFIG_ALP_SDK_UPDATE_LOG_AEN_M55_CLIENT=y
CONFIG_ALP_SDK_UPDATE_LOG_REQUIRE_HW_ENFORCED=y

# Do not set CONFIG_ALP_SDK_UPDATE_LOG_AEN_M55_FIREWALL_PROVEN here. That bit is
# only valid in a provisioned profile after a real HE write-to-log-region probe
# has faulted/rejected on silicon. Without it the HE image remains fail-closed.

# Shared HE<->HP request mailbox lives in global SRAM0. Keep D-cache off until
# the service grows explicit clean/invalidate around that mailbox.
CONFIG_DCACHE=n

# Zephyr NVS over the Alif MRAM flash driver backs alp_ulog_partition.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_NVS=y
CONFIG_ALP_SDK_UPDATE_LOG_PERSIST=y
