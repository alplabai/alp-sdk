#
# E1M-AEN801 / Alif Ensemble E8: load the HE client to ITCM. HE never opens a
# local persistent update-log store: it is a CLIENT of the HP owner and only
# ever reaches the log by proxying append/verify/count/get over MHU.
#
# alp_ulog_partition is mapped in the shared *_log_mram.dtsi purely so the HP
# owner build (which includes the same dtsi) can carve it out, and so the
# firewall-probe profile can attempt a direct raw flash_write() against it as
# a negative proof. HE's own update-log backend selection must NEVER mount a
# local NVS store on that partition -- it is the HP owner's MRAM region, and
# the update-log engine's lock is per-image, so two NVS instances over one
# region would race with no cross-image serialization. Do NOT set
# CONFIG_ALP_SDK_UPDATE_LOG_PERSIST / CONFIG_NVS here: the software tier's
# ready() probe additionally refuses to engage at all on this CLIENT role
# (src/backends/update_log/sw_tier.c) so this stays fail-closed even if PERSIST
# were mistakenly re-enabled.
#
# This is a client role, not app-immutability by itself. The active assurance
# still comes from alp_update_log_assurance(); it becomes HW_ENFORCED only
# when the real secure owner/firewall-backed backend answers ready().
#
# Keep the AEN bench image fail-closed for the customer policy: if the secure
# owner is not present, the example reports that and exits instead of using a
# local software MRAM/NVS tier as a substitute.
CONFIG_ALP_SOC_ALIF_ENSEMBLE_E8=y
CONFIG_ALP_SDK_UPDATE_LOG_AEN_M55_CLIENT=y
CONFIG_ALP_SDK_UPDATE_LOG_REQUIRE_HW_ENFORCED=y

# Do not set CONFIG_ALP_SDK_UPDATE_LOG_AEN_M55_FIREWALL_PROVEN here. That bit is
# only valid in a provisioned profile after a real HE write-to-log-region probe
# has faulted/rejected on silicon. Without it the HE image remains fail-closed.

# Shared HE<->HP request mailbox lives in global SRAM0. Keep D-cache off until
# the service grows explicit clean/invalidate around that mailbox.
CONFIG_DCACHE=n

# The Alif MRAM flash driver, kept enabled only so the firewall-probe profile
# (EXTRA_CONF_FILE-layered on top of this file) can flash_write()/flash_read()
# alp_ulog_partition directly as its negative proof. HE's own update-log path
# does not use it -- see the comment block above.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
