#
# E1M-AEN801 / Alif Ensemble E8: proof latch for the hardware-enforced
# update-log path.
#
# Use this config only for a board/profile where provisioning has already
# locked alp_ulog_partition so the HE application core cannot write or erase it,
# and where that direct-write rejection has been proven on silicon.
#
# This does not program the firewall. It only lets the HE client report
# HW_ENFORCED after the HP owner also answers the MHU ready request.
#
CONFIG_ALP_SDK_UPDATE_LOG_AEN_M55_FIREWALL_PROVEN=y
