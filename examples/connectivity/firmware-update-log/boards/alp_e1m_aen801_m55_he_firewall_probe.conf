#
# E1M-AEN801 / Alif Ensemble E8: HE direct-write firewall probe.
#
# This diagnostic profile intentionally tries to write the first 16 bytes of
# alp_ulog_partition from the HE application core. It is a negative proof: the
# hardware-enforced update-log profile is valid only if this write is rejected,
# blocked from readback, or faults while the MRAM log partition remains
# unchanged.
#
# Do not combine this with CONFIG_ALP_SDK_UPDATE_LOG_AEN_M55_FIREWALL_PROVEN.
# The normal demo uses the proven profile after this probe has passed.
#
CONFIG_ALP_SDK_UPDATE_LOG_AEN_M55_FIREWALL_PROBE=y
CONFIG_FAULT_DUMP=2
