#
# E1M-AEN801 / Alif Ensemble E8: trusted-owner side of the hardware-enforced
# update-log demo. HP owns the MRAM log partition and services HE requests over
# the RTSS MHU mailbox.
#
CONFIG_ALP_SOC_ALIF_ENSEMBLE_E8=y
CONFIG_ALP_SDK_UPDATE_LOG_AEN_M55_OWNER=y

# HP is the trusted writer, so it opens the local MRAM/NVS log directly. Do not
# require HW_ENFORCED on this side; the HE client is the side that reports the
# security property after the firewall proof and owner-ready checks pass.
CONFIG_ALP_SDK_UPDATE_LOG_REQUIRE_HW_ENFORCED=n

# HP releases HE over the Alif SE service after the dual-image package has
# loaded the HE image but before the owner starts serving requests.
CONFIG_ARM_MHUV2=y
CONFIG_HAS_ALIF_SE_SERVICES=y
CONFIG_ALP_SDK_SECURITY_SE_CRYPTOCELL=n
CONFIG_ALP_SDK_SOC_INFO_ALIF_SE=n
CONFIG_ALP_SDK_POWER_PROFILE_ALIF_SE=n

# Link at the board's zephyr,code-partition (&slot0_partition), so Flow-D
# flashing writes an image whose reset vector is in MRAM slot0 (0x8001xxxx).
CONFIG_USE_DT_CODE_PARTITION=y

# Shared HE<->HP request mailbox lives in global SRAM0. Keep D-cache off until
# the service grows explicit clean/invalidate around that mailbox.
CONFIG_DCACHE=n

# Zephyr NVS over the Alif MRAM flash driver backs alp_ulog_partition.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_NVS=y
CONFIG_ALP_SDK_UPDATE_LOG_PERSIST=y
