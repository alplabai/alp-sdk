# board.yaml -- CoAP PDU build/parse teaching example (no socket).
#
# `libraries: [coap]` is the ADR 0018 top-level part: alp_project.py reads
# metadata/libraries/coap.yaml and emits CONFIG_NETWORKING=y + CONFIG_COAP=y
# into the generated alp.conf fragment -- CoAP is the IN-TREE Zephyr
# subsystem at subsys/net/lib/coap/ (west module `zephyr` itself carries it,
# no separate west pin to fetch). prj.conf keeps only the app-specific stack
# size. See README.md.
schemaVersion: 1
som:
  sku: E1M-AEN801

preset: e1m-evk

libraries:
  - coap

cores:
  m55_hp:
    app: ./src
    # PDU construction/parsing only -- no socket opened, no peripheral.
    peripherals: []

diagnostics:
  log_level: info
