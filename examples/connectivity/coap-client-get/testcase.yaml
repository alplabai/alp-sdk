# SPDX-License-Identifier: Apache-2.0

sample:
  name: coap-client-get
  description: |
    CoAP (RFC 7252) teaching example. Builds a CoAP GET request PDU offline
    and parses a canned CoAP response PDU -- no socket. Builds and runs on
    native_sim against the in-tree Zephyr `subsys/net/lib/coap` subsystem
    (CONFIG_COAP), the low-level packet codec only -- no CONFIG_COAP_CLIENT
    socket layer.

tests:
  alp_sdk.examples.coap_client_get.native_sim:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    tags:
      - alp-sdk
      - example
      - coap-client-get
    harness: console
    harness_config:
      type: one_line
      regex:
        - "\\[coap-client-get\\] done"
