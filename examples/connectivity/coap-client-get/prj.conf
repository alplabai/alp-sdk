#
# libcoap's own Kconfig (fetched module, not the SDK's
# Kconfig.alp-libraries) is not reachable from board.yaml's
# `libraries:` enum yet (see README.md) -- enabled explicitly here.
# Everything else this app needs comes from board.yaml via
# scripts/alp_project.py (see CMakeLists.txt's OVERLAY_CONFIG).
CONFIG_LIBCOAP=y
CONFIG_LIBCOAP_CLIENT_SUPPORT=y

# libcoap's coap_mem.c (WITH_ZEPHYR path) backs coap_malloc()/coap_free()
# with k_malloc()/k_free(), which need a real heap behind them -- the
# hello-world skeleton's default CONFIG_HEAP_MEM_POOL_SIZE=0 leaves
# k_malloc undefined at link time. Sized generously for a PDU or two.
CONFIG_HEAP_MEM_POOL_SIZE=4096
