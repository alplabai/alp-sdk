#
# Native-sim Kconfig overlay for mqtt-telemetry.
#
# Loaded LAST via twister's `extra_args: EXTRA_CONF_FILE=...`
# (see ../testcase.yaml), so the settings here win over the
# alp.conf-emitted CONFIG_MBEDTLS=y that `iot.tls: true` +
# `libraries: [mbedtls]` pull into every mqtt-telemetry build.
#
# Why: Zephyr v4.4 ships mbedtls 3.6 + the new tf-psa-crypto split.
# The upstream library-internal header
# `mbedtls/library/ssl_misc.h` references `mbedtls_error_pair_t`
# before including the type's declaring header; every TU that
# compiles against the SSL portion of mbedtls fails with
# `unknown type name 'mbedtls_error_pair_t'`.  Full integration is
# a v0.6 (TF-M-on-HE + tf-psa-crypto wiring) work item.
#
# On native_sim there is no Wi-Fi radio and no MQTT-capable network
# stack, so alp_wifi_open()/alp_mqtt_open() resolve to the
# sw_fallback backend and return NULL/NOSUPPORT anyway; turning
# mbedtls off here keeps the framing build green while we exercise
# the <alp/iot.h> call sites + the graceful-degradation path.  Real
# AEN silicon (the CC3501E bridge + TF-M stack) is unaffected.
CONFIG_MBEDTLS=n
CONFIG_MBEDTLS_BUILTIN=n
CONFIG_MQTT_LIB_TLS=n
