#
# Empty-by-design Kconfig.  The effective build config is the
# overlay alp.conf emitted from board.yaml by scripts/alp_project.py
# at configure time (see CMakeLists.txt) -- it turns the
# `iot: {wifi, tls}` toggles + `libraries: [mbedtls]` into the
# CONFIG_* the app needs (Wi-Fi, the MQTT client, mbedtls).
#
# v0.5 [UNTESTED] migration note: Zephyr v4.4's mbedtls 3.6 ships
# with PSA-crypto wiring that references `mbedtls_error_pair_t` from
# a private header (`mbedtls/library/ssl_misc.h`), so every TU that
# compiles the SSL portion of mbedtls fails on native_sim.  Full
# tf-psa-crypto integration is a v0.6 work item.  On real AEN
# silicon the build follows a different config stack (TF-M-on-HE)
# and is unaffected; the native_sim leg turns mbedtls off in
# native_sim.conf (loaded last) so the framing path still builds +
# runs.  Same workaround as
# examples/connectivity/iot-fleet-ota/prj.conf.
