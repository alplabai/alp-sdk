# SPDX-License-Identifier: Apache-2.0

sample:
  name: iot-connected-camera
  description: |
    Connected-camera reference application for the V2N family.
    v0.1: skeleton — compiles under native_sim and prints the
    pipeline stages with v0.2 / v0.3 stubs.

tests:
  alp_sdk.example.iot_connected_camera.skeleton:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    tags:
      - alp-sdk
      - example
      - iot
    build_only: false
    harness: console
    harness_config:
        type: one_line
        regex:
          - "\\[iotcam\\] done"

  # alp_sdk.example.iot_connected_camera.evk_v2n — HW-in-loop
  # variant for the E1M-X EVK populated with an E1M-V2N101 SoM. The
  # real board target, alp_e1m_v2n101_m33_sm/r9a09g056n48gbg/cm33,
  # ships in-tree under zephyr/boards/alp/ -- this scenario stays
  # parked pending HW-in-loop CI wiring, not a missing board file.
