#
# Intentionally empty.  Every CONFIG_* this app needs is derived
# from board.yaml by scripts/alp_project.py and layered in via
# EXTRA_CONF_FILE (see CMakeLists.txt).  The optional overlay
# `overlay-aen.conf` carries the v0.3 IoT stack enables; load it
# explicitly with `west build -- --extra-conf-file overlay-aen.conf`
# when targeting a real board with Wi-Fi up.

# App-specific stack tuning -- the v0.3 IoT path runs supplicant +
# mqtt loops on `main`'s frame.  Tuning, not feature-select.
CONFIG_MAIN_STACK_SIZE=4096
