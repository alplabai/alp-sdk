# SPDX-License-Identifier: Apache-2.0
#
# Builds + runs on native_sim.  The example drives the modem AT
# exchange over a mock transcript Stream; it does not link libtinygsm
# (whose AT engine needs Arduino's full String class) -- see README.md
# "Why the real library isn't linked".

sample:
  name: tinygsm-modem-at
  description: |
    Runs the cellular-modem AT bring-up flow TinyGSM drives (AT
    liveness, then ATI / AT+CGMI / AT+GMM for getModemInfo) against a
    mock AT-transcript Stream, and prints the assembled modem info.
    The real TinyGsm modem(stream) call sequence is documented in
    src/main.cpp; linking the upstream library needs a full Arduino
    String, so this example demonstrates the same exchange directly.

tests:
  alp_sdk.example.tinygsm_modem_at:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    tags:
      - alp-sdk
      - example
      - tinygsm-modem-at
    harness: console
    harness_config:
        type: one_line
        regex:
          - "\\[tinygsm-modem-at\\] done"
