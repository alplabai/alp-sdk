#
# This example is C++ (src/main.cpp + the Arduino-Stream shim's
# virtual Stream base).  These are C++ toolchain knobs the language
# needs -- not board.yaml feature selection, so they live here rather
# than being loader-derived (see hello-world/prj.conf for the "what
# goes here" rule).
CONFIG_CPP=y
CONFIG_STD_CPP17=y

# The virtual Stream base emits a deleting destructor that references
# operator delete(void*, size_t); Zephyr's minimal C++ library omits
# it, so pull in the host's full libstdc++ via EXTERNAL_LIBCPP
# (native_sim's default once REQUIRES_FULL_LIBCPP is set).  Matches
# the doctest-selftest example's C++ setup.
CONFIG_REQUIRES_FULL_LIBCPP=y
