sample:
  name: iot-dashboard
  description: |
    BME280 environment sensor + OPTIGA Trust M + ST7789 TFT.
    mbedtls supplies TLS while MQTT publish enters through the
    portable <alp/iot.h> surface.  The same source builds on AEN
    (on-module CC3501E bridge) or V2N (Linux-owned Murata/CYW).
    native_sim stubs Wi-Fi + MQTT.
common:
  tags: lvgl iot mqtt tls demo example
tests:
  alp_sdk.examples.iot_dashboard.native_sim:
    platform_allow: native_sim/native/64
    build_only: true
    # native_sim.conf loads LAST (after alp.conf's OVERLAY_CONFIG
    # emit) so it can flip CONFIG_MBEDTLS off -- works around the
    # Zephyr 4.4 / mbedtls 3.6 ssl_misc.h include-order bug; see
    # native_sim.conf for the full rationale.
    extra_args:
      - "EXTRA_CONF_FILE=native_sim.conf"
  alp_sdk.examples.iot_dashboard.aen:
    platform_allow:
      - ensemble_e8_dk/ae402fa0e5597le0/rtss_hp
    build_only: true
