#
# Native-sim Kconfig overlay for iot-dashboard.
#
# Loaded LAST via twister's `extra_args: EXTRA_CONF_FILE=...`
# (see ../testcase.yaml), so the settings here win over the
# alp.conf-emitted CONFIG_MBEDTLS=y that `libraries: [mbedtls]`
# pulls into every iot-dashboard build.
#
# Why: Zephyr v4.4 ships mbedtls 3.6 + the new tf-psa-crypto
# split.  The upstream library-internal header
# `mbedtls/library/ssl_misc.h` references `mbedtls_error_pair_t`
# before including the type's declaring header, which makes
# every TU that compiles against the SSL portion of mbedtls
# fail with `unknown type name 'mbedtls_error_pair_t'`.  Full
# integration is a v0.6 (TF-M-on-HE + tf-psa-crypto wiring)
# work item, same as the production-deployment / iot-fleet-ota
# native_sim build paths.
#
# On native_sim the framing path is what we want to exercise
# (open(), publish(), TLS-config call sites); turning mbedtls
# off keeps the build green without losing that coverage.  Real-
# silicon (.aen) builds keep mbedtls on -- they follow the
# TF-M-on-HE config stack that doesn't hit the same upstream
# include-order bug.
CONFIG_MBEDTLS=n
CONFIG_MBEDTLS_BUILTIN=n
CONFIG_MQTT_LIB_TLS=n

# native_sim has no real ST7789 panel, so bind Zephyr's dummy display
# driver: it lets the dashboard link without an SDL/X11 dependency.
# On real silicon this file is NOT applied (the generated alp.conf
# binds the actual ST7789 driver instead), so the dummy-panel knob
# never reaches the real-silicon build.
CONFIG_DUMMY_DISPLAY=y
