# board.yaml -- IoT environment dashboard demo.
#
# Reads BME280 temperature/humidity/pressure, publishes the
# samples to an MQTT broker (TLS via mbedTLS today; OPTIGA
# handshake offload is planned), and renders a live LVGL dashboard
# on a 240x320 ST7789.  The Wi-Fi connection comes up through
# the E1M-AEN module's on-module CC3501E bridge backend.

libraries:
  - name: lvgl
    cores: [m55_hp]
  - name: mbedtls
    cores: [m55_hp]

som:
  sku: E1M-AEN801

preset: e1m-evk             # External chips wired into the EVK
                            # headers (BME280, ST7789) are listed in
                            # `chips:` below.

# E1M pads this app uses (subset of the EVK preset's `e1m_routes:`).
pins:
  - { e1m: E1M_I2C0, macro: EVK_I2C_BUS_SENSORS, doc: "Shared sensor + IO-expander + INA236 bus" }
  - { e1m: E1M_SPI1, macro: EVK_SPI_BUS_ARDUINO, doc: "Arduino UNO header SPI; terminates on the on-module CC3501E, not the main SoC" }

# Dashboard demo runs entirely on M55-HP (sensor poll + LVGL UI +
# Wi-Fi/MQTT publish).  A32 cluster off; M55-HE inherits the SoM
# topology default for the second NPU's future hooks.
cores:
  a32_cluster:
    os: "off"
  m55_hp:
    app: ./src
    iot:
      wifi:    true
      mqtt:    true
      tls:     true
    peripherals:
      - i2c                  # BME280.
      - spi                  # Display.
      - gpio                 # Display ancillaries + CC3501E control GPIOs.

chips:
  - bme280                   # Environment sensor.
  - optiga_trust_m           # Planned TLS trust-anchor / handshake offload.
  - st7789                   # 240x320 TFT.
  # WiFi connectivity comes through the <alp/iot.h> alp_wifi_*
  # surface; on AEN the generator resolves `on_module.wifi_ble:
  # cc3501e` and emits the CC3501E bridge backend.  V2N carries
  # `murata_lbee5hy2fy` on-module and uses the Linux/BSP path.

diagnostics:
  log_level: info
