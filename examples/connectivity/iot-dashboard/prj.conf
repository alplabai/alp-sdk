# SPDX-License-Identifier: Apache-2.0
CONFIG_MAIN_STACK_SIZE=16384
CONFIG_HEAP_MEM_POOL_SIZE=262144

CONFIG_LV_Z_VDB_SIZE=50
CONFIG_LV_COLOR_DEPTH_16=y
CONFIG_LV_DEF_REFR_PERIOD=33
# LVGL doesn't ship the larger Montserrat sizes by default; the
# dashboard's big-number tiles use the 28-pt face.
CONFIG_LV_FONT_MONTSERRAT_28=y
# LVGL's own internal allocator pool -- see
# examples/display/lvgl-widgets-demo/prj.conf for why the 2048-byte
# Kconfig default is unsafe.
CONFIG_LV_Z_MEM_POOL_SIZE=131072

CONFIG_LOG=y
CONFIG_LOG_PRINTK=y

# Networking + MQTT + TLS knobs.  Real WiFi credentials come in
# via a build-time KConfig override or a CMake -D flag; the demo
# stubs out the connect step on native_sim.
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_MQTT_LIB=y
# MQTT-TLS off on native_sim: Zephyr v4.4 + mbedtls 3.6 PSA wiring
# is the same v0.6 work item production-deployment / iot-fleet-ota
# carry.  Real-silicon builds re-enable via TF-M-on-HE.
CONFIG_MQTT_LIB_TLS=n
CONFIG_DNS_RESOLVER=y

# Display subsystem.  The actual panel driver is board-specific:
# real silicon binds the ST7789 from the generated alp.conf, while
# native_sim has no panel and pulls CONFIG_DUMMY_DISPLAY=y from the
# per-example native_sim.conf overlay (wired in testcase.yaml).
CONFIG_DISPLAY=y

# This app binds LVGL to the panel itself via <alp/gui.h>'s
# alp_gui_lvgl_attach() (src/main.c) -- see
# examples/display/lvgl-widgets-demo/prj.conf for the full rationale
# on turning Zephyr's own lvgl auto-init off.
CONFIG_LV_Z_AUTO_INIT=n
