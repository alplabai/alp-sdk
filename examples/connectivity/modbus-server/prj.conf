CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_MAIN_STACK_SIZE=4096

# board.yaml selects the Modbus subsystem through ADR 0018.  This example then
# chooses Zephyr's RAW_ADU transport so the same code builds on native_sim and
# on boards with no `zephyr,modbus-serial` devicetree node.
CONFIG_MODBUS_RAW_ADU=y
CONFIG_MODBUS_NUMOF_RAW_ADU=2
