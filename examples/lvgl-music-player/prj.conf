CONFIG_MAIN_STACK_SIZE=8192
# Music demo album-art assets are bigger than the LVGL default.
CONFIG_HEAP_MEM_POOL_SIZE=262144

CONFIG_LV_USE_DEMO_MUSIC=y

CONFIG_LV_Z_VDB_SIZE=50
CONFIG_LV_COLOR_DEPTH_16=y
CONFIG_LV_DEF_REFR_PERIOD=33

CONFIG_LOG=y
CONFIG_LOG_PRINTK=y

# Display driver: native_sim has no real panel; the dummy
# display lets the demo link without an SDL/X11 dep.
CONFIG_DISPLAY=y
CONFIG_DUMMY_DISPLAY=y
