# board.yaml -- LVGL music-player demo.
#
# Wraps the upstream `lv_demo_music()` which is the most polished
# of LVGL's bundled demos -- album-art carousel, time slider,
# track list, equaliser visualiser.  Pairs nicely with a real
# audio output path: WM8960 or TLV320AIC3204 codec over I²S.
som:
  sku: E1M-AEN701

preset: e1m-evk

# E1M pads this app uses (subset of the EVK preset's `e1m_routes:`).
pins:
  - E1M_SPI1
  - E1M_I2C0
cores:
  a32_cluster:
    os: "off"
  m55_hp:
    app: ./src
    libraries:
      - lvgl
      - minimp3              # Optional: actual MP3 decode on the audio path.
                              # The demo's `lv_demo_music()` itself only animates
                              # the UI; minimp3 wires the decode to alp_i2s_*.
    peripherals:
      - spi
      - gpio
      - i2c                  # Codec control surface.
      - i2s                  # Audio data path.

chips:
  - st7789                   # Display.
  - wm8960                   # Audio codec (I²C config + I²S data).

diagnostics:
  log_level: info
