# board.yaml -- per-app project configuration for the
# gpio-button-led example.
#
# === The customer workflow this example demonstrates ===
#
#   1. Copy this file (and the rest of examples/peripheral-io/gpio-button-led/)
#      to your own app directory.
#   2. Change `som.sku` to your MPN.  Stock SoM presets live at
#      metadata/e1m_modules/<MPN>.yaml; the SDK ships one
#      for every supported SoM preset.
#   3. If your board is not the EVK, swap `preset: e1m-evk` for
#      an inline board definition: top-level `name:` + `populated:`
#      + `e1m_routes:` blocks.  See docs/board-config-schema.md for the
#      shape.  Each `populated.<name>: true` enables the matching
#      CONFIG_ALP_SDK_CHIP_<NAME>=y (or CONFIG_ALP_SDK_BLOCK_<NAME>=y
#      for the SDK-level helpers `button_led` / `pdm_mic`; the loader
#      picks the right symbol per slug).
#   4. Build with `west build` via `tan` (or `west alp-build`'s successor).
#      The planner (scripts/alp_orchestrate) derives this file's per-core
#      Kconfig and wires it into `west build` via `-DEXTRA_CONF_FILE=...`
#      (see docs/adr/0020-sdk-owns-build-execution.md) -- no hand-edited
#      Kconfig.  (`rsource` is a Kconfig directive and is NOT valid in a
#      .conf file, which is why prj.conf cannot pull the fragment in
#      itself.)
#
# Validated against metadata/schemas/board.schema.json; the field
# reference is docs/board-config-schema.md.

som:
  sku: E1M-AEN801          # Alif Ensemble E8 SoM

preset: e1m-evk            # 35x35 EVK -- reference board.  The EVK
                           # routes the user button to the encoder
                           # push switch (E1M_GPIO_IO4) and its only
                           # user LEDs to the RGB cluster on PWM; this
                           # demo claims the red channel's pad as a GPIO
                           # (E1M_GPIO_PWM3, the E1M GPIO-secondary).
supported_boards:
  - e1m-evk
  - e1m-x-evk

# E1M pads this app uses (subset of the EVK preset's `e1m_routes:`).
pins:
  - { e1m: E1M_GPIO_IO4, macro: EVK_PIN_ENCODER_SW, doc: "Rotary encoder push switch (PEC12R-4222F-S0024), 10k pull-up + 0.1uF debounce" }
  - { e1m: E1M_GPIO_PWM3, macro: EVK_PIN_LED_RED, doc: "RGB LED red -- the PWM3 pad as a digital GPIO; the app opens it by the EVK_PIN_LED_RED macro" }

# Single-core slice on AEN801: M55-HP runs the demo.  M55-HE inherits
# the SoM topology default (stock-shim Zephyr image), keeping the
# peer-core RPMsg boot path intact for advanced users.
cores:
  m55_hp:
    app: ./src
    # Zephyr peripheral subsystems exercised by this example.  The
    # loader translates each entry to CONFIG_<X>=y in alp.conf.
    peripherals:
      - gpio

diagnostics:
  log_level: info
