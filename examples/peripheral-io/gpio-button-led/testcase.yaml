sample:
  name: gpio-button-led
  description: |
    Per-peripheral example for the GPIO surface via the
    <alp/blocks/button_led.h> block.  Button = encoder switch
    (E1M_GPIO_IO4); LED = the RGB-red PWM3 pad claimed as a GPIO
    (E1M_GPIO_PWM3, the E1M "GPIO secondary").

tests:
  alp_sdk.example.gpio_button_led:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    tags:
      - alp-sdk
      - example
      - gpio
    harness: console
    harness_config:
        type: one_line
        regex:
          - "\\[gpio\\] done"
