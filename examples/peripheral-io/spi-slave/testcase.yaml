sample:
  name: spi-slave
  description: |
    Per-peripheral example for SPI target (slave) mode via
    alp_spi_target_open: transfer-based request/response protocol
    (preload reply, bounded wait on the controller's clock).  On
    native_sim BOARD_SPI_ARDUINO is not wired (only the alp-spi0
    loader alias exists), so the open degrades cleanly with the
    NOT_READY diagnostic.  Builds on both EVKs: BOARD_SPI_ARDUINO
    resolves to ALP_E1M_SPI1 on E1M EVK and ALP_E1M_X_SPI1 on
    E1M-X EVK.

tests:
  alp_sdk.example.spi_slave.e1m_x_evk:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    extra_configs:
      - 'CONFIG_COMPILER_OPT="-DALP_BOARD_E1M_X_EVK"'
    tags:
      - alp-sdk
      - example
      - spi
      - v2n
    harness: console
    harness_config:
        type: one_line
        regex:
          - "\\[spi-slave\\] done"
  alp_sdk.example.spi_slave.e1m_evk:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    extra_configs:
      - 'CONFIG_COMPILER_OPT="-DALP_BOARD_E1M_EVK"'
    tags:
      - alp-sdk
      - example
      - spi
      - aen
    harness: console
    harness_config:
        type: one_line
        regex:
          - "\\[spi-slave\\] done"
