# SPDX-License-Identifier: Apache-2.0

sample:
  name: spi-slave
  description: |
    Per-peripheral example for SPI slave mode.  As of v0.6 the
    Alp SDK <alp/peripheral.h> surface is master-only; this
    example documents the API gap, stakes out the proposed
    slave-mode shape, and exits with the NOSUPPORT diagnostic.

tests:
  alp_sdk.example.spi_slave:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    tags:
      - alp-sdk
      - example
      - spi
      - api-gap
    harness: console
    harness_config:
        type: one_line
        regex:
          - "\\[spi-slave\\] done"
