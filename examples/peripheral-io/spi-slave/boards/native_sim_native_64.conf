#
# native_sim emul controller -- the bus enumerates but native_sim
# has no SPI slave emulation, so alp_spi_target_open degrades
# cleanly and the example prints the diagnostic and exits.  Kept
# for symmetry with examples/peripheral-io/spi-master.

CONFIG_EMUL=y
CONFIG_SPI_EMUL=y
