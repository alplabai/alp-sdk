#
# Feature-selection CONFIGs come from board.yaml via alp.conf
# (OVERLAY_CONFIG, see CMakeLists.txt).  CONFIG_SPI_SLAVE is an
# upstream-Zephyr capability toggle the derivation does not cover:
# every in-tree SPI driver compiles its slave/target path only when
# it is set, so the example enables it here.
CONFIG_SPI_SLAVE=y

# Bounded-wait transceive timeouts ride Zephyr's async SPI API
# (spi_transceive_signal + k_poll).  Without this, a finite
# timeout_ms fails with ALP_ERR_NOSUPPORT and the example degrades
# to the unbounded wait.
CONFIG_SPI_ASYNC=y
