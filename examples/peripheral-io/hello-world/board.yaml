# board.yaml -- per-app project configuration for the
# hello-world example.
#
# The simplest possible Alp SDK app: no peripherals, no chips, no
# board-specific wiring.  Just the boot path + a periodic printf
# loop so customers can confirm their toolchain + flash flow + log
# console are wired correctly before chasing harder bugs.
#
# Customer workflow: copy this directory, change `som.sku` to
# your MPN, edit the `preset:` (or use an inline board) if you're on a non-EVK board,
# and `west build`.  The planner (scripts/alp_orchestrate) derives the
# per-core Kconfig from this file and wires it into `west build` via
# `-DEXTRA_CONF_FILE=...` (see docs/adr/0020-sdk-owns-build-execution.md).
som:
  sku: E1M-AEN801

preset: e1m-evk
supported_boards:
  - e1m-evk
  - e1m-x-evk
cores:
  m55_hp:
    app: ./src
    # No peripherals -- this example exercises only the boot path
    # and printf, both of which are part of the Zephyr baseline and
    # need no explicit Kconfig.  When the loader sees an empty
    # peripherals: list it still emits the SoC + board configs
    # the SoM topology requires, so the app boots normally.
    peripherals: []

diagnostics:
  log_level: info
