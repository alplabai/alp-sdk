# board.yaml -- per-app project configuration for the
# spi-master example.
#
# Discrete SPI master that sends a known byte pattern to an
# external slave (or a single-wire loopback target if you've wired
# MOSI to MISO).  Contrasts with examples/peripheral-io/spi-loopback which is
# the same chip acting as both halves of the bus.
#
# Customer workflow: copy this directory, change `som.sku` to
# your MPN, edit the `preset:` (or use an inline board) if you're on a non-EVK board,
# and `west build`.  CMakeLists.txt invokes
# scripts/alp_project.py at configure time + layers the
# generated alp.conf over prj.conf via EXTRA_CONF_FILE.
som:
  sku: E1M-AEN801

preset: e1m-evk
supported_boards:
  - e1m-evk
  - e1m-x-evk

# E1M pads this app uses (subset of the EVK preset's `e1m_routes:`).
pins:
  - { e1m: E1M_SPI1, macro: EVK_SPI_BUS_ARDUINO, doc: "Arduino UNO header SPI; terminates on the on-module CC3501E, not the main SoC" }
cores:
  m55_hp:
    app: ./src
    # Zephyr peripheral subsystem exercised by this example.  The
    # loader translates the entry to CONFIG_SPI=y in alp.conf.
    peripherals:
      - spi

diagnostics:
  log_level: info
