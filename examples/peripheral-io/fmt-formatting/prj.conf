#
# fmt is C++; the app source is main.cpp. These are C++ toolchain
# knobs the library needs -- not board.yaml feature selection, so
# they live here rather than being loader-derived (see
# hello-world/prj.conf for the "what goes here" rule). Modelled on
# examples/testing/doctest-selftest/prj.conf, the SDK's existing
# native_sim precedent for a header-only C++ library that needs more
# than Zephyr's minimal C++ library provides.
CONFIG_CPP=y
CONFIG_STD_CPP17=y

# fmt/format.h pulls in <string_view>, <type_traits>, <limits>, and
# friends well beyond the three headers Zephyr's minimal C++ library
# ships (cstdint/cstddef/a <new> stub -- see
# examples/peripheral-io/etl-fixed-containers/CMakeLists.txt for the
# gap that stub causes for a *different* library).  Pull in the
# host's real libstdc++ via EXTERNAL_LIBCPP (native_sim's default
# once REQUIRES_FULL_LIBCPP is set) so those headers resolve.
CONFIG_REQUIRES_FULL_LIBCPP=y
