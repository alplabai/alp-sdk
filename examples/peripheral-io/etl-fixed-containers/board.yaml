# board.yaml -- per-app project configuration for the
# etl-fixed-containers example.
#
# Customer workflow: copy this directory, change `som.sku` to
# your MPN, edit the `preset:` (or use an inline board) if you're on a non-EVK board,
# and `west build`.  CMakeLists.txt invokes
# scripts/alp_project.py at configure time + layers the
# generated alp.conf over prj.conf via OVERLAY_CONFIG.
schemaVersion: 1
som:
  sku: E1M-AEN801

preset: e1m-evk
supported_boards:
  - e1m-evk
  - e1m-x-evk
cores:
  m55_hp:
    app: ./src
    peripherals: []
    # Pulls vendors/etl/include (the vendored ETL 20.39.4 headers,
    # Task 0 of the 3p-library-examples batch) and
    # metadata/library-profiles/etl/etl_profile.h onto the include
    # path. ETL is header-only -- no Kconfig knob of its own; the
    # loader emits a documentation-only comment line in alp.conf for
    # this entry (see _LIBRARY_KCONFIG in scripts/alp_project.py).
    libraries:
      - etl

diagnostics:
  log_level: info
