#
# ETL is C++; the app source is main.cpp. These are C++ toolchain
# knobs the language needs -- not board.yaml feature selection, so
# they live here rather than being loader-derived (see
# hello-world/prj.conf for the "what goes here" rule).
CONFIG_CPP=y
CONFIG_STD_CPP17=y

# Deliberately do NOT set CONFIG_REQUIRES_FULL_LIBCPP here: leaving
# it unset means none of CONFIG_EXTERNAL_LIBCPP / CONFIG_GLIBCXX_LIBCPP
# / CONFIG_LIBCXX_LIBCPP are defined, so
# metadata/library-profiles/etl/etl_profile.h's guard leaves
# ETL_NO_STL on -- the same "no host STL" mode ETL runs in on real
# Cortex-M silicon. ETL's fixed-capacity containers don't need the
# STL either way; this keeps native_sim closest to the on-target
# build.
