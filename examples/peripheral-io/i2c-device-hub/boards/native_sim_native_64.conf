#
# native_sim has no real I2C controller; pull in the emul I2C
# driver so the bus enumerates at boot and every chip-driver init
# can probe (each returns NACK because nothing is registered on
# the emulated bus -- exactly the per-device-absent branch this
# example's graceful-degradation path exercises).
# Auto-loaded by Zephyr when building for native_sim/native/64.

CONFIG_EMUL=y
CONFIG_I2C_EMUL=y
