# Functional read-out of every populated device on the EVK sensor/power
# I2C bus, each through its real chip driver.  Targets the AEN801 (E8) SoM;
# the e1m-evk preset's `populated:` set compiles the chip drivers in.
som:
  sku: E1M-AEN801
preset: e1m-evk
cores:
  m55_he:
    app: ./src
    peripherals:
      - i2c
# Every real chip driver src/main.c includes directly (issue #514's lint
# gap: an undeclared <alp/chips/*.h> include skips the family-compatibility
# check and misreports the portability ring).
chips:
  - icm42670
  - bmi323
  - bmp581
  - ina236
  - tas2563
  - tcal9538
  - eeprom_24c128
diagnostics:
  log_level: info
