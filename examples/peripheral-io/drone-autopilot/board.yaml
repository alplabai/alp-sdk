# board.yaml -- quadcopter autopilot demo.
#
# Self-contained PID-stabilised flight controller running on an
# E1M-AEN module.  IMU + barometer + GNSS sensor fusion via the
# Madgwick library, four ESC PWM outputs through the portable
# alp_pwm_t surfaces, SBUS RC receiver input via UART.  Flight-
# mode state machine: manual / stabilised / GPS-hold / RTH /
# failsafe.
#
# Demonstrates the v0.5 SDK's real-time control story: the same
# host MCU runs the IMU sample loop, attitude estimation, PID
# control cascade, motor mixer, AND the failsafe at deterministic
# kHz cadences -- all in portable C with no vendor symbols.

schemaVersion: 1
som:
  sku: E1M-AEN801           # E8's M55 HP core handles the 1 kHz
                             # rate loop comfortably; Helium MVE
                             # accelerates Madgwick.

preset: e1m-evk             # External sensors plugged into the EVK's
                            # I2C/UART headers are listed in `chips:`
                            # below to flip on their chip drivers.

# E1M pads this app uses (subset of the EVK preset's `e1m_routes:`).
pins:
  - { e1m: E1M_I2C0, macro: EVK_I2C_BUS_SENSORS, doc: "Shared sensor + IO-expander + INA236 bus" }
  - { e1m: E1M_UART0, macro: EVK_UART_PORT_DEBUG, doc: "Console UART exposed on the JTAG/SWD-side debug header" }
  - { e1m: E1M_PWM0, macro: EVK_PWM_LED_GREEN, doc: "RGB LED green; schematic-wired via PWM0 (non-contiguous with R/B)" }

# Flight controller on M55-HP only.  A32 cluster off (no Linux on a
# weight-sensitive vehicle); M55-HE inherits the SoM topology
# default (stays available as the failsafe peer for v0.7's dual-MCU
# safety story).
cores:
  a32_cluster:
    os: "off"
  m55_hp:
    app: ./src
    # Library set: Madgwick AHRS for attitude estimation, PID for the
    # control cascade.  Both pulled in via §D.lib loader; their
    # HW-backend choice (FPU on AEN, TMU CORDIC on V2N) comes from
    # the SoM's capabilities: block.
    libraries:
      - madgwick_ahrs
      - pid
    peripherals:
      - i2c                  # IMU + barometer.
      - uart                 # SBUS RC receiver + GNSS.
      - pwm                  # ESC outputs (4-6 channels for quad / hex).
      - gpio                 # Arming-switch input + status LED.

chips:
  - lsm6dso                  # 6-axis IMU (rate gyro + accel).
  - bmp390                   # Barometer for altitude hold.
  - ublox_neo_m9n            # GNSS for position hold / RTH.
  - ina236                   # Battery monitor (telemetry + failsafe).

diagnostics:
  log_level: warn            # Quiet at flight time; warn + error only.
