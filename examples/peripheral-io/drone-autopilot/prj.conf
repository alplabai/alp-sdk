# SPDX-License-Identifier: Apache-2.0
CONFIG_MAIN_STACK_SIZE=8192

CONFIG_LOG=y
CONFIG_LOG_PRINTK=y

# Tight scheduling: rate loop runs at 1 kHz, attitude at 250 Hz,
# nav at 25 Hz.  Cooperative threads + tick-rate set high.
CONFIG_NUM_PREEMPT_PRIORITIES=8
# 100 us tick resolution.
CONFIG_SYS_CLOCK_TICKS_PER_SEC=10000
# k_cycle_get_*() needed for jitter audit.
CONFIG_TIMING_FUNCTIONS=y

# Compile-time gate for the flight-loop tracing (helpful during
# bring-up; off by default to keep the loop ISR-clean).
# CONFIG_AUTOPILOT_TRACE_RATE_LOOP=y
