# board.yaml -- per-app project configuration for the
# dac-waveform example.
#
# Generates a sine wave on DAC0.  Targets the E1M EVK (Alif Ensemble
# E8) by default -- it drives the SoC's native 2-channel DAC12 directly
# through <alp/dac.h>.  The same source still builds for the E1M-X EVK
# (V2N), where the SDK dispatches DAC writes through the on-module
# GD32G553 supervisor bridge automatically; customer code never sees
# the dispatch (select it with `preset: e1m-x-evk` + the V2N SKU).
#
# The DAC is exposed through <alp/dac.h>.  The board.yaml peripherals
# enum carries only `adc` for the analog-converter family (no separate
# `dac` token), so the `adc` entry lights the analog subsystem; the DAC
# subsystem (CONFIG_DAC) is turned on in prj.conf.
#
# Customer workflow: copy this directory, change `som.sku` to
# your MPN, edit the `preset:` (or use an inline board) if you're on a non-EVK board,
# and `west build`.  The planner (scripts/alp_orchestrate) derives the
# per-core Kconfig from this file and wires it into `west build` via
# `-DEXTRA_CONF_FILE=...` (see docs/adr/0020-sdk-owns-build-execution.md).
som:
  sku: E1M-AEN801

preset: e1m-evk
supported_boards:
  - e1m-evk
  - e1m-x-evk
cores:
  # The A32 Linux cluster has nothing to do in this DAC example --
  # mark it `os: "off"` so the orchestrator doesn't spin up a Yocto
  # build for it.  The M55-HE core runs the demo.
  a32_cluster:
    os: "off"
  m55_he:
    app: ./src
    # The `adc` peripheral token lights CONFIG_ADC + the analog
    # subsystem; CONFIG_DAC is set in prj.conf (the schema enum has no
    # separate `dac` token).  alp_dac_* resolves the alp-dac0 alias the
    # generated overlay emits from the board's e1m_routes.dac.
    peripherals:
      - adc

diagnostics:
  log_level: info
