#
# Most CONFIG_* this app needs is derived from board.yaml by
# scripts/alp_project.py and layered in via EXTRA_CONF_FILE (see
# CMakeLists.txt) -- including CONFIG_ADC + the SoC select.
#
# CONFIG_DAC is the one knob the board.yaml schema can't express: the
# peripherals enum carries only `adc` for the analog-converter family
# (no separate `dac` token), so the DAC subsystem is enabled here.  On
# the Alif Ensemble EVK this pulls in the alif,dac driver
# (CONFIG_DAC_ALIF, `default y` on DT_HAS_ALIF_DAC_ENABLED) under the
# portable <alp/dac.h> zephyr_drv backend.  On the V2N (E1M-X) path the
# DAC reaches the GD32 supervisor bridge backend instead, which does not
# need CONFIG_DAC -- leaving it on there is harmless (no DAC DT node ->
# the Zephyr DAC class compiles out).
CONFIG_DAC=y
