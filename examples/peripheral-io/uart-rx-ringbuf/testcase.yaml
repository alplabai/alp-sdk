# SPDX-License-Identifier: Apache-2.0

sample:
  name: uart-rx-ringbuf
  description: |
    Per-feature example for <alp/peripheral.h>'s opt-in
    interrupt-driven RX ring buffer (CONFIG_ALP_SDK_UART_RX_RINGBUF).
    Attaches an LwRB-backed ring to BOARD_UART_DEBUG, polls the
    drain count + pops batched bytes, then detaches.  Builds on
    both EVKs: E1M EVK uses E1M_UART0; E1M-X EVK uses E1M_X_UART0.

tests:
  alp_sdk.example.uart_rx_ringbuf.e1m_x_evk:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    extra_configs:
      - 'CONFIG_COMPILER_OPT="-DALP_BOARD_E1M_X_EVK"'
    tags:
      - alp-sdk
      - example
      - uart
      - lwrb
      - v2n
    harness: console
    harness_config:
        type: one_line
        regex:
          - "\\[ringbuf\\] done"
  alp_sdk.example.uart_rx_ringbuf.e1m_evk:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    extra_configs:
      - 'CONFIG_COMPILER_OPT="-DALP_BOARD_E1M_EVK"'
    tags:
      - alp-sdk
      - example
      - uart
      - lwrb
      - aen
    harness: console
    harness_config:
        type: one_line
        regex:
          - "\\[ringbuf\\] done"
