#
# board.yaml -> alp_project.py emits the CONFIG_<peripheral>=y
# entries; this file adds the example-specific Kconfig that the
# loader doesn't drive.

# Enable the LwRB-backed RX ring buffer helper in
# <alp/peripheral.h>.  Requires interrupt-driven UART support;
# every E1M-conformant target has it but native_sim's UART driver
# also supports it under the host-mediated tty path.
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_ALP_SDK_UART_RX_RINGBUF=y

# Bump the LwRB handle pool to two so we could attach a second
# port if we wanted; the example only opens one.
CONFIG_ALP_SDK_MAX_UART_RX_RINGBUF_HANDLES=2
