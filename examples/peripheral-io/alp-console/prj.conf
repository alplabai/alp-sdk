#
# alp-console bench build configuration (both tiers enabled).
#
# CONFIG_ALP_SDK_CONSOLE enables the whole `alp` command tree at link time
# (board / gpio / i2c / adc / pwm / mem / clk / companion / reboot).
# CONFIG_ALP_SDK_CONSOLE_UNSAFE unlocks the write-capable verbs
# (mem wr, gpio write, companion gpio write) -- leave this off in field builds.
# CONFIG_ALP_SDK_HW_INFO + CONFIG_HWINFO are needed by `alp board` to read
# the SoM EEPROM identity at the shell prompt.
# CONFIG_REBOOT is required by `alp reboot`.
#
# Board-derived CONFIG_* (SPI / GPIO / ADC etc.) come from board.yaml via
# scripts/alp_project.py -> generated/alp.conf layered in by CMakeLists.txt.
CONFIG_ALP_SDK=y
CONFIG_ALP_SDK_CONSOLE=y
CONFIG_ALP_SDK_CONSOLE_UNSAFE=y
CONFIG_ALP_SDK_HW_INFO=y
CONFIG_SHELL=y
CONFIG_REBOOT=y
CONFIG_HWINFO=y

# Generous main-thread stack for the shell and companion reset sequence.
CONFIG_MAIN_STACK_SIZE=4096
