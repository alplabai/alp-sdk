# E1M-AEN801 EVK bench/ship build: slot0 MRAM boot.
# The SES boots a resident slot0 image at MRAM base 0x80000000 + 0x10000; the
# app must be slot0-linked (reset vector 0x8001xxxx) for the two-blob flash
# (app -> 0x80010000 + signed ATOC).  Matches the proven aen-rgb-led-fade /
# aen-cc3501e-gpio flash config on this bench.  AEN-only (per-board conf);
# V2N / native_sim builds are unaffected.
CONFIG_FLASH_LOAD_OFFSET=0x10000

# RGB "board alive" status LED: the demo drives the on-module RGB LED via the
# Alif UTIMER PWM (pwm10/pwm11 in the overlay) from a low-priority background
# thread, so the console stays fully responsive.  AEN-only (native_sim has no
# PWM nodes -- the RGB code device-tree-guards itself out there).
CONFIG_PWM=y

# Wire `alp board`'s live SoM identity read to the on-module 24C128 EEPROM:
# portable bus 0 = SoC I2C2 (enabled in the overlay), 7-bit addr 0x50 (default).
# On an EEPROM-provisioned unit the banner shows the live SKU + hw_rev; on a
# blank/unprovisioned unit the read NACKs/!magic and the banner gracefully
# falls back to the compiled board name (best-effort, no hang).
CONFIG_ALP_SDK_HW_INFO_EEPROM_I2C_BUS_ID=0
