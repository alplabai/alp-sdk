#
# native_sim console overlay: read-only shell build.
# No real hardware -- the CC3501E companion and the reboot command are off.
# Auto-loaded by Zephyr when building for native_sim/native/64.

# Read-only console (no hardware to write on the host).
CONFIG_ALP_SDK_CONSOLE=y
CONFIG_ALP_SDK_CONSOLE_UNSAFE=n

# No real REBOOT on native_sim.
CONFIG_REBOOT=n

# Emulated peripheral drivers so the `alp gpio` and `alp i2c` commands
# enumerate at least one bus (build-time proof, no silicon needed).
CONFIG_EMUL=y
CONFIG_GPIO_EMUL=y
CONFIG_I2C_EMUL=y

# HWINFO not meaningful on the host; disable to avoid the build error.
CONFIG_HWINFO=n
CONFIG_ALP_SDK_HW_INFO=n
