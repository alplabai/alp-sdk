# SPDX-License-Identifier: Apache-2.0

sample:
  name: i2c-master
  description: |
    Per-peripheral example for I2C master.  Reads the on-module
    TMP112 temperature sensor at a known 7-bit address via
    BOARD_I2C_SENSORS.  Builds on both EVKs: E1M EVK uses E1M_I2C0;
    E1M-X EVK uses E1M_X_I2C0.  Contrasts with
    examples/peripheral-io/i2c-scanner (discovery vs known-address read).

tests:
  alp_sdk.example.i2c_master.e1m_x_evk:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    extra_configs:
      - 'CONFIG_COMPILER_OPT="-DALP_BOARD_E1M_X_EVK"'
    tags:
      - alp-sdk
      - example
      - i2c
      - sensors
      - v2n
    harness: console
    harness_config:
        type: one_line
        regex:
          - "\\[i2c-master\\] done"
  alp_sdk.example.i2c_master.e1m_evk:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    extra_configs:
      - 'CONFIG_COMPILER_OPT="-DALP_BOARD_E1M_EVK"'
    tags:
      - alp-sdk
      - example
      - i2c
      - sensors
      - aen
    harness: console
    harness_config:
        type: one_line
        regex:
          - "\\[i2c-master\\] done"
