# board.yaml -- per-app project configuration for the
# i2c-master example.
#
# Reads the TMP112 temperature sensor on BRD_I2C via the chip-
# driver header.  Discrete master that talks to a known device at
# a known address -- contrasts with examples/peripheral-io/i2c-scanner which
# probes every 7-bit address for ACKs.
#
# Customer workflow: copy this directory, change `som.sku` to
# your MPN, edit the `preset:` (or use an inline board) if you're on a non-EVK board,
# and `west build`.  The planner (scripts/alp_orchestrate) derives the
# per-core Kconfig from this file and wires it into `west build` via
# `-DEXTRA_CONF_FILE=...` (see docs/adr/0020-sdk-owns-build-execution.md).
som:
  sku: E1M-AEN801

preset: e1m-evk
supported_boards:
  - e1m-evk
  - e1m-x-evk

# E1M pads this app uses (subset of the EVK preset's `e1m_routes:`).
pins:
  - { e1m: E1M_I2C0, macro: EVK_I2C_BUS_SENSORS, doc: "Shared sensor + IO-expander + INA236 bus" }
cores:
  m55_hp:
    app: ./src
    # Zephyr peripheral subsystem exercised by this example.  The
    # loader translates the entry to CONFIG_I2C=y in alp.conf.
    peripherals:
      - i2c

# TMP112 is populated on every member of the AEN, V2N, V2N-M1
# families per metadata/chips/tmp112.yaml -- so this example is
# Ring 2 (chip-bound, multi-family) per
# scripts/check_example_portability.py classification.
chips:
  - tmp112

diagnostics:
  log_level: info
