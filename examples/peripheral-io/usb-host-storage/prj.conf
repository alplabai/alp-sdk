#
# USB host stack + ALP SDK.  The alp_usb_host_* backend wires to Zephyr's
# usbh_* subsystem when CONFIG_USB_HOST_STACK=y and an alif,dwc2-uhc DT
# node is present (label zephyr_uhc0) in the board.
#
# Bring-up note: the DWC2-host uhc driver (uhc_dwc2_alif) is a skeleton;
# the actual register sequences are TODO(aen401-bench).  This config enables
# the full host path for compile verification; live enumeration requires
# bench bring-up on real silicon.
CONFIG_ALP_SDK=y
CONFIG_USB_HOST_STACK=y
CONFIG_UHC_DRIVER=y
CONFIG_UHC_DWC2_ALIF=y
