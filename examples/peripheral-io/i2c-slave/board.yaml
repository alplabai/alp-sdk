# board.yaml -- per-app project configuration for the
# i2c-slave example.
#
# Register-mapped I2C target (slave) via the portable
# alp_i2c_target_* surface in <alp/peripheral.h> (v0.9).
# Needs controller-driver target support (CONFIG_I2C_TARGET) at
# runtime; the example degrades cleanly (NOSUPPORT diagnostic)
# where none exists.
#
# Customer workflow: copy this directory, change `som.sku` to
# your MPN, edit the `preset:` (or use an inline board) if you're on a non-EVK board,
# and `west build`.  CMakeLists.txt invokes
# scripts/alp_project.py at configure time + layers the
# generated alp.conf over prj.conf via OVERLAY_CONFIG.
schemaVersion: 2
som:
  sku: E1M-AEN801

preset: e1m-evk
supported_boards:
  - e1m-evk
  - e1m-x-evk

# E1M pads this app uses (subset of the EVK preset's `e1m_routes:`).
pins:
  - { e1m: E1M_I2C0, macro: EVK_I2C_BUS_SENSORS, doc: "Shared sensor + IO-expander + INA236 bus" }
cores:
  m55_hp:
    app: ./src
    # Zephyr peripheral subsystem exercised by this example.  The
    # loader translates the entry to CONFIG_I2C=y in alp.conf.
    peripherals:
      - i2c

diagnostics:
  log_level: info
