#
# native_sim emul controller -- accepts the target registration
# (CONFIG_I2C_TARGET), but no external controller ever drives the
# emulated bus, so the example's callbacks never fire and the
# ticks show writes_seen=0.  Kept for symmetry with
# examples/peripheral-io/i2c-master.

CONFIG_EMUL=y
CONFIG_I2C_EMUL=y
