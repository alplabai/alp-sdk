#
# native_sim emul controller -- the bus enumerates so
# alp_i2c_target_open reaches the driver, which has no
# target-mode emulation and fails the registration; the example
# prints the NOSUPPORT diagnostic and exits.  Kept for symmetry
# with examples/peripheral-io/i2c-master.

CONFIG_EMUL=y
CONFIG_I2C_EMUL=y
