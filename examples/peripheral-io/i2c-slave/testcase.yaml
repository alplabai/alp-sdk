sample:
  name: i2c-slave
  description: |
    Per-peripheral example for I2C target (slave) mode via the
    <alp/i2c_regfile.h> helper: the register-file pattern shipped
    as one open() call over the byte-granular target callbacks,
    plus write-window + stats niceties.  On native_sim the emulated
    controller accepts the registration but nothing drives the
    bus, so ticks show writes_seen=0; drivers without target
    support degrade cleanly with the NOSUPPORT diagnostic.
    Builds on both EVKs: E1M EVK uses ALP_E1M_I2C0 via
    BOARD_I2C_SENSORS; E1M-X EVK uses ALP_E1M_X_I2C0.

tests:
  alp_sdk.example.i2c_slave.e1m_x_evk:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    extra_configs:
      - 'CONFIG_COMPILER_OPT="-DALP_BOARD_E1M_X_EVK"'
    tags:
      - alp-sdk
      - example
      - i2c
      - v2n
    harness: console
    harness_config:
        type: one_line
        regex:
          - "\\[i2c-slave\\] done"
  alp_sdk.example.i2c_slave.e1m_evk:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    extra_configs:
      - 'CONFIG_COMPILER_OPT="-DALP_BOARD_E1M_EVK"'
    tags:
      - alp-sdk
      - example
      - i2c
      - aen
    harness: console
    harness_config:
        type: one_line
        regex:
          - "\\[i2c-slave\\] done"
