#
# Feature-selection CONFIGs come from board.yaml via alp.conf
# (EXTRA_CONF_FILE, see CMakeLists.txt).  CONFIG_I2C_TARGET is an
# app-specific knob: it compiles the controller driver's
# target-mode hooks so alp_i2c_target_open can register this MCU
# as a bus target.  Drivers without target support still fail the
# open with ALP_ERR_NOSUPPORT -- which the example handles.
CONFIG_I2C_TARGET=y
