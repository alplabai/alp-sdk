# board.yaml -- per-app project configuration for the
# can-loopback example.
#
# Customer workflow: copy this directory, change `som.sku` to
# your MPN, edit the `preset:` (or use an inline board) if you're on a non-EVK board,
# and `west build`.  CMakeLists.txt invokes
# scripts/alp_project.py at configure time + layers the
# generated alp.conf over prj.conf via OVERLAY_CONFIG.
som:
  sku: E1M-AEN701

preset: e1m-evk
supported_boards:
  - e1m-evk
  - e1m-x-evk

# E1M pads this app uses (subset of the EVK preset's `e1m_routes:`).
pins:
  - { e1m: E1M_CAN0, macro: EVK_CAN_VEHICLE_BUS, doc: "TCAN1044A transceiver on header J9; loopback mode needs no external wiring" }
cores:
  m55_hp:
    app: ./src
    # Zephyr peripheral subsystem exercised by this example.  The
    # loader translates the entry to CONFIG_<X>=y in alp.conf.
    peripherals:
      - can

diagnostics:
  log_level: info
