# yaml-language-server: $schema=https://raw.githubusercontent.com/Open-CMSIS-Pack/devtools/tools/projmgr/2.12.0/tools/projmgr/schemas/cproject.schema.json

project:
  define:
    - BOARD_ALIF_DEVKIT_VARIANT: 4  # E1M Custom Board (6) / Alif DevKit Gen2 (4)
    - BUILD_ALIF: 1

  layers:
    - layer: ../../device/alif-ensemble/alif-ensemble-e7-device.clayer.yml
      
  groups:
    - group: ALP SDK Core
      files:
        - file: ../../alp/src/core/alp_spi_core.c
        - file: ../../alp/src/core/alp_gpio_core.c
        - file: ../../alp/src/core/alp_usart_core.c
        
    - group: ALP SDK Alif Drivers
      files:
        - file: ../../alp/src/drivers/alif/alp_spi_alif.c
        - file: ../../alp/src/drivers/alif/alp_gpio_alif.c
        - file: ../../alp/src/drivers/alif/alp_usart_alif.c
        
    - group: Board Support
      files:
        - file: ../../alp/board/board_alif_e7_devkit.c
        
    - group: Application
      files:
        - file: alp_spi_demo.c

  components:
    - component: ARM::CMSIS:CORE
    - component: AlifSemiconductor::CMSIS Driver:SPI
    - component: AlifSemiconductor::CMSIS Driver:USART
  
  misc:
    - for-compiler: AC6
      C:
        - -xc
        - -std=gnu11
        - -I$ProjectDir()$/../../alp/include
        - -I$ProjectDir()$/../../alp/board
