# board.yaml -- per-app project configuration for the
# i2c-master example.
#
# Reads the TMP112 temperature sensor on BRD_I2C via the chip-
# driver header.  Discrete master that talks to a known device at
# a known address -- contrasts with examples/i2c-scanner which
# probes every 7-bit address for ACKs.
#
# Customer workflow: copy this directory, change `som.sku` to
# your MPN, edit `carrier.name` if you're on a non-EVK board,
# and `west build`.  CMakeLists.txt invokes
# scripts/alp_project.py at configure time + layers the
# generated alp.conf over prj.conf via OVERLAY_CONFIG.

schema_version: 2

som:
  sku: E1M-AEN701

carrier:
  name: E1M-EVK

cores:
  m55_hp:
    app: ./src
    # Zephyr peripheral subsystem exercised by this example.  The
    # loader translates the entry to CONFIG_I2C=y in alp.conf.
    peripherals:
      - i2c

# TMP112 is populated on every member of the AEN, V2N, V2N-M1
# families per metadata/chips/tmp112.yaml -- so this example is
# Ring 2 (chip-bound, multi-family) per
# scripts/check_example_portability.py classification.
chips:
  - tmp112

diagnostics:
  log_level: info
