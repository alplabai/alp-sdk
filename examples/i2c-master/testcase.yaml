# SPDX-License-Identifier: Apache-2.0

sample:
  name: i2c-master
  description: |
    Per-peripheral example for I2C master.  Reads the on-module
    TMP112 temperature sensor at a known 7-bit address.  Contrasts
    with examples/i2c-scanner (discovery vs known-address read).

tests:
  alp_sdk.example.i2c_master:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    tags:
      - alp-sdk
      - example
      - i2c
      - sensors
    harness: console
    harness_config:
        type: one_line
        regex:
          - "\\[i2c-master\\] done"
