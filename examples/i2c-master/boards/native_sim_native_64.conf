#
# native_sim has no real I2C controller; pull in the emul I2C
# driver so the bus enumerates at boot and tmp112_init can probe
# (which returns NACK because no TMP112 is registered -- exactly
# the path the example's error-handling branch exercises).
# Auto-loaded by Zephyr when building for native_sim/native/64.

CONFIG_EMUL=y
CONFIG_I2C_EMUL=y
