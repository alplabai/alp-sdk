# board.yaml -- AI vibration-anomaly detection demo.
#
# Predictive-maintenance edge-AI pitch on the always-on NPU:
# read a 256-sample window from the on-board ICM-42670 accelerometer
# (populated on BOTH E1M EVK and E1M-X EVK), feed it through a 1D-CNN
# anomaly model via TFLM, publish the per-window score.  Same app
# source builds against the V2N's DEEPX DX-M1 path when the SoM SKU
# is flipped.
#
# Why ICM-42670: the ICM-42670-P is soldered on BOTH EVK variants
# (E1M EVK + E1M-X EVK).  The LSM6DSO is not soldered on either board,
# so using the on-board ICM-42670 lets the demo target both without
# hardware qualification branching or an external plug-in IMU.
#
# Why the headline matters for customers: factory-floor vibration
# monitoring without a cloud round-trip.  The model + ICM-42670
# sample loop both run on the on-die NPU + Cortex core -- battery-
# powered nodes can run for months on a single charge because the
# heavy compute lives behind the NPU's clock-gated path.

schemaVersion: 1
som:
  sku: E1M-AEN801           # E8 keeps the AEN always-on Ethos-U path
                             # and adds U85 headroom for transformer-style
                             # anomaly models on the same source.

preset: e1m-evk             # EVK preset populates the ICM-42670 at
                            # I2C0 by default.
supported_boards:
  - e1m-evk
  - e1m-x-evk

# E1M pads this app uses (resolved via BOARD_I2C_SENSORS at build time).
# E1M EVK:   E1M_I2C0 (shared sensor + IO-expander + INA236 bus)
# E1M-X EVK: E1M_X_I2C0 (on-board sensor + IO-expander + INA236 bus)
pins:
  - { e1m: E1M_I2C0, macro: EVK_I2C_BUS_SENSORS, doc: "Shared sensor + IO-expander + INA236 bus" }

# Single-OS app: M55-HP owns the sample loop + NPU dispatch.  Skip the
# A32 cluster (this is a battery-powered always-on demo) and keep
# M55-HE on the SoM topology default so the peer NPU stays accessible.
cores:
  a32_cluster:
    os: "off"
  m55_hp:
    app: ./src
    # Inference dispatcher set is resolved from the SoM preset's
    # `capabilities:` block (AEN -> Ethos-U, V2N -> DRP-AI3,
    # V2M101 -> DRP-AI3 + DEEPX, NX9101 -> Ethos-U65).  App source
    # touches none of those names.  This block only tunes the
    # per-model arena.
    inference:
      default_arena_kib: 128
    libraries:
      - tflite_micro
      - cmsis_dsp            # arm_rms/arm_absmax_f32 behind alp_dsp_stats_f32.
    peripherals:
      - i2c                  # ICM-42670 link.

chips:
  - icm42670                 # 6-axis IMU; we only use the accel here.

diagnostics:
  log_level: info
