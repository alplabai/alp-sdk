#
# native_sim has no real I2C controller; pull in the emul drivers so the
# ICM-42670 chip driver can open the sensor bus (alp-i2c0) at boot.  No
# GNSS UART is provided on native_sim -- main.c tolerates a NULL GNSS
# handle and replays a built-in canned NMEA track instead.
# Auto-loaded by Zephyr when building for native_sim/native/64.

CONFIG_EMUL=y
CONFIG_I2C_EMUL=y
