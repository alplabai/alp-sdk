# SPDX-License-Identifier: Apache-2.0

sample:
  name: iot-dashboard
  description: |
    BME280 environment sensor + OPTIGA Trust M + ST7789 TFT.
    mbedtls + coremqtt_sn library knobs supply TLS + MQTT
    publish.  WiFi via the portable <alp/iot.h> surface so the
    same source builds on AEN (external WiFi) or V2N (on-module
    Murata).  native_sim stubs WiFi + MQTT.
common:
  tags: lvgl iot mqtt tls demo example
  harness: console
tests:
  alp_sdk.examples.iot_dashboard.native_sim:
    platform_allow: native_sim/native/64
    build_only: true
  alp_sdk.examples.iot_dashboard.aen:
    platform_allow:
      - alif_e7_dk_rtss_hp
    build_only: true
