# SPDX-License-Identifier: Apache-2.0
CONFIG_MAIN_STACK_SIZE=16384
CONFIG_HEAP_MEM_POOL_SIZE=262144

CONFIG_LV_Z_VDB_SIZE=50
CONFIG_LV_COLOR_DEPTH_16=y
CONFIG_LV_DISP_DEF_REFR_PERIOD=33

CONFIG_LOG=y
CONFIG_LOG_PRINTK=y

# Networking + MQTT + TLS knobs.  Real WiFi credentials come in
# via a build-time KConfig override or a CMake -D flag; the demo
# stubs out the connect step on native_sim.
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_MQTT_LIB=y
CONFIG_MQTT_LIB_TLS=y
CONFIG_DNS_RESOLVER=y
