# SPDX-License-Identifier: Apache-2.0

sample:
  name: qenc-readout
  description: |
    Per-peripheral example for the quadrature-decoder side of
    <alp/counter.h>.  Polls E1M_ENC0's accumulated position.

tests:
  alp_sdk.example.qenc_readout:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    tags:
      - alp-sdk
      - example
      - qenc
      harness: console
  harness_config:
      type: one_line
      regex:
        - "\\[qenc\\] done"
