# board.yaml -- always-on "Hey Alp" wake-word demo on E1M-AEN.
#
# Pitches the AEN family's low-power AI subsystem: the Cortex-M55
# HE core stays awake at ~50 MHz running a tiny CNN over MFCC
# features streamed off a PDM microphone, with the on-die
# Ethos-U55 NPU bursting the convolutions in <50 ms windows.
# Average draw budget: <1 mW for 24/7 listening.  Detection
# wakes the M55 HP core for the heavy follow-up work (ASR /
# command parsing / cloud upload).
#
# E1M-V2N has no equivalent always-on AI complex, so this demo
# is the AEN family's headline differentiator.
som:
  sku: E1M-AEN801            # E8 -- Cortex-M55 HE runs the low-power
                              # duty-cycle math, with a core-local Ethos-U55
                              # for the always-on wake-word path.

preset: e1m-evk
cores:
  a32_cluster:
    os: "off"
  m55_he:
    app: ./src
    # TFLite Micro pulls in the CPU reference kernels; the AEN
    # SoM preset's `capabilities:` block adds the Ethos-U55 backend
    # via CONFIG_ALP_SDK_INFERENCE_BACKEND_ETHOS_U_AEN=y +
    # CONFIG_ALP_SDK_INFERENCE_ETHOS_U_VARIANT_U55=y -- no board.yaml
    # selection needed.
    libraries:
      - tflite_micro
    inference:
      default_arena_kib: 64   # ~30k-param CNN -- 64 KiB is generous.

# No per-core `peripherals:` block.  PDM mic input on Zephyr is the
# DMIC audio subsystem rather than a peripheral driver class -- the
# board.yaml schema's `peripherals:` enum doesn't carry `pdm`
# (same convention as the audio-loopback example).  The mic
# itself comes in via the board's pre-populated `pdm_mic`
# chip (E1M-EVK has it true by default) and CONFIG_AUDIO_DMIC=y
# is wired through testcase.yaml's `extra_args`.  We
# intentionally do NOT list `i2s` -- this is the PDM mic path,
# not an I2S codec path.

diagnostics:
  log_level: info
