# SPDX-License-Identifier: Apache-2.0

sample:
  name: i2s-tone
  description: |
    Per-peripheral example for <alp/i2s.h>.  Generates a 1 kHz sine
    and streams it as 16-bit stereo PCM.

tests:
  alp_sdk.example.i2s_tone:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    tags:
      - alp-sdk
      - example
      - i2s
    harness: console
    harness_config:
        type: one_line
        regex:
          - "\\[i2s\\] done"
