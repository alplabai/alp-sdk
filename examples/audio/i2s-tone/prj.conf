#
# Feature-selection lives in board.yaml; this file carries only the
# app-specific heap tuning the I2S ping-pong slab needs at runtime.
# board.yaml's derived alp.conf is layered in by `west build` itself
# via `-DEXTRA_CONF_FILE=...` (the planner wires this; see
# docs/adr/0020-sdk-owns-build-execution.md), not by this file.

CONFIG_HEAP_MEM_POOL_SIZE=8192
