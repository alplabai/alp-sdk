#
# native_sim-only overlay for audio-noise-suppression.
#
# The generated alp.conf (from board.yaml) turns on the real-silicon
# audio + DSP stack: CONFIG_I2S=y for the TAS2563 codec link,
# CONFIG_CMSIS_DSP / CONFIG_ALP_SDK_DSP for the FFT chain, and the
# TFLM inference backend.  native_sim has no I2S controller and no
# NPU, so this overlay keeps the build host-only:
#
#   - The DSP chain runs the portable C / CMSIS-DSP fallback (the
#     example explicitly relies on this path under native_sim), so we
#     KEEP CONFIG_ALP_SDK_DSP / CONFIG_CMSIS_DSP on.
#   - There is no I2S device to bind; alp_audio_in/out_open() return
#     NULL and the loop tolerates it.  Drop the I2S subsystem so the
#     native_sim build doesn't pull a controller binding it can't
#     satisfy.
#
# This file is wired via testcase.yaml `extra_args:
# EXTRA_CONF_FILE=native_sim.conf` so it only applies to the
# native_sim variant -- the real-silicon (v2n) build keeps I2S on.
CONFIG_I2S=n
CONFIG_AUDIO=n
CONFIG_AUDIO_DMIC=n
