# board.yaml -- butterworth-lowpass
#
# A self-contained DSP teaching demo: design a 2nd-order Butterworth
# low-pass biquad and run synthetic tones through the <alp/dsp.h> IIR
# chain stage (CMSIS-DSP arm_biquad on the M55, portable-C under
# native_sim).  Pure compute -- no peripherals or chips -- so the same
# source builds on any SoM; the E1M-AEN801 M55 is the reference target.

schemaVersion: 2
libraries:
  - name: cmsis-dsp
    cores: [m55_hp]

som:
  sku: E1M-AEN801

preset: e1m-evk
supported_boards:
  - e1m-evk
  - e1m-x-evk

cores:
  a32_cluster:
    os: "off"
  m55_hp:
    app: ./src

diagnostics:
  log_level: info
