# board.yaml -- per-app project configuration for the
# audio-loopback example.
#
# Customer workflow: copy this directory, change `som.sku` to
# your MPN, edit the `preset:` (or use an inline board) if you're on a non-EVK board,
# and `west build`.  CMakeLists.txt invokes
# scripts/alp_project.py at configure time + layers the
# generated alp.conf over prj.conf via OVERLAY_CONFIG.
som:
  sku: E1M-AEN801

preset: e1m-evk

# E1M pads this app uses (subset of the EVK preset's `e1m_routes:`).
# The PDM mic uses the raw E1M_PDM0 instance (no EVK route maps it).
pins:
  - { e1m: E1M_I2S0, macro: EVK_I2S_AUDIO_CODEC, doc: "I2S0 to the TAS2563 codec (speaker / line out)" }
cores:
  m55_hp:
    app: ./src
    # Zephyr peripheral subsystems exercised by this example.  Audio
    # touches the I2S TX path; alp_project.py emits CONFIG_I2S=y.
    # PDM RX support (CONFIG_AUDIO_DMIC=y) rides testcase.yaml's
    # extra_args -- `pdm` isn't in the schema's `peripherals:` enum
    # because Zephyr doesn't expose PDM as a standalone driver class
    # (DMIC sits under the audio subsystem).
    peripherals:
      - i2s

diagnostics:
  log_level: info
