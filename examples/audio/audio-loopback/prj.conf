#
# audio-loopback example -- v0.2 hand-written reference for
# <alp/audio.h>.  native_sim build skips the audio path
# gracefully (no DMIC, no I2S); the AEN-Zephyr build wires up
# the real PDM mic + codec out via the overlay.

CONFIG_ALP_SDK=y

CONFIG_LOG=y
CONFIG_PRINTK=y
CONFIG_THREAD_LOCAL_STORAGE=y
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=8192
