# SPDX-License-Identifier: Apache-2.0
#
# Builds + runs on native_sim (the portable MP3 frame-sync + header
# parse path).  The real Helix fixed-point PCM decode is ARM-only
# (real/assembly.h #errors on generic x86-64) and is not exercised
# here -- see README.md "What this teaches".

sample:
  name: libhelix-decode
  description: |
    Demonstrates the Helix MP3 decoder workflow.  On native_sim it runs
    the portable MP3 frame-sync + header parse (frame count, sample
    rate, samples/frame) that mirrors Helix's MP3FindSyncWord() +
    MP3GetLastFrameInfo(); the real MP3Decode() PCM path compiles on an
    ARM SoM with the west-fetched module (extras-tier1, RCSL licence).

tests:
  alp_sdk.example.libhelix_decode:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    tags:
      - alp-sdk
      - example
      - libhelix-decode
    harness: console
    harness_config:
        type: one_line
        regex:
          - "\\[libhelix-decode\\] done"
