# board.yaml -- per-app project configuration for the
# libhelix-decode example.
#
# **[UNTESTED]**: builds and runs on native_sim (the portable MP3
# frame-sync + header-parse path); the real Helix fixed-point PCM
# decode is ARM-only (real/assembly.h #errors on generic x86-64) and
# RCSL-licensed -- see the example's README "Why native_sim only
# parses headers" and src/main.c's banner for the real MP3Decode()
# path.  Per-core `libraries: [libhelix]` resolves against
# metadata/library-profiles/libhelix/hw-backends.yaml (pure-C SW
# fallback is the floor; FPU/I2S-DMA backends select automatically by
# SoM capability).
som:
  sku: E1M-AEN801

preset: e1m-evk

cores:
  m55_hp:
    app: ./src
    # Pure compute -- no peripheral wiring needed to decode a canned
    # in-memory frame.  A real player would add `i2s` here and stream
    # the decoded PCM to BOARD_I2S_AUDIO (see examples/audio/i2s-tone).
    peripherals: []
    libraries:
      - libhelix

diagnostics:
  log_level: info
