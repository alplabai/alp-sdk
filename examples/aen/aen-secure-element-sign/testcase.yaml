# SPDX-License-Identifier: Apache-2.0

sample:
  name: aen-secure-element-sign
  description: |
    Probe the OPTIGA Trust M secure element on the E1M-AEN
    (Alif Ensemble) SoM via the SoM-portable <alp/*> API, over
    the on-module BRD_I2C (LPI2C0) owned by the M55-HE core.  The
    current driver exposes product-info/raw-APDU as NOSUPPORT stubs.

tests:
  alp_sdk.examples.aen.secure_element_sign.native_sim:
    platform_allow:
      - native_sim/native/64
    tags:
      - alp-sdk
      - example
      - aen
      - security
      - optiga
    build_only: true
