#
# Feature CONFIG_* are derived from board.yaml by scripts/alp_project.py
# and layered in via EXTRA_CONF_FILE (see CMakeLists.txt).  Only the
# console/logging knobs the example itself needs live here.
CONFIG_PRINTK=y

# The board.yaml-derived alp.conf enables CONFIG_LOG globally; keep printk
# direct so RAM-console bench runs do not depend on the deferred logger path.
CONFIG_LOG_PRINTK=n
