# board.yaml -- per-app project configuration for the
# aen-secure-element-sign example.
#
# OPTIGA Trust M probe-only sanity on the E1M-AEN (Alif Ensemble) SoM.
# The Trust M is on BRD_I2C -- the
# on-module LP-island I2C (LPI2C0) -- owned by the M55-HE subsystem,
# so the app core is m55_he.  Everything else goes through the
# SoM-portable <alp/*> API, so this stays the AEN sibling of
# examples/v2n/v2n-secure-element-sign while keeping AEN-specific bench
# skip wording in its source.

schemaVersion: 1
som:
  sku: E1M-AEN801          # Alif Ensemble E8 (the lead AEN part).

preset: e1m-evk            # The Alp E1M-EVK carrier preset.

# Single-OS app: the M55-HE core (LP domain) owns BRD_I2C / LPI2C0,
# which carries the OPTIGA Trust M (0x30).  The A32 cluster defaults
# to Linux on the A-cores, so opt out explicitly.
cores:
  a32_cluster:
    os: "off"
  m55_he:
    app: ./src
    peripherals:
      - i2c

chips:
  - optiga_trust_m         # Infineon OPTIGA Trust M on BRD_I2C @ 0x30.

diagnostics:
  log_level: info
