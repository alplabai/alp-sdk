#
# Stage-A low-power smoke for the E1M-AEN801 (Alif Ensemble E8, M55-HE),
# bench RAM-run via J-Link.  Unlike the peripheral examples (which now default
# to the Alp UART console), the PM apps deliberately keep the RAM console:
# console output must survive the WFI/low-power path (a UART mid-idle can gate
# its clock and drop bytes), so it is retargeted to a RAM buffer the human reads
# over SWD (mem8 of the 'ram_console_buf' symbol) and ASCII-decodes.

# --- RAM console (read 'ram_console_buf' over SWD) ---------------------------
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=4096
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_SERIAL=n
CONFIG_PRINTK=y

# --- Stage-A is CONFIG_PM-FREE (intentional) ---------------------------------
# Pinned upstream Zephyr 4.4.0's Alif E8 SoC does NOT `select HAS_PM`
# (zephyr/soc/alif has no HAS_PM and ships no power.c/pm_state_set; only the
# alifsemi/zephyr_alif fork's soc/alif/ensemble/Kconfig selects it, lines 28/50).
# So CONFIG_PM (zephyr/subsys/pm/Kconfig:23 `depends on SYS_CLOCK_EXISTS &&
# HAS_PM`) is unreachable over the pinned tree, and upstream ships no Alif
# pm_state_set.  Stage-A therefore proves WFI via the kernel idle path only:
# main blocks on a periodic k_timer's semaphore -> the idle thread runs __WFI()
# with NO PM subsystem, and SysTick wakes it (it also takes one explicit
# k_cpu_idle() per round).  Do NOT set CONFIG_PM here: it would either be
# silently dropped (HAS_PM unset) or, if forced, fail to link (undefined
# pm_state_set).  Enabling it is the Stage-B work item.
# CONFIG_PM is intentionally left UNSET.

# SysTick is the M55 system clock (CONFIG_CORTEX_M_SYSTICK default y); it is the
# wake source for the WFI below.  SysTick is architectural exception #15, NOT an
# NVIC IRQ, so it is unaffected by the EWIC/IWIC "interrupts 0-63 only" wake
# range -- it always wakes a plain WFI.  Tickless is fine; the kernel reprograms
# SysTick to the next timeout before idling, so the wake k_timer still fires.
CONFIG_TICKLESS_KERNEL=y

# Keep the image small + deterministic for a RAM-run.  LOG MUST stay off --
# CONFIG_LOG=y reroutes printk into the logging subsystem, which has no
# RAM-console backend, so the RESULT line never reaches 'ram_console_buf'.
CONFIG_LOG=n
