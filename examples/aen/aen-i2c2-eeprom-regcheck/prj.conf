# SPDX-License-Identifier: Apache-2.0
#
# Bench config for the I2C2 + EEPROM RAM-run on the E1M-AEN801 (Alif Ensemble
# E8).
#
# Console is the E1M edge UART0.

# --- Console -----------------------------------------------------------------
# Console: Alp UART console -- E1M edge UART0 (Alif UART5, P3_4/P3_5, 115200
# 8N1, NS16550), the E1M-AEN801 carrier console. The board _defconfig already
# selects it; we set it explicitly here so the example is self-describing.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
# Serial-less bench? Comment the four lines above and uncomment these to read
# 'ram_console_buf' over SWD instead:
# CONFIG_RAM_CONSOLE=y
# CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
# CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=y

# --- I2C ---------------------------------------------------------------------
# The upstream i2c_dw driver (CONFIG_I2C_DW) self-selects `default y` from the
# okay'd "snps,designware-i2c" i2c2 node, so only the I2C subsystem itself needs
# turning on here.  PINCTRL is pulled in by the i2c2 pinctrl-0; set it for
# clarity.  ALP_SDK is not required for i2c_dw (Tier-1 upstream) -- left off to
# keep the image minimal.
CONFIG_I2C=y
CONFIG_PINCTRL=y

# Keep the image small + deterministic for a RAM-run.
CONFIG_LOG=n
