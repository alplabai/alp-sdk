# Bench config for the LPRTC calendar-shim RAM-run on the E1M-AEN801 (Alif
# Ensemble E8).

# Console: Alp UART console -- E1M edge UART0 (Alif UART5, P3_4/P3_5, 115200
# 8N1, NS16550), the E1M-AEN801 carrier console. The board _defconfig already
# selects it; we set it explicitly here so the example is self-describing.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
# Serial-less bench? Comment the four lines above and uncomment these to read
# 'ram_console_buf' over SWD instead:
# CONFIG_RAM_CONSOLE=y
# CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
# CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=y

# --- alp_rtc_* calendar shim over the LPRTC counter --------------------------
# CONFIG_ALP_SDK surfaces the alp_rtc_* dispatcher + the E8 "lprtc_calendar_shim"
# backend (CMake-gated on CONFIG_ALP_SOC_ALIF_ENSEMBLE_E8 AND CONFIG_COUNTER).
# CONFIG_COUNTER pulls in the Zephyr counter subsystem the snps,dw-apb-rtc driver
# (counter_dw_rtc) registers against -- that is the counter device the shim
# drives.  CONFIG_RTC is intentionally OFF: the E8 has no Zephyr-RTC-class
# device, so the calendar comes from the counter shim, not the rtc class.
CONFIG_ALP_SDK=y
CONFIG_COUNTER=y

# Keep the image small + deterministic for a RAM-run.
CONFIG_LOG=n
