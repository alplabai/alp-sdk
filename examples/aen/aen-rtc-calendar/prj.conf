#
# Bench config for the LPRTC calendar-shim RAM-run on the E1M-AEN801 (Alif
# Ensemble E8).
#
# The app console UART is NOT wired to USB on this bench (the only FT232R is the
# SE-UART), so we retarget the console to a RAM buffer that the human reads over
# J-Link (mem8 of the 'ram_console_buf' symbol) and ASCII-decodes.  The board
# _defconfig forces CONFIG_UART_CONSOLE=y / CONFIG_UART_NS16550=y for UART5;
# override that here.

# --- RAM console (read 'ram_console_buf' over SWD) ---------------------------
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_SERIAL=n
CONFIG_PRINTK=y

# --- alp_rtc_* calendar shim over the LPRTC counter --------------------------
# CONFIG_ALP_SDK surfaces the alp_rtc_* dispatcher + the E8 "lprtc_calendar_shim"
# backend (CMake-gated on CONFIG_ALP_SOC_ALIF_ENSEMBLE_E8 AND CONFIG_COUNTER).
# CONFIG_COUNTER pulls in the Zephyr counter subsystem the snps,dw-apb-rtc driver
# (counter_dw_rtc) registers against -- that is the counter device the shim
# drives.  CONFIG_RTC is intentionally OFF: the E8 has no Zephyr-RTC-class
# device, so the calendar comes from the counter shim, not the rtc class.
CONFIG_ALP_SDK=y
CONFIG_COUNTER=y

# Keep the image small + deterministic for a RAM-run.  Note: LOG MUST stay off
# -- CONFIG_LOG=y reroutes printk into the logging subsystem, which has no
# RAM-console backend, so the RESULT line never reaches 'ram_console_buf'.
CONFIG_LOG=n
