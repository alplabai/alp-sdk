#
# Bench config for the comparator regcheck on the E1M-AEN801 (M55-HE). The
# console is the E1M edge UART0 (Alif UART5, P3_4/P3_5, 115200 8N1); serial-less
# benches can fall back to the RAM console (see the console block below).

# Tier-2 driver Kconfigs (incl. CONFIG_CMP_ALIF) are gated under ALP_SDK.
CONFIG_ALP_SDK=y

# Comparator subsystem + the Alif "alif,cmp" driver. CONFIG_CMP_ALIF is
# `default y` once the cmp node is enabled (DT_HAS_ALIF_CMP_ENABLED); it
# `select`s PINCTRL and USE_ALIF_HAL_ANALOG (the hal_alif analog_ctrl VREF/clock
# library, shared with ADC_ALIF/DAC_ALIF) itself -- so we only need to turn on
# the comparator API here. Do NOT assign select-only / USE_ALIF_HAL_* symbols;
# the driver handles its own selects.
CONFIG_COMPARATOR=y

# Console: Alp UART console -- E1M edge UART0 (Alif UART5, P3_4/P3_5, 115200
# 8N1, NS16550), the E1M-AEN801 carrier console. The board _defconfig already
# selects it; we set it explicitly here so the example is self-describing.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
# Serial-less bench? Comment the four lines above and uncomment these to read
# 'ram_console_buf' over SWD instead:
# CONFIG_RAM_CONSOLE=y
# CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
# CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=y

# Keep the image small + deterministic for a RAM-run.
CONFIG_LOG=n
