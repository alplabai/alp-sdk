#
# Bench RAM-run config for the E1M-AEN801 (M55-HE). The app UART is NOT on USB on
# this bench, so the console is the RAM console (read 'ram_console_buf' over SWD).

# Tier-2 driver Kconfigs (incl. CONFIG_CMP_ALIF) are gated under ALP_SDK.
CONFIG_ALP_SDK=y

# Comparator subsystem + the Alif "alif,cmp" driver. CONFIG_CMP_ALIF is
# `default y` once the cmp node is enabled (DT_HAS_ALIF_CMP_ENABLED); it
# `select`s PINCTRL and USE_ALIF_HAL_ANALOG (the hal_alif analog_ctrl VREF/clock
# library, shared with ADC_ALIF/DAC_ALIF) itself -- so we only need to turn on
# the comparator API here. Do NOT assign select-only / USE_ALIF_HAL_* symbols;
# the driver handles its own selects.
CONFIG_COMPARATOR=y

# RAM console (no app UART on USB on this bench).
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_SERIAL=n
CONFIG_PRINTK=y

# Keep the image small + deterministic for a RAM-run. LOG MUST stay off --
# CONFIG_LOG=y reroutes printk into the logging subsystem, which has no
# RAM-console backend, so the RESULT line never reaches 'ram_console_buf'.
CONFIG_LOG=n
