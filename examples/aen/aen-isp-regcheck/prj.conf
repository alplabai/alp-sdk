#
# Bench RAM-run config for the E1M-AEN801 (M55-HE).

# Tier-2 driver Kconfigs (incl. the CONFIG_VIDEO_ISP_VSI family) are gated under
# ALP_SDK.
CONFIG_ALP_SDK=y

# This regcheck is specifically for E1M-AEN801 / Ensemble E8.
CONFIG_ALP_SOC_ALIF_ENSEMBLE_E8=y

# Video subsystem (the portable Zephyr v4.4 video API: video_get_caps).
# CONFIG_VIDEO=y makes the video class + its inline helpers available.
CONFIG_VIDEO=y

# CONFIG_VIDEO_ISP_VSI is INTENTIONALLY LEFT DEFAULT n.
#
# The isp_pico.c driver TU links the hal_alif libisp wrapper (the Vivante ISP
# BLOB).  The locally vendored 2025 hal_alif isp_wrapper is API-incompatible with
# this 2026 isp_pico.c (no <zephyr/drivers/video/isp-vsi.h>; 2-arg vs 3-arg
# isp_vsi_bottom_half()), so the driver does not even COMPILE against it.
# Enabling CONFIG_VIDEO_ISP_VSI here would break the build.  Bumping the
# hal_alif libisp wrapper is an EXTERNAL hal_alif change
# -- this regcheck validates the DT BIND without the driver, and
# reports the wrapper blocker at runtime.  Do NOT set CONFIG_VIDEO_ISP_VSI=y
# until the wrapper is fixed.

# This bench app drives the RAW Zephyr video API directly, so turn OFF the alp
# <alp/camera.h> dispatcher: CONFIG_ALP_SDK_CAMERA_ZEPHYR_VIDEO is `default y if
# VIDEO`, and its portable backend expects a bound video device (absent here),
# which is not what we are validating.
CONFIG_ALP_SDK_CAMERA_ZEPHYR_VIDEO=n

# Console: Alp UART console -- E1M edge UART0 (Alif UART5, P3_4/P3_5, 115200
# 8N1, NS16550), the E1M-AEN801 carrier console. The board _defconfig already
# selects it; we set it explicitly here so the example is self-describing.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
# Serial-less bench? Comment the four lines above and uncomment these to read
# 'ram_console_buf' over SWD instead:
# CONFIG_RAM_CONSOLE=y
# CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
# CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=y

# Keep the image small + deterministic for a RAM-run.
CONFIG_LOG=n
