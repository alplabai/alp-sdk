#
# CONFIG_SPI / CONFIG_GPIO are pulled in from board.yaml's `peripherals:`
# block (via the generated alp.conf); this file carries only the console.
CONFIG_PRINTK=y
CONFIG_LOG=y

# The reset sequence + GPIO-proxy ops use busy/sleep waits; a generous
# main-thread stack keeps the (modest) driver scratch buffers comfortable.
CONFIG_MAIN_STACK_SIZE=4096

# Link the app at the HE MRAM app partition (0x80010000) so its vector table
# matches the ATOC load address (app-zephyr-he.json mramAddress=0x80010000).
# FLASH_BASE is the full MRAM (0x80000000); without this 0x10000 offset the
# image links at 0x80000000 and the SES boots it 64 KB low -> fault/no-boot.
CONFIG_FLASH_LOAD_OFFSET=0x10000

# Route the proxied E1M IOs (cc3501e_gpio_routes[] in src/cc3501e_gpio_routes.c)
# through the CC3501E bridge: alp_gpio_open(ALP_E1M_GPIO_IOxx) for a mapped IO goes over
# the inter-chip link; the Alif's own pins delegate to the platform GPIO driver.
# This demo drives the proxy directly via the cc3501e_gpio_* calls, but building the
# proxy backend keeps the attach call (cc3501e_bridge_bringup) wired the same way an
# application that uses alp_gpio_open(ALP_E1M_GPIO_IO13) would expect.
CONFIG_ALP_SDK_GPIO_CC3501E_PROXY=y
