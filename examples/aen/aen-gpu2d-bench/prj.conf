#
# Bench config for the GPU2D software-fallback RAM-run on the E1M-AEN801 (Alif
# Ensemble E8).  Same RAM-console recipe as the other aen-* bench apps.
#
# The app console UART is NOT wired to USB on this bench (the only FT232R is the
# SE-UART), so we retarget the console to a RAM buffer the human reads over
# J-Link (mem8 of the 'ram_console_buf' symbol) and ASCII-decodes.

# --- RAM console (read 'ram_console_buf' over SWD) ---------------------------
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=4096
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_SERIAL=n
CONFIG_PRINTK=y

# --- GPU2D portable surface --------------------------------------------------
# CONFIG_ALP_SDK surfaces <alp/gpu2d.h>: ALP_SDK_GPU2D (default y) compiles the
# dispatcher and ALP_SDK_GPU2D_SW_FALLBACK (default y) the priority-0 pure-C
# backend.  The D/AVE 2D HW backend (ALP_SDK_GPU2D_ALIF_DAVE2D) is default n
# (needs the proprietary Dave2D pack), so selection lands on sw_fallback here.
CONFIG_ALP_SDK=y

# E8 D-cache maintenance loop hangs on this silicon; keep it off (shared bench
# rule).  This app is pure-CPU same-core RAM work so coherency is automatic, but
# match the other bench apps to stay on the proven RAM-run path.
CONFIG_DCACHE=n

# Keep the image small + deterministic for a RAM-run.  LOG MUST stay off --
# CONFIG_LOG=y reroutes printk into the logging subsystem, which has no
# RAM-console backend, so the RESULT line never reaches 'ram_console_buf'.
CONFIG_LOG=n
