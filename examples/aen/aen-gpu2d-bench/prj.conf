#
# Bench config for the GPU2D software-fallback RAM-run on the E1M-AEN801 (Alif
# Ensemble E8).  Same UART-console recipe as the other aen-* bench apps.
#
# Console is the E1M edge UART0.

# --- Console -----------------------------------------------------------------
# Console: Alp UART console -- E1M edge UART0 (Alif UART5, P3_4/P3_5, 115200
# 8N1, NS16550), the E1M-AEN801 carrier console. The board _defconfig already
# selects it; we set it explicitly here so the example is self-describing.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
# Serial-less bench? Comment the four lines above and uncomment these to read
# 'ram_console_buf' over SWD instead:
# CONFIG_RAM_CONSOLE=y
# CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
# CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=y

# --- GPU2D portable surface --------------------------------------------------
# CONFIG_ALP_SDK surfaces <alp/gpu2d.h>: ALP_SDK_GPU2D (default y) compiles the
# dispatcher and ALP_SDK_GPU2D_SW_FALLBACK (default y) the priority-0 pure-C
# backend.  The D/AVE 2D HW backend (ALP_SDK_GPU2D_ALIF_DAVE2D) is default n
# (needs the proprietary Dave2D pack), so selection lands on sw_fallback here.
CONFIG_ALP_SDK=y

# E8 D-cache maintenance loop hangs on this silicon; keep it off (shared bench
# rule).  This app is pure-CPU same-core RAM work so coherency is automatic, but
# match the other bench apps to stay on the proven RAM-run path.
CONFIG_DCACHE=n

# Keep the image small + deterministic for a RAM-run.
CONFIG_LOG=n
