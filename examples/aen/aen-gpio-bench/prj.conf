#
# Bench config for the GPIO RAM-run on the E1M-AEN801 (Alif Ensemble E8).
#
# The app console UART is NOT wired to USB on this bench (the only FT232R is the
# SE-UART), so we retarget the console to a RAM buffer that the human reads over
# J-Link (mem8 of the 'ram_console_buf' symbol) and ASCII-decodes.  The board
# _defconfig forces CONFIG_UART_CONSOLE=y / CONFIG_UART_NS16550=y for UART5;
# override that here.

# --- RAM console (read 'ram_console_buf' over SWD) ---------------------------
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_SERIAL=n
CONFIG_PRINTK=y

# --- GPIO + pinctrl ----------------------------------------------------------
# CONFIG_GPIO_DW is `default y` when DT_HAS_SNPS_DESIGNWARE_GPIO_ENABLED, which
# the okay'd gpio8 node provides; set it explicitly for clarity.  PINCTRL is
# needed to mux P8_0's pad to the GPIO function (gpio_dw does NOT touch the pad
# mux), applied from main() via pinctrl_apply_state().
CONFIG_GPIO=y
CONFIG_GPIO_DW=y
CONFIG_PINCTRL=y

# Keep the image small + deterministic for a RAM-run.
CONFIG_LOG=n
