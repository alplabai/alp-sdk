#
# Bench RAM-run config for the E1M-AEN801 (M55-HE). Console output goes to the
# Alp UART console (E1M edge UART0).

# Tier-1.5 / Tier-2 driver Kconfigs (incl. CONFIG_ALIF_PDM) are gated under ALP_SDK.
CONFIG_ALP_SDK=y

# Audio DMIC subsystem + the vendored Alif LPPDM driver. CONFIG_ALIF_PDM is
# `default y` once the lppdm node is enabled (DT_HAS_ALIF_ALIF_PDM_ENABLED) and it
# `select`s PINCTRL itself -- we only turn on the DMIC API + AUDIO here.
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y

# PCM capture buffers come from a k_mem_slab + the kernel heap.
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_MAIN_STACK_SIZE=4096

# FIFO is read by the CPU into a plain buffer -- keep the data path coherent on
# this M55 bench by disabling the D-cache (matches the other E8 bench apps).
CONFIG_DCACHE=n

# Console: Alp UART console -- E1M edge UART0 (Alif UART5, P3_4/P3_5, 115200
# 8N1, NS16550), the E1M-AEN801 carrier console. The board _defconfig already
# selects it; we set it explicitly here so the example is self-describing.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
# Serial-less bench? Comment the four lines above and uncomment these to read
# 'ram_console_buf' over SWD instead:
# CONFIG_RAM_CONSOLE=y
# CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
# CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=y
