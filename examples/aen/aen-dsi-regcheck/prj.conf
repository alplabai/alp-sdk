#
# Bench RAM-run config for the E1M-AEN801 (M55-HE).  The app UART is NOT on USB
# on this bench, so the console is the RAM console (read 'ram_console_buf' over
# SWD).

# Tier-2 driver Kconfigs (incl. CONFIG_MIPI_DPHY_DW) are gated under ALP_SDK.
CONFIG_ALP_SDK=y

# The shared DesignWare MIPI D-PHY (the one display-chain node that already has
# a real in-tree driver; its DSI-TX role is dphy_dw_master_setup()).  Enabled by
# the overlay; its driver Kconfig is default y under DT_HAS_*_ENABLED.
CONFIG_MIPI_DPHY=y

# No display/mipi_dsi-class driver is enabled here: this app is a BIND check.
# cdc200 (tes,cdc-2.1) and mipi_dsi (snps,designware-dsi) have no upstream/
# hal_alif driver, so there is nothing to turn on -- they bind at the DT level
# only (DEVICE_DT_GET_OR_NULL resolves NULL for them, which the app handles).

# RAM console (no app UART on USB on this bench).
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y

# Keep the image small + deterministic for a RAM-run.  LOG MUST stay off --
# CONFIG_LOG=y reroutes printk into the logging subsystem, which has no
# RAM-console backend, so the RESULT line never reaches 'ram_console_buf'.
CONFIG_LOG=n
