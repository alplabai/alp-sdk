#
# Bench RAM-run config for the UTIMER PWM register-readback validation.
#
# Console: the app UART is NOT wired to USB on this bench (the only FT232R is the
# SE-UART), so route console output to a RAM buffer and read 'ram_console_buf'
# over SWD with J-Link mem8.  Disable the UART console so nothing fights for it.
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y

# Driver under test: the Zephyr PWM class + the Alif UTIMER PWM driver.
# Do NOT set CONFIG_USE_ALIF_HAL_UTIMER here -- it is select-only; the driver
# selects it (and pulls in the hal_alif alif_utimer_* register library).
CONFIG_PWM=y

# Keep the PWM driver's log lines visible in the RAM console.
CONFIG_LOG=y
CONFIG_PWM_LOG_LEVEL_INF=y
