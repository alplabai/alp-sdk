#
# Bench RAM-run config for the E1M-AEN801 (M55-HE) Ethos-U NPU presence/clock
# probe. The app UART is NOT on USB on this bench, so the console is the RAM
# console (read 'ram_console_buf' over SWD).

# Tier-1.5 alp-sdk driver Kconfigs are gated under ALP_SDK; keep it on for parity
# with the other bench regcheck apps (harmless here -- the Ethos-U stack is
# upstream, NOT under ALP_SDK).
CONFIG_ALP_SDK=y

# Arm Ethos-U core driver (modules/hal_ethos_u/Kconfig: config ETHOS_U). Pulls in
# drivers/misc/ethos_u/ethos_u_arm.c (CONFIG_ETHOS_U_ARM defaults y when the
# arm,ethos-u node is enabled -- DT_HAS_ARM_ETHOS_U_ENABLED) and the Ethos-U core
# driver library (ethosu_init / ethosu_get_hw_info / ethosu_irq_handler).
# CONFIG_ETHOS_U depends on MULTITHREADING (default y).
CONFIG_ETHOS_U=y

# NPU variant selection. The AE822 NPU we target is an Ethos-U85; pick the U85
# 256-MAC config so the core-driver CMake compiles ethosu_device_u85.c and defines
# ETHOSU85 (modules/hal_ethos_u/Kconfig: ETHOS_U_NPU_NAME="ethos-u85-256"). The MAC
# count does not affect the ID-register presence probe (it scales the optimizer
# config check, not the ID read); 256 is the AEN801's published U85 MAC width.
CONFIG_ETHOS_U85_256=y

# RAM console (no app UART on USB on this bench).
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
