#
# Bench RAM-run config for the E1M-AEN801 (M55-HE/HP). The app UART is NOT on USB
# on this bench, so the console is the RAM console (read 'ram_console_buf' over
# SWD). Same config as aen-dualcore-master / aen-dualcore-doorbell.

# Tier-2 driver Kconfigs (incl. CONFIG_ARM_MHUV2 / CONFIG_HAS_ALIF_SE_SERVICES)
# are gated under ALP_SDK.
CONFIG_ALP_SDK=y

# SE service transport.  CONFIG_ARM_MHUV2 builds the in-tree "arm,mhuv2" IPM
# driver (zephyr/drivers/ipm/ipm_arm_mhuv2.c) and pulls in CONFIG_IPM;
# CONFIG_HAS_ALIF_SE_SERVICES compiles the hal_alif SE client
# (se_services/zephyr/src/se_service.c) that the HP master calls to release HE.
CONFIG_ARM_MHUV2=y
CONFIG_HAS_ALIF_SE_SERVICES=y

# RAM console (no app UART on USB on this bench).
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y

# Keep the image small + deterministic for a RAM-run. LOG MUST stay off --
# CONFIG_LOG=y reroutes printk into the logging subsystem, which has no
# RAM-console backend, so the RESULT line never reaches 'ram_console_buf'.
CONFIG_LOG=n

# Shared global-SRAM0 mailbox is read/written by BOTH M55 cores, each with its
# own D-cache -> the region must be coherent. Disable the D-cache (the AEN
# SRAM-coherency precedent: the NPU apps do the same) so cross-core reads see
# the other core's writes without explicit clean/invalidate. (A cache-on variant
# would sys_cache_data_flush_range on the writer + invd_range on the reader.)
CONFIG_DCACHE=n
