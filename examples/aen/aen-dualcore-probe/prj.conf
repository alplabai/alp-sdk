#
# Minimal bench probe: a per-core global-SRAM0 beacon loop. The RAM console is
# enabled for an optional banner, but the load-bearing signal is the SRAM0
# beacon (read raw over SWD, master-agnostic). Flow A (SES-booted dual ATOC).
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=1024
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_SERIAL=n
CONFIG_LOG=n
