#
# Minimal bench probe: a per-core global-SRAM0 beacon loop. Unlike the
# single-core peripheral examples (which now default to the Alp UART console),
# this probe deliberately keeps the RAM console: the load-bearing signal is the
# SRAM0 beacon read raw over SWD (master-agnostic, one buffer for both cores);
# the console is just an optional banner. Flow A (SES-booted dual ATOC).
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=1024
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_SERIAL=n
CONFIG_LOG=n
