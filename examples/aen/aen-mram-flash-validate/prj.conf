#
# Bench config for the MRAM flash erase/program/readback RAM-run on the
# E1M-AEN801 (Alif Ensemble E8, M55-HE).

# Console: the Alp UART console -- E1M edge UART0 (Alif UART5, P3_4/P3_5, 115200
# 8N1, NS16550), the E1M-AEN801 carrier console.  On the labgrid place
# e1m-aen-evk-01 UART5 is USB-routed (-> /dev/ttyUSB2 @115200, the labgrid
# `console` resource), so the app's RESULT PASS/FAIL line streams live over the
# console as the SES boots the slot0 image -- no SWD readback needed.  The board
# _defconfig already selects it; we set it explicitly so the example is
# self-describing.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_PRINTK=y

# --- slot0 link (Flow D, SES-booted) -----------------------------------------
# The SES boots the RESIDENT slot0 image in preference to a Flow-C ITCM
# RAM-run, so this bench app is flashed into MRAM slot0 and SE-booted.
# CONFIG_USE_DT_CODE_PARTITION=y links it at the slot0 offset (FLASH_LOAD_OFFSET
# 0x10000 -> reset vector 0x8001xxxx) so app-gen-toc can sign it in place
# (mramAddress 0x80010000) -- see scripts/bench/aen/flash-jlink-mramxip.sh.
CONFIG_USE_DT_CODE_PARTITION=y

# --- MRAM flash driver -------------------------------------------------------
# CONFIG_FLASH surfaces the Zephyr flash subsystem; the in-tree Tier-2
# flash_mram_alif driver binds the "alif,mram-flash-controller" node the board
# DTS declares and sets FLASH_HAS_DRIVER_ENABLED.  FLASH_MAP + FIXED_PARTITION
# give us the storage-partition offset/size without hard-coding 0x560000.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y

# MANDATORY for on-M55 MRAM writes: flash_mram_alif programs the MRAM by DIRECT
# memory-mapped stores (dst32[x] = ...), but Zephyr maps the flash region
# read-only under the ARM MPU (CONFIG_ARM_MPU=y on this SoC).  Without this the
# first flash_erase/flash_write faults with an MPU Data Access Violation
# (MMFAR = the target MRAM address).  MPU_ALLOW_FLASH_WRITE configures the flash
# MPU region with write permission -- the standard Zephyr answer for a
# direct-write flash driver, and what any real app writing MRAM at runtime needs.
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# Keep the image small + deterministic for a RAM-run; the driver's own LOG_ERR
# lines are not needed for the PASS gate (the app prints every rc explicitly).
CONFIG_LOG=n
