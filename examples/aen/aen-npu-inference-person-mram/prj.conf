# SPDX-License-Identifier: Apache-2.0
#
# aen-npu-inference-person-mram -- MATCHED-RUNTIME FULL NPU inference on the
# E1M-AEN801 (Ensemble E8, M55-HE): the real person_detect MobileNet (int8,
# Alif system-config) through the Arm Apache InferenceProcess wrapper + TFLM's
# MicroInterpreter onto the Ethos-U85 (256-MAC).  The ~263 KiB Vela'd model
# overflows ITCM, so this image links into MRAM slot0 and boots via Flow D
# (J-Link direct MRAM); RAM-console flow (the app UART is NOT on USB on this bench).

# --- MRAM slot0 link --------------------------------------------------------
# Honour the board's zephyr,code-partition=&slot0_partition so the image links at
# the slot0 offset (0x80010000), not the MRAM base.  Without this, FLASH_LOAD_OFFSET
# stays 0 and the reset vector lands at 0x80000xxx (faults on an SE slot0 boot).
CONFIG_USE_DT_CODE_PARTITION=y

# --- TFLM + Ethos-U stack ---------------------------------------------------

# TFLM is C++17; the InferenceProcess wrapper + MicroInterpreter are C++.
CONFIG_CPP=y
CONFIG_STD_CPP17=y
# The Arm InferenceProcess wrapper uses std::string / std::vector / std::queue.
CONFIG_REQUIRES_FULL_LIBCPP=y

# TFLM module (MicroInterpreter, op resolver, reference kernels, and -- because
# the Ethos-U driver is enabled -- the Ethos-U custom-op kernel ethosu.cc whose
# Register_ETHOSU() -> ethosu_invoke dispatches onto the NPU).
CONFIG_TENSORFLOW_LITE_MICRO=y

# THE KEY DRIVER.  CONFIG_ETHOS_U compiles the Arm Ethos-U core driver
# (ethosu_driver.c / ethosu_device_u85.c -> ethosu_invoke + the NPU command
# stream) and the Zephyr frontend (drivers/misc/ethos_u, ETHOS_U_ARM, which
# auto-instantiates the arm,ethos-u node at POST_KERNEL).
CONFIG_ETHOS_U=y

# THE STRONG REMAP -- but NOT via hal_alif's ethosu_callback.c.
#
# CONFIG_ARM_ETHOS_U is the symbol hal_alif's drivers/CMakeLists.txt gates its
# ethosu_callback.c on (alp-sdk defines it in zephyr/Kconfig).  That file does
# carry the strong ethosu_address_remap = local_to_global we need -- BUT it was
# written against an OLDER Arm core driver and ALSO defines
# ethosu_flush_dcache / ethosu_invalidate_dcache with the OLD signature
# (uint32_t *p, size_t bytes).  The pinned hal_ethos_u core driver uses the NEW
# signature (const uint64_t *base_addr, const size_t *base_addr_size, int n) and
# upstream Zephyr's ethos_u_common.c provides matching strong versions, so
# compiling ethosu_callback.c causes a duplicate-symbol link error AND, if it
# won, the core driver would call its dcache hooks with mismatched args.
#
# So we keep ARM_ETHOS_U OFF (do not compile the stale vendor callback) and
# instead provide the strong ethosu_address_remap = local_to_global() in the
# app (src/main.cpp), which overrides the core driver's weak identity remap.
# local_to_global() itself is hal_alif's (soc_memory_map.h) -- nothing is
# re-authored.  The correct-signature dcache hooks come from upstream
# ethos_u_common.c (ETHOS_U_DCACHE below).
# CONFIG_ARM_ETHOS_U is intentionally NOT set.

# Use upstream Zephyr's correct-signature cache hooks (ethos_u_common.c).  They
# are architectural no-ops under CONFIG_DCACHE=n, but keep the strong/weak
# resolution unambiguous and ready for a future DCACHE=y re-enable.
CONFIG_ETHOS_U_DCACHE=y

# NPU variant: the AE822 (E8) NPU is an Ethos-U85; pick the 256-MAC config so
# the core driver compiles ethosu_device_u85.c and the Vela ethos-u85-256
# command stream matches the silicon.  Agrees with gen_model.py --accel and
# the Alif --system-config Ethos_U85_SRAM_Only.
CONFIG_ETHOS_U85_256=y

# --- Heap / stack -----------------------------------------------------------

# TFLM + the Ethos-U Zephyr glue + the InferenceProcess wrapper allocate from
# the system heap (k_malloc for the per-thread heap/stacks/queue nodes).
CONFIG_HEAP_MEM_POOL_SIZE=65536

# AllocateTensors + Invoke run with the InferenceProcess on the main thread
# here (single job, no worker thread); give it the upstream sample's headroom.
CONFIG_MAIN_STACK_SIZE=16384

# --- DMA correctness (the #1 bench risk) ------------------------------------

# The Ethos-U is a DMA master reading the model + arena out of SRAM0.  With the
# M55 D-cache on, the CPU could leave the model/input dirty in cache or read
# stale output.  The hal_alif callback DOES provide clean/invalidate hooks
# (ethosu_flush/invalidate_dcache), but on this bench RAM-run we keep DCACHE=n
# (the eth_dwmac approach) so the NPU and CPU share a coherent view with no
# maintenance dependency.  (Follow-up: re-enable DCACHE -- the matched runtime's
# flush/invalidate hooks are already linked via ethosu_callback.c.)
CONFIG_DCACHE=n

# --- RAM console (no app UART on USB on this bench) -------------------------
# The single RESULT line must reach the RAM console; logging OFF so it does not
# interleave.  printk -> the RAM console buffer, read back as 'ram_console_buf'
# over SWD.
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=4096
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_LOG=n
