#
# Bench RAM-run config for the E1M-AEN801 (M55-HE). The app UART is NOT on USB on
# this bench, so the console is the RAM console (read 'ram_console_buf' over SWD).

CONFIG_ALP_SDK=y

# Watchdog subsystem + the UPSTREAM CMSDK driver. CONFIG_WDOG_CMSDK_APB is
# `default y` once the wdog0 node is enabled (DT_HAS_ARM_CMSDK_WATCHDOG_ENABLED);
# it depends on RUNTIME_NMI (the CMSDK WDT signals via NMI).
CONFIG_WATCHDOG=y
CONFIG_RUNTIME_NMI=y

CONFIG_MAIN_STACK_SIZE=4096

# RAM console (no app UART on USB on this bench).
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
