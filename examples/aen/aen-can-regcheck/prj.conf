#
# Bench RAM-run config for the E1M-AEN801 (M55-HE). Console is the Alp UART
# console on the E1M edge UART0 (see the console block below).

# Tier-2 driver Kconfigs (incl. CONFIG_CAN_ALIF_CAST) are gated under ALP_SDK.
CONFIG_ALP_SDK=y

# CAN subsystem + the vendored CAST CAN-FD driver.  CONFIG_CAN=y makes the can_*
# class available; CONFIG_CAN_ALIF_CAST is `default y if DT_HAS_CAST_CAN_ENABLED`
# so the can_cast.c TU builds in when the can0 node is enabled by the overlay.
# CAN_FD_MODE pulls in the fast-data bit-timing + the can_set_bitrate_data path
# the portable backend uses for ALP_CAN_MODE_FD.
CONFIG_CAN=y
CONFIG_CAN_FD_MODE=y

# This bench app reads the RAW devicetree + Zephyr device API directly (bind +
# device_is_ready), so the portable <alp/can.h> dispatcher is not exercised here.
# Its backend (src/backends/can/zephyr_drv.c) links unconditionally under ALP_SDK
# and binds the SAME alp_can0 alias this app checks; we validate the binding, not
# the dispatch path (no transceiver wired to open/start a bus on).

# Console: Alp UART console -- E1M edge UART0 (Alif UART5, P3_4/P3_5, 115200
# 8N1, NS16550), the E1M-AEN801 carrier console. The board _defconfig already
# selects it; we set it explicitly here so the example is self-describing.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
# Serial-less bench? Comment the four lines above and uncomment these to read
# 'ram_console_buf' over SWD instead:
# CONFIG_RAM_CONSOLE=y
# CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
# CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=y

# Keep the image small + deterministic for this bench run.
CONFIG_LOG=n
