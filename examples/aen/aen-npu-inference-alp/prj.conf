# SPDX-License-Identifier: Apache-2.0
#
# aen-npu-inference-alp -- real person_detect NPU inference through
# <alp/inference.h> on the E1M-AEN801 (Ensemble E8, M55-HE), Ethos-U85.
# ~263 KiB Vela model -> MRAM slot0, Flow D boot.

# --- MRAM slot0 link (image links at slot0 offset 0x80010000, not the base) ---
CONFIG_USE_DT_CODE_PARTITION=y

# --- alp-sdk inference backend selection ------------------------------------
# The app calls alp_inference_open(); on E8 the AEN Ethos-U backend
# (priority 100, silicon_ref alif:ensemble:e8) serves it.  A board.yaml-driven
# app gets these from the orchestrator emit; this raw example sets them itself.
CONFIG_ALP_SDK=y
CONFIG_ALP_SDK_INFERENCE_BACKEND_TFLM=y
CONFIG_ALP_SDK_INFERENCE_BACKEND_ETHOS_U_AEN=y
CONFIG_ALP_SDK_INFERENCE_ETHOS_U_VARIANT_U85=y

# --- TFLM + Ethos-U driver stack (the silicon-proven config) ----------------
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_REQUIRES_FULL_LIBCPP=y
CONFIG_TENSORFLOW_LITE_MICRO=y
# CONFIG_ETHOS_U is also select-ed by BACKEND_ETHOS_U_AEN (the board declares
# the arm,ethos-u node); set explicitly to be self-describing.
CONFIG_ETHOS_U=y
# Correct-signature dcache hooks (ethos_u_common.c); NOT CONFIG_ARM_ETHOS_U
# (hal_alif's stale ethosu_callback.c -> duplicate-symbol clash).
CONFIG_ETHOS_U_DCACHE=y
# E8 NPU = Ethos-U85 256-MAC; matches gen_model.py --accel ethos-u85-256.
CONFIG_ETHOS_U85_256=y

# --- Heap / stack -----------------------------------------------------------
# The Ethos-U driver's mutex/semaphore (k_malloc) + TFLM glue need a heap.
CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_MAIN_STACK_SIZE=16384

# --- DMA coherence (the #1 bench risk) --------------------------------------
# The NPU DMA-reads the model + arena from SRAM0.  DCACHE=n gives CPU + NPU a
# coherent view with no maintenance dependency (the silicon-proven config).
CONFIG_DCACHE=n

# --- Console: RAM console (this bench's observable, read over SWD) -----------
CONFIG_CONSOLE=y
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=y
# Keep logging off so the RESULT line prints cleanly (the PASS gate reads that
# printk line).  Flip CONFIG_LOG=y + ETHOS_U_LOG_LEVEL_DBG to debug an invoke.
CONFIG_LOG=n
