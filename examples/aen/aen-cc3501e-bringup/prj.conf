#
# CONFIG_SPI / CONFIG_GPIO are pulled in from board.yaml's `peripherals:`
# block (via the generated alp.conf); this file carries only the console.
CONFIG_PRINTK=y
CONFIG_LOG=y

# The reset sequence + soak use busy/sleep waits; a generous main-thread
# stack keeps the (modest) driver scratch buffers comfortable.
CONFIG_MAIN_STACK_SIZE=4096
