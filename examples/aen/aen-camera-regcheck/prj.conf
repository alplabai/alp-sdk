#
# Bench RAM-run config for the E1M-AEN801 (M55-HE). Console is the Alp UART
# console on the E1M edge UART0 (see the console block below).

# Tier-2 driver Kconfigs (incl. the CONFIG_VIDEO_ALIF_CAM family) are gated under
# ALP_SDK.
CONFIG_ALP_SDK=y

# Video subsystem (the portable Zephyr v4.4 video API: video_get_caps /
# video_get_format).  CONFIG_VIDEO=y makes the video class + its inline helpers
# available, and enables the vendored Alif camera-capture driver Kconfigs
# (CONFIG_VIDEO_ALIF_CAM / CONFIG_VIDEO_MIPI_CSI2_DW / CONFIG_VIDEO_ARX3A0 /
# CONFIG_MIPI_DPHY_DW, all default y under their DT_HAS_*_ENABLED).
CONFIG_VIDEO=y

# The vendored Alif camera-capture driver TUs (video_alif.c / video_csi_dw.c /
# arx3a0.c / dphy_dw.c) are now PORTED to the upstream v4.4 video API (the
# former ALP_VIDEO_ALIF_BROKEN gate is RETIRED), so each TU builds in directly
# when its DT node is enabled.  The overlay enables csi/dphy/arx3a0 AND the cam
# (CPI) node (all status="okay"): the overlay now supplies the two former
# cam-disable blockers -- the fork-only itcm/dtcm `global-base` + the
# cam->csi->arx3a0 endpoint graph -- so cam instantiates too and main.c's PASS
# gate REQUIRES CAM_BOUND (see the overlay header, task #21).
# Live frame CAPTURE is HW-blocked on this batch (no camera sensor wired).

# This bench app drives the RAW Zephyr video API directly, so turn OFF the alp
# <alp/camera.h> dispatcher: CONFIG_ALP_SDK_CAMERA_ZEPHYR_VIDEO is `default y if
# VIDEO`, and its portable backend expects a bound video device (absent here),
# which is not what we are validating.
CONFIG_ALP_SDK_CAMERA_ZEPHYR_VIDEO=n

# Console: Alp UART console -- E1M edge UART0 (Alif UART5, P3_4/P3_5, 115200
# 8N1, NS16550), the E1M-AEN801 carrier console. The board _defconfig already
# selects it; we set it explicitly here so the example is self-describing.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
# Serial-less bench? Comment the four lines above and uncomment these to read
# 'ram_console_buf' over SWD instead:
# CONFIG_RAM_CONSOLE=y
# CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
# CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=y

# Keep the image small + deterministic for this bench run.
CONFIG_LOG=n
