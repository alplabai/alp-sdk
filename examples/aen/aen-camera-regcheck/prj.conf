#
# Bench RAM-run config for the E1M-AEN801 (M55-HE). The app UART is NOT on USB on
# this bench, so the console is the RAM console (read 'ram_console_buf' over SWD).

# Tier-2 driver Kconfigs (incl. the CONFIG_VIDEO_ALIF_CAM family) are gated under
# ALP_SDK.
CONFIG_ALP_SDK=y

# Video subsystem (the portable Zephyr video API: video_get_caps /
# video_set_format).  Turning CONFIG_VIDEO=y makes the video class + its inline
# helpers available so this app links against the API even though no Alif video
# driver TU is built (see ALP_VIDEO_ALIF_BROKEN below).
CONFIG_VIDEO=y

# The vendored Alif camera-capture driver TUs (video_alif.c / video_csi_dw.c /
# arx3a0.c / dphy_dw.c) stay GATED OFF: they are vendored VERBATIM but NOT YET
# PORTED to the upstream v4.4 video API (the fork callbacks take the removed
# `enum video_endpoint_id`).  ALP_VIDEO_ALIF_BROKEN is `default n`, so the
# CONFIG_VIDEO_ALIF_CAM / CONFIG_VIDEO_MIPI_CSI2_DW / CONFIG_VIDEO_ARX3A0 /
# CONFIG_MIPI_DPHY_DW symbols all stay n and the TUs are not compiled.  This app
# therefore validates that the bindings + DT nodes are STAGED and bind to the
# right compatibles -- NOT a live driver / live frame.  Flip this to y once the
# bodies are ported (task #21).
# CONFIG_ALP_VIDEO_ALIF_BROKEN=y

# This bench app drives the RAW Zephyr video API directly, so turn OFF the alp
# <alp/camera.h> dispatcher: CONFIG_ALP_SDK_CAMERA_ZEPHYR_VIDEO is `default y if
# VIDEO`, and its portable backend expects a bound video device (absent here),
# which is not what we are validating.
CONFIG_ALP_SDK_CAMERA_ZEPHYR_VIDEO=n

# RAM console (no app UART on USB on this bench).
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y

# Keep the image small + deterministic for a RAM-run. LOG MUST stay off --
# CONFIG_LOG=y reroutes printk into the logging subsystem, which has no
# RAM-console backend, so the RESULT line never reaches 'ram_console_buf'.
CONFIG_LOG=n
