#
# Bench config for the UTIMER COMPARE-A alarm validation RAM-run on the
# E1M-AEN801 (Alif Ensemble E8).  Same RAM-console recipe as
# aen-counter-utimer-regcheck.
#
# The app console UART is NOT wired to USB on this bench (the only FT232R is the
# SE-UART), so we retarget the console to a RAM buffer the human reads over
# J-Link (mem8 of the 'ram_console_buf' symbol) and ASCII-decodes.

# --- RAM console (read 'ram_console_buf' over SWD) ---------------------------
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=4096
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_SERIAL=n
CONFIG_PRINTK=y

# --- UTIMER counter (COMPARE-A alarm path) -----------------------------------
# CONFIG_COUNTER_ALIF_UTIMER (the Tier-1.5 driver) is `default y` under `if
# ALP_SDK` once the okay'd "alif,utimer-counter" child node exists, so ALP_SDK
# MUST be on to surface it; COUNTER pulls in the Zephyr counter subsystem the
# driver registers against.
CONFIG_ALP_SDK=y
CONFIG_COUNTER=y

# Keep the image small + deterministic for a RAM-run.  LOG MUST stay off --
# CONFIG_LOG=y reroutes printk into the logging subsystem, which has no
# RAM-console backend, so the RESULT line never reaches 'ram_console_buf'.
CONFIG_LOG=n
