# SPDX-License-Identifier: Apache-2.0
#
# Build-only regression for the Tier-1.5 UTIMER counter alarm path
# (counter_alif_utimer.c set_alarm + irq_cfg), BENCH-VERIFIED PASS on E8
# 2026-06-17: the COMPARE-A one-shot alarm fires + re-arms (fired=2).
#
# This scenario compile-checks the alarm wire-up on the REAL E8 board target (it
# cannot run in CI -- the M55 has no native_sim host and no UTIMER on the gate):
#   - the alif,utimer parent + alif,utimer-counter child bind and instantiate the
#     counter device (DT_HAS_ALIF_UTIMER_COUNTER -> CONFIG_COUNTER_ALIF_UTIMER),
#   - set_alarm's COMPARE_A_BUF1 shadow write + the comp_a_buf1 IRQ_CONNECT (the
#     two bring-up fixes) compile against the hal_alif register library,
#   - the board overlay's ITCM RAM-run retarget (zephyr,flash = &itcm) links.
# It is intentionally filtered OUT of the native_sim PR gate: the only platform
# allowed is the AEN801 M55-HE board, which the native_sim twister run never
# selects, so this adds a board-target build check without slowing the gate.
#
# NOTE: the platform id below MUST match the board .yaml `identifier` exactly
# (zephyr/boards/alp/e1m_aen801_m55_he/..._rtss_he.yaml) or twister silently
# skips the scenario.

sample:
  name: aen-counter-alarm-regcheck
  description: |
    Bench RAM-run UTIMER COMPARE-A alarm proof for the E1M-AEN801 (Alif Ensemble
    E8, Cortex-M55-HE): arms a relative one-shot alarm through the portable
    Zephyr counter_set_channel_alarm path over the alp-sdk Tier-1.5
    counter_alif_utimer driver and confirms the callback fires + re-arms.  Guards
    the two bring-up fixes (COMPARE_A_BUF1 shadow write + comp_a_buf1 IRQ line).
    BENCH-VERIFIED PASS on E8 (2026-06-17).

tests:
  alp_sdk.examples.aen.counter_alarm_regcheck.aen:
    platform_allow:
      - alp_e1m_aen801_m55_he/ae822fa0e5597ls0/rtss_he
    tags:
      - alp-sdk
      - example
      - aen
      - counter
      - utimer
    build_only: true   # no UTIMER in CI; the alarm fire is a bench flash, not a run.
