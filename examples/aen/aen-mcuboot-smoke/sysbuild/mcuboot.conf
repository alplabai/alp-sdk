# Sysbuild image fragment for the MCUboot domain on the E1M-AEN801 (E8).
# DIAGNOSTIC: route MCUboot's boot log to a RAM console so it can be read over
# SWD (the app UART is not on USB on this bench).  Read 'ram_console_buf' over
# J-Link.  (For the full per-slot verify trace, set CONFIG_LOG=y +
# CONFIG_LOG_MODE_MINIMAL=y + CONFIG_MCUBOOT_LOG_LEVEL_DBG=y -- RAM_CONSOLE
# survives LOG=y when these are merged into THIS file, NOT passed via
# <image>_EXTRA_CONF_FILE which REPLACES this file.)
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=4096
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_SERIAL=n

# MCUboot's own logging at INFO (banner + boot decision).
CONFIG_LOG=n
CONFIG_MCUBOOT_LOG_LEVEL_INF=y

# ============================ MCUboot -> slot0 STATUS =========================
# SES -> MCUboot: VALIDATED on E8 (PC inside MCUboot main(), ITCM).
# MCUboot -> slot0: deeply characterised on E8 2026-06-16 -- the ECDSA-P256
# slot0 verify does NOT terminate, on EITHER crypto backend, with a PROVABLY-
# VALID + correctly-read image.  This is NOT a placement/read/key/config bug
# (all of those were ruled out on silicon) -- it is a verify-RUNTIME issue that
# needs source-level single-step debug, not a Kconfig change.
#
# WHAT IS PROVEN CORRECT (do NOT re-chase these):
#   - imgtool verify of the staged slot0 .signed.bin vs the embedded dev key
#     -> "Image was correctly validated" (digest 18e8499d...).
#   - raw MRAM @0x80010000 (J-Link) byte-matches the staged image: header
#     (magic 0x96f3b83d), SHA256 hash TLV, AND the signature TLV.
#   - flash_mram_alif read maths are correct: MRAM_FLASH(off)=0x80000000+off,
#     slot0 partition off 0x10000 -> 0x80010000 (exactly where SES wrote it).
#   - MCUboot DBG trace on-device (LOG=y + MCUBOOT_LOG_LEVEL_DBG): "Boot source:
#     primary slot" -> boot_validate_slot -> bootutil_img_hash -> finds TLV 16
#     (hash), TLV 1 (key), TLV 34 (sig 70B) -> "bootutil_verify_sig: ECDSA
#     builtin key 0" -> NEVER RETURNS.  So slot scan + TLV parse + hash + key
#     match all SUCCEED; only the point-multiplication inside the verify hangs.
#
# THE HANG (both backends, billions of cycles, slot0 never boots):
#   - BOOT_ECDSA_TINYCRYPT (default): PC parks in uECC_vli_* point-mult.
#   - BOOT_ECDSA_PSA + mbedTLS 4.x : PC parks in mbedtls_ct_*/ECP point-mult.
#   Bumping CONFIG_MAIN_STACK_SIZE (->65536) + CONFIG_MBEDTLS_HEAP_SIZE (->32768)
#   did NOT help (3.1e9 cycles in 100s, ~31 MHz boot clock).  Two independent
#   bignum libraries hanging identically in point-mult, on inputs proven correct,
#   points at a CPU/environment factor (a degenerate scalar reaching the inner
#   loop, a fault-return loop, or an M55-specific miscompile of the inner field
#   arithmetic) -- the next step is to single-step the verify and inspect r/s/e.
#
# PSA BACKEND (the right path for mbedTLS 4.x -- TinyCrypt is deprecated) now
# BUILDS + RUNS on E8 (real progress this session):
#   CONFIG_BOOT_ECDSA_PSA=y + CONFIG_MBEDTLS=y + CONFIG_MBEDTLS_PSA_CRYPTO_C=y
#   + CONFIG_PSA_WANT_ALG_SHA_256=y + CONFIG_PSA_WANT_KEY_TYPE_ECC_PUBLIC_KEY=y
#   + CONFIG_MBEDTLS_ENABLE_HEAP=y + CONFIG_MBEDTLS_HEAP_SIZE>=16384.
#   PROVISIONING GAP: the alp-sdk west workspace's mbedTLS 4.x module is missing
#   its tf-psa-crypto submodule (not in the manifest).  For the bench it was
#   provisioned by symlinking the matching (identical-rev a3e190fe4) copy:
#     ln -s <topdir>/zephyrproject/modules/crypto/tf-psa-crypto \
#           <topdir>/modules/crypto/mbedtls/tf-psa-crypto
#   PROPER FIX = add tf-psa-crypto to the alp-sdk west manifest + west update.
#
# LEFT on the build-clean TinyCrypt default (no PSA configs) so the example + CI
# build with NO workspace-provisioning dependency.  Flip to the PSA block above
# (after provisioning tf-psa-crypto) to continue the verify-hang debug on the
# supported crypto backend.
#
# DEEPER ROOT-CAUSE (2026-06-16, parallel-analysis workflow + on-bench J-Link
# breakpoint capture).  The non-termination is NOT the compiler and NOT a bad
# input -- it is the software bignum verify itself failing to converge on the E8
# M55.  Eliminated on silicon: -O0 (CONFIG_NO_OPTIMIZATIONS=y) STILL hangs (so
# not a GCC-14 -Os wrong-code defect); MVE (objdump: zero MVE opcodes in both
# ELFs; -Os + soft-float + FPU=n); RNG/entropy (verify passes f_rng=NULL;
# TinyCrypt has no RNG yet hangs identically); FIH (OFF); fault (CFSR/HFSR=0,
# thread mode).  Breakpoint at uECC_verify proved the INPUTS are correct:
# hash=18e8499d... (the image digest), pubkey X=152305eb... (the embedded key),
# sig r/s both non-zero.  Breakpoint at uECC_vli_modInv: it is the affine
# 1/Z mod p step -- modInv(z, z, curve->p, num_words=8) -- z non-zero and < p,
# mod = the correct P256 field prime; modInv is alias-safe (copies input->a
# before writing result).  The binary-GCD loop body executes (PC cycles
# vli_sub/cond_set) but a and b never converge -- mathematically impossible with
# correct arithmetic on valid coprime operands => the M55 yields wrong results
# for uECC's word arithmetic here (an E8/M55 execution anomaly), the same shared
# factor that makes mbedTLS-PSA hang identically in its own bignum core.  NEXT:
# either a watchpoint single-step of the GCD vars (a,b,u,v) to see which
# primitive mis-computes, OR -- the likely production answer -- do the ECDSA
# verify on the Alif Secure Enclave / hardware crypto (Alif's native root of
# trust is the SE, not a software MCUboot verify) via a PSA hardware driver.
# ============================================================================
#
# FINAL CONCLUSION (2026-06-16): MCUboot-as-slot0-bootloader on the E8 has
# MULTIPLE independent failure modes, not one -- each config change just moves
# the hang:
#   1. software ECDSA-P256 verify does not terminate (uECC modInv / mbedTLS ECP);
#   2. with SIGNATURE_TYPE_NONE, the SHA-256 image hash (BOOT_VALIDATE_SLOT0)
#      hangs in sha256.c ROTR;
#   3. with crypto AND validation off, MCUboot churns in flash_mram_read over the
#      FULL 2.75 MB slot0 partition (R1=0x2A1080 = slot0 size) + kernel/k_sem.
# So getting MCUboot to chainload slot0 on the E8 is a deep, multi-issue port
# (crypto + flash + boot-logic), and it is the WRONG architecture for this part.
#
# THE ALIF-NATIVE ANSWER (option 1 -- the SE / hardware root of trust) ALREADY
# WORKS and is PROVEN: a signed=true ATOC entry is verified by the SES (the SE
# hardware) against its content cert and booted directly -- the same SE-native
# flash path used by the peripheral bench apps. The SE is the hardware root of
# trust; the ECDSA verify happens
# INSIDE the SE at the SES stage, not in software on the M55. For the customer
# secure-boot + A/B update chain on E8, use the SE-native model (SES-verified
# ATOC entries + the SE STOC/ATOC update service se_service_update_stoc), NOT a
# software MCUboot in slot0. This example is retained as the investigation
# record; SES->MCUboot is validated, MCUboot->slot0 software boot is not shippable.
# ============================================================================



# Single-app SE-trusting chainloader: no software validation (SES verified the
# signed slot0 ATOC entry; the E8/M55 software crypto+SHA loops do not terminate).
CONFIG_BOOT_VALIDATE_SLOT0=n

# E8 M55-HE: SCB_EnableDCache/DisableDCache cache-maintenance loop hangs (all 13
# peripheral bench apps run DCACHE=n for this reason). MCUboot defaults DCACHE=y.
CONFIG_DCACHE=n

# ===================== FULL ROOT-CAUSE CHAIN (2026-06-16) =====================
# Pursuing the SE-trusting single-app chainloader (SINGLE_APP + TYPE_NONE +
# no-validate) peeled the MCUboot->slot0 cascade to its real end:
#   L1 crypto verify hang   -> avoided (TYPE_NONE; single_loader has no verify)
#   L2 swap whole-slot scan -> avoided (SINGLE_APP has no swap machinery)
#   L3 SHA image hash       -> avoided (BOOT_VALIDATE_SLOT0=n)
#   L4 SCB_EnableDCache hang -> FIXED (CONFIG_DCACHE=n; matches all 13 bench apps)
#   L5 slot0 vector/header mismatch -> FIXED (board Kconfig.defconfig
#      ROM_START_OFFSET=0x800: 480 IRQs force _vector_table to 0x800 align, but the
#      default 0x200 MCUboot header made MCUboot jump to slot0+0x200, a padding gap)
#   L6 THE FINAL BUG: at `blx r3` in do_boot, R3 = 0x705A3CC0 (0x5A fill), not the
#      slot0 reset 0x800115b8. do_boot: vt = flash_base + br_image_off + hdr_size;
#      flash_base = CONFIG_FLASH_BASE_ADDRESS. MCUboot is ITCM-linked (SES loads it
#      to ITCM; cannot be MRAM-XIP) so its FLASH_BASE_ADDRESS = 0x0, but slot0 is in
#      MRAM at 0x80000000. vt = 0x0 + 0x10000 + 0x800 = 0x10800 (unused ITCM) ->
#      garbage reset vector -> jump into the void -> fault -> reboot loop.
#   ROOT: generic Zephyr MCUboot do_boot assumes exec-flash == boot-flash; the Alif
#   split (MCUboot=ITCM, slot0=MRAM) breaks it. NO config-only fix (forcing
#   FLASH_BASE_ADDRESS=0x80000000 relinks MCUboot to MRAM, breaking the SES load).
#   FINAL FIX (MCUboot porting): make do_boot/flash_device_base take the slot base
#   from the flash-MAP controller (MRAM DT reg = 0x80000000), not the exec-flash
#   CONFIG_FLASH_BASE_ADDRESS. Then vt = 0x80010800 and slot0 boots.
# =============================================================================
