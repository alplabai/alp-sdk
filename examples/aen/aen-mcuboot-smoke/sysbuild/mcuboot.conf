# Sysbuild image fragment for the MCUboot domain on the E1M-AEN801 (E8).
# DIAGNOSTIC: route MCUboot's boot log to a RAM console so it can be read over
# SWD (the app UART is not on USB on this bench).  This lets us see WHY MCUboot
# does not chain-load slot0 (image-not-found vs signature-fail vs flash-read).
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_SERIAL=n

# MCUboot's own logging at INFO (banner + boot decision).
CONFIG_LOG=n
CONFIG_MCUBOOT_LOG_LEVEL_INF=y

# ============================ MCUboot -> slot0 STATUS =========================
# SES -> MCUboot: VALIDATED on E8 (PC inside MCUboot main(), ITCM).
# MCUboot -> slot0: ROOT-CAUSED, fix pending a crypto-backend swap (below).
#
# BENCH-ISOLATED on E8 (2026-06-16): with the DEFAULT BOOT_ECDSA_TINYCRYPT, the
# slot0 ECDSA-P256 verify of a PROVABLY-VALID image does NOT terminate -- J-Link
# shows PC parked in uECC_vli_*/point-mult (0x47xx-0x4Axx) for 60s+ (>1000x a
# normal ~20M-cycle P256 verify); slot0 never boots. The image is NOT the problem:
#   - imgtool verify against the embedded dev key  -> "correctly validated"
#   - raw MRAM @0x80010000 vs the staged .signed.bin -> header + SHA256 hash TLV
#     (digest 18e8499d...) + signature TLV all BYTE-MATCH
#   - MCUboot embeds the SAME dev key that signed slot0 (sysbuild, fixed PEM)
# i.e. write/placement/hash/signature/key are ALL correct; TinyCrypt uECC itself
# hangs on ARMv8-M (it is deprecated upstream). THE FIX is to switch the
# BOOT_ECDSA_IMPLEMENTATION choice off uECC, but both alternatives need crypto-
# subsystem config first (bench-confirmed blockers, the scoped follow-up):
#   - CONFIG_BOOT_ECDSA_MBEDTLS=y : Kconfig abort -- selects deprecated MBEDTLS_MD
#     (need the mcuboot mbedTLS cfg / MBEDTLS_BUILTIN sorted so the choice resolves).
#   - CONFIG_BOOT_ECDSA_PSA=y     : compile fails -- psa/crypto.h absent (no PSA
#     crypto provider wired; needs the PSA core / TF-M or mbedTLS-PSA).
# Left on the build-clean TinyCrypt default so the example/CI still builds; the
# runtime hang + the exact fix path are documented here for the follow-up.
# ============================================================================
