# Sysbuild image fragment for the MCUboot domain on the E1M-AEN801 (E8).
# DIAGNOSTIC: route MCUboot's boot log to a RAM console so it can be read over
# SWD (the app UART is not on USB on this bench).  This lets us see WHY MCUboot
# does not chain-load slot0 (image-not-found vs signature-fail vs flash-read).
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_SERIAL=n

# MCUboot's own logging at INFO so the bootable-image decision is printed.
CONFIG_LOG=n
CONFIG_MCUBOOT_LOG_LEVEL_INF=y
