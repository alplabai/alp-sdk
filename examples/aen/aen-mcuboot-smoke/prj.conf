#
# Slot0 app for the MCUboot boot-chain bench test.  NO ITCM RAM-run overlay --
# this app links to the board's default code-partition (slot0 @ MRAM 0x80010000),
# which is the whole point: MCUboot must verify + chain-load it from slot0.
# Observability is the RAM console read over SWD (the app UART is not on USB).

CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_SERIAL=n
CONFIG_LOG=n
