#
# Slot0 app for the MCUboot boot-chain bench test.  NO ITCM RAM-run overlay --
# this app links to the board's default code-partition (slot0 @ MRAM 0x80010000),
# which is the whole point: MCUboot must verify + chain-load it from slot0.
# Unlike the peripheral examples (which now default to the Alp UART console),
# this boot-chain smoke deliberately keeps the RAM console: observability is the
# buffer read over SWD as MCUboot chain-loads slot0 (survives the bootloader
# handoff without depending on UART bring-up order).

CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_SERIAL=n
CONFIG_LOG=n

# E8 M55-HE: D-cache maintenance (SCB_EnableDCache) hangs; all bench apps use DCACHE=n.
# Without this, the slot0 app faults/hangs in its own cache init when MCUboot jumps to it.
CONFIG_DCACHE=n

# E8 ARMv8-M with ~480 IRQs: the vector table needs 0x800 alignment, which exceeds
# the default 0x200 MCUboot header. Without this, _vector_table lands at slot0+0x800
# but MCUboot jumps to slot0+0x200 (header size) -> garbage SP/PC -> HardFault -> reboot
# loop. Set the header reservation = the vector alignment so the jump target = the vectors.
CONFIG_ROM_START_OFFSET=0x800
