#
# Sysbuild configuration for E1M-AEN secure-boot images.
#
# Loaded when a Zephyr application is built with sysbuild against
# this directory, e.g.:
#
#   west build -b alp_e1m_aen801_m55_he/ae822fa0e5597ls0/rtss_he path/to/app \
#       --sysbuild -- -DSB_CONF_FILE=<abs>/alp-sdk/zephyr/sysbuild/aen/sysbuild.conf
#
# Produces:
#   build/zephyr/zephyr.signed.bin     -- MCUboot-signed application image
#   build/mcuboot/zephyr/zephyr.bin    -- MCUboot bootloader
#
# Boot chain on the Alif Ensemble (E1M-AEN): the Secure Enclave (SES)
# launches an ATOC image; here that image is MCUboot, which then verifies
# and chain-loads the application from MRAM slot0.  The MRAM partition map
# lives in the board DT (mcuboot @ 0x80000000, slot0 @ 0x80010000,
# slot1 @ 0x802b0000, scratch, storage -- MRAM base 0x80000000).
#
#   SES --ATOC--> MCUboot (this build) --verify slot0--> application
#
# This is also the SoM-maker provisioning model: Alp Lab pre-provisions
# this MCUboot as the factory ATOC over the SE-UART so a shipped module
# boots out-of-box and customers load apps via `west flash` into slot0
# (no SETOOLS/SE-UART needed day-1).  See docs/aen-provisioning.md.
#
# Verification policy -- SE-ROOT-OF-TRUST (bench-validated on E8, 2026-06-16):
#   The Alif Secure Enclave (SES) is the hardware root of trust. It ECDSA-verifies
#   every signed ATOC entry against the device key BEFORE launch -- both this
#   MCUboot AND the signed slot0 application (app-cfg `signed:true`). So MCUboot
#   itself does NOT re-verify in software: SINGLE_APP (no swap) + SIGNATURE_TYPE_NONE.
#   MCUboot is the A/B chainloader; the SE provides the cryptographic trust.
#   WHY NOT software ECDSA in MCUboot: on the E8/M55 the software ECDSA-P256 verify
#   (TinyCrypt uECC AND mbedTLS-PSA) does NOT terminate -- a bench-confirmed M55
#   software-bignum non-convergence (see sysbuild/mcuboot.conf); it is also redundant
#   with the SE's ATOC verify. Re-enabling MCUboot software verify is blocked on that
#   separate M55-bignum issue; the SE-trust model is the correct Alif-native design.
#
# Status: bench-VALIDATED end-to-end on E1M-AEN801 (E8): SES -> MCUboot (ITCM) ->
# slot0 app (MRAM XIP) -> app main(), RESULT PASS, VTOR=0x80010800. Required the full
# fix set: SINGLE_APP + TYPE_NONE + CONFIG_DCACHE=n + board ROM_START_OFFSET=0x800 +
# the mcuboot do_boot flash-base patch (zephyr/patches/mcuboot, carried via west patch
# -- do_boot used CONFIG_FLASH_BASE_ADDRESS=0x0/ITCM for the MRAM slot vector address).

# Pull MCUboot into the build graph.
SB_CONFIG_BOOTLOADER_MCUBOOT=y

# Single-application slot: MCUboot reads the slot0 header and boots it; no swap,
# no software signature/hash work (the SES already verified the signed slot0 ATOC
# entry). This is what boots on the E8 -- swap-scratch + software ECDSA hang here.
SB_CONFIG_MCUBOOT_MODE_SINGLE_APP=y

# No MCUboot software signature verify -- trust is delegated to the SES (above).
SB_CONFIG_BOOT_SIGNATURE_TYPE_NONE=y
