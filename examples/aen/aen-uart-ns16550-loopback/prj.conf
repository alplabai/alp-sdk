# Bench config for the ns16550 UART validation on the E1M-AEN801 (E8, M55-HE),
# RAM-run + RAM-console flow.

# alp-sdk Tier-1.5 driver Kconfigs are gated under this.
CONFIG_ALP_SDK=y

# This IS a UART test, so the serial subsystem + ns16550 driver must be in.
CONFIG_SERIAL=y

# Console stays on the RAM buffer -- read 'ram_console_buf' over SWD.  Unlike the
# peripheral examples (which now default to the Alp UART console), THIS app IS
# the UART test: routing the console onto a UART would let console traffic
# collide with the loopback under test, so the console must NOT be on a UART.
CONFIG_CONSOLE=y
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
CONFIG_UART_CONSOLE=n

# We exercise the blocking poll API (uart_poll_out / uart_poll_in); no IRQ/async.
CONFIG_UART_INTERRUPT_DRIVEN=n
