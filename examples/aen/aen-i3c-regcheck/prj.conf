#
# Bench RAM-run config for the E1M-AEN801 (M55-HE). Console is the Alp UART
# console on the E1M edge UART0 (see the console block below).

# Tier-1 driver Kconfigs (incl. CONFIG_I3C_DW) are gated under ALP_SDK.
CONFIG_ALP_SDK=y

# I3C subsystem + the upstream DesignWare I3C driver.  CONFIG_I3C=y makes the
# i3c_* class available; CONFIG_I3C_DW is `default y if
# DT_HAS_SNPS_DESIGNWARE_I3C_ENABLED` (zephyr/drivers/i3c/Kconfig.dw), so the
# i3c_dw.c TU builds in when the lpi3c0 node is enabled by the overlay.
CONFIG_I3C=y

# This bench app reads the RAW devicetree + Zephyr device API directly (bind +
# device_is_ready + a DEVICE_CTRL register readback), so no portable <alp/*>
# I3C dispatcher is exercised here (none exists yet).

# Console: Alp UART console -- E1M edge UART0 (Alif UART5, P3_4/P3_5, 115200
# 8N1, NS16550), the E1M-AEN801 carrier console. The board _defconfig already
# selects it; we set it explicitly here so the example is self-describing.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
# Serial-less bench? Comment the four lines above and uncomment these to read
# 'ram_console_buf' over SWD instead:
# CONFIG_RAM_CONSOLE=y
# CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
# CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=y

# Keep the image small + deterministic for this bench run.
CONFIG_LOG=n
