#
# Bench RAM-run config for the E1M-AEN801 (M55-HE). The app UART is NOT on USB on
# this bench, so the console is the RAM console (read 'ram_console_buf' over SWD).

# Tier-2 driver Kconfigs (incl. CONFIG_ARM_MHUV2 / CONFIG_HAS_ALIF_SE_SERVICES)
# are gated under ALP_SDK.
CONFIG_ALP_SDK=y

# SE service transport for the SDK's E8 backends.  CONFIG_ARM_MHUV2 builds the
# in-tree "arm,mhuv2" IPM driver (zephyr/drivers/ipm/ipm_arm_mhuv2.c) and pulls
# in CONFIG_IPM; CONFIG_HAS_ALIF_SE_SERVICES compiles the hal_alif SE client
# (se_services/zephyr/src/se_service.c).  The app itself calls only portable
# alp_* surfaces; with these two on, CONFIG_ALP_SDK_SOC_INFO_ALIF_SE +
# CONFIG_ALP_SDK_POWER_PROFILE_ALIF_SE + CONFIG_ALP_SDK_SECURITY_SE_CRYPTOCELL
# default y and register the E8 backends behind them.  Both are `default y`
# under the relevant DT_HAS_*_ENABLED (the overlay okays the nodes), but set
# them explicitly here so the build is self-describing.
CONFIG_ARM_MHUV2=y
CONFIG_HAS_ALIF_SE_SERVICES=y

# RAM console (no app UART on USB on this bench).  Buffer bumped to 4096: this
# app dumps ~30 lines (identity + both profiles + rnd hexdump).
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=4096
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y

# Keep the image small + deterministic for a RAM-run. LOG MUST stay off --
# CONFIG_LOG=y reroutes printk into the logging subsystem, which has no
# RAM-console backend, so the RESULT line never reaches 'ram_console_buf'.
CONFIG_LOG=n
