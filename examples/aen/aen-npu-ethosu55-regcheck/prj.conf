#
# Bench RAM-run config: HE-core-local Ethos-U55 (128-MAC) presence/clock probe on
# the E1M-AEN801 (Ensemble E8, M55-HE).

# Arm Ethos-U core driver + the arm frontend (CONFIG_ETHOS_U_ARM defaults y once
# the arm,ethos-u node is okay).  CONFIG_ETHOS_U depends on MULTITHREADING (y).
CONFIG_ETHOS_U=y

# NPU variant choice (ETHOS_U85_256 / ETHOS_U55_* are ONE Kconfig `choice`, so a
# U55 build is distinct from the U85 build).  The E8 HE cluster's core-local NPU
# is the 128-MAC Ethos-U55 (the HP cluster's is 256-MAC); each M55 sees only its
# own at the core-private 0x400e1000 (hal_alif does the local->global remap).
CONFIG_ETHOS_U55_128=y

# drivers/misc/ethos_u/ethos_u_common.c allocates its mutex/semaphore with
# k_malloc() -> a system heap MUST be provisioned or the link fails.
CONFIG_HEAP_MEM_POOL_SIZE=4096

# RAM console (no app UART on USB on this bench).  LOG=n: with CONFIG_LOG=y,
# printk is rerouted through logging (no RAM-console log backend) -> empty buffer.
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_LOG=n
