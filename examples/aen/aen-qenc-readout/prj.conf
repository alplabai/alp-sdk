#
# Bench RAM-run config for the E1M-AEN801 (M55-HE). Console output goes to the
# Alp UART console (E1M edge UART0).

# Tier-1.5 / Tier-2 driver Kconfigs (incl. CONFIG_QDEC_ALIF) are gated under ALP_SDK.
CONFIG_ALP_SDK=y

# Sensor subsystem + the vendored Alif UTIMER quadrature decoder. CONFIG_QDEC_ALIF
# is `default y` once the alif,utimer-qdec node is enabled
# (DT_HAS_ALIF_UTIMER_QDEC_ENABLED) and it `select`s PINCTRL + USE_ALIF_HAL_UTIMER
# itself -- we only turn on the SENSOR API here.
CONFIG_SENSOR=y

CONFIG_MAIN_STACK_SIZE=4096

# Console: Alp UART console -- E1M edge UART0 (Alif UART5, P3_4/P3_5, 115200
# 8N1, NS16550), the E1M-AEN801 carrier console. The board _defconfig already
# selects it; we set it explicitly here so the example is self-describing.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
# Serial-less bench? Comment the four lines above and uncomment these to read
# 'ram_console_buf' over SWD instead:
# CONFIG_RAM_CONSOLE=y
# CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
# CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=y
