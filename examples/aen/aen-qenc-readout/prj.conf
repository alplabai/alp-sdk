#
# Bench RAM-run config for the E1M-AEN801 (M55-HE). The app UART is NOT on USB on
# this bench, so the console is the RAM console (read 'ram_console_buf' over SWD).

# Tier-1.5 / Tier-2 driver Kconfigs (incl. CONFIG_QDEC_ALIF) are gated under ALP_SDK.
CONFIG_ALP_SDK=y

# Sensor subsystem + the vendored Alif UTIMER quadrature decoder. CONFIG_QDEC_ALIF
# is `default y` once the alif,utimer-qdec node is enabled
# (DT_HAS_ALIF_UTIMER_QDEC_ENABLED) and it `select`s PINCTRL + USE_ALIF_HAL_UTIMER
# itself -- we only turn on the SENSOR API here.
CONFIG_SENSOR=y

CONFIG_MAIN_STACK_SIZE=4096

# RAM console (no app UART on USB on this bench).
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
