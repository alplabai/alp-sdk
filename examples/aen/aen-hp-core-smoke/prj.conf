#
# Bench config for the M55-HP first-light smoke on the E1M-AEN801 (Alif Ensemble
# E8).  Same RAM-console recipe as the HE bench apps; the HP board _defconfig
# forces a UART5 console, override it to the RAM buffer here.

# --- RAM console (read 'ram_console_buf' over SWD via the AXI-AP) -------------
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_SERIAL=n
CONFIG_PRINTK=y

CONFIG_ALP_SDK=y

# E8 D-cache maintenance loop hangs on this silicon (shared bench rule); and the
# SRAM0 beacon must be coherent with the host read over the system bus, so keep
# the D-cache off (a cached beacon write could sit in the HP D-cache, unseen by
# the AXI-AP read).
CONFIG_DCACHE=n

# Keep the image small + deterministic.  LOG MUST stay off -- CONFIG_LOG=y
# reroutes printk into the logging subsystem, which has no RAM-console backend.
CONFIG_LOG=n
