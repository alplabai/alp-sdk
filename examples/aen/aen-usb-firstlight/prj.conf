CONFIG_ALP_SDK=y
# UHC (USB host controller) driver only -- first light does not need the host stack.
CONFIG_UHC_DRIVER=y
# NOTE: no CONFIG_LOG -- with LOG on, printk is redirected off the ram_console
# hook (empty buffer over SWD).  Pure printk reaches ram_console; the driver's
# LOG_INF caps line is redundant with the fl snapshot read directly over SWD.
