# SPDX-License-Identifier: Apache-2.0
#
# aen-jpeg-regcheck -- Alif Ensemble Hantro VC9000E JPEG hardware-encoder
# proof for the E1M-AEN801 (Ensemble E8, M55-HE), via the portable
# <alp/jpeg.h> surface.
#
# This prj.conf holds ONLY the portable, platform-agnostic config both
# scenarios share.  The Alif-E8 / hal_alif hardware-path Kconfig (CONFIG_VIDEO*,
# CONFIG_USE_ALIF_JPEG_SW_LIB, CONFIG_ALP_SDK_JPEG_ALIF_HANTRO, CONFIG_DCACHE,
# the SoC select) lives in boards/alp_e1m_aen801_m55_he_ae822fa0e5597ls0_rtss_he.conf
# so it applies to the AEN build ONLY -- native_sim (which has no jpeg0 DT node
# and no hal_alif JPEG symbols) runs the sw_baseline fallback off this file
# alone, with no dangling assignments to symbols it can't satisfy.

CONFIG_ALP_SDK=y

# Console: Alp UART console -- E1M edge UART0 (Alif UART5, P3_4/P3_5, 115200
# 8N1, NS16550), the E1M-AEN801 carrier console.  The board _defconfig already
# selects it; set explicitly so the example is self-describing (mirrors
# aen-isp-regcheck/prj.conf).  Harmless on native_sim (its own console backend
# wins).
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_PRINTK=y

# Keep the image small + deterministic for a RAM-run.
CONFIG_LOG=n
