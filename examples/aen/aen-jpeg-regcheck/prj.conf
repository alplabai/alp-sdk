# SPDX-License-Identifier: Apache-2.0
#
# aen-jpeg-regcheck -- Alif Ensemble Hantro VC9000E JPEG hardware-encoder
# proof for the E1M-AEN801 (Ensemble E8, M55-HE), via the portable
# <alp/jpeg.h> surface.  This prj.conf is the AEN801/hardware-path default;
# the native_sim scenario in testcase.yaml re-points the four CONFIG_VIDEO*/
# CONFIG_ALP_SDK_JPEG_ALIF_HANTRO lines below to the software fallback via
# extra_configs (native_sim has no jpeg0 DT node -- Alif-E8-only silicon).

CONFIG_ALP_SDK=y

# This regcheck is specifically for E1M-AEN801 / Ensemble E8 -- without this,
# the build resolves CONFIG_ALP_SOC_NONE=1 (ALP_SOC_REF_STR="unknown"), the
# backend selector (src/backend.c) filters alif_hantro out (its
# silicon_ref="alif:ensemble:e8" never matches "unknown"), and sw_baseline
# ("*", priority 50) silently wins instead -- the exact defect a real AEN801
# bench run caught (mirrors aen-isp-regcheck/prj.conf:10).
CONFIG_ALP_SOC_ALIF_ENSEMBLE_E8=y

# Video subsystem: CONFIG_VIDEO=y makes the v4.4 video class + its inline
# helpers (video_set_format / video_set_ctrl / video_enqueue / video_dequeue)
# available.  CONFIG_VIDEO_JPEG_HANTRO_VC9000E=y builds the ported Hantro
# VC9000E driver TU (zephyr/drivers/video/jpeg_hantro_vc9000e.c) against the
# jpeg0 DT node this app's board overlay enables.  CONFIG_USE_ALIF_JPEG_SW_LIB=y
# links the hal_alif libjpeg_hantro_sw_gcc.a SW helper lib the driver needs
# for the quantization-table / JPEG-header pieces the HW block doesn't do
# itself.
CONFIG_VIDEO=y
CONFIG_VIDEO_JPEG_HANTRO_VC9000E=y
CONFIG_USE_ALIF_JPEG_SW_LIB=y

# CONFIG_ALP_SDK_CAMERA_ZEPHYR_VIDEO is `default y if VIDEO` -- turning on
# CONFIG_VIDEO above for the JPEG class collaterally pulls in the portable
# camera backend (src/backends/camera/zephyr_video.c), which this app
# neither needs nor exercises (mirrors aen-isp-regcheck/prj.conf, same
# collateral-activation reason).
CONFIG_ALP_SDK_CAMERA_ZEPHYR_VIDEO=n

# The alp-sdk backend that drives the driver above through <alp/jpeg.h>
# (src/backends/jpeg/alif_hantro.c), silicon_ref="alif:ensemble:e8" priority
# 100.  FPU/FP_HARDABI are auto-selected by the Task-3 driver Kconfig -- do
# NOT hand-add them here.
CONFIG_ALP_SDK_JPEG_ALIF_HANTRO=y

# Console: Alp UART console -- E1M edge UART0 (Alif UART5, P3_4/P3_5, 115200
# 8N1, NS16550), the E1M-AEN801 carrier console.  The board _defconfig already
# selects it; set explicitly so the example is self-describing (mirrors
# aen-isp-regcheck/prj.conf).
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_PRINTK=y

# Keep the image small + deterministic for a RAM-run.
CONFIG_LOG=n
