#
# E1M-AEN801 (Ensemble E8, M55-HE) hardware-path Kconfig for aen-jpeg-regcheck.
#
# These symbols are Alif-E8 / hal_alif specific, so they live in this
# board-scoped .conf (applied ONLY when building for this board), NOT in the
# shared prj.conf.  CONFIG_USE_ALIF_JPEG_SW_LIB is a hal_alif module symbol
# that does not exist on native_sim; assigning it in the shared prj.conf is an
# undefined-symbol Kconfig warning that CI (warnings-as-errors) turns into a
# build failure.  Board-scoping it keeps the native_sim scenario (sw_baseline
# fallback) clean while the AEN build gets the full hardware path.

# Without this the build resolves CONFIG_ALP_SOC_NONE=1 (ALP_SOC_REF_STR=
# "unknown"), the backend selector (src/backend.c) filters alif_hantro out (its
# silicon_ref="alif:ensemble:e8" never matches "unknown"), and sw_baseline
# ("*", priority 50) silently wins -- the exact defect a real AEN801 bench run
# caught (mirrors aen-isp-regcheck).
CONFIG_ALP_SOC_ALIF_ENSEMBLE_E8=y

# Video class + inline helpers (video_set_format / video_set_ctrl /
# video_enqueue / video_dequeue); the ported Hantro VC9000E driver TU
# (zephyr/drivers/video/jpeg_hantro_vc9000e.c) against the jpeg0 DT node the
# board overlay enables; and the hal_alif libjpeg_hantro_sw_gcc.a SW helper
# lib the driver links for the quantization-table / JPEG-header pieces.
CONFIG_VIDEO=y
CONFIG_VIDEO_JPEG_HANTRO_VC9000E=y
CONFIG_USE_ALIF_JPEG_SW_LIB=y

# CONFIG_VIDEO is `default y if VIDEO` for the portable camera backend
# (src/backends/camera/zephyr_video.c), which this app neither needs nor
# exercises (mirrors aen-isp-regcheck, same collateral-activation reason).
CONFIG_ALP_SDK_CAMERA_ZEPHYR_VIDEO=n

# The alp-sdk backend that drives the driver through <alp/jpeg.h>
# (src/backends/jpeg/alif_hantro.c), silicon_ref="alif:ensemble:e8" priority
# 100.  FPU/FP_HARDABI are auto-selected by the driver Kconfig -- do NOT
# hand-add them.
CONFIG_ALP_SDK_JPEG_ALIF_HANTRO=y

# Coherency: the Hantro AXI master and the M55 must share ONE view of the
# nv12_buf/out_buf SRAM0 buffers (src/main.c) with no cache maintenance -- the
# ported driver issues no cache clean/invalidate around the encode.  Matches
# the aen-dma-regcheck DMA-buffers-in-SRAM0 finding (PL330, same coherency
# requirement, same fix).
CONFIG_DCACHE=n
