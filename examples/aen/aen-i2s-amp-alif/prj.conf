#
# Bench RAM-run config for the E1M-AEN801 (M55-HE). The app UART is NOT on USB on
# this bench, so the console is the RAM console (read 'ram_console_buf' over SWD).

# Tier-1.5 / Tier-2 driver Kconfigs (incl. CONFIG_I2S_DW) are gated under ALP_SDK.
CONFIG_ALP_SDK=y

# I2S subsystem + the vendored Alif DesignWare I2S driver. CONFIG_I2S_DW is
# `default y` once the i2s0 node is enabled (DT_HAS_SNPS_DESIGNWARE_I2S_ENABLED)
# and it `select`s PINCTRL itself -- we only turn on the I2S API here.
CONFIG_I2S=y

# Tone blocks come from a k_mem_slab + the kernel heap.
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_MAIN_STACK_SIZE=4096

# FIFO is fed by the CPU from a plain buffer -- keep the data path coherent on
# this M55 bench by disabling the D-cache (matches the other E8 bench apps).
CONFIG_DCACHE=n

# RAM console (no app UART on USB on this bench).
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
