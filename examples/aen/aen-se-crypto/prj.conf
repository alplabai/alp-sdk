#
# Bench RAM-run config for the E1M-AEN801 (M55-HE).  The app UART is NOT on
# USB on this bench, so the console is the RAM console (read 'ram_console_buf'
# over SWD).

# Tier-2 driver Kconfigs (incl. CONFIG_ARM_MHUV2 / CONFIG_HAS_ALIF_SE_SERVICES
# and the alp-sdk security backends) are gated under ALP_SDK.
CONFIG_ALP_SDK=y

# SE service transport.  CONFIG_ARM_MHUV2 builds the in-tree "arm,mhuv2" IPM
# driver (zephyr/drivers/ipm/ipm_arm_mhuv2.c) and pulls in CONFIG_IPM;
# CONFIG_HAS_ALIF_SE_SERVICES compiles the hal_alif SE client
# (se_services/zephyr/src/se_service.c) the SE-CryptoCell backend rides.
CONFIG_ARM_MHUV2=y
CONFIG_HAS_ALIF_SE_SERVICES=y

# SE-CryptoCell hardware-crypto backend for <alp/security.h>.  Registers at
# silicon_ref="alif:ensemble:e8" priority 110 (ahead of the "*" PSA backend).
# RNG/TRNG runs live through the public se_service_get_rnd_num(); SHA/AES-GCM
# need the generic send seam below.
CONFIG_ALP_SDK_SECURITY_SE_CRYPTOCELL=y

# The generic SE send-request transport seam DEFAULTS ON (Kconfig default y):
# the public send-request entry now exists (hal_alif patch 0002 exposes
# se_service_send_request), so by default the SE backend's SHA/AES-GCM ops
# compute on-silicon in the SE CryptoCell (bench-validated, Flow C RAM-run) --
# the SE backend binds at priority 110 ahead of PSA.  No override is needed here.
# The MbedTLS-PSA backend below is only the fall-through for algs the SE declines
# (SHA-384/512, over-ceiling single-shot inputs).  To force a PSA-only
# fall-through demo instead, uncomment the next line:
# CONFIG_ALP_SDK_SECURITY_SE_CRYPTOCELL_SEND_SEAM is not set

# MbedTLS-PSA backend, kept as the fall-through for SE-declined algs (the SE
# send seam is ON by default, so SHA-256/AES-GCM run in the SE CryptoCell) --
# proves the portable API contract end to end.  PSA picks the E8 crypto HW
# where MbedTLS's driver layer registers it.
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_PSA_CRYPTO_C=y
CONFIG_ALP_SDK_SECURITY=y

# PSA wants for the example's ops: SHA-256 (works) + AES-GCM AEAD (the GCM
# round-trip reported "no backend" because PSA AEAD/GCM + AES key type were
# not selected, so the alp PSA backend declined the open).
CONFIG_PSA_WANT_ALG_SHA_256=y
CONFIG_PSA_WANT_ALG_GCM=y
CONFIG_PSA_WANT_KEY_TYPE_AES=y

# MbedTLS-PSA software AES-GCM/SHA is stack- and heap-heavy; the default main
# stack overflows (bench USAGE FAULT: stack overflow). Give the main thread
# room and a PSA heap pool.
CONFIG_MAIN_STACK_SIZE=16384
CONFIG_HEAP_MEM_POOL_SIZE=16384

# RAM console (no app UART on USB on this bench).  Buffer bumped to 4096: this
# app dumps ~12 lines (per-test lines + digest/tag/rnd hexdumps + RESULT).
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=4096
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y

# Keep the image small + deterministic for a RAM-run.  LOG MUST stay off --
# CONFIG_LOG=y reroutes printk into the logging subsystem, which has no
# RAM-console backend, so the RESULT line never reaches 'ram_console_buf'.
CONFIG_LOG=n
