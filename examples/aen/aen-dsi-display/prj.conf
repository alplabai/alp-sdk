#
# Bench RAM-run config for the E1M-AEN801 (M55-HE) DSI-display app.  The app UART
# is NOT on USB on this bench, so the console is the RAM console (read
# 'ram_console_buf' over SWD).

# Tier-2 driver Kconfigs (CONFIG_DISPLAY_CDC200, CONFIG_MIPI_DSI_DW,
# CONFIG_MIPI_DPHY_DW) are gated under ALP_SDK.
CONFIG_ALP_SDK=y

# --- The C2-MIPI-DSI display chain ---------------------------------------
# D-PHY (TX role: dphy_dw_master_setup), the MIPI-DSI host, and the CDC200 DPI
# pixel pump.  All three drivers default y under DT_HAS_*_ENABLED once their
# nodes are okay (the overlay flips them).
CONFIG_MIPI_DPHY=y
CONFIG_MIPI_DSI=y
CONFIG_MIPI_DSI_DW=y
CONFIG_DISPLAY=y
CONFIG_DISPLAY_CDC200=y

# The Himax HX8394 panel controller (drivers/display/display_hx8394.c).  Its
# init runs the panel reset sequence + DSI attach at POST_KERNEL.  The Kconfig
# symbol is CONFIG_HX8394 (Kconfig.hx8394), NOT CONFIG_DISPLAY_HX8394.
CONFIG_HX8394=y

# --- Panel power/reset I2C GPIO expander ---------------------------------
# U35 = TI TCA6408A on I2C2 @0x21 (nxp,pca6408, driven by gpio_pca_series.c /
# DT_DRV_COMPAT nxp_pca6408).  Enable CONFIG_GPIO_PCA_SERIES.
CONFIG_I2C=y
CONFIG_GPIO=y
CONFIG_GPIO_PCA_SERIES=y

# --- SoM identity EEPROM (boot banner shows live SKU + hw-rev) ------------
# 24C128 manifest on I2C2 @0x50, mapped to portable bus alp-i2c0 (overlay).
# alp_hw_info_read() (called by the SDK banner) reads + CRC-checks the 128-byte
# manifest; on a blank/absent EEPROM it returns NOT_PROVISIONED and the banner
# falls back to CONFIG_BOARD -- never fatal.
CONFIG_ALP_SDK_HW_INFO=y
CONFIG_ALP_SDK_CHIP_EEPROM_24C128=y
CONFIG_ALP_SDK_HW_INFO_EEPROM_I2C_BUS_ID=0
CONFIG_ALP_SDK_HW_INFO_EEPROM_ADDR_7BIT=0x50

# --- RAM console (no app UART on USB on this bench) -----------------------
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y

# LOG MUST stay off on the RAM-console bench: CONFIG_LOG=y reroutes printk into
# the logging subsystem (no RAM-console backend), so output never lands in
# 'ram_console_buf'.
CONFIG_LOG=n

# The hx8394 panel driver allocates a small MIPI-DSI command scratch and the
# regulator/expander paths need a heap + a roomier main stack than the default.
CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_MAIN_STACK_SIZE=4096
