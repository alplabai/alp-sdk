# SPDX-License-Identifier: Apache-2.0
#
# aen-npu-inference -- FULL NPU inference on the E1M-AEN801 (Ensemble E8,
# M55-HE): a Vela-compiled int8 model through TFLM's MicroInterpreter onto the
# Ethos-U85 (256-MAC).  Bench RAM-run flow.

# --- TFLM + Ethos-U stack (mirrors samples/.../tflm_ethosu) -----------------

# TFLM is C++17.  MicroInterpreter / MicroMutableOpResolver are only exposed via
# the C++ surface, so the app's main is .cpp.
CONFIG_CPP=y
CONFIG_STD_CPP17=y

# Pull in the tflite-micro module (TENSORFLOW_LITE_MICRO) -- the MicroInterpreter,
# the op resolver, the reference kernels, and (because CONFIG_ETHOS_U is also set)
# the Ethos-U custom-op kernel tensorflow/lite/micro/kernels/ethos_u/ethosu.cc,
# whose Register_ETHOSU() -> ethosu_invoke_v3() dispatches onto the NPU.
CONFIG_TENSORFLOW_LITE_MICRO=y

# Arm Ethos-U core driver (hal/ethos_u module): ethosu_init / ethosu_invoke_v3 /
# the IRQ handler + the Zephyr glue (drivers/misc/ethos_u/ethos_u_arm.c, auto-
# instantiated for the arm,ethos-u node at POST_KERNEL).  ETHOS_U depends on
# MULTITHREADING (default y).
CONFIG_ETHOS_U=y

# NPU variant: the AE822 (E8) NPU is an Ethos-U85; pick the 256-MAC config so the
# core driver compiles ethosu_device_u85.c and Vela's ethos-u85-256 command
# stream matches the silicon.  This MUST agree with gen_model.py's
# --accelerator-config ethos-u85-256.
CONFIG_ETHOS_U85_256=y

# --- Heap / stack -----------------------------------------------------------

# TFLM + the Ethos-U Zephyr glue allocate from the system heap (the glue's
# mutex/semaphore objects via k_malloc; TFLM scratch).  Generous pool -- the
# tensor arena itself is a static SRAM0 buffer, NOT heap, so this only covers
# the runtime's bookkeeping.
CONFIG_HEAP_MEM_POOL_SIZE=65536

# MicroInterpreter::AllocateTensors + Invoke run on the main thread; give it
# headroom (the upstream sample uses an 8 KiB runner stack).
CONFIG_MAIN_STACK_SIZE=16384

# --- DMA correctness (the #1 bench risk) ------------------------------------

# The Ethos-U is a DMA master reading the model + arena out of SRAM0.  With the
# M55 data cache on, the CPU could leave the model/input dirty in cache (NPU
# reads stale memory) or read stale output the NPU wrote behind the cache.  The
# upstream driver guards this with clean/invalidate-by-address, but on this
# bench RAM-run we take the eth_dwmac approach and disable the D-cache outright
# so the NPU and CPU share a coherent view with no maintenance calls.  (Follow-up:
# re-enable DCACHE + add SCB_CleanDCache/InvalidateDCache around Invoke, like
# inference_process.cpp's DataPtr::clean()/invalidate(), once bench-proven.)
CONFIG_DCACHE=n

# --- Console ----------------------------------------------------------------
# Console: Alp UART console -- E1M edge UART0 (Alif UART5, P3_4/P3_5, 115200
# 8N1, NS16550), the E1M-AEN801 carrier console. The board _defconfig already
# selects it; we set it explicitly here so the example is self-describing.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
# Serial-less bench? Comment the four lines above and uncomment these to read
# 'ram_console_buf' over SWD instead:
# CONFIG_RAM_CONSOLE=y
# CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
# CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=y
# Logging OFF so the single RESULT line is not interleaved.
CONFIG_LOG=n

# printf with %f is not used; keep the image lean.
