#
# Bench RAM-run config for the UTIMER PWM register-readback validation
# (consumer-node / PWM_DT_SPEC_GET variant).
#
# Tier-1.5 alp-sdk driver Kconfigs are gated under CONFIG_ALP_SDK -- it must be
# set for pwm_alif_utimer.c (and its hal_alif alif_utimer_* library) to build in.
CONFIG_ALP_SDK=y

# Console: Alp UART console -- E1M edge UART0 (Alif UART5, P3_4/P3_5, 115200
# 8N1, NS16550), the E1M-AEN801 carrier console. The board _defconfig already
# selects it; we set it explicitly here so the example is self-describing.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
# Serial-less bench? Comment the four lines above and uncomment these to read
# 'ram_console_buf' over SWD instead:
# CONFIG_RAM_CONSOLE=y
# CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
# CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=y

# Driver under test: the Zephyr PWM class + the Alif UTIMER PWM driver.
# Do NOT set CONFIG_USE_ALIF_HAL_UTIMER here -- it is select-only; the driver
# selects it (and pulls in the hal_alif alif_utimer_* register library).
CONFIG_PWM=y

# The pwm-leds consumer node binds the Zephyr led_pwm driver; enable it so the
# `pwm-leds` node is instantiated (its `pwms` phandle is what PWM_DT_SPEC_GET
# resolves the controller device from).
CONFIG_LED=y
CONFIG_LED_PWM=y

# Keep logging off: the PASS gate uses printk + register readback, not log
# lines, so logging is not needed here and printk stays clean on the console.
CONFIG_LOG=n
