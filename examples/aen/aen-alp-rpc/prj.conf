# SPDX-License-Identifier: Apache-2.0
#
# aen-alp-rpc -- the bench-proven aen-rpc-pingpong transport (PR#205, 16/16
# PASS) driven through the portable <alp/rpc.h> surface instead of the raw
# ipc_service calls.  The Kconfig is identical to pingpong's: the alp_rpc
# Zephyr backend binds the very same ipc0 instance the pingpong example does
# (it resolves DT_CHOSEN(zephyr_ipc) and runs ipc_service_open_instance +
# ipc_service_register_endpoint behind alp_rpc_open()).
#
# Bench RAM-run: the app UART is NOT on USB on this bench, so the console is the
# RAM console (read 'ram_console_buf' over SWD).

# CONFIG_ALP_SDK turns on the alp-sdk module sources (the dispatcher in
# src/rpc_dispatch.c + the Zephyr backend in src/backends/rpc/zephyr_drv.c) and
# the Tier-2 driver Kconfigs (CONFIG_MBOX_ALIF_MHUV2 / CONFIG_ARM_MHUV2 /
# CONFIG_HAS_ALIF_SE_SERVICES).
CONFIG_ALP_SDK=y

# --- IPC / OpenAMP stack ---------------------------------------------------
# MBOX is the doorbell class; CONFIG_MBOX_ALIF_MHUV2 builds the Alif MHUv2 MBOX
# driver (zephyr/drivers/mbox/mbox_alif_mhuv2.c) for the ipc0 'mboxes'.
CONFIG_MBOX=y
CONFIG_MBOX_ALIF_MHUV2=y

# ipc_service + the OpenAMP RPMsg static-vrings backend.  alp_rpc's backend
# requires all three (zephyr_drv.c #errors otherwise) and the Kconfig
# (ALP_SDK_RPC: depends on IPC_SERVICE_BACKEND_RPMSG && OPENAMP) gates on them.
CONFIG_IPC_SERVICE=y
CONFIG_IPC_SERVICE_BACKEND_RPMSG=y
CONFIG_OPENAMP=y

# The framed-RPC body in src/backends/rpc/zephyr_drv.c.  default-y once
# IPC_SERVICE_BACKEND_RPMSG is set, but pin it so the build is self-describing.
CONFIG_ALP_SDK_RPC=y

# OpenAMP/libmetal need a heap for the rpmsg virtio allocations + the RX work
# queue.  Size generously for the RAM-run.
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# --- SE service (HP boots HE via se_service_boot_cpu) ----------------------
# CONFIG_ARM_MHUV2 builds the in-tree "arm,mhuv2" IPM driver
# (zephyr/drivers/ipm/ipm_arm_mhuv2.c) for the seservice0 transport;
# CONFIG_HAS_ALIF_SE_SERVICES compiles the hal_alif SE client.
CONFIG_ARM_MHUV2=y
CONFIG_HAS_ALIF_SE_SERVICES=y

# --- Console (no app UART on USB on this bench) ----------------------------
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=4096
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y

# Keep LOG off: CONFIG_LOG=y reroutes printk into the logging subsystem, which
# has no RAM-console backend on this bench, so the RESULT line never lands in
# 'ram_console_buf'.  alp_rpc's zephyr_drv.c uses LOG_* but those are compiled
# out cleanly at LOG=n.
CONFIG_LOG=n

# DCACHE off: the SRAM0 shared region is addressed identically by both cores and
# carries the vrings; running it cached would need explicit flush/invalidate the
# static-vrings backend doesn't do for this carve-out.  Matches the bench's
# eth/NPU SRAM0 precedent and the proven pingpong config.
CONFIG_DCACHE=n
CONFIG_IPC_SERVICE_BACKEND_RPMSG_SHMEM_RESET=y
