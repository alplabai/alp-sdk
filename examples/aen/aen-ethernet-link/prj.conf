#
# Bench RAM-run config for the E1M-AEN801 (M55-HE). The app UART is NOT on USB on
# this bench, so the console is the RAM console (read 'ram_console_buf' over SWD).

CONFIG_ALP_SDK=y

# Networking + Ethernet L2 + the alp-sdk Alif GMAC glue (CONFIG_ETH_DWMAC_ALIF
# selects the upstream eth_dwmac core). IPv4 on; no auto DHCP (no link on this
# bench until the PHY is powered, so a DHCP client would just spin).
CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_ETH_DWMAC_ALIF=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_UDP=y
CONFIG_NET_CONFIG_AUTO_INIT=n

# DEFINITIVE link proof: pull a DHCP lease off the bench switch (dnsmasq,
# 192.168.10.50-150). A lease requires a genuine bidirectional link.
CONFIG_NET_DHCPV4=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
# DHCP needs sys_rand_get (transaction IDs); no HW RNG wired -> timer PRNG
# (TEST_RANDOM_GENERATOR enables the non-crypto choice; bench link test only).
CONFIG_TEST_RANDOM_GENERATOR=y
CONFIG_NET_PKT_RX_COUNT=8
CONFIG_NET_PKT_TX_COUNT=8
CONFIG_NET_BUF_RX_COUNT=16
CONFIG_NET_BUF_TX_COUNT=16

# Per-interface RX byte stats (a secondary proof; fixed-link masks carrier).
CONFIG_NET_STATISTICS=y
CONFIG_NET_STATISTICS_PER_INTERFACE=y

# GPIO for the PHY power-down (P15_4 lpgpio) + reset (P11_6 gpio11) lines.
CONFIG_GPIO=y

CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=16384

# eth_dwmac uses DMA descriptor rings -- keep the data path coherent on the M55.
CONFIG_DCACHE=n

# RAM console (no app UART on USB on this bench).
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
