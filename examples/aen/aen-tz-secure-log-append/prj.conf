# Single-core TrustZone-M enforced append. Beacon-driven; RAM console fallback.
# ITCM-linked by the board overlay for a non-destructive Flow C RAM-run. To
# SES-boot it via Flow D instead, drop the boards/*.overlay and add
# CONFIG_USE_DT_CODE_PARTITION=y (reset vector then links into slot0, 0x8001xxxx).
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=1024
CONFIG_UART_CONSOLE=n
CONFIG_ARM_MPU=n
