# board.yaml -- per-app project configuration for the
# edgeai-vision-aen reference application.
#
# Customer workflow: copy this directory, change `som.sku` to
# your AEN MPN, edit `preset:` if you fork the EVK, and
# `west build`.  CMakeLists.txt invokes scripts/alp_project.py
# at configure time and layers the generated alp.conf over
# prj.conf via OVERLAY_CONFIG.

schemaVersion: 1
som:
  sku: E1M-AEN801          # Alif Ensemble E8 (the lead AEN part) -- carries
                            # a pair of Ethos-U55s (vision) + an Ethos-U85
                            # (generative) this example dispatches inference
                            # to, plus the on-die VeriSilicon ISP Pico
                            # (vsi,isp-pico) + JPEG encoder.

preset: e1m-evk            # Forks the EVK preset.  lsm6dso + ssd1306 are
                           # NOT soldered on the EVK -- this demo attaches
                           # them to the I2C0 header and declares them in the
                           # `chips:` array below.  It also adds an encoder-
                           # switch trigger (GPIO) + an RGB-red status LED
                           # (the PWM3 pad as a GPIO) from the routes below.

# E1M pads this app uses (subset of the EVK preset's `e1m_routes:`).
pins:
  - { e1m: E1M_I2C0,      macro: EVK_I2C_BUS_SENSORS, doc: "Shared sensor + IO-expander bus (LSM6DSO + SSD1306)" }
  - { e1m: E1M_GPIO_IO4,  macro: EVK_PIN_ENCODER_SW,  doc: "Rotary encoder push switch (trigger), active-low" }
  - { e1m: E1M_GPIO_PWM3, macro: EVK_PIN_LED_RED,     doc: "RGB LED red (status indicator) -- the PWM3 pad opened as a digital GPIO via the EVK_PIN_LED_RED macro" }

# Single-OS app: the M55-HP core runs the vision pipeline + dispatches
# to the NPU bonded to it via topology.  M55-HE keeps the SoM
# topology default (stock-shim Zephyr image) so the peer-NPU stays
# powered for fallback.  The A32 cluster on E8 is not used here;
# defaults Linux on for A-cores so opt-out explicitly via `os: off`.
cores:
  a32_cluster:
    os: "off"
  m55_hp:
    app: ./src
    inference:
      default_arena_kib: 256   # AEN's Ethos-U dispatcher is wired in
                                # automatically from the SoM preset's
                                # `capabilities:` block; the customer
                                # only tunes the per-model arena size.
                                # Vela-compiled .tflite picks up the
                                # on-die NPU at alp_inference_open time.

# External parts this demo attaches to the EVK's I2C0 header (the EVK
# solders neither): a 6-axis IMU + a 128x64 mono OLED for status text.
# Listing them here flips on their chip drivers independently of the
# board's `populated:` block.
chips:
  - lsm6dso                # 6-axis IMU (I2C) -- plug-in module.
  - ssd1306                # 128x64 mono OLED (I2C) -- plug-in module.

diagnostics:
  log_level: info
