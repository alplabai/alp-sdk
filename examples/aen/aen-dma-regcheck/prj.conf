#
# Bench config for the DMA regcheck on the E1M-AEN801 (M55-HE).  The console is
# the E1M edge UART0 (Alif UART5, P3_4/P3_5, 115200 8N1); serial-less benches
# can fall back to the RAM console (see the console block below).

# DMA subsystem + the UPSTREAM ARM PL330 driver.  CONFIG_DMA makes the dma_*
# class available; CONFIG_DMA_PL330 is `default y if DT_HAS_ARM_DMA_PL330_ENABLED`
# (drivers/dma/Kconfig.dma_pl330) so the upstream dma_pl330.c TU builds in once
# the dma2 node is enabled by the board overlay.  ADR 0017 Tier-1 -- pure
# upstream, no ALP_SDK gating needed for the driver itself.
CONFIG_DMA=y
CONFIG_DMA_PL330=y

# 32-bit address path: the M55 + the PL330 register set are 32-bit, and the
# buffers/microcode live in the 32-bit-addressable global SRAM0 window.  Leave
# CONFIG_DMA_64BIT off (its default) so the driver does NOT require a
# `control_regs` reg-by-name on the node (that 36-bit AXI-add-control window is
# not declared here).
# CONFIG_DMA_64BIT is not set

# Coherency: the PL330 AXI master and the M55 must share ONE view of the SRAM0
# buffers + microcode with no cache maintenance.  CONFIG_DCACHE=n matches the
# eth_dwmac / NPU DMA-buffers-in-SRAM0 finding (the upstream PL330 driver issues
# no cache clean/invalidate around the transfer).
CONFIG_DCACHE=n

# Console: Alp UART console -- E1M edge UART0 (Alif UART5, P3_4/P3_5, 115200
# 8N1, NS16550), the E1M-AEN801 carrier console. The board _defconfig already
# selects it; we set it explicitly here so the example is self-describing.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
# Serial-less bench? Comment the four lines above and uncomment these to read
# 'ram_console_buf' over SWD instead:
# CONFIG_RAM_CONSOLE=y
# CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
# CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=y

# Keep the image small + deterministic for a RAM-run.
CONFIG_LOG=n
