#
# native_sim portability gate (build_only).  prj.conf turns on the bench RAM
# console (a real-silicon, no-USB-UART artifact); on native_sim CONFIG_RAM_CONSOLE
# pulls a picolibc stdout hook (__stdout_hook_install) that the native console
# does not provide, so the link fails with an undefined reference.  Use the native
# console here instead -- the only point of the native_sim build is that the
# portable <alp/dac.h> + <alp/adc.h> source compiles + links off-target.
CONFIG_RAM_CONSOLE=n
CONFIG_UART_CONSOLE=y
