#
# Board-scoped Kconfig default for aen-analog-validate on the E1M-AEN801
# (M55-HE).  Zephyr auto-applies boards/<board>.conf by the FULLY-QUALIFIED
# board id, not the bare board name -- on the customer build (`west build -b
# alp_e1m_aen801_m55_he/ae822fa0e5597ls0/rtss_he`) only a .conf named after
# that full id lands.  The application-level analog of a board
# Kconfig.defconfig default: it applies only when this example is built for
# alp_e1m_aen801_m55_he/ae822fa0e5597ls0/rtss_he, and the user can still
# override it on the command line.
#
# CONFIG_DCACHE=n: the bench RAM-run flow loads the image into ITCM/TCM over
# J-Link and runs without cache maintenance.  The analog converters are MMIO and
# the loopback is a short single-shot, so a data cache buys nothing here; leaving
# it off keeps the RAM-run deterministic and matches the other E8 bench apps
# (aen-npu-inference-alif, aen-ethernet-link).  It is a DEFAULT, not a hard
# requirement -- a flashed (non-RAM-run) build can re-enable it.
CONFIG_DCACHE=n
