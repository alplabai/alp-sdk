#
# Bench RAM-run config for the E1M-AEN801 (M55-HE). The app UART is NOT on USB on
# this bench, so the console is the RAM console (read 'ram_console_buf' over SWD).

# Tier-2 driver Kconfigs (CONFIG_DAC_ALIF + CONFIG_ADC_ALIF) are gated under
# ALP_SDK.
CONFIG_ALP_SDK=y

# DAC subsystem + the Alif "alif,dac" driver. CONFIG_DAC_ALIF is `default y` once
# the dac node is enabled (DT_HAS_ALIF_DAC_ENABLED); it `select`s PINCTRL and
# USE_ALIF_HAL_ANALOG (the hal_alif analog_ctrl VREF library, shared with ADC)
# itself. Do NOT assign select-only / USE_ALIF_HAL_* symbols.
CONFIG_DAC=y

# ADC subsystem + the Alif "alif,adc" driver. CONFIG_ADC_ALIF is `default y` once
# the adc node is enabled (DT_HAS_ALIF_ADC_ENABLED); it shares the same
# USE_ALIF_HAL_ANALOG VREF library.
CONFIG_ADC=y

# This app drives the RAW Zephyr DAC + ADC APIs directly (no <alp/*> dispatcher),
# exactly like aen-dac-regcheck / aen-adc-regcheck.
#
# Turn OFF the alp <alp/adc.h> dispatcher: CONFIG_ALP_SDK_PERIPH_ADC is
# `default y if ADC`, and its iterable backend section (.alp_backends_adc) needs
# a board.yaml-gated SoC backend (src/backends/adc/alif_e8.c, gated on
# CONFIG_ALP_SOC_ALIF_ENSEMBLE_E8). With no backend the dispatcher fails to link.
# (The DAC dispatcher compiles unconditionally with a non-empty portable backend,
# so there is no equivalent DAC symbol to gate -- see aen-dac-regcheck/prj.conf.)
CONFIG_ALP_SDK_PERIPH_ADC=n

# RAM console (no app UART on USB on this bench).
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y

# Keep the image small + deterministic for a RAM-run. LOG MUST stay off --
# CONFIG_LOG=y reroutes printk into the logging subsystem, which has no
# RAM-console backend, so the RESULT line never reaches 'ram_console_buf'.
CONFIG_LOG=n
