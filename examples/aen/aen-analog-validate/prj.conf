#
# Bench RAM-run config for the E1M-AEN801 (M55-HE). Console is the Alp UART
# console on the E1M edge UART0 (see the console block below).
#
# CONFIG_ALP_SDK + CONFIG_ADC + CONFIG_ALP_SOC_ALIF_ENSEMBLE_E8 come from
# board.yaml via scripts/alp_project.py (layered in by CMakeLists.txt). This file
# only carries what the board.yaml schema can't express.

# DAC subsystem + the Alif "alif,dac" driver. The board.yaml peripherals enum
# carries only `adc` for the analog-converter family (no `dac` token), so the DAC
# subsystem is turned on here. CONFIG_DAC_ALIF is `default y` once the dac node is
# enabled (DT_HAS_ALIF_DAC_ENABLED); it `select`s PINCTRL + USE_ALIF_HAL_ANALOG
# (the hal_alif analog_ctrl VREF library, shared with ADC) itself. Do NOT assign
# select-only / USE_ALIF_HAL_* symbols.
CONFIG_DAC=y

# Drive the loopback through the SoM-portable <alp/dac.h> + <alp/adc.h> surface
# (NOT the raw Zephyr API). Both dispatchers link here:
#   - The DAC dispatcher + its portable backend (src/backends/dac/zephyr_drv.c)
#     compile unconditionally (zephyr/CMakeLists.txt), so .alp_backends_dac is
#     always non-empty.
#   - The ADC dispatcher (CONFIG_ALP_SDK_PERIPH_ADC, `default y if ADC`) links
#     because the E8 ADC backend (src/backends/adc/alif_e8.c) is gated on
#     CONFIG_ALP_SOC_ALIF_ENSEMBLE_E8 -- which board.yaml sets via the E1M-AEN801
#     SKU -- so .alp_backends_adc is non-empty. (Unlike aen-adc-regcheck, which is
#     a plain prj.conf app with no SoC backend and so must set this OFF.)
# Both are left at their defaults; listed here only as documentation.

# Console: Alp UART console -- E1M edge UART0 (Alif UART5, P3_4/P3_5, 115200
# 8N1, NS16550), the E1M-AEN801 carrier console. The board _defconfig already
# selects it; we set it explicitly here so the example is self-describing.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
# Serial-less bench? Comment the four lines above and uncomment these to read
# 'ram_console_buf' over SWD instead:
# CONFIG_RAM_CONSOLE=y
# CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
# CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=y

# Keep the image small + deterministic for this bench run.
CONFIG_LOG=n

# Bench: a dep selects LOG (overriding LOG=n); use minimal mode so it routes
# through printk to the console synchronously (deferred log adds buffering).
CONFIG_LOG_MODE_MINIMAL=y
