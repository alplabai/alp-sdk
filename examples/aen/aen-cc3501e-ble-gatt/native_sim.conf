#
# native_sim overlay, layered in via the testcase.yaml
# `extra_args: EXTRA_CONF_FILE=native_sim.conf` so it applies AFTER the
# generated alp.conf (a boards/*.conf is applied BEFORE EXTRA_CONF_FILE and
# therefore cannot override the generated console -- this file can; same
# mechanism audio-noise-suppression uses to override generated CONFIG_I2S).
#
# board.yaml sets `diagnostics.console: ram` (the bench RAM console, a
# real-silicon / no-USB-UART artifact). On native_sim CONFIG_RAM_CONSOLE
# pulls picolibc's __stdout_hook_install, which the native/host console does
# not provide, so the link fails with an undefined reference. Use the native
# UART console off-target -- the only point of this build_only scenario is
# that the portable <alp/ble.h> GATT-server path compiles + links.
CONFIG_RAM_CONSOLE=n
CONFIG_UART_CONSOLE=y
