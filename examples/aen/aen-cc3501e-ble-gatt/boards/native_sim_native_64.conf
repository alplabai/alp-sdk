#
# native_sim has no real SPI controller; pull in the emul SPI driver so
# the alp-spi1 bus enumerates at boot.  Auto-loaded by Zephyr when
# building for native_sim/native/64.  (On the real AEN board the alp-spi1
# alias resolves to the dwc-ssi SPI1 controller instead -- see
# boards/alp_e1m_aen801_m55_he.overlay.)

CONFIG_EMUL=y
CONFIG_SPI_EMUL=y

# NB: the native_sim RAM-console override is NOT here -- a boards/*.conf is
# applied BEFORE EXTRA_CONF_FILE (the generated alp.conf, which sets
# CONFIG_RAM_CONSOLE=y from board.yaml), so it cannot win. The console
# override lives in ../native_sim.conf, layered AFTER alp.conf via the
# testcase.yaml `extra_args: EXTRA_CONF_FILE=native_sim.conf`.
