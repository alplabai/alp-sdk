#
# native_sim has no real SPI controller; pull in the emul SPI driver so
# the alp-spi1 bus enumerates at boot.  Auto-loaded by Zephyr when
# building for native_sim/native/64.  (On the real AEN board the alp-spi1
# alias resolves to the dwc-ssi SPI1 controller instead -- see
# boards/alp_e1m_aen801_m55_he.overlay.)

CONFIG_EMUL=y
CONFIG_SPI_EMUL=y

# board.yaml sets `diagnostics.console: ram` (the bench RAM console, a
# real-silicon/no-USB-UART artifact -- see board.yaml). On native_sim
# CONFIG_RAM_CONSOLE pulls a picolibc stdout hook (__stdout_hook_install)
# that the native console does not provide, so the link fails with an
# undefined reference (same root cause + fix as aen-analog-validate's
# boards/native_sim_native_64.conf). Use the native console here instead --
# the only point of this native_sim build is that the portable <alp/ble.h>
# GATT-server path compiles + links off-target.
CONFIG_RAM_CONSOLE=n
CONFIG_UART_CONSOLE=y
