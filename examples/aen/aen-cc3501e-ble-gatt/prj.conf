#
# CONFIG_SPI / CONFIG_GPIO / CONFIG_ALP_SDK_BLE_CC3501E are pulled in from
# board.yaml's `peripherals:` / `cores.m55_he.iot.ble:` blocks (via the
# generated alp.conf); this file carries only what board.yaml can't express.
CONFIG_PRINTK=y
CONFIG_LOG=y

# The bench proof issues a handful of BLE calls + a couple of gatt buffers;
# no sockets/DMA-stream scratch like the companion-tour, so the default
# tour-sized stack is generous headroom, not a tuned minimum.
CONFIG_MAIN_STACK_SIZE=4096

# Link the app at the HE MRAM app partition (0x80010000) so its vector table
# matches the ATOC load address (app-zephyr-he.json mramAddress=0x80010000).
# FLASH_BASE is the full MRAM (0x80000000); without this 0x10000 offset the
# image links at 0x80000000 and the SES boots it 64 KB low -> fault/no-boot.
CONFIG_FLASH_LOAD_OFFSET=0x10000
