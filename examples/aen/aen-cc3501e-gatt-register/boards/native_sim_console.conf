#
# native_sim override for board.yaml's `diagnostics.console: ram` -- appended
# to EXTRA_CONF_FILE (see CMakeLists.txt) AFTER the generated alp.conf so it
# wins the merge, unlike boards/native_sim_native_64.conf (which Zephyr's own
# board-conf auto-discovery merges BEFORE alp.conf and would just get
# overridden right back to CONFIG_RAM_CONSOLE=y).
#
# native_sim genuinely cannot BUILD CONFIG_RAM_CONSOLE: Zephyr's
# drivers/console/ram_console.c unconditionally calls __stdout_hook_install(),
# and that symbol is only ever DEFINED by a libc integration layer gated
# `depends on !(NATIVE_LIBRARY && EXTERNAL_LIBC)` (lib/libc/Kconfig
# CONFIG_STDOUT_CONSOLE) -- native_sim always selects BOTH NATIVE_LIBRARY and
# EXTERNAL_LIBC, so that guard is always false and the symbol never exists,
# failing the link with "undefined reference to `__stdout_hook_install'".
# The real bench rig has no UART wired to USB, so the RAM console is correct
# there; this file only swaps it back to the native console for the
# native_sim build-only smoke target.
CONFIG_RAM_CONSOLE=n
CONFIG_UART_CONSOLE=y
