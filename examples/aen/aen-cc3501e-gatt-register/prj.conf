#
# CONFIG_SPI / CONFIG_GPIO come from board.yaml's `peripherals:` block (via
# the generated alp.conf); CONFIG_RAM_CONSOLE + friends come from
# `diagnostics.console: ram` in the same file -- this file only carries what
# board.yaml has no knob for.
CONFIG_PRINTK=y
CONFIG_LOG=y

# The bench check does a handful of driver scratch buffers (GATT descriptor
# encode + the advertising payload) on the main thread; a generous stack
# keeps them comfortable.
CONFIG_MAIN_STACK_SIZE=4096

# Link the app at the HE MRAM app partition (0x80010000) so its vector table
# matches the ATOC load address (app-zephyr-he.json mramAddress=0x80010000).
# FLASH_BASE is the full MRAM (0x80000000); without this 0x10000 offset the
# image links at 0x80000000 and the SES boots it 64 KB low -> fault/no-boot.
CONFIG_FLASH_LOAD_OFFSET=0x10000
