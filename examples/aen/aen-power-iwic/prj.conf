#
# Stage-B PM deep-sleep (suspend-to-idle / IWIC) for the E1M-AEN801 (Alif
# Ensemble E8, M55-HE), bench RAM-run via J-Link.  Unlike the peripheral
# examples (which now default to the Alp UART console), the PM apps deliberately
# keep the RAM console: console output must survive the deep-sleep/WFI path
# (a UART mid-suspend can gate its clock and drop bytes), so it is retargeted to
# a RAM buffer the human reads over SWD (mem8 of 'ram_console_buf') and decodes.

# --- RAM console (read 'ram_console_buf' over SWD) ---------------------------
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=4096
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_SERIAL=n
CONFIG_PRINTK=y

# --- Stage-B: bring up CONFIG_PM over the pinned tree ------------------------
# Pinned upstream Zephyr 4.4.0's Alif E8 SoC does NOT `select HAS_PM` and ships
# no pm_state_set (only the alifsemi/zephyr_alif fork's soc/alif/common/rtss/
# power.c does), so `config PM` (subsys/pm/Kconfig: depends on SYS_CLOCK_EXISTS
# && HAS_PM) was unreachable AND unlinkable.  This app closes BOTH halves at the
# app level with NO edit to upstream zephyr/:
#   - Kconfig (this app) `select HAS_PM`  -> makes `config PM` reachable;
#   - src/alif_pm_iwic.c defines pm_state_set()/pm_state_exit_post_ops() -> PM links;
#   - the board overlay enables the suspend_idle power-state + cpu-power-states.
CONFIG_PM=y

# Device PM is not needed for the CPU-only suspend-to-idle path and would pull in
# per-device suspend/resume the bench peripherals don't implement; keep it off.
CONFIG_PM_DEVICE=n

# SysTick is the M55 system clock (CONFIG_CORTEX_M_SYSTICK default y) and the
# wake source for the deep IWIC sleep.  SysTick is architectural exception #15,
# NOT an NVIC IRQ, so it is unaffected by the IWIC "interrupts 0-63 only" wake
# range -- it always wakes the WFI inside pm_state_set().  Tickless lets the
# kernel program SysTick to the next timeout before the PM idle, so the policy
# sees a real idle window and selects suspend-to-idle, and the wake k_timer
# still fires.
CONFIG_TICKLESS_KERNEL=y

# Keep the image small + deterministic for a RAM-run.  LOG MUST stay off --
# CONFIG_LOG=y reroutes printk into the logging subsystem, which has no
# RAM-console backend, so the RESULT line never reaches 'ram_console_buf'.
CONFIG_LOG=n
