CONFIG_PRINTK=y
CONFIG_LOG=y

# Link the app at the HE MRAM app partition (0x80010000) so its vector table
# matches the ATOC load address (app-zephyr-he.json mramAddress=0x80010000).
# FLASH_BASE is the full MRAM (0x80000000); without this 0x10000 offset the
# image links at 0x80000000 and the SES boots it 64 KB low -> fault/no-boot.
# Same mechanism as the aen-cc3501e-* examples (see their prj.conf) -- this
# app is a flashed SES/slot0 target, not an ITCM RAM-run.
CONFIG_FLASH_LOAD_OFFSET=0x10000
