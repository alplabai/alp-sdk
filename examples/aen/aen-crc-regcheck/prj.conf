#
# Bench config for the CRC-engine RAM-run on the E1M-AEN801 (Alif Ensemble E8).
#
# The app console UART is NOT wired to USB on this bench (the only FT232R is the
# SE-UART), so we retarget the console to a RAM buffer that the human reads over
# J-Link (mem8 of the 'ram_console_buf' symbol) and ASCII-decodes.  The board
# _defconfig forces CONFIG_UART_CONSOLE=y / CONFIG_UART_NS16550=y for UART5;
# override that here.

# --- RAM console (read 'ram_console_buf' over SWD) ---------------------------
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_SERIAL=n
CONFIG_PRINTK=y

# --- CRC engine --------------------------------------------------------------
# CONFIG_CRC_ALIF (the clean-room driver) is `default y` under `if ALP_SDK` once
# the okay'd "alif,crc" node (crc0@48107000) exists, so ALP_SDK MUST be on to
# surface it; CRC_DRIVER pulls in the Zephyr CRC subsystem the driver registers
# against (and provides CONFIG_CRC_DRIVER_INIT_PRIORITY / *_LOG_LEVEL).
CONFIG_ALP_SDK=y
CONFIG_CRC_DRIVER=y

# Keep the image small + deterministic for a RAM-run.  Note: LOG MUST stay off
# -- CONFIG_LOG=y reroutes printk into the logging subsystem, which has no
# RAM-console backend, so the RESULT line never reaches 'ram_console_buf'.
CONFIG_LOG=n
