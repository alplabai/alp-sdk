#
# Bench RAM-run config for the E1M-AEN801 (M55-HE). The app UART is NOT on USB on
# this bench, so the console is the RAM console (read 'ram_console_buf' over SWD).

# Tier-2 driver Kconfigs (incl. CONFIG_ADC_ALIF) are gated under ALP_SDK.
CONFIG_ALP_SDK=y

# ADC subsystem + the Alif "alif,adc" driver. CONFIG_ADC_ALIF is `default y` once
# the adc node is enabled (DT_HAS_ALIF_ADC_ENABLED); it `select`s PINCTRL and
# USE_ALIF_HAL_ANALOG (the hal_alif analog_ctrl VREF library) itself -- so we only
# need to turn on the ADC API here. Do NOT assign select-only / USE_ALIF_HAL_*
# symbols; the driver handles its own selects.
CONFIG_ADC=y

# This bench app drives the RAW Zephyr ADC API (adc_channel_setup / adc_read) to
# exercise the driver directly -- exactly like aen-spi-regcheck. So turn OFF the
# alp <alp/adc.h> dispatcher: CONFIG_ALP_SDK_PERIPH_ADC is `default y if ADC`, and
# its iterable backend section (.alp_backends_adc) needs a registered backend
# (src/backends/adc/alif_e8.c, gated on CONFIG_ALP_SOC_ALIF_ENSEMBLE_E8 -- set by
# the alp_project.py board.yaml path, NOT by a plain prj.conf). With no backend
# the linker has no __start_/__stop_alp_backends_adc symbols and the dispatcher
# fails to link. The portable wrapper is validated via the alp_project.py path,
# not here.
CONFIG_ALP_SDK_PERIPH_ADC=n

# RAM console (no app UART on USB on this bench).
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y

# Keep the image small + deterministic for a RAM-run. LOG MUST stay off --
# CONFIG_LOG=y reroutes printk into the logging subsystem, which has no
# RAM-console backend, so the RESULT line never reaches 'ram_console_buf'.
CONFIG_LOG=n
