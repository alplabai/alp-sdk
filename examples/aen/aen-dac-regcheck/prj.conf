#
# Bench RAM-run config for the E1M-AEN801 (M55-HE). The app UART is NOT on USB on
# this bench, so the console is the RAM console (read 'ram_console_buf' over SWD).

# Tier-2 driver Kconfigs (incl. CONFIG_DAC_ALIF) are gated under ALP_SDK.
CONFIG_ALP_SDK=y

# DAC subsystem + the Alif "alif,dac" driver. CONFIG_DAC_ALIF is `default y` once
# the dac node is enabled (DT_HAS_ALIF_DAC_ENABLED); it `select`s PINCTRL and
# USE_ALIF_HAL_ANALOG (the hal_alif analog_ctrl VREF library, shared with ADC)
# itself -- so we only need to turn on the DAC API here. Do NOT assign
# select-only / USE_ALIF_HAL_* symbols; the driver handles its own selects.
CONFIG_DAC=y

# This bench app drives the RAW Zephyr DAC API (dac_channel_setup /
# dac_write_value) to exercise the driver directly -- exactly like
# aen-adc-regcheck drives the raw ADC API.
#
# NOTE (vs aen-adc-regcheck): the ADC example had to set
# CONFIG_ALP_SDK_PERIPH_ADC=n because the ADC dispatcher's backend section
# (.alp_backends_adc) is empty without a board.yaml-gated SoC backend and fails
# to link. The DAC path does NOT have that problem -- the DAC dispatcher
# (src/dac_dispatch.c) AND the portable backend (src/backends/dac/zephyr_drv.c)
# both compile UNCONDITIONALLY (see zephyr/CMakeLists.txt), so .alp_backends_dac
# is always non-empty and the dispatcher always links. There is also no
# CONFIG_ALP_SDK_PERIPH_DAC symbol to gate. So nothing to turn off here; this app
# just doesn't call the <alp/dac.h> surface (it uses the raw Zephyr DAC API).

# RAM console (no app UART on USB on this bench).
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y

# Keep the image small + deterministic for a RAM-run. LOG MUST stay off --
# CONFIG_LOG=y reroutes printk into the logging subsystem, which has no
# RAM-console backend, so the RESULT line never reaches 'ram_console_buf'.
CONFIG_LOG=n
