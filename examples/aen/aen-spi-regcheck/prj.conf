#
# Bench RAM-run config for the E1M-AEN801 (M55-HE). The app UART is NOT on USB on
# this bench, so the console is the RAM console (read 'ram_console_buf' over SWD).

# Tier-1.5 driver Kconfigs (incl. CONFIG_SPI_DW_ALIF) are gated under ALP_SDK.
CONFIG_ALP_SDK=y

# SPI subsystem + the Alif DWC_ssi driver. CONFIG_SPI_DW_ALIF is `default y` once
# the spi0 node is enabled (DT_HAS_ALIF_DWC_SSI_SPI_ENABLED) and `select`s PINCTRL
# itself -- so we only need to turn on the SPI API here. Do NOT assign
# select-only / USE_ALIF_HAL_* symbols; the driver handles its own selects.
CONFIG_SPI=y

# RAM console (no app UART on USB on this bench).
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=2048
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
