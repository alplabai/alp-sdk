# board.yaml -- AI camera viewer demo.
#
# OV5640 camera -> <alp/camera.h> frames -> TFLM person-detect
# (Ethos-U dispatch on AEN) -> LVGL UI rendering the captured
# preview + bounding boxes + per-frame inference latency.
#
# The headline marketing demo: shows the full edge-AI stack end
# to end on a single SoM, with the right NPU resolved by the
# §D.lib.loader from the SKU's `capabilities:` block.
som:
  sku: E1M-AEN701           # E7 -- two Ethos-U55s; the SoM `capabilities:`
                             # block (ethos_u55_count: 2) drives
                             # CONFIG_ALP_SDK_INFERENCE_ETHOS_U=y +
                             # CONFIG_ALP_TFLM_ETHOS_U55=y automatically.

preset: e1m-evk

# E1M pads this app uses (subset of the EVK preset's `e1m_routes:`).
pins:
  - E1M_I2C0
  - E1M_SPI1
cores:
  a32_cluster:
    os: "off"
  m55_hp:
    app: ./src
    libraries:
      - lvgl
      - tflite_micro
    # Inference dispatcher set is driven by the SoM preset's
    # `capabilities:` block, not by board.yaml:
    #   AEN701  -> CONFIG_ALP_SDK_INFERENCE_ETHOS_U=y + ETHOS_U55=y
    #   AEN401  -> ETHOS_U=y + ETHOS_U55=y + ETHOS_U85=y
    #   AEN801  -> same as AEN401
    #   NX9101  -> ETHOS_U=y + ETHOS_U65=y
    # Customers swap the `som.sku` line to compare U85 vs U55 dispatch
    # without touching the app source.  arena_kib is the only knob.
    inference:
      default_arena_kib: 256
    peripherals:
      - i2c                  # Camera SCCB.
      - spi                  # Display.
      - gpio                 # Camera ancillaries + display D/C#.

chips:
  - ov5640                   # 5 MP camera.
  - st7789                   # 240x320 TFT.

diagnostics:
  log_level: info
