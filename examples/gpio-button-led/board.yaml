# board.yaml -- per-app project configuration for the
# gpio-button-led example.
#
# === The customer workflow this example demonstrates ===
#
#   1. Copy this file (and the rest of examples/gpio-button-led/)
#      to your own app directory.
#   2. Change `som.sku` to your MPN.  Stock SoM presets live at
#      metadata/e1m_modules/<MPN>/som.yaml; the SDK ships one
#      for every released MPN.
#   3. Change `carrier.name` if your board is not the EVK.  For
#      custom carriers, list every populated chip-driver in
#      `populated:` -- each `true` enables the matching
#      CONFIG_ALP_SDK_CHIP_<NAME>=y.
#   4. Build with `west build`.  The example's CMakeLists.txt
#      invokes scripts/alp_project.py at configure time and the
#      generated build/generated/alp.conf is rsource'd from
#      prj.conf -- no hand-edited Kconfig.
#
# Validated against metadata/schemas/board-config-v1.schema.json;
# documented in docs/board-config.md.

schema_version: 1

som:
  sku: E1M-AEN701          # Alif Ensemble E7 SoM

carrier:
  name: E1M-EVK            # 35x35 EVK -- reference carrier
  populated:
    button_led: true       # GPIO button + LED helper used by main.c

os: zephyr

diagnostics:
  log_level: info
