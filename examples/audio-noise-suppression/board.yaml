# board.yaml -- per-app project configuration for the
# audio-noise-suppression example.
#
# Real-time mic-in -> DSP preprocess -> small AI denoiser ->
# clean speaker-out at ~10 ms end-to-end latency.  Targets the
# headset / hearable / conferencing market: the V2N (and V2H,
# same source via SKU flip) supervisor M33 owns the audio loop,
# the spectral work routes through the GD32G553 bridge's FFT/FAC
# blocks, and the denoiser CNN dispatches via TFLM (DEEPX DX-M1
# on V2N-M1, or the Renesas DRP-AI3 path on V2H once the §D.lib
# loader resolves a HW backend).
#
# Customer workflow: copy this directory, change `som.sku` to
# your V2N / V2H MPN, edit `carrier.name` if you're on a custom
# board, and `west build`.  CMakeLists.txt invokes
# scripts/alp_project.py at configure time + layers the
# generated alp.conf over prj.conf via OVERLAY_CONFIG.

schema_version: 2

som:
  sku: E1M-V2N101            # RZ/V2N supervisor; same source builds
                              # against V2H-class SKUs via SKU flip.

carrier:
  name: E1M-EVK
  # The EVK already routes I2S0 to the TAS2563 codec (mic-in over
  # the codec's PDM port + line/speaker out on the same chip).
  populated:
    tas2563: true

# This demo stays on the M33-SM for deterministic audio cadence.
# V2N's A55 cluster could host the Linux audio plumbing on top,
# but the latency budget belongs on the M33.  Opt the A55 cluster
# off here.
cores:
  a55_cluster:
    os: "off"
  m33_sm:
    os: zephyr
    app: ./src
    # Inference dispatcher set comes from the SoM preset's
    # `capabilities:` -- on V2M101 DEEPX + DRPAI both compile in,
    # on V2N101 only DRPAI, with TFLM CPU fallback always present.
    # Apps pick per-handle at runtime via alp_inference_open(.backend=...).
    inference:
      default_arena_kib: 96   # ~50k-param RNNoise-style denoiser.
    # Library set: tflite_micro carries the universal NPU dispatch +
    # the CPU fallback kernels; cmsis_dsp covers the on-host
    # preprocess (FFT/notch/window) when the GD32 bridge isn't
    # available (native_sim, or V2H once it gets a similar bridge).
    libraries:
      - tflite_micro
      - cmsis_dsp
    # I2S is the audio data bus for the TAS2563 codec on the EVK.
    # The codec handles both mic-in (its on-chip PDM-to-I2S receiver)
    # and speaker-out on the same I2S link, so we only need the one
    # peripheral here.
    peripherals:
      - i2s

diagnostics:
  log_level: info
