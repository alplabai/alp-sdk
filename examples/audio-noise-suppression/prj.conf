CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=131072

CONFIG_LOG=y
CONFIG_LOG_PRINTK=y

CONFIG_CBPRINTF_FP_SUPPORT=y

CONFIG_THREAD_NAME=y

CONFIG_ALP_SDK_INFERENCE_TFLM=y

# alp_dsp_chain_* (<alp/dsp.h>) for the FFT + magnitude pipeline.
# Gated separately so apps that don't use the DSP surface don't pay
# the libm + CMSIS-DSP link cost.
CONFIG_ALP_SDK_DSP=y
