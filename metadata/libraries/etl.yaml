# etl -- Embedded Template Library (WS6-c Phase-1 canonical manifest for
# the legacy per-core token `etl`).
#
# Grounding (this checkout):
#   * scripts/alp_project_emit/__init__.py:186 (_LIBRARY_KCONFIG) --
#     "etl: include path + etl_profile.h via the v0.4 loader hook" --
#     header-only C++, no real Zephyr Kconfig symbol exists for it.
#   * west.yml:429-435 -- `name: etl`, remote etlcpp, revision `20.39.4`,
#     path modules/lib/etl, group `extras-cpp` (disabled by default; the
#     build resolves against the vendored copy, not this west pin --
#     see vendors/etl/README.md).
#   * vendors/etl/README.md -- MIT licence (LICENSE is the upstream text
#     unmodified); upstream https://github.com/ETLCPP/etl.
#   * metadata/library-profiles/etl/hw-backends.yaml -- pure-SW,
#     no accelerator binding (header-only template library).
#
# HW-backends: see metadata/library-profiles/etl/ (folded in WS6-c Phase 3)
#
# No `kconfig:` -- there is no CONFIG_ symbol to transcribe (header-only,
# wired via the v0.4 CMake include-path loader hook instead); the schema's
# kconfig items must match `^CONFIG_...=...$`, so the loader-hook note
# lives here as prose, not as an invented CONFIG_ line.  `module: etl`
# documents the real (disabled-by-default) west pin above.
#
# No `requires:` -- pure portable C++11, no capability/core-class/RAM
# floor of note; builds on every OS target the SDK supports.
#
# `tier: B` for this Phase-1 pass: etl already has a real teaching example
# built green on native_sim (examples/peripheral-io/etl-fixed-containers),
# but Tier A additionally requires an entry in
# metadata/registries/tier-a-library-ci.json (hostBuild.libraries or
# excludedLibraries) -- editing that registry is out of scope for this
# additive Phase-1 manifest pass.  Promotion to Tier A is a named follow-up.
schema_version: 1
name: etl
description: "Embedded Template Library -- fixed-capacity, no-heap STL-like C++ containers for embedded targets."
tier: B
version: "20.39.4"
license: MIT

integration:
  zephyr:
    module: etl
    hw_backends:
      class: embedded template library
      upstream_source: "header-only; pulled in via the v0.4 include-path hook"
      accelerators: []
      sw_fallback:
        required: true
        kconfig: "# etl: header-only, no Kconfig knob needed"

      verification:
        hil_silicon: untested        # paper-correct only until v1.0 verification sweep.
        smoke_tests: build_only
