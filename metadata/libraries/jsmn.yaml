# jsmn -- minimal JSON tokenizer, single header, pure C (WS6-c Phase-1
# canonical manifest for the legacy per-core token `jsmn`).
#
# Grounding (this checkout):
#   * scripts/alp_project_emit/__init__.py:257 (_LIBRARY_KCONFIG) --
#     verbatim: `CONFIG_ALP_JSMN_SW=y`.
#   * west.yml:340-345 -- `name: jsmn`, remote zserge, revision `v1.1.0`
#     ("Header-only; latest tagged release."), path modules/lib/jsmn,
#     group `extras-tier1` (disabled by default; the build resolves
#     against the vendored copy -- see vendors/jsmn/README.md, since
#     `west update` cannot run against an out-of-workspace worktree).
#   * vendors/jsmn/README.md -- MIT licence (LICENSE upstream text
#     unmodified); upstream https://github.com/zserge/jsmn.
#   * metadata/library-profiles/jsmn/hw-backends.yaml -- pure-SW,
#     no accelerator binding (parsing class).
#   * examples/connectivity/jsmn-json-parse/testcase.yaml -- built +
#     run green on native_sim/native_sim/native/64.
#
# HW-backends: see metadata/library-profiles/jsmn/ (folded in WS6-c Phase 3)
#
# `module: jsmn` matches the real (disabled-by-default) west project
# name above; `kconfig:` is transcribed verbatim from _LIBRARY_KCONFIG.
#
# No `requires:` -- pure portable C99, single self-contained header, no
# capability/core-class/RAM floor of note.
#
# `tier: B` for this Phase-1 pass: jsmn has a real teaching example
# built green on native_sim, but Tier A additionally requires an entry
# in metadata/registries/tier-a-library-ci.json -- out of scope here;
# promotion is a named follow-up.
schema_version: 1
name: jsmn
description: "jsmn -- minimal, single-header JSON tokenizer for size-constrained parsing."
tier: B
version: "1.1.0"
license: MIT

integration:
  zephyr:
    module: jsmn
    kconfig:
      - CONFIG_ALP_JSMN_SW=y
