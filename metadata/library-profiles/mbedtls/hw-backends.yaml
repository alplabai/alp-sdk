# Per-library hardware-accelerator binding for mbedtls.
# Capability-keyed: each SoM declares which crypto accelerator is
# populated.  Pure-C is the floor.
schema_version: 1
library: mbedtls
class: crypto/TLS
upstream_source: "github.com/Mbed-TLS/mbedtls (in Zephyr west.yml already)"
accelerators:
  - class: crypto
    priority:
      # CryptoCell first on Alif (full AES + RSA + ECDSA hardware).
      - { requires_cap: cryptocell,     backend: cryptocell,               kconfig: CONFIG_ALP_MBEDTLS_CRYPTOCELL=y }
      # Inline-AES is the M55-instruction-level fast path.
      - { requires_cap: inline_aes,     backend: inline_aes,               kconfig: CONFIG_ALP_MBEDTLS_INLINE_AES=y }
      # CAU on V2N + V2N-M1 via the GD32 bridge.
      - { requires_cap: cau,            backend: cau,                      kconfig: CONFIG_ALP_MBEDTLS_CAU=y }
      # OPTIGA Trust M handles TLS handshakes on any module that
      # populates it (AEN + V2N + NX9101).
      - { requires_cap: optiga_trust_m, backend: optiga_trust_m_handshake, kconfig: CONFIG_ALP_MBEDTLS_OPTIGA=y }
sw_fallback:
  required: true
  kconfig: CONFIG_ALP_MBEDTLS_PURE_C=y

verification:
  hil_silicon: untested
  smoke_tests: build_only
