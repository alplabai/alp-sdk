# Per-library hardware-accelerator binding for madgwick_ahrs.
# Loader: scripts/alp_project.py reads this against the active SoM
# `capabilities:` block (metadata/soms/*.yaml) and emits the highest-
# priority matching CONFIG_* per accelerator class.  Pure-SW
# fallback is the floor and is always available.
schema_version: 1
library: madgwick_ahrs
class: sensor fusion
upstream_source: "xioTechnologies"
accelerators:
  - class: simd
    priority:
      - { backend: fpu, kconfig: CONFIG_ALP_MADGWICK_FPU=y }
  - class: cordic
    priority:
      - { soc_family: gd32_bridge, backend: tmu_cordic, kconfig: CONFIG_ALP_MADGWICK_TMU=y }
sw_fallback:
  required: true
  kconfig: CONFIG_ALP_MADGWICK_LIBM=y

verification:
  hil_silicon: untested        # paper-correct only until v1.0 verification sweep.
  smoke_tests: build_only
