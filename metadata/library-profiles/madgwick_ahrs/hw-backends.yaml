# Per-library hardware-accelerator binding for madgwick_ahrs.
# Capability-keyed.  libm trig is the floor.  Every CPU we target
# carries an FPU, so the `fpu` simd entry is universal (no cap).
schema_version: 1
library: madgwick_ahrs
class: sensor fusion
upstream_source: "xioTechnologies"
accelerators:
  - class: simd
    priority:
      - { backend: fpu, kconfig: CONFIG_ALP_MADGWICK_FPU=y }
  - class: cordic
    priority:
      - { requires_cap: tmu_cordic, backend: tmu_cordic, kconfig: CONFIG_ALP_MADGWICK_TMU=y }
sw_fallback:
  required: true
  kconfig: CONFIG_ALP_MADGWICK_LIBM=y

verification:
  hil_silicon: untested        # paper-correct only until v1.0 verification sweep.
  smoke_tests: build_only
