# Per-library hardware-accelerator binding for opus.
# Capability-keyed SIMD; I2S DMA universal.  Pure-C is the floor.
schema_version: 1
library: opus
class: audio
upstream_source: "xiph.org"
accelerators:
  - class: simd
    priority:
      - { requires_cap: helium_mve, backend: helium_mve, kconfig: CONFIG_ALP_OPUS_HELIUM=y }
      - { requires_cap: neon,       backend: neon,       kconfig: CONFIG_ALP_OPUS_NEON=y }
      - { backend: fpu,                                  kconfig: CONFIG_ALP_OPUS_FPU=y }
  - class: dma
    priority:
      - { backend: i2s_dma, kconfig: CONFIG_ALP_OPUS_I2S_DMA=y }
sw_fallback:
  required: true
  kconfig: CONFIG_ALP_OPUS_PURE_C=y

verification:
  hil_silicon: untested        # paper-correct only until v1.0 verification sweep.
  smoke_tests: build_only
