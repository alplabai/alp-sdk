# Per-library hardware-accelerator binding for opus.
# Loader: scripts/alp_project.py reads this against the active SoM
# `capabilities:` block (metadata/soms/*.yaml) and emits the highest-
# priority matching CONFIG_* per accelerator class.  Pure-SW
# fallback is the floor and is always available.
schema_version: 1
library: opus
class: audio
upstream_source: "xiph.org"
accelerators:
  - class: simd
    priority:
      - { soc_family: alif_ensemble, cpu: cortex_m55, backend: helium_mve, kconfig: CONFIG_ALP_OPUS_HELIUM=y }
      - { soc_family: renesas_rzv2n, cpu: cortex_a55, backend: neon, kconfig: CONFIG_ALP_OPUS_NEON=y }
      - { backend: fpu, kconfig: CONFIG_ALP_OPUS_FPU=y }
  - class: dma
    priority:
      - { backend: i2s_dma, kconfig: CONFIG_ALP_OPUS_I2S_DMA=y }
sw_fallback:
  required: true
  kconfig: CONFIG_ALP_OPUS_PURE_C=y

verification:
  hil_silicon: untested        # paper-correct only until v1.0 verification sweep.
  smoke_tests: build_only
