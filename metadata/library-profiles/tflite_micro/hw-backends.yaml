# Per-library hardware-accelerator binding for tflite_micro.
# Loader: scripts/alp_project.py reads this against the active SoM
# `capabilities:` block (metadata/soms/*.yaml) and emits the highest-
# priority matching CONFIG_* per accelerator class.  Pure-SW
# fallback is the floor and is always available.
schema_version: 1
library: tflite_micro
class: ML inference
upstream_source: "TensorFlow upstream (in Zephyr west.yml already)"
accelerators:
  - class: ml_npu
    priority:
      # Ethos-U85 lives only on Alif Ensemble E4 / E6 / E8 (one U85 +
      # two U55 in each).  U85 is the Transformer-capable / GenAI
      # path; pin it as priority 1 on the SKUs that carry it.
      - { silicon: alif:ensemble:e4, backend: ethos_u85, kconfig: CONFIG_ALP_TFLM_ETHOS_U85=y }
      - { silicon: alif:ensemble:e6, backend: ethos_u85, kconfig: CONFIG_ALP_TFLM_ETHOS_U85=y }
      - { silicon: alif:ensemble:e8, backend: ethos_u85, kconfig: CONFIG_ALP_TFLM_ETHOS_U85=y }
      # Ethos-U55 is on every E* SoC (two per SKU).  Family-wide
      # fallback for non-U85 SKUs (E3/E5/E7) and the second-choice
      # binding on U85 SKUs once U85 is unavailable.
      - { soc_family: alif_ensemble, backend: ethos_u55, kconfig: CONFIG_ALP_TFLM_ETHOS_U55=y }
      - { soc_family: renesas_rzv2n, backend: drp_ai,    kconfig: CONFIG_ALP_TFLM_DRP_AI=y }
  - class: simd
    priority:
      - { soc_family: alif_ensemble, cpu: cortex_m55, backend: helium_mve, kconfig: CONFIG_ALP_TFLM_HELIUM=y }
      - { soc_family: renesas_rzv2n, cpu: cortex_a55, backend: neon,       kconfig: CONFIG_ALP_TFLM_NEON=y }
  - class: dma
    priority:
      - { backend: tensor_dma_copy, kconfig: CONFIG_ALP_TFLM_DMA_COPY=y }
sw_fallback:
  required: true
  kconfig: CONFIG_ALP_TFLM_REF_KERNELS=y

verification:
  hil_silicon: untested        # paper-correct only until v1.0 verification sweep.
  smoke_tests: build_only
