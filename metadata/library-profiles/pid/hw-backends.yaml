# Per-library hardware-accelerator binding for pid.
# Loader: scripts/alp_project.py reads this against the active SoM
# `capabilities:` block (metadata/soms/*.yaml) and emits the highest-
# priority matching CONFIG_* per accelerator class.  Pure-SW
# fallback is the floor and is always available.
schema_version: 1
library: pid
class: control
upstream_source: "maintainer-written thin C library"
accelerators:
  - class: simd
    priority:
      - { backend: fpu, kconfig: CONFIG_ALP_PID_FPU=y }
  - class: timing
    priority:
      - { backend: timer_tick, kconfig: CONFIG_ALP_PID_TIMER=y }
sw_fallback:
  required: true
  kconfig: CONFIG_ALP_PID_INT_MATH=y

verification:
  hil_silicon: untested        # paper-correct only until v1.0 verification sweep.
  smoke_tests: build_only
