# Per-library hardware-accelerator binding for libhelix.
# Loader: scripts/alp_project.py reads this against the active SoM
# `capabilities:` block (metadata/soms/*.yaml) and emits the highest-
# priority matching CONFIG_* per accelerator class.  Pure-SW
# fallback is the floor and is always available.
schema_version: 1
library: libhelix
class: audio
upstream_source: "libhelix (upstream)"
accelerators:
  - class: simd
    priority:
      - { backend: fpu, kconfig: CONFIG_ALP_LIBHELIX_FPU=y }
  - class: dma
    priority:
      - { backend: i2s_dma, kconfig: CONFIG_ALP_LIBHELIX_I2S_DMA=y }
sw_fallback:
  required: true
  kconfig: CONFIG_ALP_LIBHELIX_PURE_C=y

verification:
  hil_silicon: untested        # paper-correct only until v1.0 verification sweep.
  smoke_tests: build_only
