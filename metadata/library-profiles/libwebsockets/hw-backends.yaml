# Per-library hardware-accelerator binding for libwebsockets.
# Loader: scripts/alp_project.py reads this against the active SoM
# `capabilities:` block (metadata/soms/*.yaml) and emits the highest-
# priority matching CONFIG_* per accelerator class.  Pure-SW
# fallback is the floor and is always available.
schema_version: 1
library: libwebsockets
class: networking
upstream_source: "warmcat/libwebsockets"
accelerators:
  - class: crypto
    priority:
      - { backend: mbedtls, kconfig: CONFIG_ALP_LWS_MBEDTLS=y }
      - { backend: bearssl, kconfig: CONFIG_ALP_LWS_BEARSSL=y }
  - class: dma
    priority:
      - { backend: tcp_dma, kconfig: CONFIG_ALP_LWS_TCP_DMA=y }
sw_fallback:
  required: true
  kconfig: CONFIG_ALP_LWS_NO_TLS=y

verification:
  hil_silicon: untested        # paper-correct only until v1.0 verification sweep.
  smoke_tests: build_only
