# Per-library hardware-accelerator binding for bearssl.
# Loader: scripts/alp_project.py reads this against the active SoM
# `capabilities:` block (metadata/soms/*.yaml) and emits the highest-
# priority matching CONFIG_* per accelerator class.  Pure-SW
# fallback is the floor and is always available.
schema_version: 1
library: bearssl
class: crypto/TLS
upstream_source: "bearssl.org"
accelerators:
  - class: crypto
    priority:
      - { soc_family: gd32_bridge, backend: cau, kconfig: CONFIG_ALP_BEARSSL_CAU=y }
      - { soc_family: alif_ensemble, backend: cryptocell, kconfig: CONFIG_ALP_BEARSSL_CRYPTOCELL=y }
      - { soc_family: alif_ensemble, backend: inline_aes, kconfig: CONFIG_ALP_BEARSSL_INLINE_AES=y }
      - { backend: optiga_trust_m_handshake, kconfig: CONFIG_ALP_BEARSSL_OPTIGA=y }
sw_fallback:
  required: true
  kconfig: CONFIG_ALP_BEARSSL_PURE_C=y

verification:
  hil_silicon: untested        # paper-correct only until v1.0 verification sweep.
  smoke_tests: build_only
