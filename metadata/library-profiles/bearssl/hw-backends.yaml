# Per-library hardware-accelerator binding for bearssl.
# Capability-keyed crypto.  Pure-C is the floor.
schema_version: 1
library: bearssl
class: crypto/TLS
upstream_source: "bearssl.org"
accelerators:
  - class: crypto
    priority:
      - { requires_cap: cryptocell,     backend: cryptocell,               status: planned, kconfig: CONFIG_ALP_BEARSSL_CRYPTOCELL=y }
      - { requires_cap: inline_aes,     backend: inline_aes,               status: planned, kconfig: CONFIG_ALP_BEARSSL_INLINE_AES=y }
      - { requires_cap: cau,            backend: cau,                      status: planned, kconfig: CONFIG_ALP_BEARSSL_CAU=y }
      - { requires_cap: optiga_trust_m, backend: optiga_trust_m_handshake, status: planned, kconfig: CONFIG_ALP_BEARSSL_OPTIGA=y }
sw_fallback:
  required: true
  kconfig: CONFIG_ALP_BEARSSL_PURE_C=y

verification:
  hil_silicon: untested        # paper-correct only until v1.0 verification sweep.
  smoke_tests: build_only
