# Per-library hardware-accelerator binding for etl.
# etl is header-only and pure-SW; no hardware acceleration is
# applicable.  This profile exists for schema completeness so the
# loader doesn't have to special-case `etl` in `libs:`.
schema_version: 1
library: etl
class: embedded template library
upstream_source: "header-only; pulled in via the v0.4 include-path hook"
accelerators: []
sw_fallback:
  required: true
  kconfig: "# etl: header-only, no Kconfig knob needed"

verification:
  hil_silicon: untested        # paper-correct only until v1.0 verification sweep.
  smoke_tests: build_only
