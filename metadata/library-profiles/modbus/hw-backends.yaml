# Per-library hardware-accelerator binding for modbus.
# Loader: scripts/alp_project.py reads this against the active SoM
# `capabilities:` block (metadata/soms/*.yaml) and emits the highest-
# priority matching CONFIG_* per accelerator class.  Pure-SW
# fallback is the floor and is always available.
schema_version: 1
library: modbus
class: industrial bus
upstream_source: "libmodbus"
accelerators:
  - class: dma
    priority:
      - { backend: uart_dma, kconfig: CONFIG_ALP_MODBUS_UART_DMA=y }
      - { backend: ethernet_dma, kconfig: CONFIG_ALP_MODBUS_ETH_DMA=y }
sw_fallback:
  required: true
  kconfig: CONFIG_ALP_MODBUS_SYNC_IO=y

verification:
  hil_silicon: untested        # paper-correct only until v1.0 verification sweep.
  smoke_tests: build_only
