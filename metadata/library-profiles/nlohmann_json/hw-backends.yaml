# Per-library hardware-accelerator binding for nlohmann_json.
# nlohmann_json is header-only and pure-SW; no hardware acceleration is
# applicable.  This profile exists for schema completeness so the
# loader doesn't have to special-case `nlohmann_json` in `libs:`.
schema_version: 1
library: nlohmann_json
class: JSON parsing
upstream_source: "header-only; pulled in via the v0.4 include-path hook"
accelerators: []
sw_fallback:
  required: true
  kconfig: "# nlohmann_json: header-only, no Kconfig knob needed"

verification:
  hil_silicon: untested        # paper-correct only until v1.0 verification sweep.
  smoke_tests: build_only
