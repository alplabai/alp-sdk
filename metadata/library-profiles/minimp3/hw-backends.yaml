# Per-library hardware-accelerator binding for minimp3.
# Capability-keyed SIMD; I2S DMA universal on any SoM that ships an
# I2S peripheral.  Pure-C is the floor.
schema_version: 1
library: minimp3
class: audio
upstream_source: "lieff/minimp3"
accelerators:
  - class: simd
    priority:
      - { requires_cap: helium_mve, backend: helium_mve, kconfig: CONFIG_ALP_MINIMP3_HELIUM=y }
      - { requires_cap: neon,       backend: neon,       kconfig: CONFIG_ALP_MINIMP3_NEON=y }
      - { backend: fpu,                                  kconfig: CONFIG_ALP_MINIMP3_FPU=y }
  - class: dma
    priority:
      - { backend: i2s_dma, kconfig: CONFIG_ALP_MINIMP3_I2S_DMA=y }
sw_fallback:
  required: true
  kconfig: CONFIG_ALP_MINIMP3_PURE_C=y

verification:
  hil_silicon: untested        # paper-correct only until v1.0 verification sweep.
  smoke_tests: build_only
