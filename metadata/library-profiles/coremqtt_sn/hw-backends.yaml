# Per-library hardware-accelerator binding for coremqtt_sn.
# Loader: scripts/alp_project.py reads this against the active SoM
# `capabilities:` block (metadata/soms/*.yaml) and emits the highest-
# priority matching CONFIG_* per accelerator class.  Pure-SW
# fallback is the floor and is always available.
schema_version: 1
library: coremqtt_sn
class: IoT
upstream_source: "FreeRTOS coreMQTT-SN"
accelerators:
  - class: crypto
    priority:
      - { backend: mbedtls, kconfig: CONFIG_ALP_MQTTSN_MBEDTLS=y }
      - { backend: bearssl, kconfig: CONFIG_ALP_MQTTSN_BEARSSL=y }
sw_fallback:
  required: true
  kconfig: CONFIG_ALP_MQTTSN_NO_TLS=y

verification:
  hil_silicon: untested        # paper-correct only until v1.0 verification sweep.
  smoke_tests: build_only
