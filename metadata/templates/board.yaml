# board.yaml -- ALP SDK project configuration.
#
# Copy this template to your application root and edit the values
# for your board.  scripts/alp_orchestrate.py reads this file,
# resolves the SoM topology, fans out into per-core build slices
# (Zephyr / Yocto / baremetal), and emits a system manifest that
# `west alp-image` / `west alp-flash` / OTA consume.
#
# === This is the ONLY place to configure the firmware. ===
#
# Don't edit prj.conf, don't pass extra -D flags, don't hand-edit
# local.conf's MACHINE.  Every other config artefact is DERIVED
# from this file.  If you can't express what you need here, the
# right fix is to extend the schema -- file an issue.
#
# See docs/heterogeneous-builds.md for the per-core walk-through
# and docs/board-config.md for the schema reference.
#
# Validated against metadata/schemas/board.schema.json.

# -------------------------------------------------------------------
# Board identity
# -------------------------------------------------------------------
# `name:` is your board's name.  Used in the generated
# `include/alp/boards/alp_<name>_routes.h` filename + as the board
# identity in build artefacts.
name: my-board                # change to your board name
description: "..."            # optional, free-form

# Optional: your board's own hardware revision (separate from the
# SoM's revision, set under `som.hw_rev` below).
# hw_rev: r1

# -------------------------------------------------------------------
# SoM identity -- which MODULE is mounted on the board?
# -------------------------------------------------------------------
# On-module components (silicon, on-module radio, on-module secure
# element + RTC + EEPROM) are fixed at SoM-fab time -- you can't
# DNI them after order.  For a custom AEN variant (e.g. DNI'd
# OPTIGA), create a new MPN preset rather than overriding here.
som:
  # Stock SKU.  Recognised values:
  #   E1M-AEN301 / AEN401 / AEN501 / AEN601 / AEN701 / AEN801   (Alif Ensemble)
  #   E1M-V2N101 / V2N102                                       (Renesas RZ/V2N)
  #   E1M-V2M101 / V2M102                                       (V2N + DEEPX DX-M1)
  #   E1M-NX9xxx                                                (NXP i.MX 93)
  #
  # The SDK ships per-SKU presets at:
  #   metadata/e1m_modules/<MPN>.yaml
  sku: E1M-AEN701

  # SoM hardware revision the firmware is built for.  Optional --
  # falls back to the SKU preset's `default_hw_rev`.  Validated
  # against metadata/e1m_modules/<family>/hw-revisions.yaml at
  # build time + against the on-module BOARD_ID ADC channel at
  # runtime.  See docs/board-config.md "Hardware revision tracking".
  #
  # hw_rev: r1

# -------------------------------------------------------------------
# Per-core runtime + app slices
# -------------------------------------------------------------------
# Heterogeneous-OS orchestration.  Keys are canonical core IDs from
# the SoM preset's `topology:` block (e.g. `a55_cluster`, `m33_sm`,
# `m55_hp`, `m55_he`, `a32_cluster`, `m33`).  Per-core fields the
# orchestrator reads:
#
#   os:          zephyr | yocto | baremetal | off
#   app:         path to the app source directory for this core
#                  - zephyr   -> dir with prj.conf or CMakeLists.txt
#                  - baremetal-> dir with CMakeLists.txt
#                  - yocto    -> recipe directory OR `image:` instead
#   image:       Yocto image recipe name (e.g. alp-image-edge)
#   peripherals: Zephyr peripheral subsystems / Yocto packages
#                  needed by this slice (per-core, not project-wide)
#   libraries:   Library knobs scoped to this slice
#   inference:   Per-slice inference tuning (arena_kib only --
#                  backend set is silicon-determined by the SoM
#                  preset's `capabilities:` block, not a knob)
#   iot:         Connectivity feature toggles (per-slice)
#
# Customers may declare a subset of cores; missing keys inherit
# the SoM preset's `topology:` defaults.  Use `os: off` to skip a
# core entirely.  Across-SoM-family swaps (AEN <-> V2N) require
# updating these keys -- per ADR-0011 cross-family portability is
# explicitly not a goal.
cores:
  m55_hp:
    app: ./src
    peripherals: [gpio, i2c]
    inference: { default_arena_kib: 128 }   # arena = per-model memory budget;
                                             # the dispatcher set is silicon-determined
                                             # (SoM preset's `capabilities:` block).
    # libraries: [...]
    # iot:       {...}

  # Heterogeneous example (V2N -- A55 Yocto + M33 Zephyr peers).
  # `os:` is omitted on both -- topology defaults pick the right
  # runtime per core class:
  #
  # a55_cluster:
  #   app: ./linux
  #   image: alp-image-edge
  #   peripherals: [ethernet, usb, emmc]
  #   libraries:   [mbedtls, nlohmann_json]
  #   iot:         { wifi: true, mqtt: true }
  # m33_sm:
  #   app: ./m33_sm
  #   peripherals: [adc, pwm, i2c, gpio]
  #   libraries:   [cmsis_dsp]

# -------------------------------------------------------------------
# Chips populated on THIS board
# -------------------------------------------------------------------
# Each `true` enables the matching CONFIG_ALP_SDK_CHIP_<NAME>=y
# (or CONFIG_ALP_SDK_BLOCK_<NAME>=y for the SDK-level helpers
# `button_led` / `pdm_mic`; the loader picks the right symbol).
#
# Edit this list to reflect your board's actual chip population.
# A worked example for a real board ships at
# metadata/boards/e1m-evk.yaml (the EVK reference) -- copy it as a
# starting template if you're laying out a derivative board.
populated:
  bmi323: true                # IMU
  ssd1306: true               # mono OLED
  # bme280: true              # environmental sensor
  # tas2563: true             # I2S audio codec
  # ...

# -------------------------------------------------------------------
# E1M-pad -> board-side macro routing
# -------------------------------------------------------------------
# Authoritative wiring for the board: which E1M-standard pad
# (E1M_GPIO_IO<N>, E1M_PWM<N>, E1M_I2C<N>, ...) connects to which
# board-side feature.
#
# scripts/gen_board_header.py reads this block and emits
# `include/alp/boards/alp_<name>_routes.h` with one
# `#define PIN_<NAME> E1M_<...>` line per entry -- hand-written
# firmware references the resulting macro names.
#
# Per entry:
#   - e1m:        E1M_GPIO_IO<N> | E1M_PWM<N> | E1M_I2C<N> | E1M_SPI<N> | E1M_UART<N> | E1M_I3C<N>
#   - macro:      uppercase C-identifier the generator emits
#   - doc:        optional one-line Doxygen `@brief` text
#   - active_low: optional bool
#   - routes_via: optional SoM-side mediator note (e.g. `cc3501e`)
e1m_routes:
  gpio:
    - { e1m: E1M_GPIO_IO15, macro: PIN_BMI323_INT1,
        doc: "BMI323 INT1 (data-ready / motion / FIFO)." }
  buses:
    - { e1m: E1M_I2C0, macro: I2C_BUS_SENSORS,
        doc: "Shared sensor bus." }
  pwm:
    - { e1m: E1M_PWM3, macro: PWM_LED_RED,
        doc: "Status LED red channel." }

# -------------------------------------------------------------------
# Cross-core IPC carve-outs (optional)
# -------------------------------------------------------------------
# Each entry declares a shared-memory region the orchestrator
# allocates from the SoM preset's `memory_map:` (filtered by
# `accessible_from:` for the listed endpoints).  Addresses + endpoint
# IDs are computed deterministically and emitted into the generated
# <alp/system_ipc.h> header that both slices include.
#
# ipc:
#   - kind: rpmsg                # rpmsg | raw_shmem | mailbox_only
#     endpoints: [a55_cluster, m33_sm]
#     carve_out_kb: 512
#     name: alp_default_rpmsg

# -------------------------------------------------------------------
# Flash / persistent storage partitions (optional)
# -------------------------------------------------------------------
# Each entry declares one fixed partition on the referenced flash
# device.  The orchestrator allocates offsets bottom-up within the
# device (name-sorted, page-aligned to 4 KiB) for byte-stable layouts
# across rebuilds -- supply `offset_kib:` to override the allocator.
#
# `flash_device:` references either a SoM `memory_map:` region (e.g.
# mram_main on AEN) or an `on_module.ospi_memories:` key (e.g. ospi0
# when the SoM ships with external OSPI flash).  The orchestrator
# emits a partial DTS overlay (the `partitions { ... }` node under
# `&<dt_label>`) plus the matching Kconfig (FILE_SYSTEM_LITTLEFS /
# FAT_FILESYSTEM_ELM / ...).
#
# storage:
#   - { name: settings, size_kib: 64,  fs: littlefs, mount: /lfs/settings,
#       flash_device: mram_main }
#   - { name: app_data, size_kib: 128, fs: littlefs, mount: /lfs/app,
#       flash_device: mram_main }
#   - { name: mcuboot_scratch, size_kib: 32, fs: raw,
#       flash_device: mram_main }

# -------------------------------------------------------------------
# Project-declared chips (beyond the board's `populated:` table)
# -------------------------------------------------------------------
# Chip drivers the application links directly via <alp/chips/<name>.h>
# -- typically external sensors plugged into the board's headers that
# aren't part of the board's stock population.
#
# chips:
#   - lsm6dso
#   - st7789

# -------------------------------------------------------------------
# Diagnostic surface (project-wide)
# -------------------------------------------------------------------
diagnostics:
  log_level: info       # error | warn | info | debug | trace
  # last_error: true    # alp_last_error() thread-local slot

# -------------------------------------------------------------------
# Note on `preset:` (SDK-internal -- you don't need it)
# -------------------------------------------------------------------
# The SDK demos under examples/ use `preset: e1m-evk` / `preset:
# e1m-x-evk` as a shortcut to share the EVK board definitions across
# ~40 demo projects.  Your project's board.yaml goes inline, as
# above -- one file, fully self-contained.
