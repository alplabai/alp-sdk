# board.yaml -- ALP SDK project configuration.
#
# Copy this template to your application root and edit the values
# for your project.  scripts/alp_orchestrate.py reads this file,
# resolves the SoM topology, fans out into per-core build slices
# (Zephyr / Yocto / baremetal), and emits a system manifest that
# `west alp-image` / `west alp-flash` / OTA consume.
#
# === This is the ONLY place to configure the firmware. ===
#
# Don't edit prj.conf, don't pass extra -D flags, don't hand-edit
# local.conf's MACHINE.  Every other config artefact is DERIVED
# from this file.  If you can't express what you need here, the
# right fix is to extend the schema -- file an issue.
#
# See docs/heterogeneous-builds.md for the per-core walk-through
# and docs/board-config.md for the schema reference.  The full
# design rationale lives at
# docs/superpowers/specs/2026-05-15-heterogeneous-os-orchestration-design.md
#
# Validated against metadata/schemas/board.schema.json.

# -------------------------------------------------------------------
# Board identity -- what BOARD does this firmware target?
# -------------------------------------------------------------------
# Two mutually-exclusive ways to declare which board:
#
#   (A) Inline -- you're targeting a custom board (production
#       PCB, bespoke daughter board, lab fixture).  Provide
#       top-level `name:` plus `populated:` and `e1m_routes:`
#       blocks below.  The board is fully described in this one
#       file.
#
#   (B) Preset -- you're targeting a board the SDK ships a shared
#       definition for (the EVKs, or any custom board you've added
#       under metadata/boards/<name>.yaml).  Provide top-level
#       `preset: <name>` and omit `populated:` / `e1m_routes:` --
#       they come from metadata/boards/<name>.yaml.
#
# Pick one mode; the schema rejects mixing.

# Mode B (preset) shown -- swap for inline below if you have a
# custom board.
preset: e1m-evk

# -- Mode A (inline) example --
# name: my-sensor-board       # board name; required when no `preset:`
# description: "Slim sensor board, AEN-based, ships in Q3."
# hw_rev: r1                  # optional board hardware revision
#
# populated:                  # chips populated on this board
#   bmi323: true
#   ssd1306: true
#
# e1m_routes:                 # E1M-pad -> board-side macro
#   gpio:
#     - { e1m: E1M_GPIO_IO15, macro: PIN_BMI323_INT1,
#         doc: "BMI323 INT1 (data-ready / motion / FIFO)." }
#   buses:
#     - { e1m: E1M_I2C0, macro: I2C_BUS_SENSORS,
#         doc: "Shared sensor bus." }

# -------------------------------------------------------------------
# SoM identity -- which MODULE is mounted on the board?
# -------------------------------------------------------------------
# On-module components (silicon, on-module radio, on-module secure
# element + RTC + EEPROM) are fixed at SoM-fab time -- you can't
# DNI them after order.  For a custom AEN variant (e.g. DNI'd
# OPTIGA), create a new MPN preset rather than overriding here.
som:
  # Stock SKU.  Recognised values:
  #   E1M-AEN301 / AEN401 / AEN501 / AEN601 / AEN701 / AEN801   (Alif Ensemble)
  #   E1M-V2N101 / V2N102                                       (Renesas RZ/V2N)
  #   E1M-V2M101 / V2M102                                       (V2N + DEEPX DX-M1)
  #   E1M-NX9xxx                                                (NXP i.MX 93)
  #
  # The SDK ships per-SKU presets at:
  #   metadata/e1m_modules/<MPN>.yaml
  sku: E1M-AEN701

  # SoM hardware revision the firmware is built for.  Optional --
  # falls back to the SKU preset's `default_hw_rev`.  Validated
  # against metadata/e1m_modules/<family>/hw-revisions.yaml at
  # build time + against the on-module BOARD_ID ADC channel at
  # runtime.  See docs/board-config.md "Hardware revision tracking".
  #
  # hw_rev: r1

# -------------------------------------------------------------------
# Per-core runtime + app slices
# -------------------------------------------------------------------
# Heterogeneous-OS orchestration.  Keys are canonical core IDs from
# the SoM preset's `topology:` block (e.g. `a55_cluster`, `m33_sm`,
# `m55_hp`, `m55_he`, `a32_cluster`, `m33`).  Per-core fields the
# orchestrator reads:
#
#   os:          zephyr | yocto | baremetal | off
#   app:         path to the app source directory for this core
#                  - zephyr   -> dir with prj.conf or CMakeLists.txt
#                  - baremetal-> dir with CMakeLists.txt
#                  - yocto    -> recipe directory OR `image:` instead
#   image:       Yocto image recipe name (e.g. alp-image-edge)
#   peripherals: Zephyr peripheral subsystems / Yocto packages
#                  needed by this slice (per-core, not project-wide)
#   libraries:   Library knobs scoped to this slice
#   inference:   Per-slice inference tuning (arena_kib only --
#                  backend set is silicon-determined by the SoM
#                  preset's `capabilities:` block, not a knob)
#   iot:         Connectivity feature toggles (per-slice)
#
# Customers may declare a subset of cores; missing keys inherit
# the SoM preset's `topology:` defaults.  Use `os: off` to skip a
# core entirely.
cores:
  m55_hp:
    app: ./src
    peripherals: [gpio, i2c]
    inference: { default_arena_kib: 128 }   # arena = per-model memory budget;
                                             # the dispatcher set is silicon-determined
                                             # (SoM preset's `capabilities:` block).
    # libraries: [...]
    # iot:       {...}

  # Other cores left unspecified inherit the SoM preset's defaults
  # entirely (e.g. m55_he gets `os: zephyr, app: alp-stock-shim`).
  # To skip a peer core explicitly:
  #
  # m55_he:
  #   os: off

# Heterogeneous example (V2N -- A55 Yocto + M33 Zephyr peers).  `os:`
# is omitted on both -- topology defaults pick the right runtime per
# core class:
#
# cores:
#   a55_cluster:
#     app: ./linux
#     image: alp-image-edge
#     peripherals: [ethernet, usb, emmc]
#     libraries:   [mbedtls, nlohmann_json]
#     iot:         { wifi: true, mqtt: true }
#   m33_sm:
#     app: ./m33_sm
#     peripherals: [adc, pwm, i2c, gpio]
#     libraries:   [cmsis_dsp]

# -------------------------------------------------------------------
# Cross-core IPC carve-outs (optional)
# -------------------------------------------------------------------
# Each entry declares a shared-memory region the orchestrator
# allocates from the SoM preset's `memory_map:` (filtered by
# `accessible_from:` for the listed endpoints).  Addresses + endpoint
# IDs are computed deterministically and emitted into the generated
# <alp/system_ipc.h> header that both slices include.
#
# ipc:
#   - kind: rpmsg                # rpmsg | raw_shmem | mailbox_only
#     endpoints: [a55_cluster, m33_sm]
#     carve_out_kb: 512
#     name: alp_default_rpmsg

# -------------------------------------------------------------------
# Chips populated for THIS project (beyond the board's `populated:`)
# -------------------------------------------------------------------
# chips:
#   - lsm6dso
#   - st7789

# -------------------------------------------------------------------
# Diagnostic surface (project-wide)
# -------------------------------------------------------------------
diagnostics:
  log_level: info       # error | warn | info | debug | trace
  # last_error: true    # alp_last_error() thread-local slot
