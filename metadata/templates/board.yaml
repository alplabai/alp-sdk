# board.yaml -- ALP SDK project configuration
#
# Copy this template to your application root and edit the values
# for your project.  scripts/alp_project.py reads this file and
# emits the equivalent Kconfig fragments (Zephyr), CMake -D flags
# (plain CMake), or local.conf snippets (Yocto).
#
# === This is the ONLY place to configure the firmware. ===
#
# Don't edit prj.conf, don't pass extra -D flags, don't hand-edit
# local.conf's MACHINE.  Every other config artefact is DERIVED
# from this file.  If you can't express what you need here, the
# right fix is to extend the schema -- file an issue.
#
# See docs/board-config.md ("Single source of truth" section)
# for the rationale + the v0.4 follow-ups (DTS overlays + west.yml
# pinning + per-test configs) that close the remaining gaps.
#
# Validated against metadata/schemas/board-config-v1.schema.json.

schema_version: 1

# -------------------------------------------------------------------
# SoM identity -- which MODULE does this firmware target?
# -------------------------------------------------------------------
# Distinct from `carrier` below: the SoM is the small (35x35 or
# 45x65) module that mounts on a carrier.  On-module components
# (silicon, on-module radio, on-module secure element + RTC + EEPROM)
# are fixed at SoM-fab time -- you can't DNI them after order.  The
# `overrides` block here covers SoM variants only (e.g. a custom
# AEN that omits the OPTIGA Trust M).
som:
  # Stock SKU.  Recognised values:
  #   E1M-AEN301 / AEN401 / AEN501 / AEN601 / AEN701 / AEN801   (Alif Ensemble)
  #   E1M-V2N101 / V2N102                                       (Renesas RZ/V2N)
  #   E1M-V2M101 / V2M102                                       (V2N + DEEPX DX-M1)
  #   E1M-NX9xxx                                                (NXP i.MX 93, SKU TBD)
  #
  # The SDK ships per-SKU presets at:
  #   metadata/e1m_modules/<family>/sku-<sku>.yaml
  sku: E1M-AEN701

  # SoM-variant overrides (uncomment for custom modules only).
  # IMUs / barometers / OLEDs / cameras live on the CARRIER, not the
  # SoM -- see the carrier block below.
  #
  # overrides:
  #   wifi_ble:       absent          # DNI'd the on-module CC3501E / Murata radio
  #   secure_element: none            # custom AEN without the OPTIGA Trust M
  #   rtc_external:   none            # custom AEN without the RV-3028-C7

  # Memory overrides (custom DRAM / flash population of the same SKU).
  #
  # memory:
  #   dram_mbit:   65536              # 64 Gbit LPDDR4X (V2N102 default)
  #   flash_mbit:  131072             # 128 Gbit eMMC
  #   mram_kbit:   13312              # 13 Mbit (Alif Ensemble only)

# -------------------------------------------------------------------
# Carrier board -- where the on-board sensors, OLEDs, cameras live
# -------------------------------------------------------------------
# Distinct from `som` above: the carrier is the user-or-EVK PCB the
# SoM mounts on.  This is where IMUs, barometers, OLEDs, cameras,
# mic/speaker amps, current monitors, I/O expanders, and similar
# carrier-side parts get declared.
#
# Stock carrier names:
#   E1M-EVK     -- 35x35 EVK for AEN / N93 SoMs
#   E1M-X-EVK   -- 45x65 EVK for V2N / V2N-M1 SoMs
#
# For a custom carrier, pick any unique name and list every
# populated chip-driver in `populated` -- each `true` enables the
# corresponding CONFIG_ALP_SDK_CHIP_<NAME>=y in the build.
#
# Omit the `carrier:` block entirely if your firmware doesn't
# reach beyond the SoM (e.g. headless inference-only build).
carrier:
  name: E1M-EVK

  # Stock-carrier overrides.  Only list keys that differ from the
  # carrier preset's `populated` defaults -- e.g. set lsm6dso:
  # false on a custom variant that DNI'd it for cost.
  #
  # populated:
  #   lsm6dso:    false   # DNI'd on this custom assembly
  #   bmi323:     false
  #   tas2563:    false   # no speaker amps populated

# -------------------------------------------------------------------
# Target OS backend
# -------------------------------------------------------------------
# zephyr     -- RTOS path, lands on E1M-AEN (full v0.1+) and
#               V2N-Zephyr (v0.3+).  Uses prj.conf for fine-tuning.
# yocto      -- Linux user-space, V2N/V2N-M1 family (v0.4
#               first-class).  See yocto/meta-alp/README.md.
# baremetal  -- No OS; CMSIS-Driver layer directly on Alif/Renesas
#               HALs.  v0.2+ for AEN.
os: zephyr

# -------------------------------------------------------------------
# Inference backend (omit for default "auto")
# -------------------------------------------------------------------
# inference:
#   backend: auto         # auto picks the best NPU for the SoM
#                         # (Ethos-U on AEN, DRP-AI on V2N, DEEPX
#                         # on V2N-M1, Ethos-U65 on N93)
#                         # Explicit alternatives: cpu | ethos_u |
#                         # drpai | deepx_dx
#   default_arena_kib: 128

# -------------------------------------------------------------------
# Optional libraries (no SDK wrapper -- apps use native API)
# -------------------------------------------------------------------
# Uncomment any you want.  When listed, the SDK adds the upstream
# include path + the matching compile-time profile (from
# metadata/library-profiles/<lib>/) so the library is set up
# correctly for the embedded environment.  You use the library
# through its native API (e.g. `#include "etl/vector.h"`,
# `lv_label_create(...)`, `nlohmann::json::parse(...)`).  No
# <alp/...> wrapper -- "wrapping everything would be chaos."
#
# libraries:
#   # User-facing C++ libs
#   - etl                 # ETL CPP container library (no-STL profile)
#   - fmt                 # libfmt (header-only, no-iostream profile)
#   - nlohmann_json       # nlohmann/json (no-exception profile)
#   - doctest             # single-header C++ test framework
#   # UI / display
#   - lvgl                # LVGL (lv_conf.h profile for E1M displays)
#   # Crypto / TLS
#   - mbedtls             # TLS 1.3 client + AEAD subset (no MD5/SHA1/CBC)
#   # Filesystem
#   - littlefs            # Fail-safe filesystem for microcontrollers
#   # DSP / math
#   - cmsis_dsp           # ARM CMSIS-DSP (Cortex-M / Cortex-A FFT, FIR, ...)
#
# Note: SDK-internal libraries (LwRB used for audio DMA staging,
# nanopb used for <alp/mproc.h> IPC frame serialisation) don't
# appear in this list.  The SDK uses them directly when the
# relevant subsystem is compiled in; consumers never enable them.

# -------------------------------------------------------------------
# Connectivity feature toggles
# -------------------------------------------------------------------
# iot:
#   wifi: true            # Pull in <alp/iot.h>'s Wi-Fi station path
#   mqtt: true            # MQTT client (requires wifi or wired net)
#   ble:  false           # BLE host stack (requires CONFIG_BT on Zephyr)
#   tls:  true            # MbedTLS for <alp/security.h>

# -------------------------------------------------------------------
# Diagnostic surface
# -------------------------------------------------------------------
# diagnostics:
#   last_error: true      # alp_last_error() thread-local slot
#   log_level:  info      # error | warn | info | debug | trace
