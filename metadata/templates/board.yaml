# board.yaml -- ALP SDK project configuration (schema v2)
#
# Copy this template to your application root and edit the values
# for your project.  scripts/alp_orchestrate.py reads this file,
# resolves the SoM topology, fans out into per-core build slices
# (Zephyr / Yocto / baremetal), and emits a system manifest that
# `west alp-image` / `west alp-flash` / OTA consume.
#
# === This is the ONLY place to configure the firmware. ===
#
# Don't edit prj.conf, don't pass extra -D flags, don't hand-edit
# local.conf's MACHINE.  Every other config artefact is DERIVED
# from this file.  If you can't express what you need here, the
# right fix is to extend the schema -- file an issue.
#
# See docs/heterogeneous-builds.md for the per-core walk-through
# and docs/board-config.md for the schema reference.  The full
# design rationale lives at
# docs/superpowers/specs/2026-05-15-heterogeneous-os-orchestration-design.md
#
# Validated against metadata/schemas/board-config-v2.schema.json.

schema_version: 2

# -------------------------------------------------------------------
# SoM identity -- which MODULE does this firmware target?
# -------------------------------------------------------------------
# Distinct from `carrier` below: the SoM is the small (35x35 or
# 45x65) module that mounts on a carrier.  On-module components
# (silicon, on-module radio, on-module secure element + RTC + EEPROM)
# are fixed at SoM-fab time -- you can't DNI them after order.  The
# `overrides` block here covers SoM variants only (e.g. a custom
# AEN that omits the OPTIGA Trust M).
som:
  # Stock SKU.  Recognised values:
  #   E1M-AEN301 / AEN401 / AEN501 / AEN601 / AEN701 / AEN801   (Alif Ensemble)
  #   E1M-V2N101 / V2N102                                       (Renesas RZ/V2N)
  #   E1M-V2M101 / V2M102                                       (V2N + DEEPX DX-M1)
  #   E1M-NX9xxx                                                (NXP i.MX 93)
  #
  # The SDK ships per-SKU presets at:
  #   metadata/e1m_modules/<MPN>.yaml
  sku: E1M-AEN701

  # Hardware revision the firmware is built for.  Optional --
  # falls back to the SKU preset's `default_hw_rev`.  Validated
  # against metadata/e1m_modules/<family>/hw-revisions.yaml at
  # build time + against the on-module BOARD_ID ADC channel at
  # runtime.  See docs/board-config.md "Hardware revision tracking".
  #
  # hw_rev: r1

  # SoM-variant overrides (uncomment for custom modules only).
  # IMUs / barometers / OLEDs / cameras live on the CARRIER, not the
  # SoM -- see the carrier block below.
  #
  # overrides:
  #   wifi_ble:       absent          # DNI'd the on-module CC3501E / Murata radio
  #   secure_element: none            # custom AEN without the OPTIGA Trust M
  #   rtc_external:   none            # custom AEN without the RV-3028-C7

  # Memory overrides (custom DRAM / flash population of the same SKU).
  #
  # memory:
  #   dram_mbit:   65536              # 64 Gbit LPDDR4X (V2N102 default)
  #   flash_mbit:  131072             # 128 Gbit eMMC
  #   mram_kbit:   13312              # 13 Mbit (Alif Ensemble only)

# -------------------------------------------------------------------
# Carrier board -- where the on-board sensors, OLEDs, cameras live
# -------------------------------------------------------------------
# Distinct from `som` above: the carrier is the user-or-EVK PCB the
# SoM mounts on.  This is where IMUs, barometers, OLEDs, cameras,
# mic/speaker amps, current monitors, I/O expanders, and similar
# carrier-side parts get declared.  Shared across cores (a carrier
# is a physical assembly fact, not a runtime mapping fact).
#
# Stock carrier names:
#   E1M-EVK     -- 35x35 EVK for AEN / N93 SoMs
#   E1M-X-EVK   -- 45x65 EVK for V2N / V2N-M1 SoMs
#
# For a custom carrier, pick any unique name and list every
# populated chip-driver in `populated` -- each `true` enables the
# corresponding CONFIG_ALP_SDK_CHIP_<NAME>=y in the build.
#
# Omit the `carrier:` block entirely if your firmware doesn't
# reach beyond the SoM (e.g. headless inference-only build).
carrier:
  name: E1M-EVK

  # Carrier hardware revision.  Same enforcement rules as
  # `som.hw_rev` (optional, falls back to the carrier preset's
  # `default_hw_rev`, validated build-time + runtime).
  #
  # hw_rev: r1

  # Stock-carrier overrides.  Only list keys that differ from the
  # carrier preset's `populated` defaults -- e.g. set lsm6dso:
  # false on a custom variant that DNI'd it for cost.
  #
  # populated:
  #   lsm6dso:    false   # DNI'd on this custom assembly
  #   bmi323:     false
  #   tas2563:    false   # no speaker amps populated

# -------------------------------------------------------------------
# Per-core runtime + app slices (board.yaml v2)
# -------------------------------------------------------------------
# Heterogeneous-OS orchestration (replaces v1's top-level `os:`).
# Keys are canonical core IDs from the SoM preset's `topology:`
# block (e.g. `a55_cluster`, `m33_sm`, `m55_hp`, `m55_he`,
# `a32_cluster`, `m33`).  Per-core fields the orchestrator reads:
#
#   os:          zephyr | yocto | baremetal | off
#   app:         path to the app source directory for this core
#                  - zephyr   -> dir with prj.conf or CMakeLists.txt
#                  - baremetal-> dir with CMakeLists.txt
#                  - yocto    -> recipe directory OR `image:` instead
#   image:       Yocto image recipe name (e.g. alp-image-edge)
#   peripherals: Zephyr peripheral subsystems / Yocto packages
#                  needed by this slice (per-core, not project-wide)
#   libraries:   Library knobs scoped to this slice
#   inference:   Inference backend selection (per-slice)
#   iot:         Connectivity feature toggles (per-slice)
#
# Customers may declare a subset of cores; missing keys inherit
# the SoM preset's `topology:` defaults.  Use `os: off` to skip a
# core entirely.
#
# Single-OS example:
cores:
  m55_hp:
    os: zephyr
    app: ./src
    peripherals: [gpio, i2c]
    inference: { backend: auto, default_arena_kib: 128 }
    # libraries: [...]
    # iot:       {...}

  # Other cores left unspecified inherit the SoM preset's defaults
  # (e.g. m55_he gets `os: zephyr, app: alp-stock-shim`).  To skip
  # a peer core explicitly:
  #
  # m55_he:
  #   os: off

# Heterogeneous example (V2N -- A55 Yocto + M33 Zephyr peers):
#
# cores:
#   a55_cluster:
#     os: yocto
#     app: ./linux
#     image: alp-image-edge
#     peripherals: [ethernet, usb, emmc]
#     libraries:   [mbedtls, nlohmann_json]
#     iot:         { wifi: true, mqtt: true }
#   m33_sm:
#     os: zephyr
#     app: ./m33_sm
#     peripherals: [adc, pwm, i2c, gpio]
#     libraries:   [cmsis_dsp]

# -------------------------------------------------------------------
# Cross-core IPC carve-outs (optional)
# -------------------------------------------------------------------
# Each entry declares a shared-memory region the orchestrator
# allocates from the SoM preset's `memory_map:` (filtered by
# `accessible_from:` for the listed endpoints).  Addresses + endpoint
# IDs are computed deterministically and emitted into the generated
# <alp/system_ipc.h> header that both slices include.
#
# ipc:
#   - kind: rpmsg                # rpmsg | raw_shmem | mailbox_only
#     endpoints: [a55_cluster, m33_sm]
#     carve_out_kb: 512
#     name: alp_default_rpmsg

# -------------------------------------------------------------------
# Chips populated for THIS project (not pre-populated by carrier)
# -------------------------------------------------------------------
# chips:
#   - lsm6dso
#   - st7789

# -------------------------------------------------------------------
# Diagnostic surface (project-wide)
# -------------------------------------------------------------------
diagnostics:
  log_level: info       # error | warn | info | debug | trace
  # last_error: true    # alp_last_error() thread-local slot
