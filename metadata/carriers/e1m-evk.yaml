# Stock preset for the E1M Development Board (35x35 SoM carrier).
#
# Reference carrier for E1M-AEN and (future) E1M-N93 SoM families.
# Authoritative wiring + per-pad assignment live in
# include/alp/boards/alp_e1m_evk.h; this YAML file lists the chip
# drivers the project loader should enable
# (CONFIG_ALP_SDK_CHIP_<NAME>=y) when `carrier.name: E1M-EVK` is
# set in alp.yaml.
#
# Custom carriers (your own board design) skip this preset and
# declare components directly in alp.yaml's `carrier.populated`
# block.

schema_version: 1

name: E1M-EVK
display_name: "E1M Development Board (35x35 carrier)"
hosts_som_families: [alif-ensemble, nxp-imx9]

# Standard population.  Each `true` becomes
# CONFIG_ALP_SDK_CHIP_<NAME>=y at build time; the user can flip
# individual entries to `false` in alp.yaml's carrier.populated
# block for DNI variants.
populated:
  # IMUs (the EVK mounts multiple for benchmark comparison; the
  # app picks which one it uses at runtime).
  lsm6dso:                  true
  bmi323:                   true
  icm42670:                 true

  # Environmental
  bmp581:                   true
  bme280:                   false               # not on the EVK by default

  # Accelerometer (additional, beyond the IMUs)
  lis2dw12:                 false               # not on the EVK by default

  # Displays
  ssd1306:                  true                # mono OLED (I2C)
  ssd1331:                  false               # colour OLED (SPI), not on the EVK

  # Camera + camera mux
  ov5640:                   false               # not on the EVK by default
                                                # (use rzv_drp-ai_yolo_cam or e-CAM22)
  cam_mux_pi3wvr626:        true                # MIPI CSI 2:1 camera mux

  # Audio
  pdm_mic:                  true                # 4x PDM mics
  tas2563:                  true                # 2x speaker amps (U27, U28)

  # I/O expander
  tcal9538:                 true                # TCA9538/TCAL9538 at 0x72

  # Power instrumentation
  ina236:                   true                # 6x current monitors at 0x40..0x46

# Inference + display defaults a stock EVK app would pick.  Apps
# override in their alp.yaml as needed.
defaults:
  display:                  ssd1306             # the always-populated OLED
  primary_imu:              lsm6dso             # canonical (other IMUs are alternates)

status:
  preliminary:              false
  partial_hw_config:        false               # wiring authoritative via the C header
