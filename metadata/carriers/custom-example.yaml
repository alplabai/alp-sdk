# Worked example: a custom carrier derived from the E1M-EVK reference.
#
# Imagine a production product based on E1M-AEN701 that ships a
# slim sensor-only board -- it keeps the EVK's IMU + barometer for
# motion + altitude, drops the multimedia / debug parts (OLEDs,
# camera, speaker amps, current monitors, I/O expander).
#
# Two equivalent ways to express this:
#
#   (a) Reference E1M-EVK + override in alp.yaml (lightweight).
#       See the example block in metadata/carriers/e1m-evk.yaml
#       header.
#
#   (b) Fork this YAML to your own carrier preset (heavyweight,
#       reusable across projects).  This file is the example fork.
#
# Copy this file to metadata/carriers/<your-board-name>.yaml,
# edit the populated list, and point alp.yaml at it:
#
#     carrier:
#       name: my-sensor-board

schema_version: 1

name: custom-example
display_name: "Custom sensor board (E1M-AEN derivative)"
hosts_som_families: [alif-ensemble]

# Carrier-side chip population.  Each key matches a chip driver
# in chips/<name>/ (i.e. an entry in zephyr/Kconfig's
# "ALP SDK chip drivers" menu).  True enables
# CONFIG_ALP_SDK_CHIP_<NAME>=y in the generated build.
populated:
  # Motion + environmental (kept from E1M-EVK reference)
  lsm6dso:                  true
  bmi323:                   false               # not needed on this slim board
  icm42670:                 false
  bmp581:                   true

  # Storage + display (dropped from E1M-EVK)
  ssd1306:                  false               # no on-board display
  ssd1331:                  false
  ov5640:                   false               # no camera

  # Audio (dropped)
  pdm_mic:                  false
  tas2563:                  false               # no speakers

  # Power / instrumentation (dropped -- production board doesn't need it)
  ina236:                   false

  # I/O routing (dropped -- this board has no I/O expander)
  tcal9538:                 false
  cam_mux_pi3wvr626:        false

defaults:
  display:                  null
  primary_imu:              lsm6dso

status:
  preliminary:              false
  partial_hw_config:        false               # consumer-authored, complete
