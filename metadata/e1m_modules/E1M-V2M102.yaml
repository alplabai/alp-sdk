# Stock preset for E1M-V2M102 (V2N-M1 + DEEPX, larger memory).

schema_version: 1

sku: E1M-V2M102
family: renesas-rzv2n
silicon: renesas:rzv2n:n44

display_name: "E1M-V2M102 (Renesas RZ/V2N + DEEPX DX-M1, larger memory)"

on_module:
  silicon:              renesas:rzv2n:n44
  pmic_main:            act8760
  pmic_secondary:       da9292
  clock_generator:      clk_5l35023b
  rtc_external:         rv3028c7
  temperature_sensor:   tmp112
  eeprom:               eeprom_24c128
  secure_element:       optiga_trust_m
  wifi_ble:             murata_lbee5hy2fy
  supervisor_mcu:       gd32g553
  ethernet_phy:         rtl8211fdi
  ethernet_phy_count:   2
  nor_flash:            xspi
  emmc:                 sd0
  npu:                  deepx_dxm1
  pcie_mux:             pi3dbs12212

  i2c_devices:
    brd_i2c:
      bus_master: renesas-rzv2n
      devices:
        - { chip: rv3028c7,         role: rtc,                       address_7bit: "0x52" }
        - { chip: optiga_trust_m,   role: secure_element,            address_7bit: "0x30" }
        - { chip: tmp112,           role: temp_sensor,               address_7bit: "0x40" }
        - { chip: clk_5l35023b,     role: clock_generator,           address_7bit: "0x68" }
        - { chip: gd32g553,         role: supervisor_mcu_i2c_slave,  address_7bit: "0x70" }
        - { chip: act8760,          role: pmic_main_page0,           address_7bit: "0x25" }
        - { chip: act8760,          role: pmic_main_page1,           address_7bit: "0x26" }
        - { chip: da9292,           role: pmic_secondary,            address_7bit: "0x1C" }
        - { chip: tps628640,        role: deepx_lpddr_0v85,          address_7bit: "0x48" }
        - { chip: tps628640,        role: deepx_ddr5_vdd,            address_7bit: "0x44" }
        - { chip: tps628640,        role: deepx_ddr5_vddq,           address_7bit: "0x4F" }
        - { chip: tps628640,        role: lpddr4x_0v6,               address_7bit: "0x4D", assembled: optional }
    e1m_i2c0:
      bus_master: renesas-rzv2n
      devices:
        - { chip: eeprom_24c128,    role: eeprom,                    address_7bit: "0x50" }

memory:
  dram_mbit:            65536                  # 64 Gbit LPDDR4X
  flash_mbit:           65536                  # 64 Gbit eMMC 5.1
  mram_kbit:            null

inference:
  preferred_backend:    deepx_dxm1
  ethos_u_variant:      null

capabilities:
  ethos_u55_count:      0
  ethos_u85_count:      0
  drp_ai:               true
  deepx_dx:             true
  helium_mve:           false
  neon:                 true
  gpu2d:                false
  dave2d:               false
  cryptocell:           false
  inline_aes:           false
  cau:                  true
  optiga_trust_m:       true
  xspi_dma:             false
  emmc_dma:             true
  quadspi_dma:          true
  dma2d:                false
  tmu_cordic:           true
  tmu_fft:              true
  tmu_fac:              true

topology:
  a55_cluster:
    os: yocto
    app: alp-image-edge
    machine: e1m-v2m102-a55           # Yocto MACHINE
    toolchain: poky-glibc
  m33_sm:
    os: zephyr
    app: alp-stock-shim
    board: alp_e1m_v2m102_m33_sm      # Zephyr board target
    toolchain: arm-zephyr-eabi

memory_map:
  - { name: ddr_main,  base: 0x48000000, size_mib: 4096, accessible_from: [a55_cluster, m33_sm], cacheable: true  }
  - { name: ocram_low, base: 0x00010000, size_kib:  512, accessible_from: [a55_cluster, m33_sm], cacheable: false }
  - { name: m33_tcm,   base: 0x80000000, size_kib:  128, accessible_from: [m33_sm],               cacheable: false }

mailbox:
  controller: renesas_mhu
  channels:
    - { id: 0, reserved_for: alp_default_rpmsg }
    - { id: 1, reserved_for: app }
    - { id: 2, reserved_for: app }
    - { id: 3, reserved_for: power_mgmt }

helper_firmware:
  - name:          gd32_bridge
    chip:          gd32g553
    firmware_path: firmware/gd32-bridge/build/gd32_bridge.bin
    flash_method:  swd_v2n_host
    flash_args:
      interface: cmsis-dap
      target:    gd32g553
      base:      "0x08000000"

default_hw_rev:         r1
default_carrier:        E1M-X-EVK

status:
  preliminary:          false
  partial_hw_config:    false
