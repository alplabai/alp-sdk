# Stock preset for E1M-NX9101 (NXP i.MX 93 SoM).
#
# Placeholder MPN -- the exact SKU number for the production
# E1M-N93 SoM is TBD pending the user-supplied HW config writeup.
# The schema's som.sku regex accepts E1M-NX9xxx for any 4-digit
# tail, so when the real SKU lands (e.g. E1M-NX9301 for i.MX 9301-
# based) drop a sibling preset under metadata/e1m_modules/<MPN>/
# and update default board.yaml references.

schema_version: 1

sku: E1M-NX9101
family: nxp-imx9
silicon: nxp:imx9:imx93

display_name: "E1M-NX9101 (NXP i.MX 93 -- exact SKU TBD)"

on_module:
  silicon:              nxp:imx9:imx93         # 2x Cortex-A55 + Cortex-M33 + Ethos-U65
  wifi_ble:             TBD                    # one of Murata Type 2DL/2EL/2KL/2LL per BOM
  pmic:                 pca9451a               # NXP PCA9451A
  ethernet_phy:         TBD                    # variant of RTL or NXP PHY per BOM

memory:
  dram_mbit:            TBD
  flash_mbit:           TBD
  mram_kbit:            null                   # i.MX 93 has no on-die MRAM

inference:
  preferred_backend:    ethos_u
  ethos_u_variant:      u65                    # i.MX 93 ships Ethos-U65

capabilities:
  ethos_u55_count:      0
  ethos_u65_count:      1          # i.MX 93's single Ethos-U65.
  ethos_u85_count:      0
  drp_ai:               false
  deepx_dx:             false
  helium_mve:           false      # i.MX 93's M33 has no Helium.
  neon:                 true       # 2× Cortex-A55 + Neon.
  gpu2d:                false      # i.MX 93 has no 2D accelerator block.
  dave2d:               false
  cryptocell:           false
  inline_aes:           false
  cau:                  false
  optiga_trust_m:       true       # Populated on the E1M-NX9101 module.
  xspi_dma:             false
  emmc_dma:             true
  quadspi_dma:          false
  dma2d:                false
  tmu_cordic:           false
  tmu_fft:              false
  tmu_fac:              false

topology:
  a55_cluster:
    os: yocto
    app: alp-image-edge
    machine: e1m-nx9101-a55             # Yocto MACHINE
    toolchain: poky-glibc
  m33:
    os: zephyr
    app: alp-stock-shim
    board: alp_e1m_nx9101_m33           # Zephyr board target
    toolchain: arm-zephyr-eabi

# Memory base addresses + sizes stay TBD until the user supplies
# the authoritative HW config writeup.
memory_map:
  - { name: ddr_main,  base: TBD, size_mib: TBD, accessible_from: [a55_cluster, m33], cacheable: true  }
  - { name: ocram,     base: TBD, size_kib: TBD, accessible_from: [a55_cluster, m33], cacheable: false }

# NXP MU (Messaging Unit) controller name TBD pending the
# hand-written HW config.
mailbox:
  controller: TBD
  channels:
    - { id: 0, reserved_for: alp_default_rpmsg }
    - { id: 1, reserved_for: app }
    - { id: 2, reserved_for: app }
    - { id: 3, reserved_for: power_mgmt }

default_hw_rev:         r1                  # see metadata/e1m_modules/<family>/hw-revisions.yaml

default_carrier:        E1M-EVK                # 35x35 carrier same as AEN family

status:
  preliminary:          true                   # production SKU + BOM choices TBD
  partial_hw_config:    true
