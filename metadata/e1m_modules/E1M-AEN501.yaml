# Stock preset for E1M-AEN501 (the SoM, NOT the EVK carrier).
# See E1M-AEN701.yaml header for the file's role + the
# project memory note governing what stays TBD.

schema_version: 1

sku: E1M-AEN501
family: alif-ensemble
silicon: alif:ensemble:e5

display_name: "E1M-AEN501 (Alif Ensemble E5 -- 1x A32 + 2x M55 + 2x Ethos-U55, preliminary)"

on_module:
  silicon:              alif:ensemble:e5       # 1x Cortex-A32 @ 800 + 2x M55 + Ethos-U55
  wifi_ble:             cc3501e
  secure_element:       optiga_trust_m
  rtc_external:         rv3028c7
  temperature_sensor:   tmp112
  eeprom:               eeprom_24c128

memory:
  dram_mbit:            TBD
  flash_mbit:           TBD
  mram_kbit:            TBD

inference:
  preferred_backend:    ethos_u
  ethos_u_variant:      u55
  npu_population:
    - { variant: u55, role: NPU-HE, paired_with: M55-HE }       # E5 carries two U55s; no U85.
    - { variant: u55, role: NPU-HP, paired_with: M55-HP }

capabilities:
  ethos_u55_count:      2
  ethos_u85_count:      0
  drp_ai:               false
  deepx_dx:             false
  helium_mve:           true
  neon:                 true       # E5 carries one Cortex-A32 @ 800 MHz.
  gpu2d:                false      # TBD.
  dave2d:               false      # TBD.
  cryptocell:           true
  inline_aes:           true
  cau:                  false
  optiga_trust_m:       true
  xspi_dma:             true
  emmc_dma:             false
  quadspi_dma:          false
  dma2d:                true
  tmu_cordic:           false
  tmu_fft:              false
  tmu_fac:              false

topology:
  a32_cluster:
    os: yocto
    app: alp-image-edge
    machine: e1m-aen501-a32             # Yocto MACHINE
    toolchain: poky-glibc
  m55_hp:
    os: zephyr
    app: alp-stock-shim
    board: alp_e1m_aen501_m55_hp        # Zephyr board target
    toolchain: arm-zephyr-eabi
  m55_he:
    os: zephyr
    app: alp-stock-shim
    board: alp_e1m_aen501_m55_he        # Zephyr board target
    toolchain: arm-zephyr-eabi

# Memory base addresses + sizes stay TBD until the user supplies
# the authoritative HW config writeup.
memory_map:
  - { name: mram_main, base: TBD, size_kib: TBD, accessible_from: [a32_cluster, m55_hp, m55_he], cacheable: true  }
  - { name: sram_main, base: TBD, size_kib: TBD, accessible_from: [a32_cluster, m55_hp, m55_he], cacheable: false }

# Alif IPC controller name TBD pending the hand-written HW config.
mailbox:
  controller: TBD
  channels:
    - { id: 0, reserved_for: alp_default_rpmsg }
    - { id: 1, reserved_for: app }
    - { id: 2, reserved_for: app }
    - { id: 3, reserved_for: power_mgmt }

helper_firmware:
  - name:          cc3501e_otp
    chip:          cc3501e
    firmware_path: TBD
    flash_method:  TBD
    flash_args:    TBD

default_hw_rev:         r1                  # see metadata/e1m_modules/<family>/hw-revisions.yaml

default_carrier:        E1M-EVK

status:
  preliminary:          true                   # E5 datasheet not yet public
  partial_hw_config:    true
