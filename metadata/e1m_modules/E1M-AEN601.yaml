# Stock preset for E1M-AEN601 (the SoM, NOT the EVK board).
# See E1M-AEN801.yaml header for the file's role + the
# project memory note governing what stays TBD.

schema_version: 1

sku: E1M-AEN601
family: alif-ensemble
silicon: alif:ensemble:e6
silicon_variant: AE612FA0E5597LS0        # see metadata/socs/alif/ensemble/e6.json variants[]

display_name: "E1M-AEN601 (Alif Ensemble E6 -- 1x A32 + 2x M55 + 3x Ethos-U, preliminary)"

on_module:
  silicon:              alif:ensemble:e6       # 1x A32, 2x Cortex-M55, 2x U55 + 1x U85
  wifi_ble:             cc3501e
  secure_element:       optiga_trust_m
  rtc_external:         rv3028c7
  temperature_sensor:   tmp112
  eeprom:               eeprom_24c128
  ospi_memories:
    ospi0:
      chip:           MX25UM25645GXDI00   # Macronix OctaFlash (xSPI NOR)
      assembled:      optional            # BOM variant
      capacity_mbit:  256                 # 256 Mbit (32 MiB)
      chip_select:    0                   # OSPI0 CS0
      role:           app_storage
    ospi1:
      chip:           TBD            # OSPI1 controller unused on this SoM: both OSPI devices
      assembled:      optional       # share the OSPI0 octal bus (NOR = CS0, HyperRAM = CS1)
      capacity_mbit:  TBD
      role:           data_log
  # External HyperRAM -- volatile XIP / scratch RAM, separate from the
  # NOR flash above.  Shares the OSPI0 octal controller with the flash,
  # separated only by chip-select (NOR flash = CS0, HyperRAM = CS1).
  hyperram:
    chip:           W958D8NBYA5I    # Winbond OctalRAM (HyperBus)
    capacity_mbit:  256             # 256 Mbit (32 MiB)
    interface:      ospi0
    chip_select:    1

# Off-SoC module memory in the canonical cross-family shape (see
# som-preset-v1.schema.json `memory:`).  Values are DERIVED from the
# on_module facts above, never invented:
#   dram_mbit  <- on_module.hyperram.capacity_mbit (populated on every
#                 AEN BOM variant).
#   flash_mbit <- TBD: the OSPI0 NOR (256 Mbit) is `assembled: optional`
#                 (per-BOM variant), so a single number would be wrong
#                 for the DNI variant.
memory:
  dram_mbit:            256
  flash_mbit:           TBD

inference:
  preferred_backend:    ethos_u
  ethos_u_variant:      u85               # primary -- E6 ships one U85 alongside two U55s.
  npu_population:
    - { variant: u55, role: NPU-HE, paired_with: M55-HE }
    - { variant: u55, role: NPU-HP, paired_with: M55-HP }
    - { variant: u85, role: NPU-HG, paired_with: HG-subsystem }

capabilities:
  optiga_trust_m:       true

topology:
  a32_cluster:
    app: alp-image-edge
    machine: e1m-aen601-a32             # Yocto MACHINE
    toolchain: poky-glibc
  m55_hp:
    app: alp-stock-shim
    board: alp_e1m_aen601_m55_hp        # Zephyr board target
    toolchain: arm-zephyr-eabi
  m55_he:
    app: alp-stock-shim
    board: alp_e1m_aen601_m55_he        # Zephyr board target
    toolchain: arm-zephyr-eabi

# Memory layout (SRAM banks + MRAM) is derived from the SoC variant
# resolved via `silicon_variant:` -- see metadata/socs/<vendor>/<family>/<part>.json
# `variants[].sram_banks_kb` + `mram_mb`. Declare a memory_map: block
# here ONLY for non-stock partitioning (none of the current 11 SKUs
# need one).

# Alif IPC controller name TBD pending the hand-written HW config.
mailbox:
  controller: TBD
  channels:
    - { id: 0, reserved_for: alp_default_rpmsg }
    - { id: 1, reserved_for: app }
    - { id: 2, reserved_for: app }
    - { id: 3, reserved_for: power_mgmt }

# E1M pads / instances that route through the on-module CC3501E
# coprocessor instead of through the Alif Ensemble silicon.  Apps
# using these pads via `alp_gpio_open()` / `alp_spi_open()` etc.
# get CC3501E command dispatch automatically; the board-side
# role (e.g. EVK_PIN_BMI323_INT1) stays SoM-agnostic.
#
# Source of truth:
#   - metadata/e1m_modules/aen/from-cc3501e.tsv
#   - AEN family hardware design (CC3501E-owned GPIO pads)
pad_routes:
  # SPI1 inter-chip bus -- CC3501E hosts the SPI peripheral.
  - { e1m: E1M_SPI1,      dispatch: cc3501e,
      doc: "Inter-chip SPI1 fast path; CC3501E acts as SPI peripheral." }

  # GPIO pads that physically terminate on CC3501E (not on Alif silicon).
  - { e1m: E1M_GPIO_IO8,  dispatch: cc3501e, dispatch_pin: 30,
      doc: "CC3501E GPIO_30 (board 2626-R2; GPIO30 moved here from IO21)." }
  - { e1m: E1M_GPIO_IO9,  dispatch: cc3501e, dispatch_pin: 12,
      doc: "CC3501E GPIO_12." }
  - { e1m: E1M_GPIO_IO10, dispatch: cc3501e, dispatch_pin: 35,
      doc: "CC3501E GPIO_35 (board 2626-R2)." }
  - { e1m: E1M_GPIO_IO11, dispatch: cc3501e, dispatch_pin: 2,
      doc: "CC3501E GPIO_2." }
  - { e1m: E1M_GPIO_IO13, dispatch: cc3501e, dispatch_pin: 13,
      doc: "CC3501E GPIO_13." }
  - { e1m: E1M_GPIO_IO15, dispatch: cc3501e, dispatch_pin: 14,
      doc: "CC3501E GPIO_14." }
  - { e1m: E1M_GPIO_IO16, dispatch: cc3501e, dispatch_pin: 17,
      doc: "CC3501E GPIO_17 (bridge READY/host-IRQ on current firmware)." }
  - { e1m: E1M_GPIO_IO17, dispatch: cc3501e, dispatch_pin: 16,
      doc: "CC3501E GPIO_16 (bridge SPI0 CS on current firmware)." }
  - { e1m: E1M_GPIO_IO18, dispatch: cc3501e, dispatch_pin: 18,
      doc: "CC3501E GPIO_18." }
  - { e1m: E1M_GPIO_IO19, dispatch: cc3501e, dispatch_pin: 19,
      doc: "CC3501E GPIO_19." }
  - { e1m: E1M_GPIO_IO20, dispatch: cc3501e, dispatch_pin: 26,
      doc: "CC3501E GPIO_26." }

# On-module helper MCUs.  CC3501E (TI Wi-Fi 6 + BLE 5.4) is wired
# on the AEN module; firmware is embedded in alp-sdk at
# `firmware/cc3501e/` (ADR 0015) and stays TBD until the first binary
# is built + signed on the bench (the project's standing convention).
# What unblocks the TBDs: the first bench-built, signed cc3501e image
# landing in firmware/cc3501e/prebuilt/ -- see docs/v0.6-tbd-and-
# assumptions.md and metadata/e1m_modules/README.md (issue #44).
helper_firmware:
  - name:          cc3501e_otp
    chip:          cc3501e
    firmware_path: TBD                       # populated when firmware/cc3501e/ cuts its first bench binary
    flash_method:  TBD                       # cc3501e_usb_bootloader or alif_spi_relay; see firmware/cc3501e/flash.py
    flash_args:    TBD                       # follows flash_method once that lands

default_hw_rev:         r2                  # see metadata/e1m_modules/<family>/hw-revisions.yaml

default_board:        E1M-EVK

status:
  preliminary:          true                   # E6 datasheet not yet public
  partial_hw_config:    true
