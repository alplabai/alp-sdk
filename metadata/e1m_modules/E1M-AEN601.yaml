# Stock preset for E1M-AEN601 (the SoM, NOT the EVK carrier).
# See E1M-AEN701.yaml header for the file's role + the
# project memory note governing what stays TBD.

schema_version: 1

sku: E1M-AEN601
family: alif-ensemble
silicon: alif:ensemble:e6

display_name: "E1M-AEN601 (Alif Ensemble E6 -- 1x A32 + 2x M55 + 3x Ethos-U55, preliminary)"

on_module:
  silicon:              alif:ensemble:e6       # 1x A32, dual-NPU 204 GOPS
  wifi_ble:             cc3501e
  secure_element:       optiga_trust_m
  rtc_external:         rv3028c7
  temperature_sensor:   tmp112
  eeprom:               eeprom_24c128

memory:
  dram_mbit:            TBD
  flash_mbit:           TBD
  mram_kbit:            TBD

inference:
  preferred_backend:    ethos_u
  ethos_u_variant:      u85               # primary -- E6 ships one U85 alongside two U55s.
  npu_population:
    - { variant: u55, role: NPU-HE, paired_with: M55-HE }
    - { variant: u55, role: NPU-HP, paired_with: M55-HP }
    - { variant: u85, role: NPU-HG, paired_with: HG-subsystem }

capabilities:
  ethos_u55_count:      2
  ethos_u85_count:      1
  drp_ai:               false
  deepx_dx:             false
  helium_mve:           true
  neon:                 true       # E6 carries one Cortex-A32 @ 800 MHz.
  gpu2d:                true       # E6 datasheet confirms GPU2D.
  dave2d:               true
  cryptocell:           true
  inline_aes:           true
  cau:                  false
  optiga_trust_m:       true
  xspi_dma:             true
  emmc_dma:             false
  quadspi_dma:          false
  dma2d:                true
  tmu_cordic:           false
  tmu_fft:              false
  tmu_fac:              false

default_hw_rev:         r1                  # see metadata/e1m_modules/<family>/hw-revisions.yaml

default_carrier:        E1M-EVK

status:
  preliminary:          true                   # E6 datasheet not yet public
  partial_hw_config:    true
