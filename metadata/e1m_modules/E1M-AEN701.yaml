# Stock preset for E1M-AEN701 (the SoM, NOT the EVK board).
#
# This file lists ONLY components physically populated on the
# E1M-AEN module PCB -- silicon, on-module radio, on-module
# secure element + RTC + temperature sensor + EEPROM.  Board-
# side parts (IMUs, barometers, OLEDs, cameras, current monitors,
# speaker amps...) live in metadata/boards/e1m-evk.yaml.
#
# Per the project memory note "pending exact hardware configurations
# -- the user will hand-write authoritative pin assignments and
# per-SoM HW config later; mark unknowns TBD, never invent values",
# memory capacities below stay TBD until the user supplies them
# authoritatively from the AEN module datasheet.

schema_version: 1

sku: E1M-AEN701
family: alif-ensemble
silicon: alif:ensemble:e7
silicon_variant: AE722F80F55D5LS         # see metadata/socs/alif/ensemble/e7.json variants[]

display_name: "E1M-AEN701 (Alif Ensemble E7)"

# On-module components only.  These are fixed at SoM-fab time; you
# cannot DNI them after ordering.  The component IDs match the
# chip-driver names in chips/<part>/ so the loader can flip the
# corresponding CONFIG_ALP_SDK_CHIP_<NAME>=y at build time.
on_module:
  silicon:              alif:ensemble:e7    # 2x Cortex-A32 + 2x Cortex-M55 + 1x Ethos-U55
  wifi_ble:             cc3501e             # TI CC3501E Wi-Fi 6 + BLE 5.4 coprocessor
  secure_element:       optiga_trust_m      # Infineon SLS32AIA010
  rtc_external:         rv3028c7            # Micro Crystal ultra-low-power RTC
  temperature_sensor:   tmp112              # TI TMP112 on the slave-only LPI2C0 (Tier-3 SE; ADR 0017)
  eeprom:               eeprom_24c128       # Onsemi N24S128C4DYT3G (128-Kbit I2C)
  ospi_memories:
    ospi0:
      chip:           MX25UM25645GXDI00   # Macronix OctaFlash (xSPI NOR)
      assembled:      optional            # BOM variant
      capacity_mbit:  256                 # 256 Mbit (32 MiB)
      chip_select:    0                   # OSPI0 CS0
      role:           app_storage
    ospi1:
      chip:           TBD            # OSPI1 controller unused on this SoM: both OSPI devices
      assembled:      optional       # share the OSPI0 octal bus (NOR = CS0, HyperRAM = CS1)
      capacity_mbit:  TBD
      role:           data_log
  # External HyperRAM -- volatile XIP / scratch RAM, separate from the
  # NOR flash above.  Shares the OSPI0 octal controller with the flash,
  # separated only by chip-select (NOR flash = CS0, HyperRAM = CS1).
  hyperram:
    chip:           W958D8NBYA5I    # Winbond OctalRAM (HyperBus)
    capacity_mbit:  256             # 256 Mbit (32 MiB)
    interface:      ospi0
    chip_select:    1

# Off-SoC module memory in the canonical cross-family shape (see
# som-preset-v1.schema.json `memory:`).  Values are DERIVED from the
# on_module facts above, never invented:
#   dram_mbit  <- on_module.hyperram.capacity_mbit (populated on every
#                 AEN BOM variant).
#   flash_mbit <- TBD: the OSPI0 NOR (256 Mbit) is `assembled: optional`
#                 (per-BOM variant), so a single number would be wrong
#                 for the DNI variant.
memory:
  dram_mbit:            256
  flash_mbit:           TBD

# Inference defaults -- silicon-determined.  `preferred_backend` is
# consumed by the build to set the default per-handle dispatcher when
# the app doesn't pin one; customers cannot countermand it via
# board.yaml (per the v0.6 schema cleanup -- `inference.backend` was
# removed as a customer field).  Apps still pick at runtime via
# `alp_inference_open(.backend = ...)`.
inference:
  preferred_backend:    ethos_u             # Ethos-U55 NPU on-die.
  ethos_u_variant:      u55                 # vs u65 on i.MX 93.
  npu_population:
    - { variant: u55, role: NPU-HE, paired_with: M55-HE }       # E7 carries two U55s; no U85.
    - { variant: u55, role: NPU-HP, paired_with: M55-HP }

capabilities:
  optiga_trust_m:       true

# Standard board the SoM mounts on for development.  Consumers
# can pick any board or write their own in board.yaml.
topology:
  a32_cluster:
    app: alp-image-edge
    machine: e1m-aen701-a32             # Yocto MACHINE
    toolchain: poky-glibc
  m55_hp:
    app: alp-stock-shim
    board: alp_e1m_aen701_m55_hp        # Zephyr board target
    toolchain: arm-zephyr-eabi
  m55_he:
    app: alp-stock-shim
    board: alp_e1m_aen701_m55_he        # Zephyr board target
    toolchain: arm-zephyr-eabi

# Memory layout (SRAM banks + MRAM) is derived from the SoC variant
# resolved via `silicon_variant:` -- see metadata/socs/<vendor>/<family>/<part>.json
# `variants[].sram_banks_kb` + `mram_mb`. Declare a memory_map: block
# here ONLY for non-stock partitioning (none of the current 11 SKUs
# need one).

# Inter-core mailbox IP: ARM MHUv2.  The controller token matches alp-sdk's
# `alif,mhuv2-mbox` Zephyr MBOX driver; endpoint-specific overlays select the
# MHU pair for the requested core topology.  The E1M-AEN801 bench validated the
# driver with dual-M55 OpenAMP RPMsg on 2026-06-19 (#225), and the AEN family
# shares the Alif Ensemble MHUv2 integration exposed by the zephyr_alif DTS.
mailbox:
  controller: alif_mhuv2
  channels:
    - { id: 0, reserved_for: alp_default_rpmsg }
    - { id: 1, reserved_for: app }
    - { id: 2, reserved_for: app }
    - { id: 3, reserved_for: power_mgmt }

# E1M pads / instances that route through the on-module CC3501E
# coprocessor instead of through the Alif Ensemble silicon.  Apps
# using these pads via `alp_gpio_open()` / `alp_spi_open()` etc.
# get CC3501E command dispatch automatically; the board-side
# role (e.g. EVK_PIN_BMI323_INT1) stays SoM-agnostic.
#
# Source of truth:
#   - metadata/e1m_modules/aen/from-cc3501e.tsv
#   - AEN family hardware design (CC3501E-owned GPIO pads)
pad_routes:
  # SPI1 inter-chip bus -- CC3501E hosts the SPI peripheral.
  - { e1m: E1M_SPI1,      dispatch: cc3501e,
      doc: "Inter-chip SPI1 fast path; CC3501E acts as SPI peripheral." }

  # GPIO pads that physically terminate on CC3501E (not on Alif silicon).
  - { e1m: E1M_GPIO_IO8,  dispatch: cc3501e, dispatch_pin: 30,
      doc: "CC3501E GPIO_30 (board 2626-R2; GPIO30 moved here from IO21)." }
  - { e1m: E1M_GPIO_IO9,  dispatch: cc3501e, dispatch_pin: 12,
      doc: "CC3501E GPIO_12." }
  - { e1m: E1M_GPIO_IO10, dispatch: cc3501e, dispatch_pin: 35,
      doc: "CC3501E GPIO_35 (board 2626-R2)." }
  - { e1m: E1M_GPIO_IO11, dispatch: cc3501e, dispatch_pin: 2,
      doc: "CC3501E GPIO_2." }
  - { e1m: E1M_GPIO_IO13, dispatch: cc3501e, dispatch_pin: 13,
      doc: "CC3501E GPIO_13." }
  - { e1m: E1M_GPIO_IO15, dispatch: cc3501e, dispatch_pin: 14,
      doc: "CC3501E GPIO_14." }
  - { e1m: E1M_GPIO_IO16, dispatch: cc3501e, dispatch_pin: 17,
      doc: "CC3501E GPIO_17 (bridge READY/host-IRQ on current firmware)." }
  - { e1m: E1M_GPIO_IO17, dispatch: cc3501e, dispatch_pin: 16,
      doc: "CC3501E GPIO_16 (bridge SPI0 CS on current firmware)." }
  - { e1m: E1M_GPIO_IO18, dispatch: cc3501e, dispatch_pin: 18,
      doc: "CC3501E GPIO_18." }
  - { e1m: E1M_GPIO_IO19, dispatch: cc3501e, dispatch_pin: 19,
      doc: "CC3501E GPIO_19." }
  - { e1m: E1M_GPIO_IO20, dispatch: cc3501e, dispatch_pin: 26,
      doc: "CC3501E GPIO_26." }

# On-module helper MCUs.  CC3501E is the TI Wi-Fi 6 + BLE 5.4
# coprocessor wired to the Alif over SPI1.  Firmware is embedded in
# alp-sdk at `firmware/cc3501e/` (ADR 0015); a signed binary built on
# the bench lands in `firmware/cc3501e/prebuilt/` and its version
# replaces TBD here.
helper_firmware:
  - name:          cc3501e_otp
    chip:          cc3501e
    firmware_path: firmware/cc3501e/prebuilt/cc3501e-v0.2.0.bin
    flash_method:  cc3501e_usb_bootloader     # west alp-flash helper backend; scripts/flash_backends/cc3501e_usb_bootloader.py
    flash_args:                                # device (host bootloader port) + mode are bench/host-specific; the public cc3501e-flasher CLI is not yet shipped
      speed:  921600                           # bootloader UART speed (backend default)
      device: TBD                              # host bootloader COM/tty port -- provided at flash time
      mode:   TBD                              # bootloader entry mode -- pending the public cc3501e-flasher CLI

default_hw_rev:         r2                  # see metadata/e1m_modules/<family>/hw-revisions.yaml

default_board:        E1M-EVK

# Status flags for tooling
status:
  preliminary:          false               # released silicon
  partial_hw_config:    true                # memory fields still TBD
