# Stock preset for E1M-AEN701 (the SoM, NOT the EVK carrier).
#
# This file lists ONLY components physically populated on the
# E1M-AEN module PCB -- silicon, on-module radio, on-module
# secure element + RTC + temperature sensor + EEPROM.  Carrier-
# side parts (IMUs, barometers, OLEDs, cameras, current monitors,
# speaker amps...) live in metadata/carriers/e1m-evk.yaml.
#
# Per the project memory note "pending exact hardware configurations
# -- the user will hand-write authoritative pin assignments and
# per-SoM HW config later; mark unknowns TBD, never invent values",
# memory capacities below stay TBD until the user supplies them
# authoritatively from the AEN module datasheet.

schema_version: 1

sku: E1M-AEN701
family: alif-ensemble
silicon: alif:ensemble:e7

display_name: "E1M-AEN701 (Alif Ensemble E7)"

# On-module components only.  These are fixed at SoM-fab time; you
# cannot DNI them after ordering.  The component IDs match the
# chip-driver names in chips/<part>/ so the loader can flip the
# corresponding CONFIG_ALP_SDK_CHIP_<NAME>=y at build time.
on_module:
  silicon:              alif:ensemble:e7    # 2x Cortex-A32 + 2x Cortex-M55 + 1x Ethos-U55
  wifi_ble:             cc3501e             # TI CC3501E Wi-Fi 6 + BLE 5.4 coprocessor
  secure_element:       optiga_trust_m      # Infineon SLS32AIA010
  rtc_external:         rv3028c7            # Micro Crystal ultra-low-power RTC
  temperature_sensor:   tmp112              # TI TMP112 on Alif's LPI2C
  eeprom:               eeprom_24c128       # Onsemi N24S128C4DYT3G (128-Kbit I2C)

# Memory subsystem -- TBD pending user HW config.  When filled
# in, these flow into the soc_caps + DTS overlays.
memory:
  dram_mbit:            TBD                 # Alif Ensemble: no external DRAM on the
                                            # standard E7 reference; on-die only
  flash_mbit:           TBD                 # SPI-NAND boot flash capacity
  mram_kbit:            TBD                 # on-die MRAM (E7 has 5.5 MB typical)

# Inference defaults -- the SoM's most-capable backend wins for
# `inference.backend: auto`.
inference:
  preferred_backend:    ethos_u             # Ethos-U55 NPU on-die.
  ethos_u_variant:      u55                 # vs u65 on i.MX 93.
  npu_population:
    - { variant: u55, role: NPU-HE, paired_with: M55-HE }       # E7 carries two U55s; no U85.
    - { variant: u55, role: NPU-HP, paired_with: M55-HP }

capabilities:
  ethos_u55_count:      2
  ethos_u85_count:      0
  drp_ai:               false
  deepx_dx:             false
  helium_mve:           true
  neon:                 true       # E7 carries two Cortex-A32s.
  gpu2d:                true       # E7 ships full GPU2D.
  dave2d:               true
  cryptocell:           true
  inline_aes:           true
  cau:                  false
  optiga_trust_m:       true
  xspi_dma:             true
  emmc_dma:             false
  quadspi_dma:          false
  dma2d:                true
  tmu_cordic:           false
  tmu_fft:              false
  tmu_fac:              false

# Standard carrier the SoM mounts on for development.  Consumers
# can pick any carrier or write their own in board.yaml.
topology:
  a32_cluster:
    os: yocto
    app: alp-image-edge
    machine: e1m-aen701-a32             # Yocto MACHINE
    toolchain: poky-glibc
  m55_hp:
    os: zephyr
    app: alp-stock-shim
    board: alp_e1m_aen701_m55_hp        # Zephyr board target
    toolchain: arm-zephyr-eabi
  m55_he:
    os: zephyr
    app: alp-stock-shim
    board: alp_e1m_aen701_m55_he        # Zephyr board target
    toolchain: arm-zephyr-eabi

# Memory base addresses + sizes stay TBD until the user supplies
# the authoritative HW config writeup.
memory_map:
  - { name: mram_main, base: TBD, size_kib: TBD, accessible_from: [a32_cluster, m55_hp, m55_he], cacheable: true  }
  - { name: sram_main, base: TBD, size_kib: TBD, accessible_from: [a32_cluster, m55_hp, m55_he], cacheable: false }

# Alif IPC controller name TBD pending the hand-written HW config.
mailbox:
  controller: TBD
  channels:
    - { id: 0, reserved_for: alp_default_rpmsg }
    - { id: 1, reserved_for: app }
    - { id: 2, reserved_for: app }
    - { id: 3, reserved_for: power_mgmt }

# On-module helper MCUs.  CC3501E is the TI Wi-Fi 6 + BLE 5.4
# coprocessor wired to the Alif over SPI1.  Firmware image is
# delivered as a signed binary by the separate
# `alplabai/cc3501e-firmware` repo; once a release lands its
# version replaces TBD here.
helper_firmware:
  - name:          cc3501e_otp
    chip:          cc3501e
    firmware_path: TBD                       # populated when alplabai/cc3501e-firmware releases v0.1
    flash_method:  TBD                       # cc3501e_usb_bootloader or alif_spi_relay; see firmware/cc3501e/flash.py
    flash_args:    TBD

default_hw_rev:         r1                  # see metadata/e1m_modules/<family>/hw-revisions.yaml

default_carrier:        E1M-EVK

# Status flags for tooling
status:
  preliminary:          false               # released silicon
  partial_hw_config:    true                # memory fields still TBD
