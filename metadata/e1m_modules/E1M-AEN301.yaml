# Stock preset for E1M-AEN301 (the SoM, NOT the EVK board).
#
# Customer's board.yaml references this preset by setting:
#   som:
#     sku: E1M-AEN301
#
# This file lists ONLY components physically populated on the
# E1M-AEN module PCB.  Board-side parts live in
# metadata/boards/<name>.yaml.
#
# Per the project memory note, memory capacities + the per-SKU
# silicon SKU-specific numbers stay TBD until the user supplies
# the authoritative HW config.

schema_version: 1

sku: E1M-AEN301
family: alif-ensemble
silicon: alif:ensemble:e3
silicon_variant: AE302F80F55D5LE         # see metadata/socs/alif/ensemble/e3.json variants[]

display_name: "E1M-AEN301 (Alif Ensemble E3)"

# On-module components (fixed at SoM-fab time; common across the
# AEN family).
on_module:
  silicon:              alif:ensemble:e3       # 2x Cortex-M55, 2x Ethos-U55 (no A-core)
  wifi_ble:             cc3501e                # TI Wi-Fi 6 + BLE 5.4 coprocessor
  secure_element:       optiga_trust_m         # Infineon SLS32AIA010
  rtc_external:         rv3028c7               # Micro Crystal ultra-low-power RTC
  temperature_sensor:   tmp112                 # TI TMP112 on the slave-only LPI2C0 (Tier-3 SE; ADR 0017)
  eeprom:               eeprom_24c128          # Onsemi N24S128C4DYT3G (128-Kbit I2C)
  ospi_memories:
    ospi0:
      chip:           MX25UM25645GXDI00   # Macronix OctaFlash (xSPI NOR)
      assembled:      optional            # BOM variant
      capacity_mbit:  256                 # 256 Mbit (32 MiB)
      chip_select:    0                   # OSPI0 CS0
      role:           app_storage
    ospi1:
      chip:           TBD            # OSPI1 controller unused on this SoM: both OSPI devices
      assembled:      optional       # share the OSPI0 octal bus (NOR = CS0, HyperRAM = CS1)
      capacity_mbit:  TBD
      role:           data_log
  # External HyperRAM -- volatile XIP / scratch RAM, separate from the
  # NOR flash above.  Shares the OSPI0 octal controller with the flash,
  # separated only by chip-select (NOR flash = CS0, HyperRAM = CS1).
  hyperram:
    chip:           W958D8NBYA5I    # Winbond OctalRAM (HyperBus)
    capacity_mbit:  256             # 256 Mbit (32 MiB)
    interface:      ospi0
    chip_select:    1

inference:
  preferred_backend:    ethos_u
  ethos_u_variant:      u55
  npu_population:
    - { variant: u55, role: NPU-HE, paired_with: M55-HE }       # E3 carries two U55s; no U85.
    - { variant: u55, role: NPU-HP, paired_with: M55-HP }

# §D.lib.loader -- per-SoM hardware-accelerator capabilities.  Loader
# (scripts/alp_project.py) reads this against each enabled library's
# metadata/library-profiles/<name>/hw-backends.yaml to pick the
# highest-priority matching CONFIG_* per accelerator class.  Counts
# are populated where the silicon has multiple instances of the same
# accelerator; booleans elsewhere.
capabilities:
  optiga_trust_m:       true       # Populated on every E1M-AEN module.

topology:
  m55_hp:
    app: alp-stock-shim
    board: alp_e1m_aen301_m55_hp        # Zephyr board target
    toolchain: arm-zephyr-eabi
  m55_he:
    app: alp-stock-shim
    board: alp_e1m_aen301_m55_he        # Zephyr board target
    toolchain: arm-zephyr-eabi

# Memory layout (SRAM banks + MRAM) is derived from the SoC variant
# resolved via `silicon_variant:` -- see metadata/socs/<vendor>/<family>/<part>.json
# `variants[].sram_banks_kb` + `mram_mb`. Declare a memory_map: block
# here ONLY for non-stock partitioning (none of the current 11 SKUs
# need one).

# Alif IPC controller name TBD pending the hand-written HW config.
mailbox:
  controller: TBD
  channels:
    - { id: 0, reserved_for: alp_default_rpmsg }
    - { id: 1, reserved_for: app }
    - { id: 2, reserved_for: app }
    - { id: 3, reserved_for: power_mgmt }

# E1M pads / instances that route through the on-module CC3501E
# coprocessor instead of through the Alif Ensemble silicon.  Apps
# using these pads via `alp_gpio_open()` / `alp_spi_open()` etc.
# get CC3501E command dispatch automatically; the board-side
# role (e.g. EVK_PIN_BMI323_INT1) stays SoM-agnostic.
#
# Source of truth:
#   - metadata/e1m_modules/aen/from-cc3501e.tsv  (SPI1 bus)
#   - AEN family hardware design (IO11/13/15..21 termination)
pad_routes:
  # SPI1 inter-chip bus -- CC3501E hosts the SPI peripheral.
  - { e1m: E1M_SPI1,      dispatch: cc3501e,
      doc: "Inter-chip SPI1 fast path; CC3501E acts as SPI peripheral." }

  # GPIO pads that physically terminate on CC3501E (not on Alif silicon).
  - { e1m: E1M_GPIO_IO8,  dispatch: cc3501e, dispatch_pin: 30,
      doc: "CC3501E GPIO_30 (board 2626-R2; GPIO30 moved here from IO21)." }
  - { e1m: E1M_GPIO_IO10, dispatch: cc3501e, dispatch_pin: 35,
      doc: "CC3501E GPIO_35 (board 2626-R2)." }
  - { e1m: E1M_GPIO_IO11, dispatch: cc3501e, dispatch_pin: 2,
      doc: "CC3501E GPIO_2." }
  - { e1m: E1M_GPIO_IO13, dispatch: cc3501e, dispatch_pin: 13,
      doc: "CC3501E GPIO_13." }
  - { e1m: E1M_GPIO_IO15, dispatch: cc3501e, dispatch_pin: 14,
      doc: "CC3501E GPIO_14." }
  - { e1m: E1M_GPIO_IO16, dispatch: cc3501e, dispatch_pin: 16,
      doc: "CC3501E GPIO_16." }
  - { e1m: E1M_GPIO_IO17, dispatch: cc3501e, dispatch_pin: 17,
      doc: "CC3501E GPIO_17." }
  - { e1m: E1M_GPIO_IO18, dispatch: cc3501e, dispatch_pin: 18,
      doc: "CC3501E GPIO_18." }
  - { e1m: E1M_GPIO_IO19, dispatch: cc3501e, dispatch_pin: 19,
      doc: "CC3501E GPIO_19." }
  - { e1m: E1M_GPIO_IO20, dispatch: cc3501e, dispatch_pin: 26,
      doc: "CC3501E GPIO_26." }

# On-module helper MCUs.  CC3501E (TI Wi-Fi 6 + BLE 5.4) is wired
# on the AEN module; firmware is embedded in alp-sdk at
# `firmware/cc3501e/` (ADR 0015) and stays TBD until the first binary
# is built + signed on the bench (the project's standing convention).
helper_firmware:
  - name:          cc3501e_otp
    chip:          cc3501e
    firmware_path: TBD
    flash_method:  TBD
    flash_args:    TBD

default_hw_rev:         r1                  # see metadata/e1m_modules/<family>/hw-revisions.yaml

default_board:        E1M-EVK

status:
  preliminary:          false                  # released silicon
  partial_hw_config:    true                   # memory + per-SKU specifics TBD
