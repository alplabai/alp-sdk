# ALP SDK chip manifest: Sitronix ST7789V SPI TFT display controller.
schema_version:   1
chip_id:          st7789
driver_status:    partial          # init + window + write_pixels; full fb opt-in via gfx_compat.
display_name:     "Sitronix ST7789V 240x240 / 240x320 IPS TFT (SPI)"
vendor:           sitronix
mpn_population:
  - "ST7789V"
  - "ST7789VI"

datasheet:
  primary:        "Sitronix ST7789V Rev 1.4 (Mar 2017)"

bus:              spi
spi:
  mode:           [0, 3]
  max_clock_hz:   62000000

signals:
  - { name: SCLK, type: input, scope: "SPI clock from host" }
  - { name: MOSI, type: input, scope: "SPI data in from host" }
  - { name: CS,   type: input, scope: "chip select, active low" }
  - { name: DC,   type: input, scope: "D/C# command/data select" }
  - { name: RESET, type: input, scope: "optional hardware reset (active low)" }
  - { name: BL,   type: input, scope: "backlight LED PWM (host-driven)" }

resolutions:
  max:            [240, 320]
  presets:        [240x240, 240x320]

kconfig:
  zephyr:         ALP_SDK_CHIP_ST7789
  baremetal:      ALP_SDK_CHIP_ST7789

families:
  - aen
  - v2n
  - v2n-m1
