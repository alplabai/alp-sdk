# Alp SDK chip manifest: InvenSense INMP441 MEMS microphone.
schema_version:   1
chip_id:          inmp441
driver_status:    complete
display_name:     "InvenSense INMP441 low-cost omnidirectional MEMS mic (I2S)"
vendor:           invensense
mpn_population:
  - "INMP441"

datasheet:
  primary:        "InvenSense INMP441 DS-INMP441 Rev 1.2 (Mar 2015)"

bus:              i2s
sensor:
  type:           digital_mems_mic
  sensitivity_db: -26
  snr_db:         61

signals:
  - { name: SCK,     type: input,  scope: "I2S bit clock" }
  - { name: SD,       type: output, scope: "I2S serial data out; needs a 100kOhm pull-down" }
  - { name: WS,       type: input,  scope: "I2S word-select (L/R clock)" }
  - { name: LR_SEL,   type: input,  scope: "L/R channel-select strap" }
  - { name: CHIPEN,   type: input,  scope: "chip-enable strap" }

physical:
  # Pins per InvenSense DS-INMP441-00 Rev 1.0, Table 6 "Pin
  # Description" (9-terminal LGA, 4.72mm x 3.76mm x 1.00mm). All 9
  # pads are populated -- none are datasheet-labelled NC. Per the
  # datasheet's "Power-Supply Decoupling" note, place a 0.1uF X7R (or
  # better) capacitor between pin 7 (VDD) and ground, as close to the
  # part as possible; pin 6 (GND) is explicitly called out as the
  # decoupling-capacitor ground point.
  refdes_prefix: U
  package:              "9-terminal LGA (CAV)"
  footprint:             lga_9_cav
  dimension_mm:          "4.72 x 3.76 x 1.00"
  visibility:            public
  provenance:            web_provisional
  pins:
    - { pad: "1", signal: "SCK" }
    - { pad: "2", signal: "SD" }
    - { pad: "3", signal: "WS" }
    - { pad: "4", signal: "LR_SEL" }
    - { pad: "5", signal: "GND" }
    - { pad: "6", signal: "GND" }
    - { pad: "7", signal: "VDD" }
    - { pad: "8", signal: "CHIPEN" }
    - { pad: "9", signal: "GND" }
  passives:
    - { role: decouple, value: 100nF, net: VDD, refdes_prefix: C }

kconfig:
  zephyr:         ALP_SDK_CHIP_INMP441
  baremetal:      ALP_SDK_CHIP_INMP441

families:
  - aen
  - v2n
  - v2n-m1
  - imx93

verification:
  hil_silicon:    untested
  smoke_tests:    null_arg_guard
