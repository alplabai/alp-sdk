# Alp SDK chip manifest: ST VL53L1X time-of-flight ranger (I2C).
schema_version:   1
chip_id:          vl53l1x
driver_status:    stub
display_name:     "STMicroelectronics VL53L1X single-zone time-of-flight ranger"
vendor:           st
mpn_population:
  - "VL53L1CXV0FY/1"

datasheet:
  primary:        "ST VL53L1X DS13088 Rev 7 (Jul 2021)"

bus:              i2c
i2c:
  addresses:
    - { addr_7bit: 0x29, scope: "factory default (programmable via XSHUT-sequenced re-address)" }
  max_clock_hz:   400000

ranging:
  max_distance_m: 4.0
  zones:          1

signals:
  - { name: AVDDVCSEL, type: power,  scope: "VCSEL laser-emitter supply; tie to main AVDD supply" }
  - { name: AVSSVCSEL, type: ground, scope: "VCSEL laser-emitter ground; tie to main ground" }
  - { name: XSHUT,      type: input,  scope: "shutdown pin, active low; must always be driven, pull-up needed if host state unknown" }
  - { name: GPIO1,      type: output, scope: "interrupt output, open-drain; leave unconnected if unused" }
  - { name: SDA,        type: bidir,  scope: "I2C serial data" }
  - { name: SCL,        type: input,  scope: "I2C serial clock" }

physical:
  # Pins per STMicroelectronics VL53L1X datasheet DocID031281 Rev 3
  # (Nov 2018), section 1.3 "Device pinout" (Table 2: Optical LGA12,
  # 4.9 x 2.5 x 1.56mm). Pad 8 (DNC) is datasheet-labelled "Do not
  # connect, must be left floating" and is omitted below; all other
  # 11 pads are populated, including the GND2/GND3/GND4 pads which the
  # datasheet forces onto the same ground domain as GND (note: "GND2,
  # GND3, and GND4 are standard pins that we force to the ground
  # domain in the application schematics").
  refdes_prefix: U
  package:              "Optical LGA12"
  footprint:             optical_lga12
  dimension_mm:          "4.9 x 2.5 x 1.56"
  operating_temp_deg_c:  "-20..85"
  visibility:            public
  provenance:            web_provisional
  pins:
    - { pad: "1",  signal: "AVDDVCSEL" }
    - { pad: "2",  signal: "AVSSVCSEL" }
    - { pad: "3",  signal: "GND" }
    - { pad: "4",  signal: "GND" }
    - { pad: "5",  signal: "XSHUT" }
    - { pad: "6",  signal: "GND" }
    - { pad: "7",  signal: "GPIO1" }
    - { pad: "9",  signal: "SDA" }
    - { pad: "10", signal: "SCL" }
    - { pad: "11", signal: "AVDD" }
    - { pad: "12", signal: "GND" }
  passives:
    # Datasheet application schematic note: "XSHUT and GPIO1 pull up
    # recommended values are 10 kOhms".
    - { role: pullup, value: 10kOhm, net: XSHUT, refdes_prefix: R }
    - { role: pullup, value: 10kOhm, net: GPIO1, refdes_prefix: R }

kconfig:
  zephyr:         ALP_SDK_CHIP_VL53L1X
  baremetal:      ALP_SDK_CHIP_VL53L1X

families:
  - aen
  - v2n
  - v2n-m1
  - imx93

verification:
  hil_silicon:    untested        # paper-correct only until v1.0 verification sweep.
  smoke_tests:    null_arg_guard
