# Alp SDK chip manifest: onsemi AR0234CS 1080p global-shutter MIPI CSI-2.
schema_version:   1
chip_id:          ar0234
driver_status:    stub
display_name:     "onsemi AR0234CS 1080p global-shutter colour MIPI CSI-2"
vendor:           onsemi
mpn_population:
  - "AR0234CS"

datasheet:
  primary:        "onsemi AR0234CS datasheet Rev 7 (Jun 2020)"

bus:              i2c
i2c:
  addresses:
    - { addr_7bit: 0x10, scope: "SADDR = low (default)" }
    - { addr_7bit: 0x18, scope: "SADDR = high" }
  max_clock_hz:   400000

mipi:
  lanes_supported: [1, 2, 4]

resolutions:
  max:            [1920, 1200]
  features:       [global_shutter, hdr]

kconfig:
  zephyr:         ALP_SDK_CHIP_AR0234
  baremetal:      ALP_SDK_CHIP_AR0234

families:
  - aen
  - v2n
  - v2n-m1
  - imx93

verification:
  hil_silicon:    untested        # paper-correct only until v1.0 verification sweep.
  smoke_tests:    null_arg_guard

physical:
  # INCOMPLETE: package size/type below is from the onsemi AR0234CS public
  # marketing summary page (Table 1 "Key Performance Parameters" -- "Package
  # Options: 9.995 x 5.595 CSP"), which is not confidentiality-marked. The
  # full 83-ball CSP ball map / pin-description table (datasheet section
  # "CONFIGURATION AND PINOUT", rev AR0234CS/D March 2020) is stamped
  # "CONFIDENTIAL AND PROPRIETARY -- NOT FOR PUBLIC RELEASE" by onsemi on
  # every page that contains it, even on copies re-hosted by public
  # distributor sites. Per the repo's public/internal split, that per-ball
  # signal map must not be transcribed into this public manifest without an
  # onsemi NDA. No pins[] populated -- do not guess ball assignments.
  package:      "83-ball CSP"
  dimension_mm: "9.995 x 5.595 (die/package outline only; height not public)"
  visibility:   public
  provenance:   web_provisional
