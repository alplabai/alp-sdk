# Alp SDK chip manifest: Murata LBES0ZZ2LL (Type 2LL) tri-radio module.
schema_version:   1
chip_id:          murata_lbes0zz2ll
driver_status:    planned          # Linux/Android/freeRTOS host stack;
                                   # no Alp SDK chip-driver body yet.
display_name:     "Murata LBES0ZZ2LL Type 2LL Wi-Fi 6 + Bluetooth 5.4 LE + 802.15.4 (NXP IW610G)"
vendor:           murata
mpn_population:
  - "LBES0ZZ2LL"
  - "LBES0ZZ2LL-001"
silicon_under_lid:
  - "NXP IW610G"

datasheet:
  primary:        "https://www.murata.com/products/connectivitymodule/wi-fi-bluetooth/overview/lineup/type2ll"

notes: |
  Candidate N93 on-module Wi-Fi/Bluetooth/802.15.4 combo. Murata lists
  Type 2LL as an NXP IW610G-based 2.4/5 GHz Wi-Fi 6 HE20 + Bluetooth
  5.4 Low Energy + 802.15.4 module with SDIO or USB for Wi-Fi, UART or
  USB for Bluetooth, and SPI for 802.15.4.

bus:              sdio              # Wi-Fi data path; Bluetooth uses UART.

host_interfaces:
  wifi:           SDIO/USB
  bluetooth:      UART/USB
  ieee802154:     SPI

radio:
  wifi:           "802.11a/b/g/n/ac/ax HE20 1x1, 2.4GHz + 5GHz, up to 114.7Mbps PHY"
  bluetooth:      "Bluetooth 5.4 Low Energy, up to 2Mbps PHY"
  ieee802154:     true

physical:
  dimension_mm:   "7.7 x 8.8 x 1.3"
  antenna:        external
  operating_temp_deg_c: "-40..85"

kconfig:
  yocto:          n/a

families:
  - nxp-imx9

verification:
  hil_silicon:    untested
  smoke_tests:    null_arg_guard
