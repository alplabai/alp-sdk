# Alp SDK chip manifest: ACT88760 primary PMIC (CMI 120.E1).
#
# Read by scripts/alp_project.py and alp-studio's pin allocator to
# resolve a populated `on_module.<role>: act8760` reference in a
# SoM preset (E1M-<MPN>.yaml) into the driver's I2C address + the Kconfig symbol
# that has to flip on for the chip code to compile in.
#
# Driver status table:
#   stub      -- header + probe + raw register R/W; no decoded
#                rail accessors yet.
#   partial   -- some rail accessors land; others remain TODO.
#   complete  -- full register map exercised, all rails decoded.
schema_version:   1
chip_id:          act8760
driver_status:    partial       # probe + status + VSET0 accessors live
                                # (register map verified vs the AA82BZ
                                # workbook 2026-06-06); DVS slots VSET1-3,
                                # per-tile fault regs + mV mapping still
                                # raw-R/W-only
display_name:     "Qorvo ACT88760-120.E1 primary PMIC"
vendor:           qorvo         # formerly Active-Semi; brand-merged 2023
mpn_population:
  - "ACT88760-120.E1.xxT"       # CMI 120.E1 in WLCSP 81-ball
  - "ACT88760-120.E1.xxT.zzz"   # any production-test suffix
datasheet:
  primary:        "ACT88760 Datasheet Rev C.pdf"  # 2025-08-05, Qorvo
  users_guide:    "ACT88760 Users Guide-Rev3.0 20210101.pdf"
  cmi_profile:    "ACT88760_120.E1.26072083.iact"  # Alp CMI snapshot
  power_sequence: "ACT88760_CMI120 Power Sequence_250916.pdf"
  v2n_seq_diagram: "e1m-x_v2n-m1_power_sequence-power-on.pdf"
  register_map:   "AA82BZ_RegisterMap_Users_Rev1P1 Customer Facing.xlsx"

bus:              i2c
i2c:
  addresses:                    # two independent slaves on the same bus (not register pages)
    - { slave: add1, addr_7bit: 0x25, scope: "MSTR + Buck1..Buck6 + GPIOs (ADD1)" }
    - { slave: add2, addr_7bit: 0x26, scope: "Buck7 + LDO1..LDO6 (ADD2)" }
  max_clock_hz:   1000000       # datasheet: 1 MHz I2C

# Per-rail manifest -- the rail names + intended target voltages live
# in the V2N power-sequence PDF.  Filling them in fully requires
# decoding the .iact CMI profile (XML) or reading the Users Guide
# VSET-to-mV table for each Buck/LDO range setting.  Until then this
# block lists the rails the V2N CMI populates with TBD voltages.
rails:
  - { id: buck1, slave: add1, role: "TBD per CMI 120.E1 power-on diagram" }
  - { id: buck2, slave: add1, role: "TBD" }
  - { id: buck3, slave: add1, role: "TBD" }
  - { id: buck4, slave: add1, role: "TBD" }
  - { id: buck5, slave: add1, role: "TBD" }
  - { id: buck6, slave: add1, role: "TBD" }
  - { id: buck7, slave: add2, role: "TBD" }
  - { id: ldo1,  slave: add2, role: "TBD" }
  - { id: ldo2,  slave: add2, role: "TBD" }
  - { id: ldo3,  slave: add2, role: "TBD" }
  - { id: ldo4,  slave: add2, role: "TBD" }
  - { id: ldo5,  slave: add2, role: "TBD; may be configured as load switch" }
  - { id: ldo6,  slave: add2, role: "TBD; may be configured as load switch" }

# Pin-level signals the driver expects the board to route.  TWARN
# is exposed inside the IC's status register (no dedicated pin); the
# real-world status signals that DO exit the WLCSP are nIRQ + nRESET
# + nPB + PWREN/PWRON.
signals:
  - { name: nIRQ,    type: input,  notes: "interrupt to host on unmasked fault" }
  - { name: nRESET,  type: input,  notes: "reset output to system processor" }
  - { name: PWREN,   type: output, notes: "primary power-enable input from host" }

kconfig:
  zephyr:         ALP_SDK_CHIP_ACT8760
  baremetal:      ALP_SDK_CHIP_ACT8760    # same symbol; build glue picks the impl
  yocto:          n/a                      # Linux uses Active-Semi's regulator
                                           # framework provider, not this driver

# Populated on:
families:
  - v2n           # E1M-X V2N base (E1M-V2N101, E1M-V2N102)
  - v2n-m1        # E1M-X V2N-M1 (E1M-V2M101, E1M-V2M102) -- inherited V2N-common

verification:
  hil_silicon:    untested        # paper-correct only until v1.0 verification sweep.
  smoke_tests:    null_arg_guard + probe_both_slaves + vset_offsets + status_decode
  register_map:   verified_2026_06_06  # AA82BZ workbook + Datasheet Rev C, cell-by-cell

physical:
  # INCOMPLETE: package type/size below (WLCSP-81, 3.85x3.85mm) is publicly
  # confirmed via Qorvo product-page/distributor listings ("13-OUT 81-Pin
  # WLCSP", "3.85mm x 3.85mm"). The ball map itself is NOT public -- Qorvo's
  # own product page marks ACT88760 "Not Recommended For New Designs" and
  # gates the full datasheet behind that notice; this manifest's existing
  # `datasheet:` block (Rev C, Users Guide, CMI profile, "Customer Facing"
  # register-map xlsx) are Alp-internal/NDA documents, not public sources,
  # so per the public/internal split they cannot be used to populate a
  # pin-level ball map in this public manifest. No pins[] populated -- do
  # not guess ball assignments for nIRQ/nRESET/PWREN/nPB or the ADD1/ADD2
  # I2C pins from the internal docs.
  package:      "WLCSP-81"
  dimension_mm: "3.85 x 3.85"
  visibility:   public
  provenance:   web_provisional
