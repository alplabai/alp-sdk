# Alp SDK chip manifest: 24Cxx-class 128-Kbit I2C EEPROM.
schema_version:   1
chip_id:          eeprom_24c128
driver_status:    complete         # init / read / write / page-aligned splitting.
display_name:     "Generic 24Cxx-class 128-Kbit (16 KB) I2C EEPROM"
vendor:           multi             # On-Semi N24S128C4DYT3G (default), STMicro M24128-BFMH6TG (alt)
mpn_population:
  - "N24S128C4DYT3G"               # On-Semi -- E1M-AEN / E1M-V2N default
  - "M24128-BFMH6TG"               # STMicro -- footprint-compatible alternate / DNP

datasheet:
  primary:        "On-Semi N24S128 datasheet"
  alternate:      "STMicro M24128 datasheet"

bus:              i2c
i2c:
  addresses:
    - { addr_7bit: 0x50, scope: "A2:A1:A0 strap = 000 (default on E1M-AEN + E1M-V2N)" }
  address_strap_range: "0x50..0x57 (A2:A1:A0)"
  max_clock_hz:   400000          # Fast-mode

signals:
  - { name: SDA, type: bidir, scope: "I2C0 / E1M_I2C0 on the host" }
  - { name: SCL, type: input, scope: "I2C0 / E1M_I2C0 on the host" }
  - { name: A0,  type: input, scope: "device address input; strapped per address_strap_range above" }
  - { name: A1,  type: input, scope: "device address input; strapped per address_strap_range above" }
  - { name: A2,  type: input, scope: "device address input; strapped per address_strap_range above" }
  - { name: WP,  type: input, scope: "write-protect input; high inhibits writes to the entire memory" }

capacity:
  bytes:          16384            # 128 Kbit
  page_bytes:     64

physical:
  # pins per the onsemi CAT24C128 datasheet (onsemi.com/download/data-sheet/pdf/cat24c128-d.pdf,
  # accessed 2026-07), "PIN CONFIGURATION" / "PIN FUNCTION" tables -- the
  # standard 24Cxx pinout shared across this whole part family (this
  # manifest's own header calls out N24S128C4DYT3G as "generic 24Cxx-class").
  # SOIC-8 (150 mil / 3.9x4.9mm) matches the On-Semi default MPN; the
  # STMicro M24128-BFMH6TG alternate is pin/footprint-compatible per its
  # own "BFMH6" (SO8) suffix.
  refdes_prefix: U
  package:       SOIC-8
  footprint:     soic_8_3p9x4p9mm
  visibility:    public
  provenance:    web_provisional
  pins:
    - { pad: "1", signal: "A0" }
    - { pad: "2", signal: "A1" }
    - { pad: "3", signal: "A2" }
    - { pad: "4", signal: "VSS" }
    - { pad: "5", signal: "SDA" }
    - { pad: "6", signal: "SCL" }
    - { pad: "7", signal: "WP" }
    - { pad: "8", signal: "VCC" }
  # No decoupling-cap or I2C pull-up values are given in the public CAT24C128
  # datasheet (bus pull-ups are a system-level BRD_I2C choice, not per-chip);
  # passives omitted rather than invented.

kconfig:
  zephyr:         ALP_SDK_CHIP_EEPROM_24C128
  baremetal:      ALP_SDK_CHIP_EEPROM_24C128
  yocto:          "kernel at24 EEPROM driver"

families:
  - aen                            # on SoC I2C2 (bridge/DNP-selected; upstream i2c_dw)
  - v2n                            # on E1M_I2C0 (Renesas RIIC0)
  - v2n-m1                         # inherited from V2N base
  - imx93                          # plain I2C; NX9 exposes E1M I2C0 directly (see ssd1306.yaml note)

verification:
  hil_silicon:    untested        # paper-correct only until v1.0 verification sweep.
  smoke_tests:    null_arg_guard
