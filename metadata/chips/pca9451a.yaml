# Alp SDK chip manifest: NXP PCA9451A multi-channel PMIC.
schema_version:   1
chip_id:          pca9451a
driver_status:    stub             # manifest only; chip-driver headers + impl
                                   # land alongside the NX9101 bring-up.
display_name:     "NXP PCA9451A multi-channel power-management IC"
vendor:           nxp
mpn_population:
  - "PCA9451A"                     # base order code; sub-variants TBD per BOM
datasheet:
  primary:        "NXP PCA9451A datasheet Rev 2.1 (20 Aug 2025)"

bus:              i2c
i2c:
  addresses:
    - { addr_7bit: 0x25, scope: "power-on-reset default target address (Table 17); board can reprogram via OTP -- confirm against V0 schematic" }
  max_clock_hz:   1000000          # Fm+ (1 Mbit/s) per datasheet section 2 features

# Per [[pending-hw-configs]]: which buck/LDO rail feeds which SoC/DRAM
# supply, and how the enable/control straps (SW_EN, PMIC_ON_REQ, ...) are
# routed on the NX9101 carrier, are still TBD until the maintainer
# hand-writes the NX9101 HW config -- the chip's OWN pinout below is now
# grounded in the public datasheet (previously TBD), but board-side
# routing is not.  The block exists so cross-reference validators
# (validate_metadata.py, alp_project.py loader) can resolve
# E1M-NX9101.yaml's `pmic_main: pca9451a` reference without flagging a
# missing-chip error.

signals:
  - { name: SCL,             type: input, scope: "I2C serial clock" }
  - { name: SDA,             type: bidir, scope: "I2C serial data" }
  - { name: PMIC_ON_REQ,     type: input, scope: "PMIC ON request from application processor (active high starts power-on sequence)" }
  - { name: PMIC_STBY_REQ,   type: input, scope: "standby-mode request from application processor (active high)" }
  - { name: PMIC_RST_B,      type: input, scope: "PMIC reset input, active low; internally pulled up with LDO1 rail" }
  - { name: WDOG_B,          type: input, scope: "active-low watchdog reset input from application processor" }
  - { name: SW_EN,           type: input, scope: "load-switch enable input; internal 1.5 Mohm pull-down" }
  - { name: IRQ_B,           type: output, scope: "open-drain interrupt output" }
  - { name: POR_B,           type: output, scope: "power-on-reset output, open-drain, requires external pull-up" }
  - { name: RTC_RESET_B,     type: output, scope: "reset output, high-Z after LDO1 good; internally pulled up with LDO1 rail" }
  - { name: SD_VSEL,         type: input, scope: "LDO5 voltage-select input (low = 3.3 V, high = 1.8 V)" }
  - { name: VSYS,            type: power, scope: "internal power input; bypass with 1 uF to ground" }
  - { name: INL1,            type: power, scope: "power input for LDO1/LDO4/LDO5; bypass with 4.7 uF to ground" }
  - { name: LDO1,            type: power, scope: "LDO1 output; bypass with 1 uF to ground" }
  - { name: LDO4,            type: power, scope: "LDO4 output; bypass with 1 uF to ground" }
  - { name: LDO5,            type: power, scope: "LDO5 output; bypass with 1 uF to ground" }
  - { name: VINT,            type: power, scope: "internal power-supply output; bypass with 1 uF to ground" }
  - { name: SWIN,            type: power, scope: "load-switch input; also the I2C level-translator SWIN reference" }
  - { name: SWOUT,           type: power, scope: "load-switch output; bypass with 1 uF to ground" }
  - { name: INB13,           type: power, scope: "BUCK1/BUCK3 input; bypass with two 10 uF to ground" }
  - { name: INB26,           type: power, scope: "BUCK2/BUCK6 input; bypass with 10 uF and 4.7 uF to ground" }
  - { name: INB45,           type: power, scope: "BUCK4/BUCK5 input; bypass with 10 uF and 4.7 uF to ground" }
  - { name: AGND,            type: ground, scope: "analog ground; connect to ground plane through via, not directly to EP" }
  - { name: BUCK_AGND,       type: ground, scope: "buck reference ground for BUCK1/2/3; connect to ground plane through via, not directly to EP" }

kconfig:
  zephyr:         ALP_SDK_CHIP_PCA9451A
  baremetal:      ALP_SDK_CHIP_PCA9451A
  yocto:          "kernel pmic-pca9450 driver (PCA9451A is software-compatible per NXP)"

families:
  - imx93

verification:
  hil_silicon:    untested         # paper-correct stub; no driver bodies yet.
  smoke_tests:    null_arg_guard

physical:
  # Pins per NXP PCA9451A datasheet Rev 2.1 (20 Aug 2025), section 6
  # "Pinning information" -- 56-pin HVQFN (SOT949-6), 7 x 7 x 0.85 mm,
  # 0.4 mm pitch, + exposed pad (EP).  Per task scope ("large PMIC --
  # populate the rail-enable/I2C/power signal-bearing pins") this
  # populates the control-interface (I2C, enable/reset/IRQ straps) and
  # named power/ground pins.  Excludes the per-buck switching-node
  # (LX1-LX6), feedback-sense (BUCK4FB/BUCK5FB/BUCK6FB/R_SNSP1/
  # R_SNSP2/R_SNSP3_CFG), the I2C level-translator subsystem
  # (SDAH/SCLH/SDAL/SCLL -- a separate SD-card level-shifting feature,
  # not this chip's own control interface), the 32.768 kHz crystal
  # pins (XTAL_IN/XTAL_OUT/CLK_32K_OUT), and NC pins -- those are
  # per-rail power-train/analog nodes rather than SDK-level control
  # signals, and are left for the maintainer's V0 schematic pass.
  refdes_prefix: U
  package:       HVQFN56
  footprint:     hvqfn_56_7p0x7p0mm
  visibility:    public
  provenance:    web_provisional
  pins:
    - { pad: "1",  signal: LDO4 }
    - { pad: "3",  signal: LDO1 }
    - { pad: "4",  signal: VINT }
    - { pad: "5",  signal: AGND }
    - { pad: "6",  signal: RTC_RESET_B }
    - { pad: "8",  signal: PMIC_RST_B }
    - { pad: "9",  signal: POR_B }
    - { pad: "12", signal: SW_EN }
    - { pad: "13", signal: IRQ_B }
    - { pad: "16", signal: INB45 }
    - { pad: "17", signal: INB45 }
    - { pad: "18", signal: INB45 }
    - { pad: "22", signal: SWIN }
    - { pad: "23", signal: SWOUT }
    - { pad: "28", signal: WDOG_B }
    - { pad: "29", signal: SD_VSEL }
    - { pad: "33", signal: INB13 }
    - { pad: "34", signal: INB13 }
    - { pad: "35", signal: INB13 }
    - { pad: "39", signal: PMIC_ON_REQ }
    - { pad: "40", signal: PMIC_STBY_REQ }
    - { pad: "41", signal: SCL }
    - { pad: "42", signal: SDA }
    - { pad: "43", signal: BUCK_AGND }
    - { pad: "47", signal: INB26 }
    - { pad: "48", signal: INB26 }
    - { pad: "49", signal: INB26 }
    - { pad: "53", signal: VSYS }
    - { pad: "55", signal: LDO5 }
    - { pad: "56", signal: INL1 }
    - { pad: "EP",  signal: GND }
