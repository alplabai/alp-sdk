# Alp SDK chip manifest: TI CC3501E Wi-Fi 6 + BLE 5.4 coprocessor.
#
# On-module wireless coprocessor on the E1M-AEN family.  The Alif
# host drives it over the inter-chip SPI1 control protocol; see
# chips/cc3501e/, include/alp/chips/cc3501e.h, the wire protocol in
# include/alp/protocol/cc3501e.h, and docs/cc3501e-bridge.md.
schema_version:   1
chip_id:          cc3501e
driver_status:    partial          # call shape + framing; reset()
                                   # returns NOSUPPORT until the EVK
                                   # overlay declares the WIFI.EN /
                                   # NRST pins as alp_gpio_* lines.
display_name:     "TI CC3501E Wi-Fi 6 + BLE 5.4 coprocessor"
vendor:           ti
mpn_population:
  - "CC3501E"

datasheet:
  primary:        "TI SWRU626"     # CC3501E technical reference manual

bus:              spi              # DEFAULT host-control link (inter-chip SPI1).
                                   # SDIO is an OPTIONAL alternative selected per
                                   # board (firmware CC3501E_CONTROL_TRANSPORT);
                                   # available only when the Alif SDIO is routed to
                                   # the CC3501E instead of an SD card.  See
                                   # docs/cc3501e-bridge.md "Selectable host-control
                                   # transport".
spi:
  interface:      SPI1             # E1M_SPI1 bus (Alif SPI1 master); the
                                   # CC3501E endpoint is its own SPI0 peripheral
  mode:           [0]
  word_bits:      8
  max_clock_hz:   8000000          # current default per the header lifecycle
                                   # example; SWRU626 §18 allows higher --
                                   # final value pending signal-integrity sweep.

signals:
  # Side-channel control lines the Alif drives via alp_gpio_*.  The
  # exact E1M-AEN pad routes are baked from
  # metadata/e1m_modules/aen/inter-chip.tsv; left here as roles only.
  - { name: WIFI_EN,     direction: output, role: "wireless subsystem enable", route: TBD }
  - { name: E_WIFI_NRST, direction: output, role: "active-low hardware reset", route: TBD }

protocol:
  header:         "include/alp/protocol/cc3501e.h"
  doc:            "docs/cc3501e-bridge.md"
  major_version:  1                # ALP_CC3501E_PROTOCOL_VERSION; host insists on a match

kconfig:
  zephyr:         ALP_SDK_CHIP_CC3501E
  baremetal:      ALP_SDK_CHIP_CC3501E

families:
  - aen

verification:
  hil_silicon:    untested        # paper-correct only until v1.0 verification sweep.
  smoke_tests:    null_arg_guard

physical:
  # Package/temp per ti.com/product/CC3501E public product page (2026-07);
  # the CC3501E is a bare QFN die (not an antenna-integrated module), but is
  # treated with the lighter module-style physical block here because its
  # RF-side pinout (antenna match, PA, LNA) is NDA-gated -- only the
  # host-control side (SPI1 + WIFI_EN/NRST GPIOs, declared under signals:
  # above) is in the alp-sdk driver's scope.
  package:              "QFN (RSH), 56-pin"
  dimension_mm:         "7 x 7"
  antenna:              "none in-package; RF pins route to board-level matching network + antenna (E1M-AEN board design, NDA-gated)"
  operating_temp_deg_c: "-40..105"
  visibility:            public
  provenance:            web_provisional
