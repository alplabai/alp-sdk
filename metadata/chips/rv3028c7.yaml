# Alp SDK chip manifest: Micro Crystal RV-3028-C7 low-power RTC.
schema_version:   1
chip_id:          rv3028c7
driver_status:    complete         # init / get-set time / alarm + match / multi-source dispatcher / CLKOUT routing.
display_name:     "Micro Crystal RV-3028-C7 32.768 kHz extreme-low-power RTC"
vendor:           micro-crystal
mpn_population:
  - "RV-3028-C7"

datasheet:
  primary:        "Micro Crystal RV-3028-C7 Application Manual"
  reference:      "Micro Crystal AN -- Multiple Interrupt Lines with RV-3028-C7"

bus:              i2c
i2c:
  addresses:
    - { addr_7bit: 0x52, scope: "fixed by silicon -- no strap" }
  max_clock_hz:   400000          # Fast-mode

signals:
  - { name: SDA,    type: bidir,        scope: "I2C0 / BRD_I2C on the host" }
  - { name: SCL,    type: input,        scope: "I2C0 / BRD_I2C on the host" }
  - { name: INT,    type: open_drain,   scope: "alarm + multi-source event line, active-low",
      v2n_route:  "Renesas RTC_ALARM",
      aen_route:  "Alif P15_0_FLEX (RTC_ALARM)" }
  - { name: CLKOUT, type: output,       scope: "programmable source (32 kHz default, alarm route optional)" }
  - { name: VBACKUP, type: power,       scope: "backup supply / integrated trickle-charger input (coin cell or supercap)" }
  - { name: EVI,     type: input,       scope: "external event input; latches an event timestamp on transition" }

power:
  vdd_min_v:      1.1
  vdd_max_v:      5.5
  idd_typ_na:     100             # 0.1 uA typical at 3.0 V

kconfig:
  zephyr:         ALP_SDK_CHIP_RV3028C7
  baremetal:      ALP_SDK_CHIP_RV3028C7
  yocto:          "kernel rtc-rv3028 driver"

families:
  - aen
  - v2n
  - v2n-m1
  - imx93   # plain I2C; NX9 exposes E1M I2C0 directly (see ssd1306.yaml note)

verification:
  hil_silicon:    untested        # paper-correct only until v1.0 verification sweep.
  smoke_tests:    null_arg_guard

physical:
  # Pins per Micro Crystal RV-3028-C7 datasheet ("DIMENSIONS" front page),
  # "PIN CONNECTIONS TOP VIEW" table (pins 1-8) + "ORDERING INFORMATION"
  # (package/termination). Metal lid is internally tied to VSS (pin 5) --
  # noted on the datasheet's block-diagram page, not a separate pad.
  refdes_prefix: U
  package:       SON-8
  footprint:     microcrystal_son_8
  dimension_mm:  "3.2 x 1.5 x 0.8"
  visibility:    public
  provenance:    web_provisional
  pins:
    - { pad: "1", signal: CLKOUT }
    - { pad: "2", signal: INT }
    - { pad: "3", signal: SCL }
    - { pad: "4", signal: SDA }
    - { pad: "5", signal: VSS }
    - { pad: "6", signal: VBACKUP }
    - { pad: "7", signal: VDD }
    - { pad: "8", signal: EVI }
