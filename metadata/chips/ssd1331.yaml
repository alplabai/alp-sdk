# Alp SDK chip manifest: Solomon Systech SSD1331 colour OLED controller.
schema_version:   1
chip_id:          ssd1331
driver_status:    partial          # SPI init/framebuffer/present; display facade integration deferred.
display_name:     "Solomon Systech SSD1331 96x64 colour OLED (SPI)"
vendor:           solomon-systech
mpn_population:
  - "SSD1331"

datasheet:
  primary:        "Solomon Systech SSD1331 v1.2 (2008)"

bus:              spi
spi:
  mode:           [0]
  max_clock_hz:   6250000

signals:
  - { name: SCLK, type: input, scope: "SPI clock from host" }
  - { name: MOSI, type: input, scope: "SPI data in from host" }
  - { name: CS, type: input, scope: "chip select, active low" }
  - { name: DC, type: input, scope: "D/C# command/data select GPIO" }
  - { name: RESET, type: input, scope: "optional hardware reset, active low" }
  - { name: VCC, type: power, scope: "OLED panel supply" }
  - { name: VDD, type: power, scope: "logic supply" }
  - { name: GND, type: ground }

resolutions:
  max:            [96, 64]
  presets:        ["96x64"]
  pixel_format:   rgb565

kconfig:
  zephyr:         ALP_SDK_CHIP_SSD1331
  baremetal:      ALP_SDK_CHIP_SSD1331

families:
  - aen
  - v2n
  - v2n-m1
  - imx93

verification:
  hil_silicon:    untested
  smoke_tests:    null_arg_guard
