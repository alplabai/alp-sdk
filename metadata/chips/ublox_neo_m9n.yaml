# Alp SDK chip manifest: u-blox NEO-M9N GNSS receiver.
schema_version:   1
chip_id:          ublox_neo_m9n
driver_status:    complete         # NMEA line read; sentence parsing in consumer code.
display_name:     "u-blox NEO-M9N multi-constellation GNSS receiver"
vendor:           ublox
mpn_population:
  - "NEO-M9N-00B"

datasheet:
  primary:        "u-blox NEO-M9N datasheet UBX-19014285 v1.10"

bus:              uart
uart:
  baud_rate:      9600              # default NMEA 0183
  framing:        "8N1"

gnss:
  constellations: [gps, glonass, galileo, beidou]

physical:
  # Pre-routed GNSS module (not a bare die/package) -- lighter module
  # form, no pins/footprint. Per u-blox NEO-M9N-00B datasheet
  # UBX-19014285 R08, section 6 "Mechanical specifications" (Table 20:
  # typical 16.0 x 12.2 x 2.4mm, "NEO form factor" 16-pad LCC) and
  # section 4.2 "Operating conditions" (Topr -40 to +85 degC). Module
  # has no on-board antenna: RF_IN (pin 11) is the GNSS RF input and
  # VCC_RF (pin 9) + LNA_EN (pin 14) drive an external active antenna;
  # both active and passive external antennas are supported. Module
  # also breaks out a 16-pad UART/I2C/SPI/USB interface not modeled
  # here since this form omits pins per the module template.
  package:              "16-pad LCC (leadless chip carrier)"
  dimension_mm:         "16.0 x 12.2 x 2.4"
  antenna:              external
  operating_temp_deg_c: "-40..85"
  visibility:            public
  provenance:            web_provisional

kconfig:
  zephyr:         ALP_SDK_CHIP_UBLOX_NEO_M9N
  baremetal:      ALP_SDK_CHIP_UBLOX_NEO_M9N

families:
  - aen
  - v2n
  - v2n-m1
  - imx93

verification:
  hil_silicon:    untested        # paper-correct only until v1.0 verification sweep.
  smoke_tests:    null_arg_guard
