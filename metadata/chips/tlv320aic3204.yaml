# Alp SDK chip manifest: TI TLV320AIC3204 premium stereo codec.
schema_version:   1
chip_id:          tlv320aic3204
driver_status:    stub
display_name:     "TI TLV320AIC3204 premium stereo audio codec w/ miniDSP"
vendor:           ti
mpn_population:
  - "TLV320AIC3204IRHBT"

datasheet:
  primary:        "TI TLV320AIC3204 datasheet SLAS549G (Nov 2018)"

bus:              i2c
i2c:
  addresses:
    - { addr_7bit: 0x18, scope: "ADDR strap = low (default)" }
    - { addr_7bit: 0x19, scope: "ADDR strap = high" }
  max_clock_hz:   400000

audio:
  channels:       2
  bitdepth_max:   32
  features:       [stereo, mic_input, line_output, headphone_amp, minidsp]

kconfig:
  zephyr:         ALP_SDK_CHIP_TLV320AIC3204
  baremetal:      ALP_SDK_CHIP_TLV320AIC3204

families:
  - aen
  - v2n
  - v2n-m1

verification:
  hil_silicon:    untested
  smoke_tests:    null_arg_guard
