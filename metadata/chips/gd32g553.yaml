# Alp SDK chip manifest: GigaDevice GD32G553MEY7TR supervisor MCU.
#
# Acts as the V2N module's companion / IO MCU.  Host-side driver
# reaches it over the hybrid SPI + I2C bridge defined in
# docs/gd32-bridge-protocol.md.
schema_version:   1
chip_id:          gd32g553
driver_status:    partial               # host driver: full surface.
                                        # firmware: PING/GET_VERSION/GPIO/PWM/ADC/DAC/QENC/
                                        # COUNTER/TRNG/TMU/PWM_CAPTURE/PWM_SINGLE_PULSE/
                                        # TIMER_SYNC/POWER_MODE_SET/ADC_STREAM/ADC_DSP_CHAIN_*
                                        # bodies landed (see docs/gd32-bridge-protocol.md +
                                        # firmware/gd32-bridge/hal/gd32/init.c).  Still partial:
                                        # PWM_CONFIGURE + ADC_CONFIGURE only accept defaults
                                        # (#495 / #494); ADC DSP chains bind but don't yet
                                        # transform stream samples (#496); PWM_CAPTURE edges
                                        # pending a V2N pad-routing rework.  All of the above
                                        # are still HiL-gated end to end -- see
                                        # docs/v1.0-readiness.md §1a.
display_name:     "GigaDevice GD32G553MEY7TR Cortex-M33 supervisor MCU"
vendor:           gigadevice
mpn_population:
  - "GD32G553MEY7TR"                    # 216 MHz Cortex-M33 core, 512 KB flash, 128 KB SRAM.
                                        # Timer clock domain (TIMER0/TIMER7) = CK_APB
                                        # at DIV1 = the same 216 MHz as the core (no
                                        # separate timer PLL exists on this part) --
                                        # see pwm_routing.counter_clock_hz.
datasheet:
  primary:        "GD32G553xx datasheet"
  user_manual:    "GD32G553 user manual"
notes: |
  The host-side driver (chips/gd32g553/) is a pure C99 module that
  rides <alp/peripheral.h> -- it speaks SPI master and / or I2C
  master against the GD32 from the Renesas side.  The matching
  firmware tree lives in firmware/gd32-bridge/ (separate compile artifact,
  separate flash binary, separate toolchain) -- see
  docs/gd32-bridge.md.

  Hardware control surface from V2N (planned 2026-05-12; SWD-from-host design):
    - SPI fast path (P76/77/96/97 host  ↔  PA8/9/10/PB15 GD32 slave)
    - I2C management path (P07/P06 host ↔  PA15/PB9 GD32 slave; 7-bit
      address 0x70 by default, configurable on the firmware side).
    - GD32_NRST  (P74; shared with primary PMIC reset-out -- open-drain)
    - GD32_SWDIO (P70; host drives SWD data; displaces former GPT0_GTIOC0A / E1M PWM2 Renesas-side drive)
    - GD32_SWCLK (P71; host drives SWD clock; displaces former GPT0_GTIOC0B / E1M PWM3 Renesas-side drive)
    - SWD header (PA13/PA14) -- still accessible for external probes
      during dev / factory.

bus:              hybrid                 # SPI + I2C carry the same protocol
spi:
  role:           master_on_renesas      # GD32 is the slave
  renesas_pads:
    sclk:         P96
    miso:         P77
    mosi:         P76
    cs:           P97
  gd32_pads:
    sclk:         PA9
    miso:         PA10
    mosi:         PB15
    cs:           PA8
  mode:           0                      # CPOL=0, CPHA=0, MSB-first
  word_bits:      8
i2c:
  role:           master_on_renesas      # GD32 is the slave
  renesas_pads:                          # BRD_I2C (RIIC8)
    scl:          P07
    sda:          P06
  gd32_pads:                             # I2C0 on the GD32 side
    scl:          PA15
    sda:          PB9
  default_address_7bit: 0x70

signals:
  - { name: GD32_SWDIO,  type: bidir,  v2n_route: "Renesas P70 (was GPT0_GTIOC0A / E1M PWM2)",
      notes: "host-driven SWD data line for in-field reflash + recovery" }
  - { name: GD32_SWCLK,  type: input,  v2n_route: "Renesas P71 (was GPT0_GTIOC0B / E1M PWM3)",
      notes: "host-driven SWD clock line" }
  - { name: GD32_NRST,   type: input,  v2n_route: "Renesas P74 (open-drain, shared with primary PMIC reset-out)",
      notes: "host pad configured open-drain; drive low to assert reset, HiZ to release" }
  - { name: GD32_SWDIO_HDR, type: bidir, v2n_route: "(programming header, GD32 PA13)" }
  - { name: GD32_SWCLK_HDR, type: input, v2n_route: "(programming header, GD32 PA14)" }
  - { name: VDDA,  type: power,  notes: "analog supply; datasheet ball J5" }
  - { name: VSSA,  type: ground, notes: "analog ground; datasheet ball H6" }
  - { name: VREFP, type: power,  notes: "ADC reference; VREFN is internally tied to VSSA per datasheet note (1)" }
  - { name: VBAT,  type: power,  notes: "backup-domain supply; datasheet ball B9" }
  - { name: BOOT0, type: input,  notes: "boot-mode strap, shared with GPIO PB8 (datasheet ball B7)" }

# --------------------------------------------------------------------
# E1M PWM routing on the GD32 side.  All eight E1M PWM channels ride
# the GD32's two 16-bit advanced timers (TIMER0 + TIMER7).  Counter
# clock is the 216 MHz CK_TIMER (= CK_APB at DIV1 = the Cortex-M33
# core clock; this part has NO separate timer PLL -- a long-standing
# "240 MHz timer clock" claim here was invented and is corrected as
# of fw v0.2.4); effective LSB ~4.63 ns; maximum period ~303 us at
# full 16-bit count.  Firmware translates caller `period_ns` /
# `duty_ns` from CMD_PWM_SET into the timer's CAR / CHnCV register
# pair and reports the register-derived actual via CMD_PWM_GET.
pwm_routing:
  counter_clock_hz: 216000000
  channels:
    - { e1m: PWM0, gd32_pad: PA11, timer: TIMER0, channel: MCH0 }
    - { e1m: PWM1, gd32_pad: PB1,  timer: TIMER0, channel: MCH2 }
    - { e1m: PWM2, gd32_pad: PB14, timer: TIMER0, channel: MCH1 }
    - { e1m: PWM3, gd32_pad: PC5,  timer: TIMER0, channel: MCH3 }
    - { e1m: PWM4, gd32_pad: PC10, timer: TIMER7, channel: MCH0 }
    - { e1m: PWM5, gd32_pad: PC11, timer: TIMER7, channel: MCH1 }
    - { e1m: PWM6, gd32_pad: PC12, timer: TIMER7, channel: MCH2 }
    - { e1m: PWM7, gd32_pad: PD0,  timer: TIMER7, channel: MCH3 }
  notes: |
    Both TIMER0 and TIMER7 are 16-bit advanced-control timers with
    dead-time generation, complementary output, and break-input
    support.  The 16-bit counter at the 216 MHz CK_TIMER gives
    ~4.63 ns LSB; periods longer than ~303 us require the firmware's
    repetition-counter / prescaler logic (firmware-internal, not
    surfaced via CMD_PWM_SET).  Channel ordering matches the
    GD32G553 datasheet -- note that on TIMER0, MCH2 (not MCH1) maps
    to E1M PWM1 on V2N pad PB1; firmware honours the datasheet
    layout.

physical:
  # Pins per GigaDevice GD32G553xx datasheet Rev 1.0.1, table 2-5
  # "GD32G553MxY7TR WLCSP81 pin definitions" (81-ball WLCSP, 4x4mm
  # per GigaDevice ordering collateral).  Per the task scope for this
  # sweep, only the power/ground/key-function balls are populated
  # here -- NOT all 81 balls (most are general-purpose GPIO with long
  # alternate-function lists; see the datasheet directly for those).
  # SWDIO/SWCLK/NRST reuse the GD32_SWDIO/GD32_SWCLK/GD32_NRST signals
  # declared above, since those already describe this exact physical
  # net (GD32 PA13/PA14/NRST) from the V2N routing side.
  refdes_prefix: U
  package:       WLCSP-81
  footprint:     wlcsp_81_4p0x4p0mm
  visibility:    public
  provenance:    web_provisional
  pins:
    - { pad: "A1", signal: "VDD" }
    - { pad: "B1", signal: "VSS" }
    - { pad: "E1", signal: "VDD" }
    - { pad: "F1", signal: "VSS" }
    - { pad: "J1", signal: "VDD" }
    - { pad: "J2", signal: "VSS" }
    - { pad: "A8", signal: "VSS" }
    - { pad: "A9", signal: "VDD" }
    - { pad: "H9", signal: "VSS" }
    - { pad: "J9", signal: "VDD" }
    - { pad: "J5", signal: "VDDA" }
    - { pad: "H6", signal: "VSSA" }
    - { pad: "J6", signal: "VREFP" }
    - { pad: "B9", signal: "VBAT" }
    - { pad: "D8", signal: "GD32_NRST" }   # datasheet "PG10-NRST"
    - { pad: "B2", signal: "GD32_SWDIO" }  # datasheet "PA13", default JTMS/SWDIO
    - { pad: "C3", signal: "GD32_SWCLK" }  # datasheet "PA14", default JTCK/SWCLK
    - { pad: "B7", signal: "BOOT0" }       # datasheet "PB8/BOOT0"
  passives:
    # Per datasheet Figure 4-1 "Recommended power supply decoupling
    # capacitors": 100nF per VDD pin + one shared 4.7uF bulk cap; VDDA
    # gets 1uF + 10nF; VREFP gets 1uF; VBAT gets 10nF.
    - { role: decouple, value: 100nF, net: VDD,   refdes_prefix: C }
    - { role: bulk,      value: 4.7uF, net: VDD,   refdes_prefix: C }
    - { role: decouple,  value: 1uF,   net: VDDA,  refdes_prefix: C }
    - { role: decouple,  value: 10nF,  net: VDDA,  refdes_prefix: C }
    - { role: decouple,  value: 1uF,   net: VREFP, refdes_prefix: C }
    - { role: decouple,  value: 10nF,  net: VBAT,  refdes_prefix: C }

protocol:
  doc:            "docs/gd32-bridge-protocol.md"
  major_version:  0                      # host insists on exact major match
  shared_handler_table: true             # SPI + I2C share firmware/gd32-bridge/src/protocol.c

kconfig:
  zephyr:         ALP_SDK_CHIP_GD32G553
  baremetal:      ALP_SDK_CHIP_GD32G553
  yocto:          n/a                    # Linux side opens the bus via SPI char device + i2c-dev

families:
  - v2n                                  # always populated (companion MCU)
  - v2n-m1

verification:
  hil_silicon:    untested        # paper-correct only until v1.0 verification sweep.
  smoke_tests:    null_arg_guard
