# Alp SDK chip manifest: ADI MAX31855 K-type thermocouple-to-digital.
schema_version:   1
chip_id:          max31855
driver_status:    complete
display_name:     "ADI (Maxim) MAX31855 K-type thermocouple-to-digital converter"
vendor:           adi_maxim
mpn_population:
  - "MAX31855KASA+"

datasheet:
  primary:        "Maxim MAX31855 datasheet Rev 4 (Aug 2015)"

bus:              spi
spi:
  mode:           [0]
  max_clock_hz:   5000000

sensor:
  thermocouple_types: ["K"]
  resolution_c:   0.25
  range_c:        [-270, 1372]

kconfig:
  zephyr:         ALP_SDK_CHIP_MAX31855
  baremetal:      ALP_SDK_CHIP_MAX31855

families:
  - aen
  - v2n
  - v2n-m1
  - imx93

verification:
  hil_silicon:    untested        # paper-correct only until v1.0 verification sweep.
  smoke_tests:    null_arg_guard

signals:
  - { name: "T+",  type: analog, scope: "thermocouple input, positive" }
  - { name: "T-",  type: analog, scope: "thermocouple input, negative" }
  - { name: SCK,   type: input,  scope: "SPI clock input" }
  - { name: CS,    type: input,  scope: "SPI chip select, active low" }
  - { name: SO,    type: output, scope: "SPI serial data output" }

physical:
  # pins per Maxim MAX31855 datasheet 19-5793 Rev 2 (2/12), SO-8 typical
  # application circuit (Fig. "Typical Application Circuit") + text pinout
  # widely reproduced by distributors (Adafruit mirror cross-checked).
  refdes_prefix: U
  package:       SO-8
  footprint:     so_8
  visibility:    public
  provenance:    web_provisional
  pins:
    - { pad: "1", signal: "GND" }
    - { pad: "2", signal: "T-" }
    - { pad: "3", signal: "T+" }
    - { pad: "4", signal: "VCC" }
    - { pad: "5", signal: "SCK" }
    - { pad: "6", signal: "CS" }
    - { pad: "7", signal: "SO" }
    # pad 8 = DNC (do not connect) per datasheet; omitted (not signal-bearing).
  passives:
    # 0.1uF VCC-GND decouple per the datasheet's Typical Application Circuit.
    - { role: decouple, value: 100nF, net: VCC, refdes_prefix: C }
