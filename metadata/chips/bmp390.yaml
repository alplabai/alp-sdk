# Alp SDK chip manifest: Bosch BMP390 pressure sensor (I2C).
schema_version:   1
chip_id:          bmp390
driver_status:    stub             # chip-ID + soft reset; pressure read path land later.
display_name:     "Bosch BMP390 high-precision barometric pressure sensor"
vendor:           bosch
mpn_population:
  - "BMP390"

datasheet:
  primary:        "Bosch BMP390 datasheet v1.4 (Nov 2020)"

bus:              i2c
i2c:
  addresses:
    - { addr_7bit: 0x77, scope: "SDO = high (default)" }
    - { addr_7bit: 0x76, scope: "SDO = low" }
  max_clock_hz:   3400000          # I3C-style fast-mode-plus

precision:
  accuracy_hpa:   0.03
  range_hpa:      [300, 1250]

kconfig:
  zephyr:         ALP_SDK_CHIP_BMP390
  baremetal:      ALP_SDK_CHIP_BMP390

families:
  - aen
  - v2n
  - v2n-m1
  - imx93   # plain I2C; NX9 exposes E1M I2C0 directly (see ssd1306.yaml note)

verification:
  hil_silicon:    untested        # paper-correct only until v1.0 verification sweep.
  smoke_tests:    null_arg_guard

signals:
  - { name: SCK,    type: input,  scope: "I2C SCL (4-/3-wire SPI clock in SPI mode; unused here)" }
  - { name: SDI,    type: bidir,  scope: "I2C SDA (SPI data-in / 3-wire SPI data-in-out; unused here)" }
  - { name: SDO,    type: input,  scope: "I2C address-select bit (SA0): GND=0x76, VDDIO=0x77 (SPI data-out; unused here)" }
  - { name: CSB,    type: input,  scope: "SPI chip select; tie to VDDIO for I2C-only use" }
  - { name: INT,    type: output, scope: "interrupt output; push-pull or open-drain, register-configurable" }
  - { name: VDD,    type: power,  scope: "analog supply" }
  - { name: VDDIO,  type: power,  scope: "digital interface supply" }
  - { name: VSS,    type: ground }

physical:
  # pins per Bosch Sensortec BMP390 datasheet BST-BMP390-DS002-07 Rev 1.7 (03/2021),
  # Table 52 "Pin description" / Figure 23 "Pin-out top and bottom view"
  # (2.0x2.0x0.8mm 10-pin metal-lid LGA). No NC/RESV pins on this package.
  refdes_prefix: U
  package:       LGA-10
  footprint:     lga_10_2p0x2p0mm
  visibility:    public
  provenance:    web_provisional
  pins:
    - { pad: "1",  signal: "VDDIO" }
    - { pad: "2",  signal: "SCK" }
    - { pad: "3",  signal: "VSS" }
    - { pad: "4",  signal: "SDI" }
    - { pad: "5",  signal: "SDO" }
    - { pad: "6",  signal: "CSB" }
    - { pad: "7",  signal: "INT" }
    - { pad: "8",  signal: "VSS" }
    - { pad: "9",  signal: "VSS" }
    - { pad: "10", signal: "VDD" }
  passives:
    # Values per BST-BMP390-DS002-07 sections 6.2/6.3 connection diagrams
    # (C1/C2 = 100nF; R1/R2 = 4.7k I2C pull-ups on SCK/SDI when used as SCL/SDA).
    - { role: decouple, value: 100nF, net: VDDIO, refdes_prefix: C }
    - { role: decouple, value: 100nF, net: VDD,   refdes_prefix: C }
    - { role: pullup,   value: 4k7,   net: SCK,   refdes_prefix: R }
    - { role: pullup,   value: 4k7,   net: SDI,   refdes_prefix: R }
