# ALP SDK chip manifest: Ilitek ILI9488 SPI TFT 320x480.
schema_version:   1
chip_id:          ili9488
driver_status:    partial
display_name:     "Ilitek ILI9488 320x480 SPI TFT controller"
vendor:           ilitek
mpn_population:
  - "ILI9488"

datasheet:
  primary:        "Ilitek ILI9488 datasheet v1.00 (May 2012)"

bus:              spi
spi:
  mode:           [0, 3]
  max_clock_hz:   15000000

signals:
  - { name: SCLK, type: input }
  - { name: MOSI, type: input }
  - { name: CS,   type: input }
  - { name: DC,   type: input, scope: "D/C# command/data" }
  - { name: RESET, type: input, scope: "optional hardware reset" }
  - { name: BL,   type: input, scope: "backlight LED" }

resolutions:
  max:            [320, 480]

kconfig:
  zephyr:         ALP_SDK_CHIP_ILI9488
  baremetal:      ALP_SDK_CHIP_ILI9488

families:
  - aen
  - v2n
  - v2n-m1

verification:
  hil_silicon:    untested        # paper-correct only until v1.0 verification sweep.
  smoke_tests:    null_arg_guard
