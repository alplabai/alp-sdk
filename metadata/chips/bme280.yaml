# ALP SDK chip manifest: Bosch BME280 T/H/P environment sensor.
schema_version:   1
chip_id:          bme280
driver_status:    partial          # init + sampling + raw read + canonical compensation.
display_name:     "Bosch BME280 temperature + humidity + pressure sensor"
vendor:           bosch
mpn_population:
  - "BME280"

datasheet:
  primary:        "Bosch BME280 datasheet v1.6 (Sep 2018)"

bus:              i2c
i2c:
  addresses:
    - { addr_7bit: 0x76, scope: "SDO = GND (default)" }
    - { addr_7bit: 0x77, scope: "SDO = VDD" }
  max_clock_hz:   3400000

precision:
  temp_accuracy_c: 1.0
  pressure_accuracy_hpa: 1.0
  humidity_accuracy_pct: 3.0

kconfig:
  zephyr:         ALP_SDK_CHIP_BME280
  baremetal:      ALP_SDK_CHIP_BME280

families:
  - aen
  - v2n
  - v2n-m1

verification:
  hil_silicon:    untested        # paper-correct only until v1.0 verification sweep.
  smoke_tests:    null_arg_guard
