# Shared board definition for the E1M Development Board
# (35x35 SoM board).  SDK-internal: customers do not reference
# this file directly -- their own board.yaml either points at it
# via `preset: e1m-evk` (for demo apps targeting the stock EVK) or
# carries the same fields inline at the top level (for custom
# boards).  See docs/board-config-schema.md.
#
# Authoritative per-E1M-pad routing lives in this file's
# `e1m_routes:` block below; on-board I2C device addresses +
# INA236 calibration live in the `i2c_devices:` block further
# down.  `scripts/gen_board_header.py` reads both and produces
# `include/alp/boards/alp_e1m_evk_routes.h`.  The remaining
# sections of `alp_e1m_evk.h` (mux enums, overlay-pad indices)
# stay hand-authored until follow-up slices lift them too.
#
# Customers building a custom board copy this file into their
# project root as `board.yaml`, drop the SDK-internal preamble +
# `hw_revisions:` table they don't need, add their own `som:` +
# `cores:` blocks, and edit `name:`, `populated:`, `e1m_routes:`
# for their assembly.  A worked custom example lives at
# metadata/boards/custom-example.yaml.

name: E1M-EVK
display_name: "E1M Development Board (35x35 board)"
hosts_som_families: [alif-ensemble, nxp-imx9]

# Standard population.  Each `true` becomes
# CONFIG_ALP_SDK_CHIP_<NAME>=y at build time; the user can flip
# individual entries to `false` in board.yaml's board.populated
# block for DNI variants.
populated:
  # IMUs -- two are soldered on the EVK (BMI323 + ICM-42670; the app
  # picks which at runtime).  LSM6DSO is NOT on the EVK; an app that
  # wants one attaches it to the I2C/Qwiic header and lists it in its
  # own board.yaml `chips:` array, so it is intentionally absent from
  # this (soldered-parts) block.
  bmi323:                   true
  icm42670:                 true

  # Environmental
  bmp581:                   true
  bme280:                   false               # not on the EVK by default

  # Accelerometer (additional, beyond the IMUs)
  lis2dw12:                 false               # not on the EVK by default

  # Displays -- none are soldered on the EVK.  The SSD1306 OLED attaches
  # via the I2C/Qwiic header (the SSD1331 variant uses SPI); MIPI panels
  # use the DSI/CSI FFC.  Apps that drive a panel declare it per-app in a
  # board.yaml `chips:` array, so panels are intentionally absent here.
  # SSD1331 below is a documented DNI footprint option.
  ssd1331:                  false               # colour OLED (SPI), not on the EVK

  # Camera + camera mux
  ov5640:                   false               # not on the EVK by default
                                                # (use rzv_drp-ai_yolo_cam or e-CAM22)
  cam_mux_pi3wvr626:        true                # MIPI CSI 2:1 camera mux

  # Audio
  pdm_mic:                  true                # 4x PDM mics
  tas2563:                  true                # 2x speaker amps (U27, U28)

  # I/O expander
  tcal9538:                 true                # TCA9538/TCAL9538 at 0x72

  # Power instrumentation
  ina236:                   true                # 6x current monitors at 0x40..0x46

  # SDK-level block helpers (GPIO button + LED on the EVK headers).
  button_led:               true

# E1M-pad → board-feature routing.  Each entry binds an
# E1M-standard pad or peripheral instance to a board-side
# macro name.  The generator `scripts/gen_board_header.py`
# reads this block and produces
# `include/alp/boards/alp_e1m_evk_routes.h` with one
# `#define EVK_<NAME> E1M_<...>` line per entry.
#
# This is the single source of truth for the EVK_PIN_* /
# EVK_*_BUS_* / EVK_UART_PORT_* / EVK_PWM_* / EVK_ARD_PWM* /
# EVK_MB_PWM macros (and, via the `i2c_devices:` block further
# down, the EVK_I2C_ADDR_* / EVK_INA236_* macros) that
# hand-written firmware uses; do not hand-edit the generated
# header.  The remaining sections of
# `include/alp/boards/alp_e1m_evk.h` (mux enums, overlay-pad
# indices) stay hand-authored until follow-up slices lift them too.
#
# Entry schema:
#   - e1m:         <E1M_GPIO_IO<N> | E1M_PWM<N> | E1M_<bus_class><N>>
#     macro:       <EVK_* C-macro name to emit>
#     doc:         "<one-line Doxygen `@brief` text>"  (optional)
#     active_low:  true                                  (optional)
#     board_alias: BOARD_<NAME>                          (optional) portable
#                  cross-EVK alias; emitted in the generated header's BOARD_*
#                  block (e1m-spec STANDARD.md §7.2 common set). The SAME
#                  board_alias must be declared on every board exposing the
#                  role (enforced by tests/scripts/test_board_alias_parity.py).
#
# SoM-side dispatch (which pad reaches the host SoC directly vs. via
# an on-module mediator like the CC3501E) lives in the SoM preset's
# `pad_routes:` block, NOT here -- this board YAML is SoM-agnostic.
e1m_routes:
  gpio:
    - { e1m: E1M_GPIO_IO2,  macro: EVK_PIN_CAM_MUX_SEL,
        doc: "PI3WVR626 SEL pin; see `evk_cam_select_*` enum + chips/cam_mux_pi3wvr626." }
    - { e1m: E1M_GPIO_IO4,  macro: EVK_PIN_ENCODER_SW,    active_low: true,
        board_alias: BOARD_PIN_ENCODER_SW,
        doc: "Rotary encoder push switch (PEC12R-4222F-S0024), 10k pull-up + 0.1uF debounce." }
    - { e1m: E1M_GPIO_IO5,  macro: EVK_PIN_CAM_RST,       active_low: true,
        doc: "Camera reset (active-low)." }
    - { e1m: E1M_GPIO_IO7,  macro: EVK_PIN_PCIE_IOEXP_INT,
        doc: "INT input from the PCIe IO expander." }
    - { e1m: E1M_GPIO_IO8,  macro: EVK_PIN_I2S_MUX_EN,    active_low: true,
        doc: "I2S0 74LVC157 /E (Alif side P7.1); drive low to enable mux." }
    - { e1m: E1M_GPIO_IO9,  macro: EVK_PIN_PCIE_IOEXP_RST,
        doc: "Reset output to the PCIe IO expander." }
    - { e1m: E1M_GPIO_IO10, macro: EVK_PIN_PCIE0_I2C_EN,
        doc: "Drive high to enable I2C mux to the PCIe slot." }
    - { e1m: E1M_GPIO_IO11, macro: EVK_PIN_USB2_MUX_SEL,
        doc: "USB2 TMUXHS221 select: 0 = USB connector, 1 = M.2 E-key USB." }
    - { e1m: E1M_GPIO_IO13, macro: EVK_PIN_I2S_MUX_SEL,
        doc: "I2S0 74LVC157 S; 0 = TAS2563 amps, 1 = M.2 E-key I2S." }
    - { e1m: E1M_GPIO_IO15, macro: EVK_PIN_BMI323_INT1,
        board_alias: BOARD_PIN_BMI323_INT1,
        doc: "BMI323 INT1 (data-ready / motion / FIFO); CC3501E GPIO14." }
    - { e1m: E1M_GPIO_IO16, macro: EVK_PIN_W_DISABLE2,    active_low: true,
        doc: "Bluetooth disable (open-drain, active-low) on M.2 E-key." }
    - { e1m: E1M_GPIO_IO17, macro: EVK_PIN_W_DISABLE1,    active_low: true,
        doc: "Wi-Fi disable (open-drain, active-low) on M.2 E-key." }
    - { e1m: E1M_GPIO_IO18, macro: EVK_PIN_M2E_SDIO_WAKE, active_low: true,
        doc: "M.2 E-key SDIO-path wake (active-low)." }
    - { e1m: E1M_GPIO_IO19, macro: EVK_PIN_M2E_UART_WAKE, active_low: true,
        doc: "M.2 E-key UART-path wake (active-low)." }
    - { e1m: E1M_GPIO_IO20, macro: EVK_PIN_SDIO_MUX_EN,   active_low: true,
        doc: "SDIO 74LVC157 /E; drive low to enable mux." }
    - { e1m: E1M_GPIO_IO21, macro: EVK_PIN_SDIO_MUX_SEL,
        doc: "SDIO 74LVC157 S; 0 = M.2 E-key SDIO, 1 = microSD slot." }
    - { e1m: E1M_GPIO_IO22, macro: EVK_PIN_PCIE_MUX_PD,
        doc: "Drive HIGH to power down all four PCIe lane muxes." }
    - { e1m: E1M_GPIO_IO23, macro: EVK_PIN_PCIE_MUX_SEL,
        doc: "Selects M-key vs E-key routing on the PCIe lane muxes." }
    # RGB LED pads driven as digital GPIOs (the E1M GPIO-secondary of
    # the PWM cluster).  Same physical pads as EVK_PWM_LED_* in the
    # `pwm:` section -- open the PWM macro for brightness/fade, the GPIO
    # macro for plain on/off.  Don't open both functions of a pad at once.
    - { e1m: E1M_GPIO_PWM3, macro: EVK_PIN_LED_RED,
        board_alias: BOARD_PIN_LED_RED,
        doc: "RGB LED red -- the PWM3 pad driven as a digital GPIO." }
    - { e1m: E1M_GPIO_PWM0, macro: EVK_PIN_LED_GREEN,
        board_alias: BOARD_PIN_LED_GREEN,
        doc: "RGB LED green -- the PWM0 pad driven as a digital GPIO." }
    - { e1m: E1M_GPIO_PWM1, macro: EVK_PIN_LED_BLUE,
        board_alias: BOARD_PIN_LED_BLUE,
        doc: "RGB LED blue -- the PWM1 pad driven as a digital GPIO." }
  buses:
    - { e1m: E1M_I2C0,  macro: EVK_I2C_BUS_SENSORS,
        board_alias: BOARD_I2C_SENSORS,
        doc: "Shared sensor + IO-expander + INA236 bus." }
    - { e1m: E1M_I2C1,  macro: EVK_I2C_BUS_DSI_CSI,
        doc: "Display + camera control I2C (touch panel, camera-side I2C config)." }
    - { e1m: E1M_I3C0,  macro: EVK_I2C_BUS_ARDUINO,
        doc: "Arduino UNO header I2C ride on I3C0 (I3C is backwards-compatible with classic I2C)." }
    - { e1m: E1M_SPI1,  macro: EVK_SPI_BUS_ARDUINO,
        board_alias: BOARD_SPI_ARDUINO,
        doc: "Arduino UNO header SPI; terminates on the on-module CC3501E, not the main SoC." }
    - { e1m: E1M_UART0, macro: EVK_UART_PORT_DEBUG,
        board_alias: BOARD_UART_DEBUG,
        doc: "Console UART exposed on the JTAG/SWD-side debug header." }
    - { e1m: E1M_UART1, macro: EVK_UART_PORT_ARDUINO,
        board_alias: BOARD_UART_ARDUINO,
        doc: "Arduino UNO header UART (D0/D1); CK_RXD = UART1_TX, CK_TXD = UART1_RX." }
  pwm:
    - { e1m: E1M_PWM0, macro: EVK_PWM_LED_GREEN,
        board_alias: BOARD_PWM_LED_GREEN,
        doc: "RGB LED green; schematic-wired via PWM0 (non-contiguous with R/B)." }
    - { e1m: E1M_PWM1, macro: EVK_PWM_LED_BLUE,
        board_alias: BOARD_PWM_LED_BLUE,
        doc: "RGB LED blue channel." }
    - { e1m: E1M_PWM1, macro: EVK_ARD_PWM1,
        board_alias: BOARD_PWM_ARD1,
        doc: "Arduino header CK_PWM1; shares E1M_PWM1 with LED_BLUE." }
    - { e1m: E1M_PWM2, macro: EVK_ARD_PWM4,
        doc: "Arduino header CK_PWM4 = E1M_PWM2." }
    - { e1m: E1M_PWM3, macro: EVK_PWM_LED_RED,
        board_alias: BOARD_PWM_LED_RED,
        doc: "RGB LED red channel." }
    - { e1m: E1M_PWM4, macro: EVK_ARD_PWM2,
        board_alias: BOARD_PWM_ARD2,
        doc: "Arduino header CK_PWM2 = E1M_PWM4." }
    - { e1m: E1M_PWM5, macro: EVK_ARD_PWM3,
        board_alias: BOARD_PWM_ARD3,
        doc: "Arduino header CK_PWM3 = E1M_PWM5." }
    - { e1m: E1M_PWM6, macro: EVK_MB_PWM,
        doc: "mikroBUS PWM pin." }
  # The adc: / dac: entries below also drive the portable analog DT
  # aliases: scripts/alp_project.py emits one `alp-adc<N> = &adc<N>;` /
  # `alp-dac<N> = &dac<N>;` per channel into the generated DTS overlay
  # (the `alp-adcN` / `alp-dacN` aliases the <alp/adc.h> / <alp/dac.h>
  # backends resolve their channels through).  The `&adc<N>` / `&dac<N>`
  # phandle is the convention-default node-label; SoCs whose vendor DT
  # node-labels diverge (the Alif Ensemble ADCs are `adc12_0..2`, DACs
  # `dac0/dac1`) repoint the alias in the per-app board overlay
  # (`aliases { alp-adc0 = &adc12_0; };`).  Regenerate after editing:
  #   python3 scripts/alp_project.py --input <board.yaml> --emit dts-overlay
  adc:
    - { e1m: E1M_ADC0, macro: EVK_ADC_BOARD_ID,
        doc: "Carrier-side BOARD_ID resistor divider (see docs/board-id.md)." }
    - { e1m: E1M_ADC1, macro: EVK_ADC_ARDUINO_A1,
        doc: "Arduino UNO header A1 analog input." }
    - { e1m: E1M_ADC2, macro: EVK_ADC_ARDUINO_A2,
        doc: "Arduino UNO header A2 analog input." }
    - { e1m: E1M_ADC3, macro: EVK_ADC_ARDUINO_A3,
        doc: "Arduino UNO header A3 analog input." }
    - { e1m: E1M_ADC4, macro: EVK_ADC_ARDUINO_A4,
        doc: "Arduino UNO header A4 analog input (shared with I2C SDA on classic UNO boards)." }
    - { e1m: E1M_ADC5, macro: EVK_ADC_ARDUINO_A5,
        doc: "Arduino UNO header A5 analog input (shared with I2C SCL on classic UNO boards)." }
    - { e1m: E1M_ADC6, macro: EVK_ADC_MB_AN,
        doc: "mikroBUS click AN pin." }
    - { e1m: E1M_ADC7, macro: EVK_ADC_VBAT_SENSE,
        doc: "Battery voltage divider (4:1 resistor scale) for power-monitor demos." }
  dac:
    - { e1m: E1M_DAC0, macro: EVK_DAC_ARDUINO_DAC0,
        board_alias: BOARD_DAC0,
        doc: "Arduino-shield-style DAC0 output exposed on header J3." }
    - { e1m: E1M_DAC1, macro: EVK_DAC_AUDIO_LINE_OUT,
        board_alias: BOARD_DAC1,
        doc: "Auxiliary line-level audio output (analog, sums with TAS2563 mix)." }
  i2s:
    - { e1m: E1M_I2S0, macro: EVK_I2S_AUDIO_CODEC,
        board_alias: BOARD_I2S_AUDIO,
        doc: "Routed through the 74LVC157 mux to either the TAS2563 amps (default) or the M.2 E-key I2S; see EVK_PIN_I2S_MUX_SEL." }
    - { e1m: E1M_I2S1, macro: EVK_I2S_PDM_MIC,
        doc: "PDM mic capture (4x MP34DT05 mics)." }
  can:
    - { e1m: E1M_CAN0, macro: EVK_CAN_VEHICLE_BUS,
        board_alias: BOARD_CAN0,
        doc: "TCAN1044A transceiver on header J9; termination via jumpers JP1-JP4." }
  qenc:
    - { e1m: E1M_ENC0, macro: EVK_ENC_ROTARY,
        board_alias: BOARD_ENC_ROTARY,
        doc: "PEC12R-4222F-S0024 rotary encoder: ENC0_X = A phase, ENC0_Y = B phase, 24 PPR; push switch on EVK_PIN_ENCODER_SW (E1M_GPIO_IO4)." }

# On-board I2C device instances (all on ALP_E1M_I2C0, the sensor bus).
# Strap values per the EVK schematic UG-E1M-001 + user-supplied
# confirmation.  Single source of truth for the `EVK_I2C_ADDR_*` /
# `EVK_INA236_SHUNT_*` / `EVK_INA236_MAX_*` macros; `scripts/gen_board_header.py`
# reads this block and emits the macros into
# `include/alp/boards/alp_e1m_evk_routes.h`.  Do not hand-edit the
# generated header.
i2c_devices:
  - { macro: EVK_I2C_ADDR_ICM42670, part: icm42670, designator: U12, address: "0x69",
      doc: "U12 IMU (AD0->VIO). Collides with U13 @0x69 until the respin. BENCH-CONFIRMED 2026-06-16 (E1M-AEN801): U12 + U13 both answer at 0x69 and collide -- see EVK_I2C_ADDR_BMI323." }
  - { macro: EVK_I2C_ADDR_BMI323, part: bmi323, designator: U13, address: "0x68",
      doc: "U13 IMU; respin target (SDO->GND = datasheet default). Pre-respin batch mis-straps it to 0x69 (collides w/ U12, see EVK_I2C_ADDR_ICM42670)." }
  - { macro: EVK_I2C_ADDR_BMP581, part: bmp581, designator: U14, address: "0x47",
      doc: "U14 barometer (SDO->VIO; 0x46 if SDO->GND)." }
  - { macro: EVK_I2C_ADDR_TCAL9538_MAIN, part: tcal9538, designator: U35, address: "0x72",
      alias: EVK_I2C_ADDR_TCAL9538,
      doc: "U35 main I/O expander (A1=1, A0=0). Handles LCD/camera/capacitive-touch control + four sensor interrupt inputs." }
  - { macro: EVK_I2C_ADDR_TCAL9538_PCIE, part: tcal9538, designator: U37, address: "0x71",
      doc: "U37 PCIe I/O expander (A0=1, A1=0). Handles the I2C-mux SEL + PCIe slot RST/WAKE/CLKREQ signals + M2E_ALERT." }
  - { macro: EVK_I2C_ADDR_TCA6408A_MAIN, part: tcal9538, designator: U35, address: "0x20",
      doc: "U35 main I/O expander, TCA6408ARSVR alternative (R112 fitted, R145 DNP). PCA9538-register-compatible, so chips/tcal9538 drives it unchanged. BENCH-CONFIRMED 2026-06-16: read back config=0xFF + a live input port." }
  - { macro: EVK_I2C_ADDR_TAS2563_LOW, part: tas2563, designator: U27, address: "0x4D",
      doc: "U27 smart amp (AD0 = 10k to GND)." }
  - { macro: EVK_I2C_ADDR_TAS2563_HIGH, part: tas2563, designator: U28, address: "0x4E",
      doc: "U28 smart amp (AD0 = 10k to VDD). The TAS2563 broadcast address (0x48) is occupied on this EVK by U32 INA236B (+V_CAM0 rail, pre-respin) -- firmware that wants to write both amps must issue two targeted unit-address writes." }
  - { macro: EVK_I2C_ADDR_INA236_3V3, part: ina236, designator: U21, address: "0x40",
      doc: "U21 INA236A, +3V3 rail (20 mOhm shunt, 4.0 A max). A0 = GND.",
      calibration: { shunt_macro: EVK_INA236_SHUNT_3V3_OHMS, shunt_ohms: "0.020",
                     max_macro: EVK_INA236_MAX_3V3_A, max_current_a: "4.0" } }
  - { macro: EVK_I2C_ADDR_INA236_1V8, part: ina236, designator: U31, address: "0x41",
      doc: "U31 INA236A, +1V8 rail (20 mOhm shunt, 4.0 A max). A0 = V+.",
      calibration: { shunt_macro: EVK_INA236_SHUNT_1V8_OHMS, shunt_ohms: "0.020",
                     max_macro: EVK_INA236_MAX_1V8_A, max_current_a: "4.0" } }
  - { macro: EVK_I2C_ADDR_INA236_VIO, part: ina236, designator: U33, address: "0x42",
      doc: "U33 INA236A, +VIO rail (50 mOhm shunt, 1.6 A max). A0 = SDA.",
      calibration: { shunt_macro: EVK_INA236_SHUNT_VIO_OHMS, shunt_ohms: "0.050",
                     max_macro: EVK_INA236_MAX_VIO_A, max_current_a: "1.6" } }
  - { macro: EVK_I2C_ADDR_INA236_VCAM0, part: ina236, designator: U32, address: "0x4B",
      doc: "U32 INA236B, +V_CAM0 rail (50 mOhm shunt, 1.6 A max). Re-strapped A0=SCL -> 0x4B from the next batch; PRE-RESPIN boards had it at 0x48, which collides with the TAS2563 broadcast address (unreadable there).",
      calibration: { shunt_macro: EVK_INA236_SHUNT_VCAM0_OHMS, shunt_ohms: "0.050",
                     max_macro: EVK_INA236_MAX_VCAM0_A, max_current_a: "1.6" } }
  - { macro: EVK_I2C_ADDR_INA236_VCAM1, part: ina236, designator: U34, address: "0x49",
      doc: "U34 INA236B, +V_CAM1 rail (50 mOhm shunt, 1.6 A max). A0 = V+.",
      calibration: { shunt_macro: EVK_INA236_SHUNT_VCAM1_OHMS, shunt_ohms: "0.050",
                     max_macro: EVK_INA236_MAX_VCAM1_A, max_current_a: "1.6" } }
  - { macro: EVK_I2C_ADDR_INA236_5V, part: ina236, designator: U30, address: "0x4A",
      doc: "U30 INA236B, +5V rail (20 mOhm shunt, 4.0 A max). A0 = SDA.",
      calibration: { shunt_macro: EVK_INA236_SHUNT_5V_OHMS, shunt_ohms: "0.020",
                     max_macro: EVK_INA236_MAX_5V_A, max_current_a: "4.0" } }

# Inference + display defaults a stock EVK app would pick.  Apps
# override in their board.yaml as needed.
defaults:
  display:                  ssd1306             # default panel for apps that attach an
                                                # SSD1306 to the I2C header (none is soldered)
  primary_imu:              bmi323              # canonical soldered IMU (ICM-42670 is the alternate)

# Hardware revisions.  Same ADC + resistor-divider scheme as the
# SoM modules (see metadata/e1m_modules/aen/hw-revisions.yaml for
# the full math) -- the board has no spare GPIO either, so the
# rev is sampled on a dedicated ADC channel exposed at one of the
# E1M-spec ADC pads.  Board-specific ADC channel is TBD pending
# the EVK schematic's BOARD_ID net assignment.
default_hw_rev:             r1

hw_revisions:
  r1:
    min_sdk_version: "0.3.0"
    max_sdk_version: ~
    status: production
    board_id:
      adc_channel:    TBD
      # Divider resistor values + per-rev `expected_mv` + `bin_radius_mv`
      # thresholds live in the private `alp-sdk-internal` repo per
      # the public/private split policy.  hw_info_zephyr.c's ADC
      # cross-check consumes them via a generated header (see
      # docs/board-id.md for the divider math + the studio pipeline).
    notes: |
      First production revision of the E1M EVK (35x35 board).
      Wiring authoritative per the `e1m_routes:` block above
      (`include/alp/boards/alp_e1m_evk_routes.h` is generated
      from it).

status:
  preliminary:              false
  partial_hw_config:        false               # wiring authoritative via the `e1m_routes:` block
